<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TravelKeeper 系統總後台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --green:      #06C755;
      --green-dark: #00B900;
      --green-bg:   #E8FBF0;
      --green-mid:  #B8EDD0;
      --sidebar:    #1A1A1A;
      --sidebar-w:  220px;
      --bg:         #F0F2F0;
      --white:      #FFFFFF;
      --text:       #111111;
      --sub:        #717171;
      --border:     #E5E5E5;
      --amber:      #FF9500;
      --red:        #FF3B30;
      --blue:       #007AFF;
      --purple:     #AF52DE;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* Sidebar */
    .sb { position:fixed; left:0; top:0; bottom:0; width:var(--sidebar-w); background:var(--sidebar); display:flex; flex-direction:column; z-index:200; }
    .sb-head { padding:20px 16px 18px; border-bottom:1px solid rgba(255,255,255,.07); }
    .sb-logo { display:flex; align-items:center; gap:10px; }
    .sb-logo-icon { width:38px; height:38px; background:var(--green); border-radius:10px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .sb-section { padding:16px 16px 6px; font-size:10px; font-weight:700; color:rgba(255,255,255,.22); text-transform:uppercase; letter-spacing:.12em; }
    .sb-item { display:flex; align-items:center; gap:10px; padding:11px 16px; font-size:13px; font-weight:700; color:rgba(255,255,255,.4); cursor:pointer; transition:all .15s; position:relative; }
    .sb-item:hover { color:rgba(255,255,255,.8); background:rgba(255,255,255,.04); }
    .sb-item.on { color:#fff; background:rgba(6,199,85,.14); }
    .sb-item.on::before { content:''; position:absolute; left:0; top:6px; bottom:6px; width:3px; background:var(--green); border-radius:0 2px 2px 0; }
    .sb-badge { margin-left:auto; background:var(--red); color:#fff; font-size:10px; font-weight:900; min-width:18px; padding:1px 5px; border-radius:999px; text-align:center; }
    .sb-foot { margin-top:auto; border-top:1px solid rgba(255,255,255,.07); padding:14px 16px; display:flex; align-items:center; gap:10px; }

    /* Main */
    .main { margin-left:var(--sidebar-w); min-height:100vh; }
    .topbar { position:sticky; top:0; z-index:100; background:var(--white); border-bottom:1px solid var(--border); padding:0 28px; height:56px; display:flex; align-items:center; justify-content:space-between; }
    .tb-title { font-size:16px; font-weight:900; }
    .tb-sub { font-size:11px; color:var(--sub); margin-top:1px; }
    .content { padding:24px 28px; }

    /* Cards */
    .card { background:var(--white); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
    .card-head { padding:14px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    .card-title { font-size:13px; font-weight:900; }
    .card-body { padding:20px; }

    /* Stat cards */
    .stat-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin-bottom:18px; }
    .scard { background:var(--white); border:1px solid var(--border); border-radius:12px; padding:16px 18px; position:relative; overflow:hidden; }
    .scard::after { content:''; position:absolute; bottom:0; left:0; right:0; height:3px; }
    .scard.g::after { background:var(--green); }
    .scard.a::after { background:var(--amber); }
    .scard.b::after { background:var(--blue); }
    .scard.r::after { background:var(--red); }
    .scard.p::after { background:var(--purple); }
    .scard-icon { position:absolute; top:14px; right:14px; opacity:.07; }
    .scard-label { font-size:11px; color:var(--sub); font-weight:700; margin-bottom:8px; }
    .scard-val { font-size:28px; font-weight:900; line-height:1; }
    .scard-change { font-size:11px; font-weight:700; color:var(--green); margin-top:6px; }

    /* Table */
    .tbl { width:100%; border-collapse:collapse; }
    .tbl th { background:#FAFAFA; font-size:11px; font-weight:700; color:var(--sub); text-transform:uppercase; letter-spacing:.08em; padding:10px 16px; text-align:left; border-bottom:1px solid var(--border); }
    .tbl td { padding:13px 16px; font-size:13px; border-bottom:1px solid #F5F5F5; vertical-align:middle; }
    .tbl tr:last-child td { border-bottom:none; }
    .tbl tbody tr:hover td { background:#FAFFF9; }

    /* Badge */
    .badge { display:inline-flex; align-items:center; padding:3px 9px; border-radius:999px; font-size:10px; font-weight:700; text-transform:uppercase; }
    .bg { background:var(--green-bg); color:#00A040; }
    .ba { background:#FFF3E0; color:#E65100; }
    .br { background:#FFF0EE; color:var(--red); }
    .bb { background:#EEF5FF; color:#005FCC; }
    .bx { background:#F5F5F5; color:var(--sub); }

    /* Buttons */
    .btn { display:inline-flex; align-items:center; gap:5px; padding:7px 14px; border-radius:7px; border:none; font-size:12px; font-weight:700; cursor:pointer; font-family:'Noto Sans TC',sans-serif; transition:all .15s; }
    .btn-primary { background:var(--green); color:#fff; box-shadow:0 2px 8px rgba(6,199,85,.3); }
    .btn-primary:hover { background:var(--green-dark); transform:translateY(-1px); }
    .btn-ok  { background:var(--green-bg); color:#00A040; border:1px solid var(--green-mid); }
    .btn-ok:hover  { background:var(--green-mid); }
    .btn-no  { background:#FFF0EE; color:var(--red); border:1px solid #FFD0CC; }
    .btn-no:hover  { background:#FFD8D4; }
    .btn-ghost { background:#F5F5F5; color:var(--sub); }
    .btn-ghost:hover { background:#EBEBEB; color:var(--text); }
    .btn-ol { background:transparent; color:var(--green); border:1.5px solid var(--green); }
    .btn-ol:hover { background:var(--green-bg); }

    /* Avatar */
    .ava { width:34px; height:34px; border-radius:50%; background:var(--green-bg); color:var(--green-dark); font-size:13px; font-weight:900; display:flex; align-items:center; justify-content:center; flex-shrink:0; }

    /* Bar chart */
    .bars { display:flex; align-items:flex-end; gap:5px; height:50px; }
    .bar { flex:1; background:var(--green-bg); border-radius:4px 4px 0 0; transition:background .2s; cursor:default; }
    .bar.now { background:var(--green); }
    .bar:hover { background:var(--green-dark); }

    /* Activity dot */
    .adot { width:8px; height:8px; border-radius:50%; flex-shrink:0; margin-top:5px; }

    /* Toast */
    .toast-wrap { position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#111; color:#fff; padding:10px 22px; border-radius:999px; font-size:13px; font-weight:700; z-index:9999; display:flex; align-items:center; gap:8px; box-shadow:0 4px 20px rgba(0,0,0,.22); animation:tIn .3s cubic-bezier(.22,1,.36,1); }
    @keyframes tIn { from{opacity:0;transform:translateX(-50%) translateY(-10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }

    /* Animations */
    @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    .a0{animation:fadeUp .35s cubic-bezier(.22,1,.36,1) both}
    .a1{animation:fadeUp .35s .05s cubic-bezier(.22,1,.36,1) both}
    .a2{animation:fadeUp .35s .10s cubic-bezier(.22,1,.36,1) both}
    .a3{animation:fadeUp .35s .15s cubic-bezier(.22,1,.36,1) both}
    .a4{animation:fadeUp .35s .20s cubic-bezier(.22,1,.36,1) both}
    .a5{animation:fadeUp .35s .25s cubic-bezier(.22,1,.36,1) both}

    select { background:var(--white); border:1px solid var(--border); color:var(--text); border-radius:7px; padding:7px 12px; font-size:12px; font-weight:700; font-family:'Noto Sans TC',sans-serif; outline:none; cursor:pointer; }
    select:focus { border-color:var(--green); }

    /* Tenant card color strip */
    .tstrip { height:4px; border-radius:12px 12px 0 0; }

    /* Setting row */
    .srow { display:flex; align-items:center; justify-content:space-between; padding:14px 0; border-bottom:1px solid var(--border); }
    .srow:last-child { border-bottom:none; }

    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-thumb { background:#D5D5D5; border-radius:10px; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react,env">
  const { useState, useEffect } = React;
  const WORKER_URL = 'https://travelkeeper.fangwl591021.workers.dev';

  /* ── SVG Icon helper ── */
  const Ic = ({ d, size=16, color }) => (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
         stroke={color||'currentColor'} strokeWidth="2"
         strokeLinecap="round" strokeLinejoin="round" style={{flexShrink:0}}>{d}</svg>
  );
  const I = {
    grid:   <><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></>,
    users:  <><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>,
    bldg:   <><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></>,
    bell:   <><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></>,
    check:  <><polyline points="20 6 9 17 4 12"/></>,
    xmark:  <><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>,
    reload: <><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></>,
    trend:  <><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></>,
    gear:   <><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></>,
    map:    <><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></>,
    eye:    <><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></>,
    exit:   <><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></>,
    plus:   <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
  };

  /* helpers */
  const ago = ts => { if(!ts) return '—'; const d=Math.floor((Date.now()-new Date(ts))/86400000); return d===0?'今天':d===1?'昨天':`${d} 天前`; };
  const fmt = n => Number(n||0).toLocaleString();
  const ini = s => (s||'?')[0].toUpperCase();
  const actCol = t => t==='green'?'#06C755':t==='red'?'#FF3B30':t==='pending'?'#FF9500':'#007AFF';

  /* mock */
  const MS = { tenants:12, distributors:148, pending:7, itineraries:94, revenue:4820000 };
  const MT = [
    {slug:'demo',      name:'旅遊管家示範社', distributors:32,itineraries:18,status:'active', created_at:'2024-01-15'},
    {slug:'sunshine',  name:'陽光旅行社',     distributors:21,itineraries:12,status:'active', created_at:'2024-02-20'},
    {slug:'eastwind',  name:'東風旅遊',        distributors:15,itineraries:9, status:'active', created_at:'2024-03-10'},
    {slug:'globetrek', name:'環球探索',        distributors:8, itineraries:5, status:'trial',  created_at:'2024-05-01'},
    {slug:'bluewave',  name:'藍波旅行',        distributors:0, itineraries:0, status:'pending',created_at:'2024-06-18'},
  ];
  const MP = [
    {uid:'Ua1',name:'王小明',phone:'0912-111-111',company_name:'自由業',  agency:'demo',     created_at:'2024-06-20',ref_uid:''},
    {uid:'Ub2',name:'李美華',phone:'0933-222-333',company_name:'環島旅遊',agency:'sunshine', created_at:'2024-06-19',ref_uid:'Uf123abc'},
    {uid:'Uc3',name:'陳大偉',phone:'0966-444-555',company_name:'',        agency:'eastwind', created_at:'2024-06-18',ref_uid:''},
    {uid:'Ud4',name:'林佳欣',phone:'0988-666-777',company_name:'景程企業',agency:'demo',     created_at:'2024-06-17',ref_uid:'Uf456def'},
    {uid:'Ue5',name:'張志遠',phone:'0911-888-999',company_name:'',        agency:'globetrek',created_at:'2024-06-16',ref_uid:''},
    {uid:'Uf6',name:'吳雅玲',phone:'0955-123-456',company_name:'玲瓏旅行',agency:'sunshine', created_at:'2024-06-15',ref_uid:''},
    {uid:'Ug7',name:'蔡宗翰',phone:'0977-654-321',company_name:'',        agency:'demo',     created_at:'2024-06-14',ref_uid:'Uf789ghi'},
  ];
  const MA = [
    {time:'10:32',event:'新夥伴申請',detail:'王小明 申請加入 demo',    type:'pending'},
    {time:'09:15',event:'審核通過',  detail:'林佳欣 已獲授權',         type:'green'},
    {time:'08:54',event:'新行程上架',detail:'東風旅遊「東京賞楓五日」',type:'blue'},
    {time:'昨天', event:'新租戶開通',detail:'藍波旅行 系統上線',        type:'blue'},
    {time:'昨天', event:'申請拒絕',  detail:'某用戶 資料不符',          type:'red'},
    {time:'2天前',event:'新行程上架',detail:'陽光旅行社 + 3 筆行程',   type:'green'},
  ];
  const WB = [30,45,28,60,42,72,55];

  /* ── Sidebar item ── */
  function SbItem({id,label,icon,badge,active,onClick}) {
    return (
      <div className={`sb-item${active?' on':''}`} onClick={()=>onClick(id)}>
        <Ic d={icon} size={15} color={active?'#06C755':undefined}/>
        <span style={{flex:1}}>{label}</span>
        {badge>0 && <span className="sb-badge">{badge}</span>}
      </div>
    );
  }

  /* ── Stat card ── */
  function SC({label,val,change,cls,icon}) {
    return (
      <div className={`scard ${cls}`}>
        <div className="scard-icon"><Ic d={icon} size={44}/></div>
        <div className="scard-label">{label}</div>
        <div className="scard-val">{val}</div>
        {change && <div className="scard-change">{change}</div>}
      </div>
    );
  }

  /* ── App ── */
  function App() {
    const [page,  setPage]  = useState('dashboard');
    const [stats, setStat]  = useState(MS);
    const [ten,   setTen]   = useState(MT);
    const [pend,  setPend]  = useState(MP);
    const [filt,  setFilt]  = useState('all');
    const [toast, setToast] = useState('');

    const showToast = msg => { setToast(msg); setTimeout(()=>setToast(''),2800); };

    useEffect(()=>{
      (async()=>{
        try{ const r=await fetch(`${WORKER_URL}/api/super/stats`);    if(r.ok){const d=await r.json();if(d.success)setStat(d.data);} }catch{}
        try{ const r=await fetch(`${WORKER_URL}/api/super/tenants`);  if(r.ok){const d=await r.json();if(d.success)setTen(d.data);}  }catch{}
        try{ const r=await fetch(`${WORKER_URL}/api/super/pending`);  if(r.ok){const d=await r.json();if(d.success)setPend(d.data);} }catch{}
      })();
    },[]);

    const approve = async (item,status) => {
      setPend(p=>p.filter(x=>x.uid!==item.uid));
      setStat(s=>({...s,pending:s.pending-1,distributors:status==='active'?s.distributors+1:s.distributors}));
      showToast(status==='active'?`✅ 已核准 ${item.name}`:`🚫 已拒絕 ${item.name}`);
      try{ await fetch(`${WORKER_URL}/api/admin/approve-distributor?a=${item.agency}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({uid:item.uid,status})}); }catch{}
    };

    const fp = filt==='all' ? pend : pend.filter(p=>p.agency===filt);

    return (
      <>
        {toast && <div className="toast-wrap">{toast}</div>}

        {/* Sidebar */}
        <aside className="sb">
          <div className="sb-head">
            <div className="sb-logo">
              <div className="sb-logo-icon">
                {/* LINE-style chat bubble icon */}
                <svg width="22" height="22" viewBox="0 0 24 24" fill="white">
                  <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
                </svg>
              </div>
              <div>
                <div style={{fontSize:13,fontWeight:900,color:'#fff',letterSpacing:'-.01em'}}>TravelKeeper</div>
                <div style={{fontSize:10,color:'rgba(255,255,255,.28)',marginTop:1}}>Super Admin</div>
              </div>
            </div>
          </div>

          <div className="sb-section">主選單</div>
          <SbItem id="dashboard" label="儀表板"    icon={I.grid}  active={page==='dashboard'} onClick={setPage}/>
          <SbItem id="pending"   label="待審核申請" icon={I.bell}  badge={pend.length} active={page==='pending'}   onClick={setPage}/>
          <SbItem id="tenants"   label="旅行社管理" icon={I.bldg}  active={page==='tenants'}   onClick={setPage}/>

          <div className="sb-section" style={{marginTop:4}}>系統</div>
          <SbItem id="settings"  label="系統設定"   icon={I.gear}  active={page==='settings'}  onClick={setPage}/>

          <div className="sb-foot">
            <div className="ava" style={{background:'#06C755',color:'#fff',borderRadius:10,width:32,height:32,fontSize:12}}>A</div>
            <div style={{flex:1}}>
              <div style={{fontSize:12,fontWeight:700,color:'#fff'}}>Admin</div>
              <div style={{fontSize:10,color:'rgba(255,255,255,.3)'}}>系統管理員</div>
            </div>
            <Ic d={I.exit} size={15} color="rgba(255,255,255,.3)"/>
          </div>
        </aside>

        <div className="main">

          {/* ══ DASHBOARD ══ */}
          {page==='dashboard' && <>
            <div className="topbar">
              <div>
                <div className="tb-title">系統儀表板</div>
                <div className="tb-sub">{new Date().toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric',weekday:'long'})}</div>
              </div>
              <div style={{display:'flex',gap:8}}>
                <button className="btn btn-ghost" onClick={()=>window.location.reload()}><Ic d={I.reload} size={13}/> 重新整理</button>
                <button className="btn btn-primary" onClick={()=>setPage('pending')}>
                  <Ic d={I.bell} size={13}/> 待審核
                  {pend.length>0 && <span style={{background:'rgba(0,0,0,.18)',borderRadius:999,padding:'1px 7px',fontSize:11}}>{pend.length}</span>}
                </button>
              </div>
            </div>
            <div className="content">
              {/* Stat cards */}
              <div className="stat-grid a0">
                <SC label="旅行社總數"  val={fmt(stats.tenants)}      cls="g" icon={I.bldg}  change="↑ 本月新增 2"/>
                <SC label="授權合作夥伴"  val={fmt(stats.distributors)} cls="g" icon={I.users}  change="↑ 本週 +12"/>
                <SC label="待審核申請"  val={fmt(stats.pending)}      cls="a" icon={I.bell}/>
                <SC label="上架行程數"  val={fmt(stats.itineraries)}  cls="b" icon={I.map}    change="↑ 本月 +8"/>
                <SC label="預估月營收"  val={`$${Math.round(stats.revenue/10000)}萬`} cls="p" icon={I.trend} change="↑ 18%"/>
              </div>

              <div style={{display:'grid',gridTemplateColumns:'1fr 348px',gap:16}}>
                <div style={{display:'flex',flexDirection:'column',gap:16}}>

                  {/* Pending quick */}
                  {pend.length>0 && (
                    <div className="card a1">
                      <div className="card-head">
                        <div style={{display:'flex',alignItems:'center',gap:8}}>
                          <div style={{width:8,height:8,borderRadius:'50%',background:'#FF9500'}}/>
                          <span className="card-title">待審核申請</span>
                          <span className="badge ba">{pend.length} 件</span>
                        </div>
                        <button className="btn btn-ol" style={{fontSize:11}} onClick={()=>setPage('pending')}>全部查看 →</button>
                      </div>
                      <table className="tbl">
                        <thead><tr><th>申請人</th><th>電話</th><th>所屬旅行社</th><th>時間</th><th style={{textAlign:'right'}}>操作</th></tr></thead>
                        <tbody>
                          {pend.slice(0,4).map(d=>(
                            <tr key={d.uid}>
                              <td><div style={{display:'flex',alignItems:'center',gap:8}}><div className="ava">{ini(d.name)}</div><div><div style={{fontWeight:700}}>{d.name}</div><div style={{fontSize:11,color:'#aaa'}}>{d.company_name||'個人'}</div></div></div></td>
                              <td style={{fontSize:12,color:'#555',fontFamily:'monospace'}}>{d.phone}</td>
                              <td><span className="badge bg">{d.agency}</span></td>
                              <td style={{fontSize:12,color:'#aaa'}}>{ago(d.created_at)}</td>
                              <td style={{textAlign:'right'}}><div style={{display:'flex',gap:6,justifyContent:'flex-end'}}>
                                <button className="btn btn-ok" onClick={()=>approve(d,'active')}><Ic d={I.check} size={12}/> 核准</button>
                                <button className="btn btn-no" onClick={()=>approve(d,'rejected')}><Ic d={I.xmark} size={12}/> 拒絕</button>
                              </div></td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  )}

                  {/* Tenant table */}
                  <div className="card a2">
                    <div className="card-head">
                      <span className="card-title">旅行社概覽</span>
                      <button className="btn btn-ghost" style={{fontSize:11}} onClick={()=>setPage('tenants')}>查看全部 →</button>
                    </div>
                    <table className="tbl">
                      <thead><tr><th>旅行社</th><th>合作夥伴</th><th>行程</th><th>狀態</th><th>建立日期</th></tr></thead>
                      <tbody>
                        {ten.map(t=>(
                          <tr key={t.slug}>
                            <td><div style={{display:'flex',alignItems:'center',gap:8}}>
                              <div className="ava" style={{borderRadius:8,background:'#E8FBF0',color:'#00A040',fontSize:11}}>{ini(t.name)}</div>
                              <div><div style={{fontWeight:700}}>{t.name}</div><div style={{fontSize:11,color:'#aaa',fontFamily:'monospace'}}>{t.slug}</div></div>
                            </div></td>
                            <td style={{fontWeight:700,color:'#06C755'}}>{t.distributors}</td>
                            <td style={{fontWeight:700,color:'#007AFF'}}>{t.itineraries}</td>
                            <td><span className={`badge ${t.status==='active'?'bg':t.status==='trial'?'ba':'bb'}`}>{t.status==='active'?'運營中':t.status==='trial'?'試用中':'申請中'}</span></td>
                            <td style={{fontSize:12,color:'#aaa'}}>{t.created_at}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>

                {/* Right column */}
                <div style={{display:'flex',flexDirection:'column',gap:16}}>
                  {/* Bar chart */}
                  <div className="card a3">
                    <div className="card-head">
                      <span className="card-title">本週申請趨勢</span>
                      <span style={{fontSize:20,fontWeight:900,color:'#06C755'}}>{WB.reduce((a,b)=>a+b)}</span>
                    </div>
                    <div className="card-body">
                      <div className="bars">
                        {WB.map((v,i)=><div key={i} className={`bar${i===6?' now':''}`} style={{height:`${Math.round(v/72*100)}%`}} title={`${['一','二','三','四','五','六','日'][i]}: ${v}件`}/>)}
                      </div>
                      <div style={{display:'flex',justifyContent:'space-between',marginTop:6}}>
                        {['一','二','三','四','五','六','日'].map(d=><span key={d} style={{fontSize:10,color:'#C0C0C0',flex:1,textAlign:'center'}}>{d}</span>)}
                      </div>
                    </div>
                  </div>

                  {/* Activity */}
                  <div className="card a4" style={{flex:1}}>
                    <div className="card-head"><span className="card-title">最新動態</span></div>
                    <div className="card-body" style={{display:'flex',flexDirection:'column',gap:14}}>
                      {MA.map((a,i)=>(
                        <div key={i} style={{display:'flex',gap:10}}>
                          <div className="adot" style={{background:actCol(a.type)}}/>
                          <div style={{flex:1}}>
                            <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline'}}>
                              <span style={{fontSize:12,fontWeight:700}}>{a.event}</span>
                              <span style={{fontSize:10,color:'#C0C0C0',marginLeft:8,flexShrink:0}}>{a.time}</span>
                            </div>
                            <div style={{fontSize:11,color:'#888',marginTop:2}}>{a.detail}</div>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </>}

          {/* ══ PENDING ══ */}
          {page==='pending' && <>
            <div className="topbar">
              <div><div className="tb-title">合作夥伴審核</div><div className="tb-sub">共 {fp.length} 件待審申請</div></div>
              <div style={{display:'flex',gap:8,alignItems:'center'}}>
                <span style={{fontSize:12,color:'#717171'}}>篩選：</span>
                <select value={filt} onChange={e=>setFilt(e.target.value)}>
                  <option value="all">全部旅行社</option>
                  {ten.map(t=><option key={t.slug} value={t.slug}>{t.name}</option>)}
                </select>
              </div>
            </div>
            <div className="content">
              {fp.length===0 ? (
                <div className="card"><div style={{textAlign:'center',padding:'56px 0'}}>
                  <div style={{fontSize:52,marginBottom:12}}>🎉</div>
                  <div style={{fontSize:16,fontWeight:700,marginBottom:6}}>沒有待審核申請</div>
                  <div style={{fontSize:13,color:'#717171'}}>所有申請皆已處理完畢</div>
                </div></div>
              ) : (
                <div className="card a0">
                  <div className="card-head">
                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                      <div style={{width:8,height:8,borderRadius:'50%',background:'#FF9500'}}/>
                      <span className="card-title">待審核列表</span>
                      <span className="badge ba">{fp.length} 件</span>
                    </div>
                  </div>
                  <table className="tbl">
                    <thead><tr><th>申請人</th><th>聯絡電話</th><th>公司 / 品牌</th><th>所屬旅行社</th><th>推薦人</th><th>申請時間</th><th style={{textAlign:'right'}}>操作</th></tr></thead>
                    <tbody>
                      {fp.map((d,i)=>(
                        <tr key={d.uid} style={{animation:`fadeUp .3s ${i*.04}s both`}}>
                          <td><div style={{display:'flex',alignItems:'center',gap:10}}>
                            <div className="ava">{ini(d.name)}</div>
                            <div><div style={{fontWeight:700,fontSize:13}}>{d.name}</div><div style={{fontSize:10,color:'#C0C0C0',fontFamily:'monospace'}}>#{d.uid}</div></div>
                          </div></td>
                          <td style={{fontSize:12,color:'#444',fontFamily:'monospace'}}>{d.phone}</td>
                          <td style={{fontSize:13,color:d.company_name?'#333':'#C0C0C0'}}>{d.company_name||'—'}</td>
                          <td><span className="badge bg">{d.agency}</span></td>
                          <td style={{fontSize:11,fontFamily:'monospace'}}>
                            {d.ref_uid ? <span style={{color:'#AF52DE'}} title={d.ref_uid}>{d.ref_uid.slice(0,8)}…</span> : <span style={{color:'#C0C0C0'}}>直接申請</span>}
                          </td>
                          <td style={{fontSize:12,color:'#aaa'}}>{ago(d.created_at)}</td>
                          <td style={{textAlign:'right'}}><div style={{display:'flex',gap:6,justifyContent:'flex-end'}}>
                            <button className="btn btn-ok" onClick={()=>approve(d,'active')}><Ic d={I.check} size={12}/> 核准</button>
                            <button className="btn btn-no" onClick={()=>approve(d,'rejected')}><Ic d={I.xmark} size={12}/> 拒絕</button>
                          </div></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          </>}

          {/* ══ TENANTS ══ */}
          {page==='tenants' && <>
            <div className="topbar">
              <div><div className="tb-title">旅行社管理</div><div className="tb-sub">共 {ten.length} 間租戶</div></div>
              <button className="btn btn-primary"><Ic d={I.plus} size={13}/> 新增旅行社</button>
            </div>
            <div className="content">
              <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14}}>
                {ten.map((t,i)=>(
                  <div key={t.slug} className={`card a${i}`} style={{padding:0,cursor:'pointer'}}>
                    <div className="tstrip" style={{background:t.status==='active'?'#06C755':t.status==='trial'?'#FF9500':'#007AFF'}}/>
                    <div style={{padding:'18px 20px'}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14}}>
                        <div className="ava" style={{width:44,height:44,fontSize:18,borderRadius:10,background:'#E8FBF0',color:'#06C755'}}>{ini(t.name)}</div>
                        <span className={`badge ${t.status==='active'?'bg':t.status==='trial'?'ba':'bb'}`}>{t.status==='active'?'運營中':t.status==='trial'?'試用中':'申請中'}</span>
                      </div>
                      <div style={{fontWeight:900,fontSize:15,marginBottom:2}}>{t.name}</div>
                      <div style={{fontSize:11,color:'#B0B0B0',fontFamily:'monospace',marginBottom:16}}>{t.slug}</div>
                      <div style={{display:'flex',borderTop:'1px solid #F0F0F0',paddingTop:14,gap:0}}>
                        <div style={{flex:1}}><div style={{fontSize:10,color:'#B0B0B0',marginBottom:4}}>合作夥伴</div><div style={{fontWeight:900,fontSize:22,color:'#06C755'}}>{t.distributors}</div></div>
                        <div style={{flex:1}}><div style={{fontSize:10,color:'#B0B0B0',marginBottom:4}}>行程</div><div style={{fontWeight:900,fontSize:22,color:'#007AFF'}}>{t.itineraries}</div></div>
                        <div style={{alignSelf:'flex-end'}}>
                          <button className="btn btn-ol" style={{fontSize:11}}><Ic d={I.eye} size={12}/> 進入後台</button>
                        </div>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </>}

          {/* ══ SETTINGS ══ */}
          {page==='settings' && <>
            <div className="topbar"><div className="tb-title">系統設定</div></div>
            <div className="content">
              <div style={{maxWidth:540,display:'flex',flexDirection:'column',gap:16}}>
                <div className="card a0">
                  <div className="card-head"><span className="card-title">API 設定</span></div>
                  <div className="card-body">
                    <div className="srow">
                      <div><div style={{fontSize:13,fontWeight:700}}>Worker 端點</div><div style={{fontSize:11,color:'#888',marginTop:2,fontFamily:'monospace'}}>{WORKER_URL}</div></div>
                      <button className="btn btn-ghost" style={{fontSize:11}}>修改</button>
                    </div>
                    <div className="srow">
                      <div><div style={{fontSize:13,fontWeight:700}}>API 狀態</div><div style={{fontSize:11,color:'#888',marginTop:2}}>連線正常</div></div>
                      <span className="badge bg">● 正常</span>
                    </div>
                  </div>
                </div>
                <div className="card a1">
                  <div className="card-head"><span className="card-title">版本資訊</span></div>
                  <div className="card-body">
                    {[['系統版本','v2.4.1'],['部署環境','Cloudflare Workers'],['資料庫','D1 SQLite'],['LIFF 版本','LINE LIFF 2.x']].map(([k,v])=>(
                      <div className="srow" key={k}>
                        <span style={{fontSize:13,color:'#717171'}}>{k}</span>
                        <span style={{fontSize:13,fontWeight:700,fontFamily:'monospace'}}>{v}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          </>}

        </div>
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
