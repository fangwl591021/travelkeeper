<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅遊管家 - 總管理後台 (極致全開版)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
    body { font-family: 'Noto Sans TC', sans-serif; overflow: hidden; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    
    /* 專業部落格渲染 */
    .blog-preview { color: #1e293b; line-height: 1.8; }
    .blog-preview h3 { font-size: 2rem; font-weight: 900; margin: 3rem 0 1.5rem; color: #0f172a; display: flex; align-items: center; gap: 0.75rem; }
    .blog-preview h3::before { content: ""; width: 8px; height: 32px; background: #4f46e5; border-radius: 4px; }
    .blog-preview img { width: 100%; border-radius: 2.5rem; margin: 1.5rem 0 2.5rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15); object-fit: cover; max-height: 500px; }
    .blog-preview p { font-size: 1.25rem; margin-bottom: 2rem; white-space: pre-wrap; color: #475569; }
  </style>
</head>
<body class="bg-white">
  <div id="root"></div>

  <script type="text/babel" data-presets="react,env">
    const { useState, useEffect, useRef } = React;

    const Icon = ({ name, className = "w-6 h-6" }) => {
      const icons = {
        plus: (<React.Fragment><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></React.Fragment>),
        edit: (<React.Fragment><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></React.Fragment>),
        trash: (<React.Fragment><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></React.Fragment>),
        sparkles: (<React.Fragment><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707"/></React.Fragment>),
        arrowLeft: (<React.Fragment><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></React.Fragment>),
        save: (<React.Fragment><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/></React.Fragment>)
      };
      return <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>{icons[name]}</svg>;
    };

    const WORKER_URL = 'https://travelkeeper.fangwl591021.workers.dev';

    // 核心渲染引擎：完美支援 Unsplash 長網址
    const MarkdownContent = ({ content }) => {
      if (!content) return <div className="text-slate-200 font-black text-6xl opacity-20 mt-20">WAITING FOR CONTENT...</div>;
      
      const paragraphs = content.split('\n');
      const elements = paragraphs.map((p, i) => {
        const trimmed = p.trim();
        if (trimmed.startsWith('###')) {
          return <h3 key={i}>{trimmed.replace('###', '').trim()}</h3>;
        }
        // 強化版正則：確保能抓到含大量參數的 Unsplash 網址
        if (trimmed.includes('![Image](')) {
          const match = trimmed.match(/\!\[.*?\]\((.*?)\)/);
          return match ? <img key={i} src={match[1]} alt="itinerary-photo" /> : null;
        }
        if (trimmed === '') return null;
        return <p key={i}>{trimmed}</p>;
      });

      return <div className="blog-preview animate-fade-in">{elements}</div>;
    };

    function App() {
      const urlParams = new URLSearchParams(window.location.search);
      const agencySlug = urlParams.get('a') || 'demo';
      const fileInputRef = useRef(null);
      const [isAdmin, setIsAdmin] = useState(false);
      const [isLoading, setIsLoading] = useState(true);
      const [view, setView] = useState('list'); // 'list', 'edit'
      const [itineraries, setItineraries] = useState([]);
      const [formData, setFormData] = useState({ id: null, title: '', region: '亞洲', price: 0, days: 1, image: '', description: '' });
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [aiLoading, setAiLoading] = useState(false);

      useEffect(() => {
        const init = async () => {
          try {
            const configRes = await fetch(`${WORKER_URL}/api/config?a=${agencySlug}`);
            const configData = await configRes.json();
            if (configData.success) {
              await liff.init({ liffId: configData.data.liff_id });
              if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                const statusRes = await fetch(`${WORKER_URL}/api/itineraries?action=checkUserStatus&uid=${profile.userId}&a=${agencySlug}`);
                const statusData = await statusRes.json();
                if (statusData.success && statusData.data.isAdmin) {
                  setIsAdmin(true);
                  fetchList();
                }
              } else { liff.login(); }
            }
          } catch (e) { console.error(e); } finally { setIsLoading(false); }
        };
        init();
      }, [agencySlug]);

      const fetchList = async () => {
        const res = await fetch(`${WORKER_URL}/api/itineraries?a=${agencySlug}`);
        setItineraries(await res.json());
      };

      const handleAiExpand = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onloadend = async () => {
          setAiLoading(true);
          try {
            const res = await fetch(`${WORKER_URL}/api/upload-dm?a=${agencySlug}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ image: reader.result })
            });
            const result = await res.json();
            if (result.success) setFormData({...formData, ...result.data});
          } catch (e) { alert('AI 連線失敗'); }
          setAiLoading(false);
        };
        reader.readAsDataURL(file);
      };

      const handleSave = async () => {
        setIsSubmitting(true);
        const action = formData.id ? 'updateItinerary' : 'addItinerary';
        try {
          const res = await fetch(`${WORKER_URL}/api/itineraries?a=${agencySlug}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action, ...formData })
          });
          if ((await res.json()).success) { setView('list'); fetchList(); }
        } catch (e) { alert('儲存失敗'); }
        setIsSubmitting(false);
      };

      if (isLoading) return <div className="h-screen flex items-center justify-center font-black text-slate-100 text-9xl">ADMIN</div>;
      if (!isAdmin) return <div className="p-20 text-center font-black text-red-500 text-6xl">DENIED</div>;

      if (view === 'list') return (
        <div className="min-h-screen bg-slate-50 flex flex-col">
          <header className="bg-white border-b px-12 py-8 flex justify-between items-center sticky top-0 z-50">
            <h1 className="text-4xl font-black tracking-tighter uppercase italic">Control <span className="text-indigo-600">Panel</span></h1>
            <button onClick={() => { setFormData({ id: null, title: '', region: '亞洲', price: 0, days: 1, image: '', description: '' }); setView('edit'); }} className="bg-indigo-600 text-white px-10 py-4 rounded-full font-black shadow-2xl hover:scale-105 transition flex items-center gap-2"><Icon name="plus" /> 新增行程文章</button>
          </header>
          <main className="p-12 grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-10 overflow-y-auto custom-scrollbar">
            {itineraries.map(item => (
              <div key={item.id} className="bg-white rounded-[3rem] overflow-hidden border border-slate-100 hover:shadow-[0_40px_80px_-20px_rgba(0,0,0,0.15)] transition-all group">
                <div className="h-64 overflow-hidden"><img src={item.image} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-1000" /></div>
                <div className="p-10">
                  <h2 className="text-2xl font-black mb-6 line-clamp-1">{item.title}</h2>
                  <div className="flex justify-between items-center">
                    <p className="text-red-600 font-black text-3xl">${Number(item.price).toLocaleString()}</p>
                    <div className="flex gap-3">
                      <button onClick={() => { setFormData(item); setView('edit'); }} className="p-4 bg-slate-50 rounded-full hover:bg-indigo-600 hover:text-white transition"><Icon name="edit" /></button>
                      <button onClick={async () => { if(confirm('刪除？')){ await fetch(`${WORKER_URL}/api/itineraries?a=${agencySlug}`, { method:'POST', body:JSON.stringify({action:'deleteItinerary', id:item.id}) }); fetchList(); } }} className="p-4 bg-slate-50 rounded-full hover:bg-red-600 hover:text-white transition"><Icon name="trash" /></button>
                    </div>
                  </div>
                </div>
              </div>
            ))}
          </main>
        </div>
      );

      // 全開編輯模式：100% 寬度，分屏寫作
      return (
        <div className="h-screen w-screen flex flex-col animate-fade-in bg-white overflow-hidden">
          <nav className="h-24 border-b flex justify-between items-center px-12 shrink-0 bg-white z-50">
            <div className="flex items-center gap-10">
              <button onClick={() => setView('list')} className="p-4 hover:bg-slate-100 rounded-full transition"><Icon name="arrowLeft" /></button>
              <h2 className="text-3xl font-black italic tracking-widest uppercase">Editor <span className="text-indigo-600">Mode</span></h2>
            </div>
            <div className="flex items-center gap-6">
              {!formData.id && (
                <button type="button" onClick={() => fileInputRef.current.click()} disabled={aiLoading} className="bg-indigo-50 text-indigo-700 px-10 py-4 rounded-full font-black flex items-center gap-3 hover:bg-indigo-100 transition disabled:opacity-50">
                  {aiLoading ? <div className="w-6 h-6 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div> : <Icon name="sparkles" className="animate-pulse" />} 
                  {aiLoading ? 'AI 寫作中...' : 'AI 視覺擴寫文章'}
                </button>
              )}
              <input type="file" ref={fileInputRef} onChange={handleAiExpand} accept="image/*" className="hidden" />
              <button onClick={handleSave} disabled={isSubmitting} className="bg-indigo-600 text-white px-12 py-4 rounded-full font-black shadow-2xl hover:bg-indigo-700 transition flex items-center gap-3">
                <Icon name="save" /> {isSubmitting ? 'SAVING...' : '發佈部落格'}
              </button>
            </div>
          </nav>

          <div className="flex-grow flex w-full">
            {/* 左側：100% 自由度的編輯區 */}
            <div className="w-1/2 h-full flex flex-col border-r bg-slate-50/10 overflow-y-auto custom-scrollbar p-16">
              <div className="w-full space-y-16">
                <input type="text" value={formData.title} onChange={e=>setFormData({...formData, title:e.target.value})} className="w-full text-7xl font-black bg-transparent border-none focus:ring-0 placeholder-slate-200 outline-none" placeholder="文章標題..." />
                
                <div className="grid grid-cols-3 gap-12">
                  <div><label className="text-xs font-black text-slate-400 uppercase tracking-[0.2em] block mb-4">REGION</label><select value={formData.region} onChange={e=>setFormData({...formData, region:e.target.value})} className="w-full bg-white border border-slate-100 rounded-[2rem] py-6 px-10 text-xl font-bold shadow-sm focus:ring-4 ring-indigo-500/10 outline-none transition"><option>亞洲</option><option>歐洲</option><option>美洲</option><option>國旅</option></select></div>
                  <div><label className="text-xs font-black text-slate-400 uppercase tracking-[0.2em] block mb-4">DAYS</label><input type="number" value={formData.days} onChange={e=>setFormData({...formData, days:e.target.value})} className="w-full bg-white border border-slate-100 rounded-[2rem] py-6 px-10 text-xl font-bold shadow-sm outline-none" /></div>
                  <div><label className="text-xs font-black text-slate-400 uppercase tracking-[0.2em] block mb-4">PRICE</label><input type="number" value={formData.price} onChange={e=>setFormData({...formData, price:e.target.value})} className="w-full bg-white border border-slate-100 rounded-[2rem] py-6 px-10 text-xl font-bold shadow-sm outline-none" /></div>
                </div>

                <div>
                  <label className="text-xs font-black text-slate-400 uppercase tracking-[0.2em] block mb-6">COVER IMAGE URL</label>
                  <input type="url" value={formData.image} onChange={e=>setFormData({...formData, image:e.target.value})} className="w-full bg-white border border-slate-100 rounded-[3rem] py-8 px-12 text-lg shadow-sm outline-none mb-10" placeholder="https://unsplash.com/..." />
                  {formData.image && <img src={formData.image} className="w-full h-[400px] object-cover rounded-[4rem] shadow-2xl border-[10px] border-white" />}
                </div>

                <div>
                  <label className="text-xs font-black text-slate-400 uppercase tracking-[0.2em] block mb-6">BLOG CONTENT (MARKDOWN)</label>
                  <textarea rows="40" value={formData.description} onChange={e=>setFormData({...formData, description:e.target.value})} className="w-full bg-white border border-slate-100 rounded-[4rem] py-16 px-20 text-2xl leading-[2] shadow-sm outline-none focus:ring-8 ring-indigo-500/5 transition custom-scrollbar" placeholder="在這裡盡情揮灑您的旅遊故事..."></textarea>
                </div>
              </div>
            </div>

            {/* 右側：高解析度即時預覽區 */}
            <div className="w-1/2 h-full overflow-y-auto bg-white p-24 custom-scrollbar">
              <div className="w-full">
                <div className="flex items-center gap-4 mb-10">
                  <span className="bg-indigo-600 text-white px-6 py-2 rounded-full text-sm font-black uppercase tracking-widest">{formData.region}</span>
                  <span className="text-slate-300 font-black text-lg">/</span>
                  <span className="text-slate-400 font-black text-lg uppercase tracking-widest">{formData.days} DAYS TOUR</span>
                </div>
                <h1 className="text-[5rem] font-black text-slate-900 leading-[1.1] mb-20 tracking-tighter">{formData.title || 'PREVIEW TITLE'}</h1>
                
                <div className="flex items-center gap-20 mb-20 py-16 border-y border-slate-50">
                  <div><p className="text-sm font-black text-slate-400 uppercase tracking-[0.3em] mb-4">TOTAL PRICE</p><p className="text-7xl font-black text-red-600">TWD {Number(formData.price).toLocaleString()}</p></div>
                  <div className="w-px h-24 bg-slate-100"></div>
                  <div><p className="text-sm font-black text-slate-400 uppercase tracking-[0.3em] mb-4">TOUR DURATION</p><p className="text-6xl font-black text-slate-800">{formData.days} 天</p></div>
                </div>

                <MarkdownContent content={formData.description} />
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
