<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅遊管家 - 總管理後台 (全開版)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
    body { font-family: 'Noto Sans TC', sans-serif; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    .custom-scrollbar::-webkit-scrollbar { width: 8px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    
    /* 部落格渲染樣式 */
    .blog-preview h3 { font-size: 1.8rem; font-weight: 900; margin-top: 3rem; margin-bottom: 1rem; color: #0f172a; border-left: 6px solid #4f46e5; padding-left: 1rem; }
    .blog-preview img { width: 100%; border-radius: 1.5rem; margin: 2rem 0; box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
    .blog-preview p { font-size: 1.125rem; line-height: 2; margin-bottom: 1.5rem; color: #334155; }
  </style>
</head>
<body class="bg-white text-slate-900">
  <div id="root"></div>

  <script type="text/babel" data-presets="react,env">
    const { useState, useEffect, useRef } = React;

    const Icon = ({ name, className = "w-6 h-6" }) => {
      const icons = {
        plus: (<React.Fragment><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></React.Fragment>),
        edit: (<React.Fragment><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></React.Fragment>),
        trash: (<React.Fragment><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></React.Fragment>),
        sparkles: (<React.Fragment><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/></React.Fragment>),
        arrowLeft: (<React.Fragment><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></React.Fragment>),
        save: (<React.Fragment><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></React.Fragment>)
      };
      return <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>{icons[name]}</svg>;
    };

    const WORKER_URL = 'https://travelkeeper.fangwl591021.workers.dev';

    // 關鍵修正：Markdown 渲染組件
    const MarkdownContent = ({ content }) => {
      if (!content) return <div className="text-slate-300 italic">等待內容產出...</div>;
      
      const paragraphs = content.split('\n');
      const elements = paragraphs.map((p, i) => {
        if (p.startsWith('###')) {
          return <h3 key={i}>{p.replace('###', '').trim()}</h3>;
        }
        if (p.includes('![Image](')) {
          const url = p.match(/\((.*?)\)/)?.[1];
          return url ? <img key={i} src={url} alt="day-img" /> : null;
        }
        if (p.trim() === '') return <br key={i}/>;
        return <p key={i}>{p}</p>;
      });

      return <div className="blog-preview">{elements}</div>;
    };

    function App() {
      const urlParams = new URLSearchParams(window.location.search);
      const agencySlug = urlParams.get('a') || 'demo';

      const fileInputRef = useRef(null);
      const [tenant, setTenant] = useState(null);
      const [isAdmin, setIsAdmin] = useState(false);
      const [isLoading, setIsLoading] = useState(true);
      const [view, setView] = useState('list'); // 'list', 'edit'
      const [itineraries, setItineraries] = useState([]);
      const [formData, setFormData] = useState({ id: null, title: '', region: '亞洲', price: 0, days: 1, image: '', description: '', notes: '' });
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [aiLoading, setAiLoading] = useState(false);

      useEffect(() => {
        const init = async () => {
          try {
            const configRes = await fetch(`${WORKER_URL}/api/config?a=${agencySlug}`);
            const configData = await configRes.json();
            if (configData.success) {
              setTenant(configData.data);
              await liff.init({ liffId: configData.data.liff_id });
              if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                const statusRes = await fetch(`${WORKER_URL}/api/itineraries?action=checkUserStatus&uid=${profile.userId}&a=${agencySlug}`);
                const statusData = await statusRes.json();
                if (statusData.success && statusData.data.isAdmin) {
                  setIsAdmin(true);
                  fetchList();
                }
              } else { liff.login(); }
            }
          } catch (e) { console.error(e); } finally { setIsLoading(false); }
        };
        init();
      }, [agencySlug]);

      const fetchList = async () => {
        const res = await fetch(`${WORKER_URL}/api/itineraries?a=${agencySlug}`);
        const data = await res.json();
        setItineraries(Array.isArray(data) ? data : []);
      };

      const handleAiExpand = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onloadend = async () => {
          setAiLoading(true);
          try {
            const res = await fetch(`${WORKER_URL}/api/upload-dm?a=${agencySlug}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ image: reader.result })
            });
            const result = await res.json();
            if (result.success) setFormData({...formData, ...result.data});
          } catch (e) { alert('AI 解析失敗'); }
          setAiLoading(false);
        };
        reader.readAsDataURL(file);
      };

      const handleSave = async () => {
        setIsSubmitting(true);
        const action = formData.id ? 'updateItinerary' : 'addItinerary';
        try {
          const res = await fetch(`${WORKER_URL}/api/itineraries?a=${agencySlug}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action, ...formData })
          });
          if ((await res.json()).success) { setView('list'); fetchList(); }
        } catch (e) { alert('儲存失敗'); }
        setIsSubmitting(false);
      };

      if (isLoading) return <div className="h-screen flex items-center justify-center font-black text-slate-300 text-3xl">LOADING...</div>;
      if (!isAdmin) return <div className="p-20 text-center font-black text-red-500 text-4xl uppercase">Access Denied ⛔</div>;

      if (view === 'list') return (
        <div className="min-h-screen bg-slate-50">
          <header className="bg-white border-b px-10 py-6 flex justify-between items-center sticky top-0 z-50 shadow-sm">
            <h1 className="text-3xl font-black tracking-tighter">旅遊管家 <span className="text-indigo-600">ADMIN</span></h1>
            <button onClick={() => { setFormData({ id: null, title: '', region: '亞洲', price: 0, days: 1, image: '', description: '', notes: '' }); setView('edit'); }} className="bg-indigo-600 text-white px-8 py-3 rounded-full font-black flex items-center gap-2 hover:scale-105 transition"><Icon name="plus" /> 新增行程</button>
          </header>
          <main className="p-10 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 animate-fade-in">
            {itineraries.map(item => (
              <div key={item.id} className="bg-white rounded-[2.5rem] overflow-hidden border hover:shadow-2xl transition-all group">
                <div className="h-64 overflow-hidden"><img src={item.image} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" /></div>
                <div className="p-8">
                  <h2 className="text-2xl font-black mb-4 line-clamp-1">{item.title}</h2>
                  <div className="flex justify-between items-center">
                    <p className="text-red-600 font-black text-2xl">${Number(item.price).toLocaleString()}</p>
                    <div className="flex gap-2">
                      <button onClick={() => { setFormData(item); setView('edit'); }} className="p-3 bg-slate-100 rounded-full hover:bg-indigo-600 hover:text-white transition"><Icon name="edit" /></button>
                      <button onClick={async () => { if(confirm('刪除？')){ await fetch(`${WORKER_URL}/api/itineraries?a=${agencySlug}`, { method:'POST', body:JSON.stringify({action:'deleteItinerary', id:item.id}) }); fetchList(); } }} className="p-3 bg-slate-100 rounded-full hover:bg-red-600 hover:text-white transition"><Icon name="trash" /></button>
                    </div>
                  </div>
                </div>
              </div>
            ))}
          </main>
        </div>
      );

      // 全開編輯模式
      return (
        <div className="h-screen flex flex-col animate-fade-in bg-white overflow-hidden">
          <nav className="h-20 border-b flex justify-between items-center px-8 shrink-0 bg-white z-50">
            <div className="flex items-center gap-6">
              <button onClick={() => setView('list')} className="p-3 hover:bg-slate-100 rounded-full transition"><Icon name="arrowLeft" /></button>
              <h2 className="text-2xl font-black tracking-tight">{formData.id ? '編輯行程' : '全新行程擴寫'}</h2>
            </div>
            <div className="flex items-center gap-4">
              {!formData.id && (
                <button type="button" onClick={() => fileInputRef.current.click()} disabled={aiLoading} className="bg-indigo-50 text-indigo-700 px-8 py-3 rounded-full font-black flex items-center gap-2 hover:bg-indigo-100 transition disabled:opacity-50">
                  {aiLoading ? <div className="w-5 h-5 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div> : <Icon name="sparkles" />} 
                  {aiLoading ? 'AI 深度擴寫中...' : '開始 AI 視覺擴寫'}
                </button>
              )}
              <input type="file" ref={fileInputRef} onChange={handleAiExpand} accept="image/*" className="hidden" />
              <button onClick={handleSave} disabled={isSubmitting} className="bg-indigo-600 text-white px-10 py-3 rounded-full font-black shadow-xl hover:bg-indigo-700 transition flex items-center gap-2">
                <Icon name="save" /> {isSubmitting ? '儲存中...' : '發佈文章'}
              </button>
            </div>
          </nav>

          <div className="flex-grow flex overflow-hidden">
            {/* 左側：極簡編輯區 (不限寬) */}
            <div className="w-1/2 flex flex-col border-r bg-slate-50/20">
              <div className="p-12 overflow-y-auto custom-scrollbar">
                <div className="space-y-12">
                  <input type="text" value={formData.title} onChange={e=>setFormData({...formData, title:e.target.value})} className="w-full text-5xl font-black bg-transparent border-none focus:ring-0 placeholder-slate-200" placeholder="文章標題..." />
                  
                  <div className="grid grid-cols-3 gap-10">
                    <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">地區</label><select value={formData.region} onChange={e=>setFormData({...formData, region:e.target.value})} className="w-full bg-white border rounded-2xl py-4 px-6 font-bold shadow-sm outline-none focus:ring-2 ring-indigo-500/20 transition"><option>亞洲</option><option>歐洲</option><option>美洲</option><option>國旅</option></select></div>
                    <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">天數</label><input type="number" value={formData.days} onChange={e=>setFormData({...formData, days:e.target.value})} className="w-full bg-white border rounded-2xl py-4 px-6 font-bold shadow-sm outline-none" /></div>
                    <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">售價</label><input type="number" value={formData.price} onChange={e=>setFormData({...formData, price:e.target.value})} className="w-full bg-white border rounded-2xl py-4 px-6 font-bold shadow-sm outline-none" /></div>
                  </div>

                  <div>
                    <label className="text-sm font-black text-slate-400 uppercase block mb-4">封面圖片網址</label>
                    <input type="url" value={formData.image} onChange={e=>setFormData({...formData, image:e.target.value})} className="w-full bg-white border rounded-3xl py-5 px-8 shadow-sm outline-none mb-6" placeholder="https://..." />
                    {formData.image && <img src={formData.image} className="w-full h-80 object-cover rounded-[3rem] shadow-2xl border-4 border-white" />}
                  </div>

                  <div>
                    <label className="text-sm font-black text-slate-400 uppercase block mb-4">部落格長文內容 (MARKDOWN)</label>
                    <textarea rows="30" value={formData.description} onChange={e=>setFormData({...formData, description:e.target.value})} className="w-full bg-white border rounded-[3rem] py-10 px-12 shadow-sm outline-none focus:ring-2 ring-indigo-500/20 transition text-xl leading-relaxed custom-scrollbar" placeholder="在這裡編輯您的旅遊故事..."></textarea>
                  </div>
                </div>
              </div>
            </div>

            {/* 右側：高感度預覽區 (全開呈現) */}
            <div className="w-1/2 overflow-y-auto bg-white p-20 custom-scrollbar">
              <div className="max-w-4xl mx-auto">
                <div className="flex items-center gap-3 mb-6">
                  <span className="bg-indigo-600 text-white px-4 py-1 rounded-full text-xs font-black uppercase">{formData.region}</span>
                  <span className="text-slate-400 font-bold">{formData.days} DAYS</span>
                </div>
                <h1 className="text-6xl font-black text-slate-900 leading-tight mb-12">{formData.title || '標題預覽'}</h1>
                
                <div className="flex items-center gap-16 mb-16 py-10 border-y border-slate-100">
                  <div><p className="text-xs font-black text-slate-400 uppercase mb-2">TOUR PRICE</p><p className="text-5xl font-black text-red-600">TWD {Number(formData.price).toLocaleString()}</p></div>
                  <div className="w-px h-16 bg-slate-100"></div>
                  <div><p className="text-xs font-black text-slate-400 uppercase mb-2">DURATION</p><p className="text-4xl font-black text-slate-800">{formData.days} 天</p></div>
                </div>

                <MarkdownContent content={formData.description} />
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
