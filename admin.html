<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅遊管家 - 總管理後台 (SaaS 版)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    .modal-overlay { background-color: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px); }
    .custom-scrollbar::-webkit-scrollbar { width: 5px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    textarea { font-family: 'Noto Sans TC', sans-serif; line-height: 1.6; }
  </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800">
  <div id="root"></div>

  <script type="text/babel" data-presets="react,env">
    const { useState, useEffect, useRef } = React;

    const Icon = ({ name, className = "w-6 h-6" }) => {
      const icons = {
        box: (
          <React.Fragment>
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
            <polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/>
          </React.Fragment>
        ),
        fileText: (
          <React.Fragment>
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
          </React.Fragment>
        ),
        plus: (
          <React.Fragment><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></React.Fragment>
        ),
        edit: (
          <React.Fragment>
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </React.Fragment>
        ),
        trash: (
          <React.Fragment>
            <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
          </React.Fragment>
        ),
        sparkles: (
          <React.Fragment>
            <path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/>
          </React.Fragment>
        ),
        upload: (
          <React.Fragment><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></React.Fragment>
        ),
        link: (
          <React.Fragment>
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
          </React.Fragment>
        )
      };
      return (
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
          {icons[name]}
        </svg>
      );
    };

    const WORKER_URL = 'https://travelkeeper.fangwl591021.workers.dev';

    function AdminApp() {
      const urlParams = new URLSearchParams(window.location.search);
      const agencySlug = urlParams.get('a') || 'demo';

      const fileInputRef = useRef(null);
      const [tenant, setTenant] = useState(null);
      const [liffProfile, setLiffProfile] = useState(null);
      const [isAdmin, setIsAdmin] = useState(false);
      const [isLoading, setIsLoading] = useState(true);
      const [activeTab, setActiveTab] = useState('itineraries'); 
      
      const [itineraries, setItineraries] = useState([]);
      const [orders, setOrders] = useState([]);
      
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [formData, setFormData] = useState({ id: null, title: '', region: '亞洲', price: 0, days: 1, startDate: '', endDate: '', image: '', description: '', notes: '' });
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [aiLoading, setAiLoading] = useState(false);

      useEffect(() => {
        const init = async () => {
          try {
            const configRes = await fetch(`${WORKER_URL}/api/config?a=${agencySlug}`);
            const configData = await configRes.json();
            
            if (configData.success) {
              setTenant(configData.data);
              await liff.init({ liffId: configData.data.liff_id });
              
              if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                setLiffProfile(profile);
                const statusRes = await fetch(`${WORKER_URL}/api/itineraries?action=checkUserStatus&uid=${profile.userId}&a=${agencySlug}`);
                const statusData = await statusRes.json();
                if (statusData.success && statusData.data.isAdmin) {
                  setIsAdmin(true);
                  fetchData('itineraries');
                  fetchData('orders');
                }
              } else {
                liff.login({ redirectUri: window.location.href });
              }
            } else { alert("租戶不存在"); }
          } catch (e) { console.error(e); } finally { setIsLoading(false); }
        };
        init();
      }, [agencySlug]);

      const fetchData = async (type) => {
        try {
          if (type === 'itineraries') {
            const res = await fetch(`${WORKER_URL}/api/itineraries?a=${agencySlug}`);
            const data = await res.json();
            setItineraries(Array.isArray(data) ? data : []);
          } else if (type === 'orders') {
            const res = await fetch(`${WORKER_URL}/api/itineraries?action=getAllOrders&a=${agencySlug}`);
            const data = await res.json();
            if (data.success) setOrders(data.data);
          }
        } catch (e) { console.error(e); }
      };

      const convertGoogleDriveUrl = (url) => {
        if (!url) return "";
        const googleDriveRegex = /\/file\/d\/([^\/]+)\//;
        const googleDriveIdOnlyRegex = /id=([^\&]+)/;
        let fileId = "";
        if (url.match(googleDriveRegex)) fileId = url.match(googleDriveRegex)[1];
        else if (url.match(googleDriveIdOnlyRegex)) fileId = url.match(googleDriveIdOnlyRegex)[1];
        if (fileId) return `https://lh3.googleusercontent.com/u/0/d/${fileId}`;
        return url;
      };

      const handleImageChange = (val) => {
        const converted = convertGoogleDriveUrl(val);
        setFormData({...formData, image: converted});
      };

      const handleSaveItinerary = async (e) => {
        e.preventDefault();
        setIsSubmitting(true);
        const action = formData.id ? 'updateItinerary' : 'addItinerary';
        try {
          const res = await fetch(`${WORKER_URL}/api/itineraries?a=${agencySlug}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action, ...formData })
          });
          const result = await res.json();
          if (result.success) {
            alert('儲存成功！');
            setIsModalOpen(false);
            fetchData('itineraries');
          } else { alert('儲存失敗：' + result.error); }
        } catch (err) { alert('發生錯誤'); }
        setIsSubmitting(false);
      };

      const handleDelete = async (id) => {
        if (!confirm('確定要下架此行程嗎？')) return;
        try {
          await fetch(`${WORKER_URL}/api/itineraries?a=${agencySlug}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'deleteItinerary', id })
          });
          fetchData('itineraries');
        } catch (err) { alert('刪除失敗'); }
      };

      const handleFileChange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (file.size > 4 * 1024 * 1024) { alert("檔案太大囉！請選擇 4MB 以內的圖片。"); return; }

        const reader = new FileReader();
        reader.onloadend = async () => {
          const base64Data = reader.result;
          setAiLoading(true);
          try {
            const res = await fetch(`${WORKER_URL}/api/upload-dm?a=${agencySlug}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ image: base64Data })
            });
            const result = await res.json();
            if (result.success) {
              setFormData(prev => ({
                ...prev,
                title: result.data.title || prev.title,
                region: result.data.region || prev.region,
                price: result.data.price || prev.price,
                days: result.data.days || prev.days,
                image: result.data.image,
                description: result.data.description,
                notes: result.data.notes
              }));
              alert('✨ AI 擴寫與 Unsplash/Pixabay 搜圖完成！');
            } else { alert('AI 解析失敗'); }
          } catch (e) { alert('連線發生錯誤'); }
          setAiLoading(false);
        };
        reader.readAsDataURL(file);
        fileInputRef.current.value = "";
      };

      const openModalWith = (tour = null) => {
        if (tour) setFormData({ ...tour });
        else setFormData({ id: null, title: '', region: '亞洲', price: 0, days: 1, startDate: '', endDate: '', image: '', description: '', notes: '' });
        setIsModalOpen(true);
      };

      if (isLoading) return <div className="flex h-screen items-center justify-center font-bold">載入中...</div>;
      if (!isAdmin) return <div className="p-20 text-center font-black text-red-500">權限不足 ⛔</div>;

      return (
        <React.Fragment>
          <div className="min-h-screen flex flex-col md:flex-row bg-slate-50">
            <aside className="w-full md:w-64 bg-slate-900 text-white flex flex-col shadow-xl z-10 md:min-h-screen">
              <div className="p-6 bg-slate-950 flex items-center gap-3">
                <div className="bg-indigo-500 p-2 rounded-lg"><Icon name="box" className="w-5 h-5 text-white" /></div>
                <div><h1 className="font-black text-lg">旅遊管家</h1><p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Admin Panel</p></div>
              </div>
              <div className="p-4 flex items-center gap-3 border-b border-slate-800">
                <img src={liffProfile?.pictureUrl} className="w-10 h-10 rounded-full border-2 border-slate-700" />
                <div><p className="text-xs text-slate-400">管理員</p><p className="text-sm font-bold text-indigo-300">{tenant?.name}</p></div>
              </div>
              <nav className="flex-1 p-4 space-y-2">
                <button onClick={() => setActiveTab('itineraries')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold transition-all ${activeTab==='itineraries' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}><Icon name="box" /> 行程管理</button>
                <button onClick={() => setActiveTab('orders')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold transition-all ${activeTab==='orders' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}><Icon name="fileText" /> 訂單管理</button>
                <button onClick={() => window.location.href=`index.html?a=${agencySlug}`} className="w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-slate-400 hover:bg-slate-800 hover:text-white mt-auto"><Icon name="arrowLeft" /> 返回首頁</button>
              </nav>
            </aside>

            <main className="flex-1 p-4 md:p-10 overflow-y-auto">
              <div className="animate-fade-in max-w-6xl mx-auto">
                <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                  <div><h2 className="text-3xl font-black text-slate-800">行程管理庫</h2><p className="text-slate-500 font-medium">您可以手動新增或使用 AI 辨識 DM 自動擴寫部落格文章</p></div>
                  <button onClick={() => openModalWith()} className="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-xl font-bold shadow-lg flex items-center gap-2"><Icon name="plus" /> 新增行程</button>
                </div>
                <div className="bg-white rounded-2xl shadow-sm border overflow-x-auto">
                  <table className="w-full text-left min-w-[600px]">
                    <thead><tr className="bg-slate-50 border-b text-slate-500 text-sm"><th className="p-4 font-bold">行程名稱</th><th className="p-4 font-bold">地區</th><th className="p-4 font-bold">售價</th><th className="p-4 font-bold text-right">操作</th></tr></thead>
                    <tbody>
                      {itineraries.length === 0 ? (<tr><td colSpan="4" className="p-8 text-center text-slate-400 font-bold">目前尚無行程</td></tr>) : itineraries.map(item => (
                        <tr key={item.id} className="border-b hover:bg-slate-50 transition-colors">
                          <td className="p-4 flex items-center gap-4"><img src={item.image} className="w-16 h-12 rounded-lg object-cover bg-slate-200 shadow-sm" /><p className="font-bold text-slate-800 line-clamp-1">{item.title}</p></td>
                          <td className="p-4"><span className="bg-slate-100 text-slate-600 px-2.5 py-1 rounded-md text-xs font-bold">{item.region}</span></td>
                          <td className="p-4 font-black text-red-600">${Number(item.price).toLocaleString()}</td>
                          <td className="p-4 text-right"><button onClick={() => openModalWith(item)} className="text-indigo-600 p-2"><Icon name="edit"/></button><button onClick={() => handleDelete(item.id)} className="text-red-500 p-2"><Icon name="trash"/></button></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            </main>
          </div>

          {isModalOpen && (
            <div className="fixed inset-0 modal-overlay z-50 flex items-center justify-center p-2 sm:p-4">
              <div className="bg-white rounded-3xl shadow-2xl w-full max-w-4xl max-h-[95vh] overflow-hidden animate-fade-in flex flex-col">
                <div className="p-5 border-b flex justify-between items-center bg-white/95 backdrop-blur shrink-0">
                  <h3 className="text-xl font-black text-slate-800">{formData.id ? '編輯行程' : '新增行程'}</h3>
                  <button onClick={() => setIsModalOpen(false)} className="text-slate-400 p-2">✕</button>
                </div>
                <div className="flex-grow overflow-y-auto p-6 custom-scrollbar">
                  {!formData.id && (
                    <div className="mb-6 p-5 bg-gradient-to-r from-indigo-50 to-blue-50 rounded-2xl border border-indigo-100 flex flex-col sm:flex-row items-center justify-between gap-4">
                      <div className="text-center sm:text-left">
                        <p className="text-indigo-800 font-black flex items-center justify-center sm:justify-start gap-2 text-lg"><Icon name="sparkles" className="w-6 h-6 text-indigo-600"/> AI 部落格模式擴寫</p>
                        <p className="text-indigo-600 text-xs mt-1 font-medium">選取手機相簿內的 DM 圖片，AI 將自動擴寫豐富的文章並從 Unsplash/Pixabay 搜圖</p>
                      </div>
                      <input type="file" ref={fileInputRef} onChange={handleFileChange} accept="image/*" className="hidden" />
                      <button type="button" onClick={() => fileInputRef.current.click()} disabled={aiLoading} className="bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold flex items-center gap-2 shadow-lg hover:bg-indigo-700 transition active:scale-95">
                        {aiLoading ? <div className="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div> : <Icon name="upload" className="w-4 h-4"/>} 
                        {aiLoading ? 'AI 正在擴寫文案中...' : '選取 DM 檔案'}
                      </button>
                    </div>
                  )}
                  <form id="tourForm" onSubmit={handleSaveItinerary} className="space-y-6">
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                      <div className="md:col-span-2"><label className="block text-sm font-bold text-slate-700 mb-2">文章標題</label><input type="text" required value={formData.title} onChange={e=>setFormData({...formData, title:e.target.value})} className="w-full bg-slate-50 border rounded-xl px-4 py-3 focus:bg-white outline-none" /></div>
                      <div><label className="block text-sm font-bold text-slate-700 mb-2">地區</label><select value={formData.region} onChange={e=>setFormData({...formData, region:e.target.value})} className="w-full bg-slate-50 border rounded-xl px-4 py-3"><option value="國旅">國旅</option><option value="亞洲">亞洲</option><option value="歐洲">歐洲</option><option value="美洲">美洲</option><option value="大洋洲">大洋洲</option><option value="非洲">非洲</option></select></div>
                      <div className="grid grid-cols-2 gap-4">
                        <div><label className="block text-sm font-bold text-slate-700 mb-2">天數</label><input type="number" required value={formData.days} onChange={e=>setFormData({...formData, days:e.target.value})} className="w-full bg-slate-50 border rounded-xl px-4 py-3" /></div>
                        <div><label className="block text-sm font-bold text-slate-700 mb-2">售價</label><input type="number" required value={formData.price} onChange={e=>setFormData({...formData, price:e.target.value})} className="w-full bg-slate-50 border rounded-xl px-4 py-3" /></div>
                      </div>
                      <div className="md:col-span-2 p-4 bg-slate-50 rounded-2xl border border-dashed">
                        <label className="block text-sm font-bold text-slate-700 mb-2 flex items-center gap-2"><Icon name="link" className="w-4 h-4 text-blue-500"/> 封面圖片網址 (支援 Google Drive 分享連結)</label>
                        <input type="url" value={formData.image} onChange={e=>handleImageChange(e.target.value)} className="w-full bg-white border rounded-xl px-4 py-3 mb-3" placeholder="https://..." />
                        {formData.image && <img src={formData.image} className="w-full h-48 object-cover rounded-xl shadow-sm border" onerror="this.src='https://via.placeholder.com/800x400?text=Invalid+Image+URL'"/>}
                      </div>
                      <div className="md:col-span-2"><label className="block text-sm font-bold text-slate-700 mb-2">部落格文章內容 (由 AI 擴寫)</label><textarea rows="15" value={formData.description} onChange={e=>setFormData({...formData, description:e.target.value})} className="w-full bg-slate-50 border rounded-xl px-4 py-3 focus:bg-white outline-none custom-scrollbar leading-relaxed" placeholder="在這裡編輯您的旅遊故事..."></textarea></div>
                    </div>
                  </form>
                </div>
                <div className="p-5 border-t flex justify-end gap-3 bg-white shrink-0"><button type="button" onClick={() => setIsModalOpen(false)} className="px-6 py-3 font-bold text-slate-500">取消</button><button type="submit" form="tourForm" disabled={isSubmitting} className="bg-indigo-600 text-white px-10 py-3 rounded-xl font-bold shadow-lg transition active:scale-95">{isSubmitting ? '儲存中...' : '確認儲存行程'}</button></div>
              </div>
            </div>
          )}
        </React.Fragment>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AdminApp />);
  </script>
</body>
</html>
