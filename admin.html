<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅遊管家 Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --bg: #f7f6f3;
      --surface: #ffffff;
      --border: #e8e6e1;
      --text: #1a1917;
      --muted: #8c8a84;
      --accent: #2563eb;
      --accent-light: #eff6ff;
      --danger: #dc2626;
      --radius: 12px;
      --radius-lg: 20px;
    }
    body { font-family: 'DM Sans', 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
    .editor-wrap { display: grid; grid-template-columns: 6fr 4fr; height: calc(100vh - 56px); width: 100vw; }
    .editor-sidebar { border-right: 1px solid var(--border); overflow-y: auto; background: var(--surface); padding: 32px 48px; display: flex; flex-direction: column; gap: 24px; }
    .editor-preview { overflow-y: auto; background: var(--bg); padding: 40px 48px; }
    .field-label { font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; display: block; }
    .field-input { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 14px; outline: none; background: var(--bg); }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all .15s; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-ai { background: var(--accent-light); color: var(--accent); border: 1px solid #bfdbfe; }
    .topbar { height: 56px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; position: sticky; top: 0; z-index: 50; }
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 32px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; transition: all .2s; }
    .card:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    .preview-article h3 { font-family: 'DM Serif Display', serif; font-size: 1.6rem; margin: 2rem 0 .8rem; border-left: 5px solid var(--accent); padding-left: 14px; }
    .preview-article img { width: 100%; border-radius: var(--radius-lg); margin: 1rem 0; object-fit: cover; }
    .spinner { width: 14px; height: 14px; border: 2px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin .6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react,env">
    const { useState, useEffect, useRef } = React;

    const Ico = ({ n, s = 16, c }) => {
      const paths = {
        plus: <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
        edit: <><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></>,
        trash: <><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></>,
        sparkles: <><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707"/></>,
        back: <><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></>,
        send: <><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></>
      };
      return <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c||"currentColor"} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">{paths[n]}</svg>;
    };

    const WORKER_URL = 'https://travelkeeper.fangwl591021.workers.dev';

    const BlogPreview = ({ form }) => {
      if (!form.title && !form.description) return <div className="text-gray-300 text-center py-40 font-bold uppercase tracking-widest">Live Preview</div>;
      const lines = (form.description || '').split('\n');
      return (
        <div className="preview-article animate-fade-in">
          {form.image && <img src={form.image} className="w-full h-64 object-cover rounded-3xl mb-8 shadow-lg" alt="cover" />}
          <h1 className="text-4xl font-black mb-6 leading-tight">{form.title || '未命名行程'}</h1>
          <div className="flex gap-6 py-6 border-y border-gray-200 mb-10">
            <div><p className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">售價</p><p className="text-xl font-black text-red-600">TWD {Number(form.price||0).toLocaleString()}</p></div>
            <div><p className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">天數</p><p className="text-xl font-bold">{form.days} 天</p></div>
            <div><p className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">地區</p><p className="text-xl font-bold">{form.region}</p></div>
          </div>
          {lines.map((p, i) => {
            const l = p.trim();
            if (l.startsWith('###')) return <h3 key={i}>{l.replace('###','').trim()}</h3>;
            if (l.includes('![Image](')) {
              const m = l.match(/\!\[.*?\]\((.*?)\)/);
              return m ? <img key={i} src={m[1]} className="shadow-xl" alt="" /> : null;
            }
            if (!l) return null;
            return <p key={i} className="text-gray-600 leading-relaxed text-lg mb-6">{l}</p>;
          })}
        </div>
      );
    };

    const EMPTY = { id: null, title: '', region: '亞洲', price: 0, days: 1, image: '', description: '', notes: '' };

    function App() {
      const slug = new URLSearchParams(window.location.search).get('a') || 'demo';
      const fileRef = useRef(null);
      const [auth, setAuth] = useState('loading');
      const [myUid, setMyUid] = useState('');
      const [items, setItems] = useState([]);
      const [view, setView] = useState('list');
      const [form, setForm] = useState(EMPTY);
      const [saving, setSaving] = useState(false);
      const [aiLoading, setAiLoading] = useState(false);
      const [pushingId, setPushingId] = useState(null);

      const setF = (k, v) => setForm(p => ({ ...p, [k]: v }));

      const fetchList = async () => {
        try {
          const r = await fetch(`${WORKER_URL}/api/itineraries?a=${slug}`);
          setItems(await r.json());
        } catch(e) {}
      };

      useEffect(() => {
        (async () => {
          try {
            const cr = await fetch(`${WORKER_URL}/api/config?a=${slug}`);
            const cd = await cr.json();
            if (!cd.success) { setAuth('denied'); return; }
            await liff.init({ liffId: cd.data.liff_id });
            if (!liff.isLoggedIn()) { liff.login(); return; }
            const prof = await liff.getProfile();
            setMyUid(prof.userId);
            const sr = await fetch(`${WORKER_URL}/api/itineraries?action=checkUserStatus&uid=${prof.userId}&a=${slug}`);
            const sd = await sr.json();
            if (sd.success && sd.data.isAdmin) { fetchList(); setAuth('admin'); } else { setAuth('denied'); }
          } catch(e) { setAuth('denied'); }
        })();
      }, [slug]);

      const handleAI = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onloadend = async () => {
          setAiLoading(true);
          try {
            const r = await fetch(`${WORKER_URL}/api/upload-dm?a=${slug}`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({image:reader.result}) });
            const d = await r.json();
            if (d.success) setForm(p => ({ ...p, ...d.data }));
            else alert('AI 錯誤：' + d.error);
          } catch(e) { alert('AI 連線失敗'); }
          setAiLoading(false);
        };
        reader.readAsDataURL(file);
        e.target.value = "";
      };

      const handleSave = async () => {
        setSaving(true);
        try {
          const r = await fetch(`${WORKER_URL}/api/itineraries?a=${slug}`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ action: form.id ? 'updateItinerary' : 'addItinerary', ...form }) });
          if ((await r.json()).success) { setView('list'); fetchList(); }
        } catch(e) {}
        setSaving(false);
      };

      const handleBroadcast = async (itineraryId) => {
        if (!confirm('確定要將此行程推播給所有會員嗎？')) return;
        setPushingId(itineraryId);
        try {
          const r = await fetch(`${WORKER_URL}/api/admin/broadcast?a=${slug}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ itineraryId, adminUid: myUid })
          });
          const d = await r.json();
          if (d.success) alert(`推播成功！已發送給 ${d.count} 位用戶。`);
          else alert('推播失敗：' + d.error);
        } catch(e) { alert('連線失敗'); }
        setPushingId(null);
      };

      if (auth === 'loading') return <div className="h-screen flex items-center justify-center font-bold text-gray-400">Loading Admin...</div>;
      if (auth === 'denied') return <div className="h-screen flex flex-col items-center justify-center p-10 text-center"><h1 className="text-6xl mb-4">⛔</h1><p className="font-bold text-xl mb-4">存取被拒</p><code className="bg-gray-100 p-4 rounded-xl text-xs break-all">{myUid}</code></div>;

      if (view === 'list') return (
        <div>
          <div className="topbar px-8">
            <span className="font-black text-xl italic tracking-tighter">SaaS <span className="text-blue-600">Admin</span></span>
            <button className="btn btn-primary shadow-xl shadow-blue-200" onClick={() => { setForm(EMPTY); setView('edit'); }}><Ico n="plus" /> 新增行程</button>
          </div>
          <div className="card-grid">
            {items.map(it => (
              <div key={it.id} className="card shadow-sm group">
                <div className="h-48 overflow-hidden"><img src={it.image} className="w-full h-full object-cover group-hover:scale-110 transition duration-700" alt="" /></div>
                <div className="p-6">
                  <p className="text-[10px] font-black text-blue-600 uppercase tracking-widest mb-2">{it.region} · {it.days}天</p>
                  <h4 className="font-bold text-lg mb-4 line-clamp-1">{it.title}</h4>
                  <div className="flex justify-between items-center border-t pt-4">
                    <span className="text-red-600 font-black text-xl">${Number(it.price).toLocaleString()}</span>
                    <div className="flex gap-2">
                      <button className="p-2.5 bg-green-50 text-green-600 rounded-xl hover:bg-green-600 hover:text-white transition" title="推播給會員" onClick={() => handleBroadcast(it.id)}>
                        {pushingId === it.id ? <div className="spinner"/> : <Ico n="send" s={14}/>}
                      </button>
                      <button className="p-2.5 bg-gray-50 text-gray-400 rounded-xl hover:bg-blue-600 hover:text-white transition" onClick={() => { setForm(it); setView('edit'); }}><Ico n="edit" s={14}/></button>
                      <button className="p-2.5 bg-gray-50 text-gray-400 rounded-xl hover:bg-red-600 hover:text-white transition" onClick={async () => { if(confirm('刪除？')){ await fetch(`${WORKER_URL}/api/itineraries?a=${slug}`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({action:'deleteItinerary', id:it.id}) }); fetchList(); } }}><Ico n="trash" s={14}/></button>
                    </div>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      );

      return (
        <div className="animate-fade-in">
          <div className="topbar px-8">
            <div className="flex items-center gap-4">
              <button className="p-2 hover:bg-gray-100 rounded-full transition" onClick={() => setView('list')}><Ico n="back" s={20}/></button>
              <span className="font-black uppercase tracking-widest text-xs text-gray-400">Editor Workspace</span>
            </div>
            <div className="flex gap-3">
              {!form.id && (
                <>
                  <button className="btn btn-ai px-6 py-2.5 rounded-full" disabled={aiLoading} onClick={() => fileRef.current.click()}>
                    {aiLoading ? <div className="spinner"/> : <Ico n="sparkles" s={14}/>} AI 視覺擴寫
                  </button>
                  <input ref={fileRef} type="file" accept="image/*" className="hidden" onChange={handleAI} />
                </>
              )}
              <button className="btn btn-primary px-8 py-2.5 rounded-full shadow-xl shadow-blue-200" disabled={saving} onClick={handleSave}>{saving ? <div className="spinner"/> : '儲存並發佈'}</button>
            </div>
          </div>
          <div className="editor-wrap">
            <div className="editor-sidebar custom-scrollbar">
              <div><label className="field-label">行程標題</label><input className="field-input font-black text-2xl border-none bg-transparent p-0 focus:ring-0" value={form.title} onChange={e=>setF('title',e.target.value)} placeholder="在此揮寫大器標題..." /></div>
              <div className="grid grid-cols-3 gap-6">
                <div><label className="field-label">地區</label><select className="field-input font-bold" value={form.region} onChange={e=>setF('region',e.target.value)}>{['亞洲','歐洲','美洲','國旅','大洋洲','非洲'].map(r=><option key={r}>{r}</option>)}</select></div>
                <div><label className="field-label">天數</label><input type="number" className="field-input font-bold" value={form.days} onChange={e=>setF('days',e.target.value)} /></div>
                <div><label className="field-label">售價</label><input type="number" className="field-input font-bold" value={form.price} onChange={e=>setF('price',e.target.value)} /></div>
              </div>
              <div className="divider" />
              <div><label className="field-label">封面大圖</label><input type="url" className="field-input text-xs mb-4" value={form.image} onChange={e=>setF('image',e.target.value)} placeholder="Unsplash 連結..." />{form.image && <img src={form.image} className="w-full h-40 object-cover rounded-2xl shadow-md" />}</div>
              <div className="divider" />
              <div className="flex-1 flex flex-col"><label className="field-label">故事長文 (Markdown)</label><textarea className="field-input field-textarea custom-scrollbar bg-white border-2 border-gray-100" value={form.description} onChange={e=>setF('description',e.target.value)} placeholder={`### 第 1 天\n![Image](圖片網址)\n內容故事...`} /></div>
              <div><label className="field-label">內部備註</label><textarea className="field-input text-xs" rows={2} value={form.notes||''} onChange={e=>setF('notes',e.target.value)} style={{resize:'none'}} /></div>
            </div>
            <div className="editor-preview custom-scrollbar">
              <div className="flex items-center gap-3 mb-10 text-[10px] font-black uppercase tracking-[0.3em] text-gray-300"><Ico n="edit" s={12}/> Live Rendering Preview</div>
              <BlogPreview form={form} />
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
