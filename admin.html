<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>老闆管理後台 | 旅遊管家</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Sans TC', sans-serif; background: #f8fafc; }
    .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react,env">
    const { useState, useEffect } = React;
    const WORKER_URL = 'https://travelkeeper.fangwl591021.workers.dev';

    function App() {
      const urlParams = new URLSearchParams(window.location.search);
      const agencySlug = urlParams.get('a') || 'demo';
      
      const [auth, setAuth] = useState('loading');
      const [myUid, setMyUid] = useState('');
      const [tenantName, setTenantName] = useState('');

      useEffect(() => {
        const init = async () => {
          try {
            const configRes = await fetch(`${WORKER_URL}/api/config?a=${agencySlug}`);
            const configData = await configRes.json();
            if (!configData.success) { setAuth('error'); return; }

            await liff.init({ liffId: configData.data.liff_id });
            if (!liff.isLoggedIn()) { liff.login(); return; }

            const profile = await liff.getProfile();
            setMyUid(profile.userId);

            const statusRes = await fetch(`${WORKER_URL}/api/itineraries?action=checkUserStatus&uid=${profile.userId}&a=${agencySlug}`);
            const statusData = await statusRes.json();

            if (statusData.success && statusData.data.isAdmin) {
              setTenantName(statusData.data.tenantName);
              setAuth('admin');
            } else {
              setAuth('denied');
            }
          } catch (e) { setAuth('error'); }
        };
        init();
      }, [agencySlug]);

      if (auth === 'loading') return (
        <div className="h-screen flex flex-col items-center justify-center">
          <div className="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
          <p className="text-slate-400 font-bold">驗證管理員權限中...</p>
        </div>
      );

      if (auth === 'denied') return (
        <div className="h-screen flex items-center justify-center p-6">
          <div className="bg-white p-10 rounded-[3rem] shadow-2xl max-w-md w-full text-center border border-red-100 animate-fade-in">
            <div className="text-6xl mb-6">🚫</div>
            <h1 className="text-2xl font-black mb-2 text-slate-800">管理權限不足</h1>
            <p className="text-slate-500 mb-8 leading-relaxed">此頁面為「{agencySlug}」老闆專用。<br/>您的帳號目前未被列入管理員名單。</p>
            
            <div className="bg-slate-50 p-5 rounded-2xl mb-8 text-left">
              <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">請將此 UID 加入管理員名單：</p>
              <code className="text-xs font-mono text-blue-600 break-all bg-white p-3 rounded-xl border border-slate-100 block">{myUid}</code>
            </div>

            <div className="space-y-3">
              <a href={`index.html?a=${agencySlug}&tab=dist`} className="block w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-xl shadow-blue-100 hover:scale-[1.02] transition">前往合作夥伴專區</a>
              <button onClick={()=>window.location.reload()} className="block w-full bg-slate-100 text-slate-600 py-3 rounded-2xl font-bold text-sm">重新整理</button>
            </div>
          </div>
        </div>
      );

      if (auth === 'error') return <div className="h-screen flex items-center justify-center font-bold text-red-500">❌ 無法載入租戶配置，請檢查網址參數。</div>;

      return (
        <div className="min-h-screen animate-fade-in">
          <nav className="bg-white border-b px-10 py-5 flex justify-between items-center sticky top-0 z-50">
            <div className="flex items-center gap-4">
               <div className="bg-blue-600 text-white p-2 rounded-xl font-black italic text-xs">SAAS</div>
               <h1 className="text-2xl font-black tracking-tighter">{tenantName} <span className="text-slate-300 text-sm font-bold ml-2">管理控制台</span></h1>
            </div>
            <div className="flex items-center gap-6">
               <div className="text-right hidden sm:block">
                  <p className="text-[10px] font-black text-slate-300 uppercase tracking-widest">Logged in as</p>
                  <p className="text-sm font-bold text-slate-600">Administrator</p>
               </div>
               <button onClick={()=>liff.logout()} className="bg-slate-50 text-slate-400 px-4 py-2 rounded-xl text-xs font-black hover:text-red-500 transition">登出</button>
            </div>
          </nav>
          
          <main className="p-10 max-w-7xl mx-auto">
             <div className="bg-gradient-to-br from-blue-600 to-blue-500 p-12 rounded-[3.5rem] text-white shadow-2xl shadow-blue-200 mb-12">
                <h2 className="text-5xl font-black mb-4">歡迎回來，老闆！👋</h2>
                <p className="text-blue-100 text-xl font-medium">您現在可以自由管理行程與審核合作夥伴了。</p>
             </div>
             {/* 這裡之後會補上行程管理列表 */}
             <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div className="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm">
                   <h3 className="text-xl font-black mb-2">📦 行程庫管理</h3>
                   <p className="text-slate-400 text-sm mb-6">發布新行程、AI 擴寫故事內容</p>
                   <button className="bg-slate-900 text-white px-8 py-3 rounded-2xl font-bold">進入管理</button>
                </div>
                <div className="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm">
                   <h3 className="text-xl font-black mb-2">👥 夥伴審核</h3>
                   <p className="text-slate-400 text-sm mb-6">管理申請名單、發放推廣權限</p>
                   <button className="bg-emerald-600 text-white px-8 py-3 rounded-2xl font-bold">進入審核</button>
                </div>
             </div>
          </main>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
