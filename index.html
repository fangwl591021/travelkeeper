<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅遊管家 - 智能行程管理與經銷系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in-up { animation: fadeInUp 0.3s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    .line-chat-bg { background-color: #749cbd; }
  </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800">
  <div id="root"></div>

  <script type="text/babel" data-presets="react,env">
    const { useState, useEffect } = React;

    // --- 圖示組件定義 ---
    const IconWrapper = ({ children, className = "w-6 h-6" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
    );
    const Navigation = ({ className }) => <IconWrapper className={className}><polygon points="3 11 22 2 13 21 11 13 3 11"/></IconWrapper>;
    const Search = ({ className }) => <IconWrapper className={className}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></IconWrapper>;
    const MapPin = ({ className }) => <IconWrapper className={className}><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></IconWrapper>;
    const Calendar = ({ className }) => <IconWrapper className={className}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></IconWrapper>;
    const Type = ({ className }) => <IconWrapper className={className}><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></IconWrapper>;
    const UploadCloud = ({ className }) => <IconWrapper className={className}><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></IconWrapper>;
    const ImageIcon = ({ className }) => <IconWrapper className={className}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></IconWrapper>;
    const FileText = ({ className }) => <IconWrapper className={className}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></IconWrapper>;
    const RefreshCw = ({ className }) => <IconWrapper className={className}><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></IconWrapper>;
    const Send = ({ className }) => <IconWrapper className={className}><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></IconWrapper>;
    const CheckCircle = ({ className }) => <IconWrapper className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></IconWrapper>;
    const AlertCircle = ({ className }) => <IconWrapper className={className}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></IconWrapper>;
    const X = ({ className }) => <IconWrapper className={className}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></IconWrapper>;
    const Camera = ({ className }) => <IconWrapper className={className}><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></IconWrapper>;
    const Users = ({ className }) => <IconWrapper className={className}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></IconWrapper>;
    const Share2 = ({ className }) => <IconWrapper className={className}><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></IconWrapper>;
    const Briefcase = ({ className }) => <IconWrapper className={className}><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></IconWrapper>;

    const AdminDeniedScreen = () => (
      <div className="w-full max-w-3xl mx-auto px-4 py-32 animate-fade-in text-center">
        <AlertCircle className="w-24 h-24 text-red-500 mx-auto mb-6" />
        <h2 className="text-4xl font-bold text-gray-800 mb-4">權限不足</h2>
        <p className="text-gray-500 text-xl">此區塊為授權經銷商專屬，您的帳號目前尚未開通。</p>
      </div>
    );

    // --- 全域變數 ---
    const WORKER_URL = 'https://travelkeeper.fangwl591021.workers.dev';
    const LIFF_ID = '2009367829-BDZCGti8'; 
    const ENDPOINT_URL = 'https://fangwl591021.github.io/travelkeeper/';

    // 管理員 UID 清單
    const ADMIN_UIDS = [
      "Uf729764dbb5b652a5a90a467320bea29",
      "U58eb5c1a747450140ce1335af709ae55"
    ];

    function App() {
      const urlParams = new URLSearchParams(window.location.search);
      const [activeTab, setActiveTab] = useState(urlParams.get('tab') || 'home'); 
      const [itineraries, setItineraries] = useState([]);
      const [liffProfile, setLiffProfile] = useState(null);
      const [distributorStatus, setDistributorStatus] = useState(null); 
      const [isAdmin, setIsAdmin] = useState(false);
      const [myDistributorData, setMyDistributorData] = useState(null);
      const [isStatusChecked, setIsStatusChecked] = useState(false);
      const [isLoading, setIsLoading] = useState(true);
      const [toast, setToast] = useState(null);
      const [flexModalItem, setFlexModalItem] = useState(null);
      const [cardOptions, setCardOptions] = useState({ phone: false, line: false });

      useEffect(() => {
        initLiff();
        fetchItineraries();
      }, []);

      const showToast = (message, type = 'success') => { setToast({ message, type }); setTimeout(() => setToast(null), 3000); };

      const initLiff = async () => {
        try {
          await liff.init({ liffId: LIFF_ID });
          if (!liff.isLoggedIn()) {
            liff.login({ redirectUri: window.location.href });
          } else {
            const profile = await liff.getProfile();
            setLiffProfile(profile);
            
            // 立即檢查是否為管理員
            const isUserAdmin = ADMIN_UIDS.includes(profile.userId);
            setIsAdmin(isUserAdmin);
            
            await checkMyStatus(profile.userId);
          }
        } catch (err) { console.error('LIFF 初始化失敗', err); }
      };

      const checkMyStatus = async (uid) => {
        try {
          const res = await fetch(`${WORKER_URL}/api/itineraries`, { 
            method: 'POST', 
            headers: { 'Content-Type': 'application/json' }, 
            body: JSON.stringify({ action: 'checkUserStatus', uid: uid }) 
          });
          const result = await res.json();
          if (result.success) {
            const info = result.data;
            // 優先以 ADMIN_UIDS 清單判定管理員
            if (ADMIN_UIDS.includes(uid) || info.isAdmin) setIsAdmin(true);
            
            if (info.role === 'distributor') {
              setDistributorStatus(info.status ? String(info.status).trim().toLowerCase() : 'pending');
              setMyDistributorData(info.distributorData);
            }
          }
        } catch (e) { console.error('API 連線失敗', e); }
        finally { setIsStatusChecked(true); }
      };

      const fetchItineraries = async () => {
        setIsLoading(true);
        try {
          const res = await fetch(`${WORKER_URL}/api/itineraries`);
          const data = await res.json();
          if (Array.isArray(data)) setItineraries(data);
        } catch (e) { console.error('獲取行程失敗', e); }
        finally { setIsLoading(false); }
      };

      const changeTab = (tab) => {
        setActiveTab(tab);
        window.history.replaceState({}, '', `?tab=${tab}`);
      };

      const openFlexModal = (item) => {
        setCardOptions({ 
          phone: !!(myDistributorData?.phone || isAdmin), 
          line: !!(myDistributorData?.lineLink || isAdmin) 
        });
        setFlexModalItem(item);
      };

      const buildFlexMessage = (tourItem, distributorData, refUidStr, options) => {
        const trackingUrl = `${ENDPOINT_URL}index.html?t=${tourItem.id}&r=${refUidStr || 'GUEST'}`;
        const shareLiffUrl = `https://liff.line.me/${LIFF_ID}?action=share&t=${tourItem.id}&r=${refUidStr || ''}`;

        const buttons = [
          { "type": "button", "style": "primary", "color": "#00B900", "height": "sm", "action": { "type": "uri", "label": "查看行程 / 立即報名", "uri": trackingUrl } },
          { "type": "button", "style": "primary", "color": "#FF334B", "height": "sm", "margin": "sm", "action": { "type": "uri", "label": "分享行程給好友", "uri": shareLiffUrl } }
        ];
        
        if (options.phone && distributorData?.phone) buttons.push({ "type": "button", "style": "secondary", "height": "sm", "margin": "sm", "action": { "type": "uri", "label": "📞 聯絡電話", "uri": `tel:${distributorData.phone}` }});
        if (options.line && distributorData?.lineLink) buttons.push({ "type": "button", "style": "secondary", "height": "sm", "margin": "sm", "action": { "type": "uri", "label": "💬 私訊 LINE", "uri": distributorData.lineLink }});

        return {
          "type": "flex",
          "altText": `推薦行程：${tourItem.title}`,
          "contents": {
            "type": "bubble",
            "hero": { "type": "image", "url": tourItem.image || 'https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?auto=format&fit=crop&w=800&q=80', "size": "full", "aspectRatio": "20:13", "aspectMode": "cover" },
            "body": { "type": "box", "layout": "vertical", "contents": [
              { "type": "text", "text": tourItem.title, "weight": "bold", "size": "xl", "wrap": true },
              { "type": "text", "text": `TWD ${Number(tourItem.price).toLocaleString()}`, "color": "#ff334b", "weight": "bold", "margin": "md" }
            ]},
            "footer": { "type": "box", "layout": "vertical", "spacing": "sm", "contents": buttons, "flex": 0 }
          }
        };
      };

      const triggerFlexSharing = async () => {
        try {
          const flexMsg = buildFlexMessage(flexModalItem, myDistributorData || {}, liffProfile.userId, cardOptions);
          await liff.shareTargetPicker([flexMsg]);
          showToast('✅ 發送成功！');
          setFlexModalItem(null);
        } catch(e) { showToast('發送取消或失敗', 'error'); }
      };

      let roleBadge = <span className="bg-gray-100 text-gray-600 text-[10px] px-2 py-0.5 rounded font-bold">訪客</span>;
      if (isAdmin) roleBadge = <span className="bg-red-100 text-red-700 text-[10px] px-2 py-0.5 rounded font-bold border border-red-200">👑 總管理員</span>;
      else if (distributorStatus === 'approved') roleBadge = <span className="bg-emerald-100 text-emerald-700 text-[10px] px-2 py-0.5 rounded font-bold border border-emerald-200">💼 經銷商</span>;

      return (
        <div className="min-h-screen flex flex-col bg-gray-50">
          <nav className="bg-white shadow-sm h-16 sticky top-0 z-50 flex items-center px-4">
            <div className="flex-1 flex items-center cursor-pointer" onClick={() => changeTab('home')}>
              <Navigation className="w-7 h-7 text-blue-600 mr-2" />
              <span className="font-bold text-xl text-blue-900 tracking-tight">旅遊管家</span>
            </div>
            <div className="flex items-center space-x-4">
              <button onClick={() => changeTab('home')} className={`text-sm font-bold px-2 py-1 transition ${activeTab === 'home' ? 'text-blue-600 border-b-2 border-blue-600' : 'text-gray-500'}`}>找行程</button>
              <button onClick={() => changeTab('distributor')} className={`text-sm font-bold px-2 py-1 transition ${activeTab === 'distributor' ? 'text-emerald-600 border-b-2 border-emerald-600' : 'text-gray-500'}`}>經銷商</button>
              {liffProfile && (
                <div className="flex items-center space-x-2 border-l pl-4">
                  <div className="text-right hidden sm:block">
                    <p className="text-xs font-bold leading-none mb-1">{liffProfile.displayName}</p>
                    {roleBadge}
                  </div>
                  <img src={liffProfile.pictureUrl} className="w-9 h-9 rounded-full border border-gray-100 shadow-sm" />
                </div>
              )}
            </div>
          </nav>

          <main className="flex-grow max-w-7xl mx-auto w-full p-4">
            {activeTab === 'home' && (
              <div className="animate-fade-in">
                <div className="mb-6 h-40 md:h-64 rounded-3xl overflow-hidden relative shadow-lg">
                  <img src="https://images.unsplash.com/photo-1436491865332-7a61a109cc05?auto=format&fit=crop&w=1920&q=80" className="w-full h-full object-cover" />
                  <div className="absolute inset-0 bg-black/40 flex flex-col items-center justify-center text-white">
                    <h2 className="text-3xl font-bold mb-2">探索您的下一段旅程</h2>
                    <p className="text-sm opacity-80">精選全球優質行程，為您量身打造</p>
                  </div>
                </div>
                {isLoading ? (
                  <div className="py-20 text-center text-gray-400"><RefreshCw className="w-10 h-10 animate-spin mx-auto mb-2" />讀取行程中...</div>
                ) : (
                  <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                    {itineraries.map(item => (
                      <div key={item.id} className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-md transition">
                        <img src={item.image} className="w-full h-48 object-cover" />
                        <div className="p-5">
                          <span className="text-[10px] font-bold bg-blue-50 text-blue-600 px-2 py-1 rounded uppercase tracking-wider">{item.region}</span>
                          <h3 className="font-bold text-lg mt-2 line-clamp-2 h-14">{item.title}</h3>
                          <div className="mt-4 flex justify-between items-baseline">
                            <span className="text-gray-400 text-sm font-medium">{item.days} 天</span>
                            <span className="text-2xl font-black text-red-500">${Number(item.price).toLocaleString()}</span>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {activeTab === 'distributor' && (
              <div className="animate-fade-in">
                {(distributorStatus === 'approved' || isAdmin) ? (
                  <div className="space-y-6">
                    <div className="bg-emerald-600 rounded-3xl p-8 text-white shadow-lg relative overflow-hidden">
                      <div className="relative z-10">
                        <h2 className="text-3xl font-bold mb-2">經銷商專屬區</h2>
                        <p className="text-emerald-100">管理員身份：{isAdmin ? '已啟用最高權限' : '授權經銷商'}</p>
                      </div>
                      <Briefcase className="absolute right-0 bottom-0 w-32 h-32 text-white/10 -mr-6 -mb-6" />
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                      {itineraries.map(item => (
                        <div key={item.id} className="bg-white p-5 border rounded-2xl shadow-sm flex flex-col justify-between">
                          <div className="flex gap-4 mb-4">
                            <img src={item.image} className="w-20 h-20 rounded-xl object-cover" />
                            <div className="flex-1">
                              <h4 className="font-bold text-gray-800 line-clamp-2 text-sm">{item.title}</h4>
                              <p className="text-red-500 font-bold mt-1">${Number(item.price).toLocaleString()}</p>
                            </div>
                          </div>
                          <button onClick={() => openFlexModal(item)} className="w-full bg-emerald-500 hover:bg-emerald-600 text-white py-3 rounded-xl font-bold shadow-sm transition flex justify-center items-center">
                            <Share2 className="w-4 h-4 mr-2" /> 產生推廣名片
                          </button>
                        </div>
                      ))}
                    </div>
                  </div>
                ) : <AdminDeniedScreen />}
              </div>
            )}
          </main>

          {flexModalItem && (
            <div className="fixed inset-0 z-[100] bg-black/60 backdrop-blur-sm flex items-center justify-center p-4">
              <div className="bg-white rounded-3xl w-full max-w-md p-8 relative animate-fade-in-up shadow-2xl">
                <button onClick={() => setFlexModalItem(null)} className="absolute top-5 right-5 text-gray-400 hover:text-gray-600"><X /></button>
                <h3 className="text-2xl font-bold mb-6 flex items-center"><Share2 className="mr-3 text-emerald-500" /> 推廣名片設定</h3>
                <div className="space-y-4 mb-8">
                  <p className="text-sm text-gray-500 font-medium">勾選要包含在名片中的聯絡按鈕：</p>
                  <label className="flex items-center p-4 border-2 rounded-2xl cursor-pointer hover:bg-gray-50 transition">
                    <input type="checkbox" className="mr-4 w-5 h-5 accent-emerald-500" checked={cardOptions.phone} onChange={e => setCardOptions({...cardOptions, phone: e.target.checked})} />
                    <span className="font-bold text-gray-700">📞 聯絡電話</span>
                  </label>
                  <label className="flex items-center p-4 border-2 rounded-2xl cursor-pointer hover:bg-gray-50 transition">
                    <input type="checkbox" className="mr-4 w-5 h-5 accent-emerald-500" checked={cardOptions.line} onChange={e => setCardOptions({...cardOptions, line: e.target.checked})} />
                    <span className="font-bold text-gray-700">💬 私訊 LINE</span>
                  </label>
                </div>
                <button onClick={triggerFlexSharing} className="w-full bg-[#00B900] hover:bg-[#009900] text-white py-4 rounded-2xl font-bold text-lg shadow-lg transition transform active:scale-95">
                  一鍵發送至 LINE 好友
                </button>
              </div>
            </div>
          )}

          {toast && (
            <div className="fixed bottom-10 left-1/2 -translate-x-1/2 z-[200] bg-gray-900/90 backdrop-blur text-white px-8 py-4 rounded-2xl font-bold shadow-2xl animate-fade-in-up border border-white/10">
              {toast.message}
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
