<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅遊管家 - 智能行程管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
  <style>
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in-up {
      animation: fadeInUp 0.3s ease-out forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .animate-fade-in {
      animation: fadeIn 0.3s ease-out forwards;
    }
    /* 自訂卷軸樣式讓左側儀表板更美觀 */
    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #e2e8f0;
      border-radius: 4px;
    }
  </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800">
  <div id="root"></div>

  <script type="text/babel" data-presets="react,env">
    const { useState, useEffect } = React;

    const IconWrapper = ({ children, className = "w-6 h-6" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        {children}
      </svg>
    );
    const Navigation = ({ className }) => <IconWrapper className={className}><polygon points="3 11 22 2 13 21 11 13 3 11"/></IconWrapper>;
    const Search = ({ className }) => <IconWrapper className={className}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></IconWrapper>;
    const MapPin = ({ className }) => <IconWrapper className={className}><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></IconWrapper>;
    const DollarSign = ({ className }) => <IconWrapper className={className}><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></IconWrapper>;
    const UploadCloud = ({ className }) => <IconWrapper className={className}><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/><polyline points="16 16 12 12 8 16"/></IconWrapper>;
    const ImageIcon = ({ className }) => <IconWrapper className={className}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></IconWrapper>;
    const FileText = ({ className }) => <IconWrapper className={className}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></IconWrapper>;
    const RefreshCw = ({ className }) => <IconWrapper className={className}><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></IconWrapper>;
    const Send = ({ className }) => <IconWrapper className={className}><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></IconWrapper>;
    const Sparkles = ({ className }) => <IconWrapper className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></IconWrapper>;
    const CheckCircle = ({ className }) => <IconWrapper className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></IconWrapper>;
    const AlertCircle = ({ className }) => <IconWrapper className={className}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></IconWrapper>;
    const X = ({ className }) => <IconWrapper className={className}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></IconWrapper>;
    const Edit2 = ({ className }) => <IconWrapper className={className}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></IconWrapper>;
    const Trash2 = ({ className }) => <IconWrapper className={className}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></IconWrapper>;
    const Camera = ({ className }) => <IconWrapper className={className}><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></IconWrapper>;
    const Filter = ({ className }) => <IconWrapper className={className}><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></IconWrapper>;

    const WORKER_URL = 'https://travelkeeper.fangwl591021.workers.dev';

    const INITIAL_ITINERARIES = [
      { id: 1, title: '花東縱谷原民部落四日遊', region: '國旅', price: 12500, days: 4, image: 'https://images.unsplash.com/photo-1578338944883-7eecc7a95079?auto=format&fit=crop&w=600&q=80', description: '深入台灣後花園，體驗太魯閣壯麗峽谷與道地原住民風味餐。' },
    ];

    const HOT_SPOTS = ['國旅', '亞洲', '歐洲', '美洲', '大洋洲', '非洲'];

    function App() {
      const [activeTab, setActiveTab] = useState('home');
      const [itineraries, setItineraries] = useState(INITIAL_ITINERARIES);
      const [toast, setToast] = useState(null);

      // Search State
      const [searchRegion, setSearchRegion] = useState('');
      const [searchPrice, setSearchPrice] = useState('');
      const [filteredResults, setFilteredResults] = useState(INITIAL_ITINERARIES);
      const [isLoading, setIsLoading] = useState(false);

      // Banner State
      const [bannerImage, setBannerImage] = useState(() => {
        return localStorage.getItem('travel_keeper_banner') || 'https://images.unsplash.com/photo-1436491865332-7a61a109cc05?auto=format&fit=crop&w=1920&q=80';
      });

      // Admin State
      const [uploadMode, setUploadMode] = useState('dm');
      const [ocrStatus, setOcrStatus] = useState('idle');
      const [draftData, setDraftData] = useState({ id: null, title: '', region: '', price: '', days: '', description: '', image: '' });
      
      // Delete Modal State
      const [deleteModalId, setDeleteModalId] = useState(null);

      useEffect(() => {
        fetchItineraries();
      }, []);

      const fetchItineraries = async () => {
        setIsLoading(true);
        try {
          const res = await fetch(`${WORKER_URL}/api/itineraries`);
          if (!res.ok) throw new Error('Network error');
          const data = await res.json();
          if (data && data.length > 0) {
            setItineraries(data);
            setFilteredResults(data);
          }
        } catch (error) {
          showToast('尚未取得資料庫最新資料，目前顯示預設行程', 'error');
        } finally {
          setIsLoading(false);
        }
      };

      const showToast = (message, type = 'success') => {
        setToast({ message, type });
        setTimeout(() => setToast(null), 3000);
      };

      const handleSearch = () => {
        let results = itineraries;
        if (searchRegion) results = results.filter(item => item.region.includes(searchRegion));
        if (searchPrice) results = results.filter(item => item.price <= parseInt(searchPrice, 10));
        setFilteredResults(results);
        showToast(`為您找到 ${results.length} 筆符合的行程`);
      };

      // Banner上傳處理
      const handleBannerUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onloadend = () => {
           setBannerImage(reader.result);
           localStorage.setItem('travel_keeper_banner', reader.result);
           showToast('✅ 首頁 Banner 更新成功！');
        };
      };

      // --- DM 解析與自動上架 ---
      const handleFileUpload = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        setOcrStatus('processing');
        
        try {
          const reader = new FileReader();
          reader.readAsDataURL(file);
          reader.onloadend = async () => {
            const base64data = reader.result;
            
            const res = await fetch(`${WORKER_URL}/api/upload-dm`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ image: base64data })
            });
            
            const aiResult = await res.json();
            
            if (aiResult.success) {
              const parsedData = aiResult.data;
              
              let keyword = parsedData.imageKeyword || parsedData.region || "travel";
              let searchTerms = encodeURIComponent(keyword.trim().replace(/\s+/g, ',') + ",landscape");
              const autoImageUrl = `https://loremflickr.com/800/600/${searchTerms}`;
              
              parsedData.image = autoImageUrl; 
              parsedData.id = Date.now(); 
              
              setDraftData(parsedData);
              showToast('✅ AI 解析完成並已搜尋相關圖片！系統正自動為您寫入資料庫...');
              
              const newItinerary = {
                ...parsedData,
                action: 'addItinerary', 
                price: parseInt(parsedData.price, 10) || 0,
              };
              
              setItineraries(prev => [newItinerary, ...prev]);

              try {
                const dbRes = await fetch(`${WORKER_URL}/api/itineraries`, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify(newItinerary)
                });
                
                const dbResult = await dbRes.json();
                if (dbResult.success) {
                  showToast('🎉 行程已成功寫入資料庫並上架！');
                  setDraftData({ id: null, title: '', region: '', price: '', days: '', description: '', image: '' });
                  setOcrStatus('idle');
                  fetchItineraries();
                } else {
                  throw new Error('寫入失敗');
                }
              } catch (dbErr) {
                setOcrStatus('done');
                showToast('已解析，但寫入失敗，請手動點擊「儲存」', 'error');
              }
            } else {
              throw new Error(aiResult.error || '解析失敗');
            }
          };
        } catch (error) {
          setOcrStatus('idle');
          showToast(error.message || '檔案上傳與解析失敗', 'error');
        }
      };

      // --- 手動新增 或 修改儲存 ---
      const handleUpdateContent = async () => {
        if (!draftData.title) return showToast('請先填寫或解析行程內容', 'error');
        
        const isEditing = !!draftData.id;
        const submitData = {
          ...draftData,
          id: draftData.id || Date.now(),
          price: parseInt(draftData.price, 10) || 0,
          action: isEditing ? 'updateItinerary' : 'addItinerary' 
        };

        try {
          const res = await fetch(`${WORKER_URL}/api/itineraries`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(submitData)
          });
          
          const result = await res.json();
          if (result.success) {
            showToast(isEditing ? '修改成功！已更新至網站。' : '新增成功！行程已上架。');
            setDraftData({ id: null, title: '', region: '', price: '', days: '', description: '', image: '' });
            setOcrStatus('idle');
            setUploadMode('dm'); 
            fetchItineraries(); 
          } else {
            throw new Error('操作失敗');
          }
        } catch (error) {
          showToast('寫入資料庫發生錯誤', 'error');
        }
      };

      const handleEditClick = (item) => {
        setUploadMode('manual');
        setOcrStatus('done');
        setDraftData(item); 
        window.scrollTo({ top: 0, behavior: 'smooth' }); 
        showToast('已載入行程內容，請於上方表單修改');
      };

      const confirmDelete = async () => {
        if (!deleteModalId) return;
        try {
          const res = await fetch(`${WORKER_URL}/api/itineraries`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'deleteItinerary', id: deleteModalId })
          });
          
          const result = await res.json();
          if (result.success) {
            showToast('已成功下架該行程！');
            setDeleteModalId(null);
            fetchItineraries();
          } else {
            throw new Error('刪除失敗');
          }
        } catch (error) {
          showToast('下架發生錯誤', 'error');
        }
      };

      const handleSyncLine = async () => {
        if (!draftData.title) return showToast('請先選擇或填寫要推播的行程（從列表中點擊編輯）', 'error');
        try {
          const res = await fetch(`${WORKER_URL}/api/sync-line`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(draftData)
          });
          const result = await res.json();
          if (result.success) showToast('已同步至 LINE@！關注者將立即看到最新推播。');
          else throw new Error('同步失敗');
        } catch (error) {
          showToast('LINE 推播觸發失敗，請確認 Worker 設定', 'error');
        }
      };

      return (
        <div className="min-h-screen">
          {/* Navbar (寬度完全展開) */}
          <nav className="bg-white shadow-sm sticky top-0 z-50">
            <div className="w-full max-w-[1920px] mx-auto px-4 sm:px-6 lg:px-8 xl:px-12">
              <div className="flex justify-between h-16">
                <div className="flex items-center cursor-pointer" onClick={() => setActiveTab('home')}>
                  <Navigation className="h-8 w-8 text-blue-600 mr-2" />
                  <span className="font-bold text-xl tracking-wider text-blue-900">旅遊管家</span>
                </div>
                <div className="flex items-center space-x-4">
                  <button 
                    onClick={() => setActiveTab('home')}
                    className={`px-3 py-2 rounded-md text-sm font-medium transition-colors ${activeTab === 'home' ? 'text-blue-600 bg-blue-50' : 'text-gray-600 hover:text-blue-600 hover:bg-gray-50'}`}
                  >
                    找行程
                  </button>
                  <button 
                    onClick={() => setActiveTab('admin')}
                    className={`px-3 py-2 rounded-md text-sm font-medium transition-colors ${activeTab === 'admin' ? 'text-blue-600 bg-blue-50' : 'text-gray-600 hover:text-blue-600 hover:bg-gray-50'}`}
                  >
                    後台上稿系統
                  </button>
                </div>
              </div>
            </div>
          </nav>

          {/* Main Content (寬度完全展開) */}
          <main className="w-full max-w-[1920px] mx-auto px-4 sm:px-6 lg:px-8 xl:px-12 py-8">
            
            {/* ====== 前台：找行程 ====== */}
            {activeTab === 'home' && (
              <div className="space-y-6 animate-fade-in">
                
                {/* 1. 可上傳圖片的 Banner 區塊 */}
                <div className="relative w-full h-64 md:h-80 xl:h-96 rounded-2xl overflow-hidden group shadow-md bg-gray-200">
                  <img src={bannerImage} alt="Travel Banner" className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" onError={(e)=>{e.target.src='https://images.unsplash.com/photo-1436491865332-7a61a109cc05?auto=format&fit=crop&w=1920&q=80'}} />
                  <div className="absolute inset-0 bg-gradient-to-t from-black/60 via-black/20 to-transparent transition-opacity" />
                  
                  <div className="absolute inset-0 flex flex-col items-center justify-center text-white p-4 text-center">
                    <h1 className="text-3xl md:text-5xl lg:text-6xl font-bold tracking-wider mb-3 drop-shadow-lg">探索世界的美好</h1>
                    <p className="text-lg md:text-xl lg:text-2xl drop-shadow-md font-light">發現您的下一個夢幻旅程</p>
                  </div>

                  <label className="absolute bottom-4 right-4 bg-white/90 hover:bg-white text-gray-800 px-4 py-2 rounded-lg cursor-pointer shadow-lg backdrop-blur-sm transition-all flex items-center text-sm font-bold opacity-0 group-hover:opacity-100 transform translate-y-2 group-hover:translate-y-0">
                    <Camera className="w-4 h-4 mr-2 text-blue-600" />
                    更換 Banner
                    <input type="file" className="hidden" accept="image/*" onChange={handleBannerUpload} />
                  </label>
                </div>

                {/* 2. 下方內容區：左側搜尋儀表板 + 右側行程列表 */}
                <div className="flex flex-col md:flex-row gap-8 items-start">
                  
                  {/* 左側：搜尋儀表板 (寬螢幕時佔比較小) */}
                  <div className="w-full md:w-1/3 lg:w-1/4 xl:w-1/5 flex-shrink-0 md:sticky md:top-24">
                    <div className="bg-white rounded-2xl shadow-md p-6 border border-gray-100">
                      <h2 className="text-xl font-bold text-gray-800 mb-5 flex items-center border-b pb-4">
                        <Filter className="h-5 w-5 mr-2 text-blue-500" /> 行程篩選
                      </h2>
                      
                      <div className="space-y-5">
                        <div className="relative">
                          <label className="block text-sm font-medium text-gray-700 mb-1.5">地區查詢</label>
                          <div className="relative">
                            <MapPin className="absolute left-3 top-3 h-5 w-5 text-gray-400" />
                            <select 
                              value={searchRegion} 
                              onChange={(e) => setSearchRegion(e.target.value)}
                              className="pl-10 w-full rounded-lg border-gray-300 border p-2.5 focus:ring-blue-500 focus:border-blue-500 bg-gray-50 outline-none transition-shadow"
                            >
                              <option value="">所有地區</option>
                              <option value="國旅">國旅 (台灣)</option>
                              <option value="亞洲">亞洲</option>
                              <option value="歐洲">歐洲</option>
                              <option value="美洲">美洲</option>
                              <option value="大洋洲">大洋洲</option>
                              <option value="非洲">非洲</option>
                            </select>
                          </div>
                        </div>
                        
                        <div className="relative">
                          <label className="block text-sm font-medium text-gray-700 mb-1.5">預算範圍</label>
                          <div className="relative">
                            <DollarSign className="absolute left-3 top-3 h-5 w-5 text-gray-400" />
                            <select 
                              value={searchPrice} 
                              onChange={(e) => setSearchPrice(e.target.value)}
                              className="pl-10 w-full rounded-lg border-gray-300 border p-2.5 focus:ring-blue-500 focus:border-blue-500 bg-gray-50 outline-none transition-shadow"
                            >
                              <option value="">不限預算</option>
                              <option value="20000">20,000 以下</option>
                              <option value="50000">50,000 以下</option>
                              <option value="100000">100,000 以下</option>
                              <option value="150000">150,000 以下</option>
                            </select>
                          </div>
                        </div>

                        <button 
                          onClick={handleSearch}
                          className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl transition duration-200 shadow-md hover:shadow-lg flex items-center justify-center"
                        >
                          <Search className="w-4 h-4 mr-2" /> 開始搜尋
                        </button>

                        <div className="pt-5 border-t border-gray-100">
                          <span className="block text-sm font-medium text-gray-700 mb-3">🔥 熱門景點推薦</span>
                          <div className="flex flex-wrap gap-2">
                            {HOT_SPOTS.map(spot => (
                              <button 
                                key={spot}
                                onClick={() => { setSearchRegion(spot); handleSearch(); }}
                                className="bg-blue-50 text-blue-700 px-3 py-1.5 rounded-lg text-sm font-medium hover:bg-blue-100 transition-colors border border-blue-100"
                              >
                                {spot}
                              </button>
                            ))}
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>

                  {/* 右側：精選行程列表 (支援到 5 排網格) */}
                  <div className="w-full md:w-2/3 lg:w-3/4 xl:w-4/5">
                    <div className="flex justify-between items-center mb-6">
                      <h3 className="text-2xl font-bold text-gray-800 flex items-center">
                        <Sparkles className="w-6 h-6 mr-2 text-yellow-500" /> 為您推薦的精選行程
                      </h3>
                      <span className="text-sm font-medium text-gray-500 bg-gray-100 px-3 py-1 rounded-full">
                        共 {filteredResults.length} 筆
                      </span>
                    </div>

                    {isLoading ? (
                      <div className="text-center py-20 text-gray-500 bg-white rounded-2xl shadow-sm border border-gray-100">
                        <RefreshCw className="w-10 h-10 animate-spin mx-auto mb-3 text-blue-500" />
                        <p className="font-medium">從資料庫載入中...</p>
                      </div>
                    ) : (
                      <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-6">
                        {filteredResults.map(item => (
                          <div key={item.id} className="bg-white rounded-2xl shadow-sm hover:shadow-xl transition-all duration-300 overflow-hidden group border border-gray-100 flex flex-col h-full transform hover:-translate-y-1">
                            <div className="h-52 overflow-hidden relative flex-shrink-0 bg-gray-100">
                              <img src={item.image} alt={item.title} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" onError={(e) => {e.target.src='https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?auto=format&fit=crop&w=600&q=80'}}/>
                              <div className="absolute top-3 left-3 bg-black/60 backdrop-blur-sm text-white px-3 py-1 rounded-md text-xs font-bold tracking-wider shadow-sm">
                                {item.region}
                              </div>
                            </div>
                            <div className="p-5 flex flex-col flex-grow">
                              <h4 className="font-bold text-lg mb-2 text-gray-900 line-clamp-2 leading-snug group-hover:text-blue-600 transition-colors">{item.title}</h4>
                              <p className="text-gray-500 text-sm mb-4 line-clamp-3 flex-grow leading-relaxed">{item.description}</p>
                              <div className="flex justify-between items-end border-t border-gray-50 pt-4 mt-auto">
                                <span className="text-sm font-medium text-gray-400 bg-gray-50 px-2 py-1 rounded">{item.days} 天行程</span>
                                <span className="text-2xl font-bold text-red-500">${Number(item.price).toLocaleString()}</span>
                              </div>
                            </div>
                          </div>
                        ))}
                        {filteredResults.length === 0 && (
                          <div className="col-span-full text-center py-20 text-gray-500 bg-white rounded-2xl border border-dashed border-gray-300">
                            <Search className="w-12 h-12 text-gray-300 mx-auto mb-3" />
                            <p className="font-medium text-lg">找不到符合條件的行程</p>
                            <p className="text-sm text-gray-400 mt-1">請嘗試調整左側的搜尋條件。</p>
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                </div>
              </div>
            )}

            {/* ====== 後台：上稿與管理系統 (擴大編輯寬度) ====== */}
            {activeTab === 'admin' && (
              <div className="w-full max-w-6xl mx-auto space-y-6 animate-fade-in">
                {/* 1. 表單區塊 */}
                <div className="bg-white rounded-2xl shadow-md p-6 border border-gray-100">
                  <div className="flex justify-between items-center border-b pb-4 mb-6">
                    <h2 className="text-2xl font-bold text-gray-800 flex items-center">
                      <UploadCloud className="h-6 w-6 mr-2 text-blue-500" /> 行程智能上稿系統
                    </h2>
                    <div className="flex space-x-2">
                      <button 
                        onClick={handleUpdateContent}
                        className="flex items-center bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium transition shadow-sm hover:shadow"
                      >
                        <RefreshCw className="w-4 h-4 mr-2" /> {draftData.id ? '儲存修改' : '手動新增上架'}
                      </button>
                      <button 
                        onClick={handleSyncLine}
                        className="flex items-center bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-lg font-medium transition shadow-sm hover:shadow"
                      >
                        <Send className="w-4 h-4 mr-2" /> LINE@同步推播
                      </button>
                    </div>
                  </div>

                  {/* 切換上傳模式 */}
                  {!draftData.id && (
                    <div className="flex space-x-4 mb-6">
                      <button
                        onClick={() => setUploadMode('dm')}
                        className={`flex-1 py-3 rounded-xl border-2 font-medium flex justify-center items-center transition-colors ${uploadMode === 'dm' ? 'border-blue-500 bg-blue-50 text-blue-700' : 'border-gray-200 text-gray-500 hover:bg-gray-50'}`}
                      >
                        <ImageIcon className="mr-2 h-5 w-5" /> DM / 圖片智能解析 (自動上架)
                      </button>
                      <button
                        onClick={() => { setUploadMode('manual'); setDraftData({ id: null, title: '', region: '', price: '', days: '', description: '', image: '' }); }}
                        className={`flex-1 py-3 rounded-xl border-2 font-medium flex justify-center items-center transition-colors ${uploadMode === 'manual' ? 'border-blue-500 bg-blue-50 text-blue-700' : 'border-gray-200 text-gray-500 hover:bg-gray-50'}`}
                      >
                        <FileText className="mr-2 h-5 w-5" /> 人工手動填寫
                      </button>
                    </div>
                  )}

                  {/* 上傳區塊 */}
                  {uploadMode === 'dm' && !draftData.id && (
                    <div className="mb-8">
                      <label className="block text-sm font-medium text-gray-700 mb-2">上傳旅遊 DM 圖片 (解析後將自動產生配圖並儲存至資料庫)</label>
                      <div className="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-gray-300 border-dashed rounded-xl bg-gray-50 hover:bg-gray-100 transition relative">
                        <div className="space-y-1 text-center">
                          <ImageIcon className="mx-auto h-12 w-12 text-gray-400" />
                          <div className="flex text-sm text-gray-600 justify-center">
                            <label className="relative cursor-pointer bg-white rounded-md font-medium text-blue-600 hover:text-blue-500 focus-within:outline-none focus-within:ring-2 focus-within:ring-offset-2 focus-within:ring-blue-500 px-2">
                              <span>選擇檔案</span>
                              <input type="file" className="sr-only" accept="image/*" onChange={handleFileUpload} disabled={ocrStatus === 'processing'} />
                            </label>
                            <p className="pl-1">或拖曳至此</p>
                          </div>
                          <p className="text-xs text-gray-500">PNG, JPG 限制 5MB</p>
                        </div>
                        
                        {ocrStatus === 'processing' && (
                          <div className="absolute inset-0 bg-white/90 rounded-xl flex flex-col items-center justify-center z-10">
                            <RefreshCw className="h-8 w-8 text-blue-500 animate-spin mb-3" />
                            <p className="text-blue-700 font-bold text-lg">ChatGPT 視覺模型解析中...</p>
                            <p className="text-sm text-blue-600 mt-1">正在提取文案與自動產生高畫質配圖，請稍候</p>
                          </div>
                        )}
                      </div>
                    </div>
                  )}

                  {/* 編輯表單 */}
                  {(uploadMode === 'manual' || ocrStatus === 'done' || draftData.title) && (
                    <div className="bg-gray-50 p-6 lg:p-8 rounded-xl border border-gray-200 shadow-inner relative">
                      {draftData.id && (
                        <button 
                          onClick={() => { setDraftData({ id: null, title: '', region: '', price: '', days: '', description: '', image: '' }); setUploadMode('dm'); setOcrStatus('idle'); }}
                          className="absolute top-4 right-4 text-gray-400 hover:text-gray-600 bg-white rounded-full p-1 border shadow-sm transition-colors"
                        >
                          <X className="w-5 h-5" />
                        </button>
                      )}
                      <div className="flex items-center mb-6">
                        <h3 className="text-xl font-bold text-gray-800">
                          {draftData.id ? '✏️ 正在修改行程' : '📝 行程內容草稿'}
                        </h3>
                        {ocrStatus === 'done' && !draftData.id && (
                          <span className="ml-3 inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800 border border-green-200">
                            <Sparkles className="w-3 h-3 mr-1" /> 已解析並自動上架
                          </span>
                        )}
                      </div>
                      
                      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-6">
                        <div className="lg:col-span-2">
                          <label className="block text-sm font-medium text-gray-700 mb-1.5">行程標題</label>
                          <input 
                            type="text" 
                            value={draftData.title}
                            onChange={(e) => setDraftData({...draftData, title: e.target.value})}
                            className="w-full rounded-lg border-gray-300 border p-2.5 focus:ring-blue-500 focus:border-blue-500 outline-none transition-shadow"
                            placeholder="例如：巴黎浪漫七日遊"
                          />
                        </div>
                        <div>
                          <label className="block text-sm font-medium text-gray-700 mb-1.5">所屬地區</label>
                          <select 
                            value={draftData.region}
                            onChange={(e) => setDraftData({...draftData, region: e.target.value})}
                            className="w-full rounded-lg border-gray-300 border p-2.5 focus:ring-blue-500 focus:border-blue-500 bg-white outline-none transition-shadow"
                          >
                            <option value="">請選擇地區</option>
                            <option value="國旅">國旅</option>
                            <option value="亞洲">亞洲</option>
                            <option value="歐洲">歐洲</option>
                            <option value="美洲">美洲</option>
                            <option value="大洋洲">大洋洲</option>
                            <option value="非洲">非洲</option>
                          </select>
                        </div>
                        <div>
                          <label className="block text-sm font-medium text-gray-700 mb-1.5">價格 (TWD)</label>
                          <input 
                            type="number" 
                            value={draftData.price}
                            onChange={(e) => setDraftData({...draftData, price: e.target.value})}
                            className="w-full rounded-lg border-gray-300 border p-2.5 focus:ring-blue-500 focus:border-blue-500 outline-none transition-shadow"
                            placeholder="例如：85000"
                          />
                        </div>
                        <div className="lg:col-span-1">
                          <label className="block text-sm font-medium text-gray-700 mb-1.5">天數</label>
                          <input 
                            type="number" 
                            value={draftData.days}
                            onChange={(e) => setDraftData({...draftData, days: e.target.value})}
                            className="w-full rounded-lg border-gray-300 border p-2.5 focus:ring-blue-500 focus:border-blue-500 outline-none transition-shadow"
                            placeholder="例如：7"
                          />
                        </div>
                        <div className="lg:col-span-3">
                          <label className="block text-sm font-medium text-gray-700 mb-1.5">圖片網址 (已自動搜尋真實授權圖，也可手動修改)</label>
                          <div className="flex gap-4 items-center">
                            <input 
                              type="text" 
                              value={draftData.image || ''}
                              onChange={(e) => setDraftData({...draftData, image: e.target.value})}
                              className="flex-1 rounded-lg border-gray-300 border p-2.5 focus:ring-blue-500 focus:border-blue-500 outline-none font-mono text-sm text-gray-500 transition-shadow"
                              placeholder="https://..."
                            />
                            {draftData.image && (
                               <img src={draftData.image} alt="預覽" className="w-16 h-16 rounded-lg object-cover border shadow-sm" onError={(e)=>{e.target.src='https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?auto=format&fit=crop&w=60&q=80'}} />
                            )}
                          </div>
                        </div>
                      </div>
                      <div>
                        <label className="block text-sm font-medium text-gray-700 mb-1.5">詳細行程文案</label>
                        <textarea 
                          rows={6}
                          value={draftData.description}
                          onChange={(e) => setDraftData({...draftData, description: e.target.value})}
                          className="w-full rounded-lg border-gray-300 border p-3 focus:ring-blue-500 focus:border-blue-500 outline-none leading-relaxed transition-shadow custom-scrollbar text-base"
                          placeholder="請輸入詳細行程..."
                        />
                      </div>
                    </div>
                  )}
                </div>

                {/* 2. 現有行程管理列表 */}
                <div className="bg-white rounded-2xl shadow-md p-6 border border-gray-100">
                  <h3 className="text-xl font-bold text-gray-800 mb-4 border-b pb-3 flex items-center">
                    <FileText className="w-5 h-5 mr-2 text-gray-500" /> 現有行程管理
                  </h3>
                  
                  {isLoading ? (
                    <div className="text-center py-8 text-gray-500"><RefreshCw className="w-6 h-6 animate-spin mx-auto mb-2" /></div>
                  ) : itineraries.length === 0 ? (
                    <div className="text-center py-8 text-gray-400 bg-gray-50 rounded-xl border border-dashed border-gray-200">目前尚無已上架的行程</div>
                  ) : (
                    <div className="space-y-3 max-h-[600px] overflow-y-auto custom-scrollbar pr-2">
                      {itineraries.map(item => (
                        <div key={item.id} className="flex flex-col sm:flex-row items-center justify-between p-4 bg-gray-50 hover:bg-blue-50/50 rounded-xl border border-gray-200 transition-colors">
                          <div className="flex items-center gap-5 w-full sm:w-auto mb-3 sm:mb-0">
                            <img src={item.image} className="w-20 h-20 rounded-lg object-cover flex-shrink-0 border border-gray-100 shadow-sm" alt="thumb" onError={(e)=>{e.target.src='https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?auto=format&fit=crop&w=80&q=80'}} />
                            <div>
                              <div className="flex items-center gap-2 mb-1">
                                <span className="bg-gray-200 text-gray-700 px-2.5 py-0.5 rounded text-xs font-bold">{item.region}</span>
                                <h4 className="font-bold text-lg text-gray-900 line-clamp-1">{item.title}</h4>
                              </div>
                              <div className="text-gray-500">
                                <span className="font-semibold text-red-500 text-lg">${Number(item.price).toLocaleString()}</span> <span className="text-sm ml-1">• {item.days}天</span>
                              </div>
                            </div>
                          </div>
                          
                          <div className="flex space-x-3 w-full sm:w-auto justify-end">
                            <button 
                              onClick={() => handleEditClick(item)}
                              className="flex items-center px-4 py-2 bg-white border border-gray-300 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50 hover:text-blue-600 transition shadow-sm hover:shadow"
                            >
                              <Edit2 className="w-4 h-4 mr-2" /> 編輯
                            </button>
                            <button 
                              onClick={() => setDeleteModalId(item.id)}
                              className="flex items-center px-4 py-2 bg-white border border-red-200 rounded-lg text-sm font-medium text-red-600 hover:bg-red-50 transition shadow-sm hover:shadow"
                            >
                              <Trash2 className="w-4 h-4 mr-2" /> 下架
                            </button>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>

              </div>
            )}

          </main>

          {/* ====== 獨立元件：刪除確認 Modal ====== */}
          {deleteModalId && (
            <div className="fixed inset-0 z-[60] flex items-center justify-center bg-black/50 backdrop-blur-sm animate-fade-in">
              <div className="bg-white rounded-2xl p-6 max-w-sm w-full mx-4 shadow-2xl border border-gray-100 transform transition-all">
                <div className="flex items-center text-red-600 mb-4">
                  <AlertCircle className="w-6 h-6 mr-2" />
                  <h3 className="text-lg font-bold">確認下架此行程？</h3>
                </div>
                <p className="text-gray-600 mb-6 leading-relaxed">下架後該行程將從前台及資料庫移除，此動作無法復原。確定要繼續嗎？</p>
                <div className="flex justify-end space-x-3">
                  <button 
                    onClick={() => setDeleteModalId(null)}
                    className="px-4 py-2 rounded-lg font-medium text-gray-600 bg-gray-100 hover:bg-gray-200 transition"
                  >
                    取消
                  </button>
                  <button 
                    onClick={confirmDelete}
                    className="px-4 py-2 rounded-lg font-medium text-white bg-red-600 hover:bg-red-700 transition shadow-sm hover:shadow-md"
                  >
                    確定下架
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Toast Notification */}
          {toast && (
            <div className="fixed bottom-4 right-4 z-[70] animate-fade-in-up">
              <div className={`flex items-center p-4 rounded-xl shadow-xl ${toast.type === 'error' ? 'bg-red-50 text-red-800 border border-red-200' : 'bg-gray-900 text-white'}`}>
                {toast.type === 'error' ? <X className="w-5 h-5 mr-3 text-red-500" /> : <CheckCircle className="w-5 h-5 mr-3 text-green-400" />}
                <span className="font-medium tracking-wide">{toast.message}</span>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
