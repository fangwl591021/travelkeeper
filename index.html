<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅遊管家 - 智能行程管理與經銷系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in-up { animation: fadeInUp 0.3s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    .line-chat-bg { background-color: #749cbd; }
  </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800">
  <div id="root"></div>

  <script type="text/babel" data-presets="react,env">
    const { useState, useEffect } = React;

    // --- 圖示元件 ---
    const IconWrapper = ({ children, className = "w-6 h-6" }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>;
    const Navigation = ({ className }) => <IconWrapper className={className}><polygon points="3 11 22 2 13 21 11 13 3 11"/></IconWrapper>;
    const Search = ({ className }) => <IconWrapper className={className}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></IconWrapper>;
    const MapPin = ({ className }) => <IconWrapper className={className}><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></IconWrapper>;
    const DollarSign = ({ className }) => <IconWrapper className={className}><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></IconWrapper>;
    const UploadCloud = ({ className }) => <IconWrapper className={className}><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/><polyline points="16 16 12 12 8 16"/></IconWrapper>;
    const ImageIcon = ({ className }) => <IconWrapper className={className}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></IconWrapper>;
    const FileText = ({ className }) => <IconWrapper className={className}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></IconWrapper>;
    const RefreshCw = ({ className }) => <IconWrapper className={className}><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></IconWrapper>;
    const Send = ({ className }) => <IconWrapper className={className}><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></IconWrapper>;
    const Sparkles = ({ className }) => <IconWrapper className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></IconWrapper>;
    const CheckCircle = ({ className }) => <IconWrapper className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></IconWrapper>;
    const AlertCircle = ({ className }) => <IconWrapper className={className}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></IconWrapper>;
    const X = ({ className }) => <IconWrapper className={className}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></IconWrapper>;
    const Edit2 = ({ className }) => <IconWrapper className={className}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></IconWrapper>;
    const Trash2 = ({ className }) => <IconWrapper className={className}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></IconWrapper>;
    const Camera = ({ className }) => <IconWrapper className={className}><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></IconWrapper>;
    const Users = ({ className }) => <IconWrapper className={className}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></IconWrapper>;
    const Share2 = ({ className }) => <IconWrapper className={className}><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></IconWrapper>;
    const Briefcase = ({ className }) => <IconWrapper className={className}><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></IconWrapper>;

    // --- 系統變數 ---
    const WORKER_URL = 'https://travelkeeper.fangwl591021.workers.dev';
    const LIFF_ID = '2009367829-BDZCGti8'; 
    const ENDPOINT_URL = 'https://fangwl591021.github.io/travelkeeper/';
    const LOGIN_URL = 'login.html'; 

    const HOT_SPOTS = ['國旅', '亞洲', '歐洲', '美洲', '大洋洲', '非洲'];

    function App() {
      // 解析網址上的 ?tab= 參數
      const [activeTab, setActiveTab] = useState(() => {
        const params = new URLSearchParams(window.location.search);
        return params.get('tab') || 'home';
      }); 
      
      const [crmSubTab, setCrmSubTab] = useState('distributors'); 
      const [itineraries, setItineraries] = useState([]);
      const [toast, setToast] = useState(null);
      const [isLoading, setIsLoading] = useState(false);
      
      // 帳號與 LIFF 狀態
      const [liffProfile, setLiffProfile] = useState(null);
      const [isLiffReady, setIsLiffReady] = useState(false);
      const [distributorStatus, setDistributorStatus] = useState(null); 
      const [isGeneralMember, setIsGeneralMember] = useState(false);

      // CRM 資料狀態
      const [crmDistributors, setCrmDistributors] = useState([]);
      const [crmUsers, setCrmUsers] = useState([]);

      // 前台搜尋
      const [searchRegion, setSearchRegion] = useState('');
      const [searchPrice, setSearchPrice] = useState('');
      const [filteredResults, setFilteredResults] = useState([]);
      const [bannerImage, setBannerImage] = useState(() => localStorage.getItem('travel_keeper_banner') || 'https://images.unsplash.com/photo-1436491865332-7a61a109cc05?auto=format&fit=crop&w=1920&q=80');

      // 後台上稿
      const [uploadMode, setUploadMode] = useState('dm');
      const [ocrStatus, setOcrStatus] = useState('idle');
      const [draftData, setDraftData] = useState({ id: null, title: '', region: '', price: '', days: '', description: '', image: '' });
      
      // Modals
      const [deleteModalId, setDeleteModalId] = useState(null);
      const [flexModalItem, setFlexModalItem] = useState(null);

      // 初始化
      useEffect(() => {
        fetchItineraries();
        initLiff();
      }, []);

      const fetchItineraries = async () => {
        setIsLoading(true);
        try {
          const res = await fetch(`${WORKER_URL}/api/itineraries`);
          const data = await res.json();
          if (data && Array.isArray(data)) {
            setItineraries(data);
            setFilteredResults(data);
          }
        } catch (error) { console.error('Fetch error', error); } 
        finally { setIsLoading(false); }
      };

      // 【修復核心】：嚴格補齊 headers: { 'Content-Type': 'application/json' }
      const fetchCrmDataAndCheckStatus = async (currentProfile) => {
        try {
          // 拉取經銷商
          const resD = await fetch(`${WORKER_URL}/api/itineraries`, { 
            method: 'POST', 
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'getDistributors' })
          });
          const dataD = await resD.json();
          const distArr = Array.isArray(dataD) ? dataD : [];
          setCrmDistributors(distArr);
          
          // 拉取一般會員
          const resU = await fetch(`${WORKER_URL}/api/itineraries`, { 
            method: 'POST', 
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'getUsers' })
          });
          const dataU = await resU.json();
          const userArr = Array.isArray(dataU) ? dataU : [];
          setCrmUsers(userArr);

          // 確認目前登入者身分
          if (currentProfile) {
            const meDist = distArr.find(d => d.uid === currentProfile.userId);
            if (meDist) setDistributorStatus(meDist.status);
            
            const meUser = userArr.find(u => u.uid === currentProfile.userId);
            if (meUser) setIsGeneralMember(true);
          }
        } catch (e) { console.error('CRM Fetch error', e); }
      };

      const initLiff = async () => {
        try {
          await liff.init({ liffId: LIFF_ID });
          setIsLiffReady(true);
          if (liff.isLoggedIn()) {
            const profile = await liff.getProfile();
            setLiffProfile(profile);
            fetchCrmDataAndCheckStatus(profile);
          } else {
            fetchCrmDataAndCheckStatus(null);
          }
        } catch (err) { console.error('LIFF 初始化失敗', err); }
      };

      const changeTab = (newTab) => {
        setActiveTab(newTab);
        window.history.replaceState({}, '', `?tab=${newTab}`);
        if (newTab === 'crm') {
           fetchCrmDataAndCheckStatus(liffProfile);
        }
      };

      const showToast = (message, type = 'success') => {
        setToast({ message, type });
        setTimeout(() => setToast(null), 3000);
      };

      const loginAsDistributor = () => { window.location.href = `${LOGIN_URL}?type=distributor`; };
      const loginAsMember = () => { window.location.href = `${LOGIN_URL}?type=user`; };

      // --- 行程與管理功能 ---
      const handleSearch = () => {
        let results = itineraries;
        if (searchRegion) results = results.filter(item => item.region.includes(searchRegion));
        if (searchPrice) results = results.filter(item => item.price <= parseInt(searchPrice, 10));
        setFilteredResults(results);
        showToast(`為您找到 ${results.length} 筆符合的行程`);
      };

      const handleBannerUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onloadend = () => {
           setBannerImage(reader.result);
           localStorage.setItem('travel_keeper_banner', reader.result);
           showToast('✅ 首頁 Banner 更新成功！');
        };
      };

      const handleFileUpload = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        setOcrStatus('processing');
        try {
          const reader = new FileReader();
          reader.readAsDataURL(file);
          reader.onloadend = async () => {
            const base64data = reader.result;
            const res = await fetch(`${WORKER_URL}/api/upload-dm`, {
              method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ image: base64data })
            });
            const aiResult = await res.json();
            
            if (aiResult.success) {
              const parsedData = aiResult.data;
              let keyword = parsedData.imageKeyword || parsedData.region || "travel";
              parsedData.image = `https://loremflickr.com/800/600/${encodeURIComponent(keyword.trim().replace(/\s+/g, ',') + ",landscape")}`; 
              parsedData.id = Date.now(); 
              
              setDraftData(parsedData);
              showToast('✅ AI 解析完成！系統正自動寫入資料庫...');
              const newItinerary = { ...parsedData, action: 'addItinerary', price: parseInt(parsedData.price, 10) || 0 };
              setItineraries(prev => [newItinerary, ...prev]);

              try {
                const dbRes = await fetch(`${WORKER_URL}/api/itineraries`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(newItinerary) });
                const dbResult = await dbRes.json();
                if (dbResult.success) {
                  showToast('🎉 行程已成功上架！');
                  setDraftData({ id: null, title: '', region: '', price: '', days: '', description: '', image: '' });
                  setOcrStatus('idle');
                  fetchItineraries();
                } else throw new Error('寫入失敗');
              } catch (dbErr) {
                setOcrStatus('done'); showToast('寫入失敗，請手動點擊「儲存」', 'error');
              }
            } else throw new Error(aiResult.error || '解析失敗');
          };
        } catch (error) { setOcrStatus('idle'); showToast(error.message || '解析失敗', 'error'); }
      };

      const handleUpdateContent = async () => {
        if (!draftData.title) return showToast('請先填寫內容', 'error');
        const isEditing = !!draftData.id;
        const submitData = { ...draftData, id: draftData.id || Date.now(), price: parseInt(draftData.price, 10) || 0, action: isEditing ? 'updateItinerary' : 'addItinerary' };
        try {
          const res = await fetch(`${WORKER_URL}/api/itineraries`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(submitData) });
          const result = await res.json();
          if (result.success) {
            showToast(isEditing ? '修改成功！' : '新增成功！');
            setDraftData({ id: null, title: '', region: '', price: '', days: '', description: '', image: '' });
            setOcrStatus('idle'); setUploadMode('dm'); fetchItineraries(); 
          } else throw new Error('操作失敗');
        } catch (error) { showToast('寫入資料庫錯誤', 'error'); }
      };

      const handleEditClick = (item) => {
        setUploadMode('manual');
        setOcrStatus('done');
        setDraftData(item); 
        window.scrollTo({ top: 0, behavior: 'smooth' }); 
      };

      const confirmDelete = async () => {
        if (!deleteModalId) return;
        try {
          const res = await fetch(`${WORKER_URL}/api/itineraries`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'deleteItinerary', id: deleteModalId }) });
          if ((await res.json()).success) { showToast('已成功下架！'); setDeleteModalId(null); fetchItineraries(); }
          else throw new Error('刪除失敗');
        } catch (error) { showToast('下架發生錯誤', 'error'); }
      };

      const handleApproveUser = async (uid) => {
        try {
          const res = await fetch(`${WORKER_URL}/api/itineraries`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'updateDistributorStatus', uid: uid, status: 'approved' })
          });
          if ((await res.json()).success) {
             showToast('已核准該經銷商資格！');
             fetchCrmDataAndCheckStatus(liffProfile); 
          }
        } catch (e) { showToast('審核失敗', 'error'); }
      };

      const shareFlexMessage = async () => {
        if (!isLiffReady || !liff.isLoggedIn()) return showToast('請先登入', 'error');
        try {
          const trackingUrl = `${ENDPOINT_URL}?tour_id=${flexModalItem.id}&ref_uid=${liffProfile.userId}`;
          const flexMessage = {
            type: "flex", altText: `推薦行程：${flexModalItem.title}`,
            contents: {
              type: "bubble",
              hero: { type: "image", url: flexModalItem.image, size: "full", aspectRatio: "20:13", aspectMode: "cover" },
              body: {
                type: "box", layout: "vertical",
                contents: [
                  { type: "text", text: flexModalItem.title, weight: "bold", size: "xl", wrap: true },
                  { type: "box", layout: "baseline", margin: "md", contents: [
                      { type: "text", text: "🔥 熱門搶購中", size: "sm", color: "#999999", flex: 1 },
                      { type: "text", text: `$${Number(flexModalItem.price).toLocaleString()}`, size: "xl", color: "#ff334b", weight: "bold", align: "end" }
                    ]
                  }
                ]
              },
              footer: { type: "box", layout: "vertical", spacing: "sm", contents: [{ type: "button", style: "primary", color: "#00B900", action: { type: "uri", label: "立即查閱與報名", uri: trackingUrl } }] }
            }
          };
          const result = await liff.shareTargetPicker([flexMessage]);
          if (result) { showToast('✅ 成功發送推廣名片！'); setFlexModalItem(null); }
        } catch (error) { showToast('發送失敗：請在 LINE APP 內操作', 'error'); }
      };

      // ==========================================
      // 4. UI 渲染 (Render)
      // ==========================================
      return (
        <div className="min-h-screen flex flex-col bg-gray-50">
          {/* --- Navbar (永遠置頂) --- */}
          <nav className="bg-white shadow-sm sticky top-0 z-50">
            <div className="w-full max-w-[1920px] mx-auto px-4 sm:px-6 lg:px-8 xl:px-12">
              <div className="flex justify-between h-16">
                <div className="flex items-center cursor-pointer" onClick={() => changeTab('home')}>
                  <Navigation className="h-8 w-8 text-blue-600 mr-2" />
                  <span className="font-bold text-xl tracking-wider text-blue-900">旅遊管家</span>
                </div>
                <div className="hidden md:flex items-center space-x-2 overflow-x-auto">
                  <button onClick={() => changeTab('home')} className={`whitespace-nowrap px-4 py-2 rounded-lg text-sm font-bold transition-colors ${activeTab === 'home' ? 'text-blue-700 bg-blue-50' : 'text-gray-600 hover:bg-gray-100'}`}>找行程</button>
                  <button onClick={() => changeTab('member')} className={`whitespace-nowrap px-4 py-2 rounded-lg text-sm font-bold transition-colors flex items-center ${activeTab === 'member' ? 'text-orange-700 bg-orange-50' : 'text-gray-600 hover:bg-gray-100'}`}>
                    <Users className="w-4 h-4 mr-1.5" /> 會員中心
                  </button>
                  <button onClick={() => changeTab('distributor')} className={`whitespace-nowrap px-4 py-2 rounded-lg text-sm font-bold transition-colors flex items-center ${activeTab === 'distributor' ? 'text-emerald-700 bg-emerald-50' : 'text-gray-600 hover:bg-gray-100'}`}>
                    <Briefcase className="w-4 h-4 mr-1.5" /> 經銷商專區
                  </button>
                  <button onClick={() => changeTab('crm')} className={`whitespace-nowrap px-4 py-2 rounded-lg text-sm font-bold transition-colors flex items-center ${activeTab === 'crm' ? 'text-purple-700 bg-purple-50' : 'text-gray-600 hover:bg-gray-100'}`}>
                    後台 CRM
                  </button>
                  <button onClick={() => changeTab('admin')} className={`whitespace-nowrap px-4 py-2 rounded-lg text-sm font-bold transition-colors ${activeTab === 'admin' ? 'text-blue-700 bg-blue-50' : 'text-gray-600 hover:bg-gray-100'}`}>
                    後台上稿
                  </button>
                </div>
              </div>
            </div>
          </nav>

          <div className="flex-grow w-full">
            
            {/* ====== 前台：找行程 ====== */}
            {activeTab === 'home' && (
              <div className="w-full animate-fade-in pb-12">
                <div className="relative w-full h-64 md:h-80 xl:h-[400px] group bg-gray-200">
                  <img src={bannerImage} alt="Travel Banner" className="w-full h-full object-cover" onError={(e)=>{e.target.src='https://images.unsplash.com/photo-1436491865332-7a61a109cc05?auto=format&fit=crop&w=1920&q=80'}} />
                  <div className="absolute inset-0 bg-gradient-to-t from-black/60 via-black/20 to-transparent" />
                  <div className="absolute inset-0 flex flex-col items-center justify-center text-white p-4 text-center">
                    <h1 className="text-3xl md:text-5xl lg:text-6xl font-bold tracking-wider mb-4 drop-shadow-lg">探索世界的美好</h1>
                    <p className="text-lg md:text-xl lg:text-2xl drop-shadow-md font-light">發現您的下一個夢幻旅程</p>
                  </div>
                  <label className="absolute bottom-6 right-6 bg-white/90 hover:bg-white text-gray-800 px-5 py-2.5 rounded-lg cursor-pointer shadow-lg backdrop-blur-sm transition-all flex items-center text-sm font-bold opacity-0 group-hover:opacity-100 transform translate-y-2 group-hover:translate-y-0">
                    <Camera className="w-5 h-5 mr-2 text-blue-600" />更換 Banner<input type="file" className="hidden" accept="image/*" onChange={handleBannerUpload} />
                  </label>
                </div>

                <div className="sticky top-16 z-40 w-full bg-white/95 backdrop-blur-md shadow-md border-b border-gray-200 transition-all">
                  <div className="w-full max-w-[1920px] mx-auto px-4 sm:px-6 lg:px-8 xl:px-12 py-4 md:py-5">
                    <div className="flex flex-col md:flex-row gap-4 items-end">
                      <div className="flex-1 w-full">
                        <label className="block text-sm font-medium text-gray-700 mb-1.5 ml-1">前往地區</label>
                        <div className="relative">
                          <MapPin className="absolute left-3.5 top-3.5 h-5 w-5 text-gray-400" />
                          <select value={searchRegion} onChange={(e) => setSearchRegion(e.target.value)} className="pl-11 w-full rounded-xl border-gray-300 border p-3 focus:ring-blue-500 focus:border-blue-500 bg-gray-50 outline-none hover:bg-white transition-colors">
                            <option value="">探索所有地區</option><option value="國旅">國旅 (台灣)</option><option value="亞洲">亞洲</option><option value="歐洲">歐洲</option><option value="美洲">美洲</option><option value="大洋洲">大洋洲</option><option value="非洲">非洲</option>
                          </select>
                        </div>
                      </div>
                      <div className="flex-1 w-full">
                        <label className="block text-sm font-medium text-gray-700 mb-1.5 ml-1">預算範圍</label>
                        <div className="relative">

                  <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4 gap-6 max-h-[800px] overflow-y-auto pr-2 pb-2">
                    {itineraries.map(item => (
                      <div key={item.id} className="flex flex-col p-5 bg-white rounded-2xl border border-gray-200 shadow-sm h-full">
                        <div className="flex gap-5 mb-5"><img src={item.image} className="w-28 h-28 rounded-xl object-cover border" onError={(e)=>e.target.src='https://via.placeholder.com/150'}/><div className="flex-1"><span className="bg-gray-200 px-2 py-0.5 rounded text-xs font-bold">{item.region}</span><h4 className="font-bold text-lg line-clamp-2 mt-1">{item.title}</h4><div className="mt-3"><span className="font-extrabold text-red-500 text-xl">${Number(item.price).toLocaleString()}</span><span className="text-sm ml-1">• {item.days}天</span></div></div></div>
                        <div className="flex space-x-3 justify-end mt-auto border-t border-gray-100 pt-4">
                          <button onClick={() => handleEditClick(item)} className="flex-1 py-2 bg-white border rounded-xl text-sm font-bold shadow-sm">編輯</button>
                          <button onClick={() => setDeleteModalId(item.id)} className="flex-1 py-2 bg-white border border-red-200 text-red-600 rounded-xl text-sm font-bold shadow-sm">下架</button>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}
          </div>

          {/* ====== 獨立元件：Flex Message Modal ====== */}
          {flexModalItem && (
            <div className="fixed inset-0 z-[80] flex items-center justify-center bg-black/70 backdrop-blur-sm p-4">
              <div className="bg-white rounded-3xl overflow-hidden max-w-4xl w-full flex flex-col md:flex-row shadow-2xl relative animate-fade-in-up">
                <button onClick={() => setFlexModalItem(null)} className="absolute top-4 right-4 z-10 bg-black/20 hover:bg-black/50 text-white rounded-full p-2"><X className="w-6 h-6"/></button>
                <div className="w-full md:w-2/5 line-chat-bg p-6 flex flex-col items-center justify-center border-r border-gray-200">
                   <p className="text-white/80 font-bold mb-4 text-sm">LINE FLEX 預覽</p>
                   <div className="w-full max-w-[300px] bg-white rounded-[20px] overflow-hidden shadow-lg scale-95">
                     <div className="relative h-40"><img src={flexModalItem.image} className="w-full h-full object-cover" /></div>
                     <div className="p-5">
                       <h4 className="font-bold text-[17px] mb-1">{flexModalItem.title}</h4>
                       <div className="flex justify-between items-baseline mb-4 mt-2"><span className="text-gray-400 text-xs">🔥 熱門搶購中</span><span className="font-extrabold text-[#ff334b] text-xl">${Number(flexModalItem.price).toLocaleString()}</span></div>
                       <div className="w-full bg-[#00B900] text-white text-center py-2.5 rounded-xl font-bold text-sm">立即查閱與報名</div>
                     </div>
                   </div>
                </div>
                <div className="w-full md:w-3/5 p-8 lg:p-12 flex flex-col justify-center bg-white">
                  <div className="flex items-center text-[#00B900] mb-6"><CheckCircle className="w-8 h-8 mr-3" /><h3 className="text-2xl font-extrabold">推廣名片準備完畢！</h3></div>
                  <div className="space-y-6">
                    <div><label className="block text-sm font-bold text-gray-500 mb-2">專屬追蹤 UID</label><div className="bg-gray-50 border p-3 rounded-xl font-mono text-sm text-gray-700 select-all">{liffProfile?.userId}</div></div>
                    <div><label className="block text-sm font-bold text-gray-500 mb-2">專屬報名追蹤連結預覽</label><div className="bg-emerald-50 border p-3 rounded-xl font-mono text-sm text-emerald-800 break-all">{ENDPOINT_URL}?tour_id={flexModalItem.id}&ref_uid={liffProfile?.userId}</div></div>
                    <div className="pt-6 mt-6 border-t border-gray-100">
                      <button onClick={shareFlexMessage} className="w-full bg-[#00B900] hover:bg-[#009900] text-white font-bold py-4 rounded-2xl shadow-lg flex justify-center text-lg"><Share2 className="w-5 h-5 mr-2" /> 發送至 LINE 好友 / 群組</button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* 刪除確認 Modal */}
          {deleteModalId && (
            <div className="fixed inset-0 z-[60] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4">
              <div className="bg-white rounded-2xl p-8 max-w-md w-full shadow-2xl animate-fade-in-up">
                <div className="flex items-center text-red-600 mb-5"><AlertCircle className="w-8 h-8 mr-3" /><h3 className="text-2xl font-bold">確認下架此行程？</h3></div>
                <p className="text-gray-600 mb-8 text-lg">下架後該行程將從前台及資料庫移除，確定要繼續嗎？</p>
                <div className="flex justify-end space-x-4">
                  <button onClick={() => setDeleteModalId(null)} className="px-6 py-2.5 rounded-xl font-bold text-gray-600 bg-gray-100 hover:bg-gray-200 text-lg">取消</button>
                  <button onClick={confirmDelete} className="px-6 py-2.5 rounded-xl font-bold text-white bg-red-600 hover:bg-red-700 text-lg">確定下架</button>
                </div>
              </div>
            </div>
          )}

          {/* Toast Notification */}
          {toast && (
            <div className="fixed bottom-6 right-6 z-[90] animate-fade-in-up">
              <div className={`flex items-center p-5 rounded-2xl shadow-2xl ${toast.type === 'error' ? 'bg-red-50 text-red-800' : 'bg-gray-900 text-white'}`}><span className="font-bold text-lg tracking-wide">{toast.message}</span></div>
            </div>
          )}
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
