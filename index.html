    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    @keyframes run { 0% { transform: translateY(0) rotate(0deg); } 25% { transform: translateY(-8px) rotate(5deg); } 50% { transform: translateY(0) rotate(0deg); } 75% { transform: translateY(-8px) rotate(-5deg); } 100% { transform: translateY(0) rotate(0deg); } }

    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }

  </style>
</head>

  <script type="text/babel" data-presets="react,env">
    const { useState, useEffect } = React;

    const IconWrapper = ({ children, className = "w-6 h-6" }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>;

    const Type = ({ className }) => <IconWrapper className={className}><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></IconWrapper>;

    const ImageIcon = ({ className }) => <IconWrapper className={className}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></IconWrapper>;
    const FileText = ({ className }) => <IconWrapper className={className}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></IconWrapper>;
    const RefreshCw = ({ className }) => <IconWrapper className={className}><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></IconWrapper>;
    const Send = ({ className }) => <IconWrapper className={className}><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></IconWrapper>;
    const Sparkles = ({ className }) => <IconWrapper className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></IconWrapper>;
    const CheckCircle = ({ className }) => <IconWrapper className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></IconWrapper>;
    const AlertCircle = ({ className }) => <IconWrapper className={className}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></IconWrapper>;
    const X = ({ className }) => <IconWrapper className={className}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></IconWrapper>;
    const Edit2 = ({ className }) => <IconWrapper className={className}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></IconWrapper>;
    const Trash2 = ({ className }) => <IconWrapper className={className}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></IconWrapper>;
    const Camera = ({ className }) => <IconWrapper className={className}><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></IconWrapper>;
    const Users = ({ className }) => <IconWrapper className={className}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></IconWrapper>;
    const UserIcon = ({ className }) => <IconWrapper className={className}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></IconWrapper>;
    const Share2 = ({ className }) => <IconWrapper className={className}><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></IconWrapper>;
    const Briefcase = ({ className }) => <IconWrapper className={className}><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></IconWrapper>;
    const ArrowLeft = ({ className }) => <IconWrapper className={className}><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></IconWrapper>;
    const ClipboardList = ({ className }) => <IconWrapper className={className}><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/></IconWrapper>;
    const CopyIcon = ({ className }) => <IconWrapper className={className}><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></IconWrapper>;
    const LinkIcon = ({ className }) => <IconWrapper className={className}><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></IconWrapper>;
    const Smartphone = ({ className }) => <IconWrapper className={className}><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></IconWrapper>;
    const BadgeDollarSign = ({ className }) => <IconWrapper className={className}><path d="M3.85 8.62a4 4 0 0 1 4.78-4.77 4 4 0 0 1 6.74 0 4 4 0 0 1 4.78 4.78 4 4 0 0 1 0 6.74 4 4 0 0 1-4.77 4.78 4 4 0 0 1-6.75 0 4 4 0 0 1-4.78-4.77 4 4 0 0 1 0-6.76Z"/><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"/><path d="M12 18V6"/></IconWrapper>;
    const FileCheck = ({ className }) => <IconWrapper className={className}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="m9 15 2 2 4-4"/></IconWrapper>;
    const SendIcon = ({ className }) => <IconWrapper className={className}><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></IconWrapper>;
    const FilterIcon = ({ className }) => <IconWrapper className={className}><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></IconWrapper>;
    const RunningMan = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <circle cx="16" cy="5" r="2"/><path d="M12 9l3-2 1.5 2.5"/><path d="M10.5 16.5L8 11h3l2.5 4 4.5-1.5"/><path d="M14.5 22l-2-6-3.5 2.5"/><path d="M5.5 22L8 17"/>
      </svg>
    );

    const WORKER_URL = 'https://travelkeeper.fangwl591021.workers.dev';
    const LIFF_ID = '2009367829-BDZCGti8'; 
    const ENDPOINT_URL = 'https://fangwl591021.github.io/travelkeeper/';
    const LOGIN_URL = 'login.html'; 

    // ★ 核心修復：防止電話掉 0 的顯示與送單轉型
    const formatPhone = (phone) => {
        if (!phone) return '';
        const p = String(phone).trim();
        // 台灣手機若被 Excel 吞掉 0 會變 9 開頭的 9 碼數字
        if (p.length === 9 && p.startsWith('9')) return '0' + p;
        return p;
    };

    const buildFlexMessage = (tourItem, distributorData, refUidStr, options) => {
        const trackingUrl = `${ENDPOINT_URL}?t=${tourItem.id}&r=${refUidStr || 'GUEST'}`;
        const optsStr = [options.phone, options.line, options.lineAt, options.fb, options.web, options.map].map(b=>b?'1':'0').join('');
        const shareLiffUrl = `https://liff.line.me/${LIFF_ID}?action=share&t=${tourItem.id}&r=${refUidStr || ''}&o=${optsStr}`;
        const buttons = [
            { "type": "button", "style": "primary", "color": "#00B900", "height": "sm", "action": { "type": "uri", "label": "查看行程 / 立即報名", "uri": trackingUrl } },
            { "type": "button", "style": "primary", "color": "#b82337", "height": "sm", "margin": "sm", "action": { "type": "uri", "label": "分享行程給好友", "uri": shareLiffUrl } }
        ];
        if (options.phone && distributorData.phone) buttons.push({ "type": "button", "style": "secondary", "height": "sm", "margin": "sm", "action": { "type": "uri", "label": "📞 聯絡電話", "uri": `tel:${formatPhone(distributorData.phone)}` }});
        if (options.line && distributorData.lineLink) buttons.push({ "type": "button", "style": "secondary", "height": "sm", "margin": "sm", "action": { "type": "uri", "label": "💬 私訊 LINE", "uri": distributorData.lineLink }});
        if (options.lineAt && distributorData.lineAtLink) buttons.push({ "type": "button", "style": "secondary", "height": "sm", "margin": "sm", "action": { "type": "uri", "label": "🟢 官方 LINE@", "uri": distributorData.lineAtLink }});
        if (options.fb && distributorData.fbLink) buttons.push({ "type": "button", "style": "secondary", "height": "sm", "margin": "sm", "action": { "type": "uri", "label": "👍 FB 粉絲專頁", "uri": distributorData.fbLink }});
        if (options.web && distributorData.webLink) buttons.push({ "type": "button", "style": "secondary", "height": "sm", "margin": "sm", "action": { "type": "uri", "label": "🌐 官方網站", "uri": distributorData.webLink }});
        if (options.map && distributorData.mapLink) buttons.push({ "type": "button", "style": "secondary", "height": "sm", "margin": "sm", "action": { "type": "uri", "label": "📍 門市導航", "uri": distributorData.mapLink }});
        return {
          "type": "flex", "altText": `推薦行程：${tourItem.title}`,
          "contents": {
            "type": "bubble",
            "hero": { "type": "image", "url": tourItem.image || 'https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?auto=format&fit=crop&w=800&q=80', "size": "full", "aspectRatio": "20:13", "aspectMode": "cover", "action": { "type": "uri", "uri": trackingUrl } },
            "body": { "type": "box", "layout": "vertical", "contents": [
                { "type": "text", "text": tourItem.title, "weight": "bold", "size": "xl", "wrap": true },
                { "type": "box", "layout": "vertical", "margin": "lg", "spacing": "sm", "contents": [
                    { "type": "box", "layout": "baseline", "spacing": "sm", "contents": [ { "type": "text", "text": "天數", "color": "#aaaaaa", "size": "sm", "flex": 1 }, { "type": "text", "text": `${tourItem.days} 天`, "wrap": true, "color": "#666666", "size": "sm", "flex": 5 } ] },
                    { "type": "box", "layout": "baseline", "spacing": "sm", "contents": [ { "type": "text", "text": "價格", "color": "#aaaaaa", "size": "sm", "flex": 1 }, { "type": "text", "text": `TWD ${Number(tourItem.price).toLocaleString()}`, "wrap": true, "color": "#b82337", "size": "md", "weight": "bold", "flex": 5 } ] },
                    { "type": "box", "layout": "baseline", "spacing": "sm", "contents": [ { "type": "text", "text": "介紹", "color": "#aaaaaa", "size": "sm", "flex": 1 }, { "type": "text", "text": tourItem.description ? tourItem.description.substring(0, 120) + '...' : '點擊下方按鈕了解行程！', "wrap": true, "maxLines": 5, "color": "#666666", "size": "sm", "flex": 5 } ] }
                  ] } ] },
            "footer": { "type": "box", "layout": "vertical", "spacing": "sm", "contents": buttons, "flex": 0 }
          }
        };
    };

    const renderAgencyBlogDescription = (text) => {
      if (!text) return null;
      const lines = text.split('\n');
      const blocks = [];
      let currentBlock = { type: 'intro', dayText: '行程介紹', title: '', content: [], meals: [], hotels: [] };
      let inMeal = false; let inHotel = false;

      for (let i = 0; i < lines.length; i++) {
          let line = lines[i].trim();
          if (!line) { currentBlock.content.push({ type: 'space' }); continue; }
          const dayMatch = line.match(/^(Day\s*\d+|第\s*[\d一二三四五六七八九十]+\s*天)(.*)/i);
          if (dayMatch) {
              if (currentBlock.content.length > 0 || currentBlock.meals.length > 0 || currentBlock.hotels.length > 0 || currentBlock.dayText !== '行程介紹') blocks.push(currentBlock);
              currentBlock = { type: 'day', dayText: dayMatch[1].replace(/\s+/g, ''), title: dayMatch[2].replace(/^[:：\-\s]+/, ''), content: [], meals: [], hotels: [] };
              inMeal = false; inHotel = false; continue;
          }
          if (line.match(/^(餐食|早餐|午餐|晚餐)[:：]/)) { inMeal = true; inHotel = false; currentBlock.meals.push(line); continue; }
          if (line.match(/^(住宿|飯店|旅館|酒店)[:：]/)) { inHotel = true; inMeal = false; currentBlock.hotels.push(line); continue; }
          if (inMeal && line.match(/^(早餐|午餐|晚餐|早|午|晚)[:：]/)) { currentBlock.meals.push(line); continue; }
          if (inHotel && line.length < 40) { currentBlock.hotels.push(line); continue; }
          inMeal = false; inHotel = false;
          const parts = line.split(/(!\[.*?\]\(.*?\))/g);
          const parsedLine = parts.filter(p => p).map((part) => {
              const mdMatch = part.match(/^!\[(.*?)\]\((.*?)\)$/);
              if (mdMatch) return { type: 'image', alt: mdMatch[1], url: mdMatch[2] };
              if (part.startsWith('http') && !part.includes(' ') && parts.length === 1) return { type: 'image', alt: '圖片', url: part };
              return { type: 'text', text: part };
          });
          currentBlock.content.push({ type: 'mixed', elements: parsedLine });
      }
      blocks.push(currentBlock);
      return blocks.map((block, bIdx) => (
          <div key={bIdx} className="mb-12 w-full max-w-full">
              {block.dayText !== '行程介紹' && (
                  <div className="mb-10 mt-16 w-full">
                      <div className="text-center relative mb-8"><div className="absolute top-1/2 left-0 w-full border-t-[2px] border-dashed border-[#b82337] -z-10"></div><h2 className="inline-block px-6 bg-white text-4xl md:text-5xl font-black text-gray-900 tracking-widest">{block.dayText}</h2></div>
                      {block.title && (<div className="flex items-start mb-6 px-2"><span className="text-[#b82337] font-light text-2xl mr-3 flex-shrink-0">— {block.dayText.replace(/\D/g, '') || '*'}</span><h3 className="text-xl md:text-2xl font-bold text-gray-800 leading-snug pt-0.5">{block.title}</h3></div>)}
                  </div>
              )}
              <div className="text-[1.15rem] leading-[2.2] text-gray-700 tracking-wide text-justify w-full break-words">
                  {block.content.map((item, idx) => {
                      if (item.type === 'space') return <div key={idx} className="h-6"></div>;
                      if (item.type === 'mixed') {
                          return (
                              <p key={idx} className="mb-5 break-words whitespace-pre-wrap">
                                  {item.elements.map((el, eIdx) => {
                                      if (el.type === 'image') return (
                                          <span key={eIdx} className="block my-10 w-full relative group">
                                              <img src={el.url} className="w-full h-auto max-w-full object-cover rounded-none md:rounded-2xl max-h-[800px] border border-gray-100" alt={el.alt} onError={(e) => { e.target.style.display = 'none'; e.target.nextSibling.style.display = 'block'; }} />
                                              <span className="hidden bg-blue-50 p-5 border-l-[6px] border-blue-500 my-4 rounded-lg text-sm text-blue-800 shadow-sm font-medium tracking-wider w-full overflow-hidden break-words"><span className="font-extrabold mr-2 text-red-600">⚠️ 防盜鏈阻擋：</span>原網站禁止直接顯示圖片，請改用系統「上傳雲端圖片」按鈕，或 <a href={el.url} target="_blank" rel="noreferrer" className="text-blue-600 hover:text-blue-800 underline font-bold">點此查看圖片</a></span>
                                          </span>
                                      );
                                      return <span key={eIdx}>{el.text}</span>;
                                  })}
                              </p>
                          );
                      }
                      return null;
                  })}
              </div>
              {(block.meals.length > 0 || block.hotels.length > 0) && (
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-5 mt-10">
                      {block.meals.length > 0 && (<div className="border border-gray-200 p-6 flex items-start bg-white w-full rounded-md shadow-sm hover:shadow-md transition"><div className="text-3xl mr-4 opacity-90 flex-shrink-0 text-[#b82337]">🍽️</div><div className="w-full border-l-[3px] border-[#b82337] pl-5 min-w-0"><p className="font-bold text-gray-900 mb-2 text-lg">餐食</p><div className="space-y-1 text-gray-600 font-medium text-[0.95rem] break-words">{block.meals.map((m, mIdx) => { const parts = m.split(/[:：](.+)/); if (parts.length > 1) return (<div key={mIdx} className="flex"><span className="font-bold text-gray-900 w-14 flex-shrink-0">{parts[0]}</span><span className="text-gray-600 break-words flex-1">: {parts[1]}</span></div>); return <p key={mIdx}>{m}</p>; })}</div></div></div>)}
                      {block.hotels.length > 0 && (<div className="border border-gray-200 p-6 flex items-start bg-white w-full rounded-md shadow-sm hover:shadow-md transition"><div className="text-3xl mr-4 opacity-90 flex-shrink-0 text-[#b82337]">🏨</div><div className="w-full border-l-[3px] border-[#b82337] pl-5 min-w-0"><p className="font-bold text-gray-900 mb-2 text-lg">住宿</p><div className="space-y-1 text-gray-600 font-medium text-[0.95rem] break-words">{block.hotels.map((h, hIdx) => { const parts = h.split(/[:：](.+)/); if (parts.length > 1) return (<div key={hIdx} className="flex"><span className="font-bold text-gray-900 w-14 flex-shrink-0">{parts[0]}</span><span className="text-gray-600 break-words flex-1">: {parts[1]}</span></div>); return <p key={hIdx}>{h}</p>; })}</div></div></div>)}
                  </div>
              )}
          </div>
      ));
    };

    function App() {
      const urlParams = new URLSearchParams(window.location.search);
      const actionParam = urlParams.get('action'); 
      const [activeTab, setActiveTab] = useState(urlParams.get('tab') || 'home'); 
      const [tourDetailTab, setTourDetailTab] = useState('itinerary'); 
      const [shareStatusText, setShareStatusText] = useState('搜尋中...'); 
      const [selectedTourId, setSelectedTourId] = useState(() => urlParams.get('t') || urlParams.get('tour_id') || null);
      const [refUid, setRefUid] = useState(() => {
        const urlRef = urlParams.get('r') || urlParams.get('ref_uid');
        if (urlRef) localStorage.setItem('tracking_ref_uid', urlRef);
        return urlRef || localStorage.getItem('tracking_ref_uid') || '';
      });

      const [crmSubTab, setCrmSubTab] = useState('orders');
      const [itineraries, setItineraries] = useState([]);
      const [toast, setToast] = useState(null);
      const [isLoading, setIsLoading] = useState(true); 
      const [isUploadingImage, setIsUploadingImage] = useState(false); 
      const [isInsertingContentImage, setIsInsertingContentImage] = useState(false);

      const [myDistributorData, setMyDistributorData] = useState(null);
      const [myUserData, setMyUserData] = useState(null);
      const [distributorStats, setDistributorStats] = useState({ users: [], orders: [] });

      const [crmDistributors, setCrmDistributors] = useState([]);
      const [crmUsers, setCrmUsers] = useState([]);
      const [crmOrders, setCrmOrders] = useState([]);

      // ★ 搜尋與過濾條件 State

      const [searchEndDate, setSearchEndDate] = useState('');

      const [bannerImage, setBannerImage] = useState(() => localStorage.getItem('travel_keeper_banner') || 'https://images.unsplash.com/photo-1436491865332-7a61a109cc05?auto=format&fit=crop&w=1920&q=80');
      const [uploadMode, setUploadMode] = useState('dm');

      const [draftData, setDraftData] = useState({ id: null, title: '', region: '', price: '', days: '', startDate: '', endDate: '', description: '', image: '', notes: '' });
      const [deleteModalId, setDeleteModalId] = useState(null);
      const [flexModalItem, setFlexModalItem] = useState(null);

      const [cardOptions, setCardOptions] = useState({ phone: false, line: false, lineAt: false, fb: false, web: false, map: false });

      const getTimestamp = () => new Date().getTime();

      useEffect(() => { initLiff(); fetchItineraries(); }, []);

      useEffect(() => {
        const processAutoAction = async () => {
             if (!isLiffReady || isLoading || !liffProfile) return;
             const tourId = urlParams.get('t') || urlParams.get('tour_id');
             const rUid = urlParams.get('r') || urlParams.get('ref_uid');
             const optsParam = urlParams.get('o') || urlParams.get('opts') || '000000';
             
             const tour = itineraries.find(i => String(i.id) === String(tourId));
             if (!tour) { setShareStatusText('❌ 找不到該行程資訊'); setTimeout(() => window.location.replace(ENDPOINT_URL), 2000); return; }

             let targetDistData = {};
             if (rUid === liffProfile.userId && myDistributorData) { 
                 targetDistData = myDistributorData; 
             } else if (rUid) {
                 try {
                     const res = await fetch(`${WORKER_URL}/api/itineraries?action=checkUserStatus&uid=${rUid}&_t=${getTimestamp()}`);
                     const data = await res.json();
                     if (data.success && data.data.role === 'distributor') targetDistData = data.data.distributorData;
                 } catch(e) {}
             }

             const cOptions = { phone: optsParam[0]==='1', line: optsParam[1]==='1', lineAt: optsParam[2]==='1', fb: optsParam[3]==='1', web: optsParam[4]==='1', map: optsParam[5]==='1' };
             const flexMsg = buildFlexMessage(tour, targetDistData, rUid, cOptions);

             if (actionParam === 'send') {
                 setShareStatusText("極速傳送中...");
                 try {
                     const context = liff.getContext();
                     if (context && context.type !== 'none' && context.type !== 'external') { 
                         await liff.sendMessages([flexMsg]); 
                         liff.closeWindow(); 
                     } else { 
                         setShareStatusText('電腦版無聊天室，即將展開網頁...'); 
                         setTimeout(() => window.location.replace(`${ENDPOINT_URL}?t=${tourId}&r=${rUid}`), 1000); 
                     }
                 } catch (e) { window.location.replace(`${ENDPOINT_URL}?t=${tourId}&r=${rUid}`); }
             } else if (actionParam === 'share') {
                 setShareStatusText("準備通訊錄...");
                 try { 
                     await liff.shareTargetPicker([flexMsg]); 
                     liff.closeWindow(); 
                 } catch(e) { 
                     if (e.message && e.message.includes('not allowed')) { liff.logout(); window.location.reload(); } else { liff.closeWindow(); } 
                 }
             }
        };
        if (actionParam === 'share' || actionParam === 'send') processAutoAction();
      }, [isLiffReady, isLoading, liffProfile, actionParam]);

      const initLiff = async () => {
        try {
          await liff.init({ liffId: LIFF_ID });
          setIsLiffReady(true);
          if (!liff.isLoggedIn()) { liff.login({ redirectUri: window.location.href }); } 
          else {
            const profile = await liff.getProfile();
            setLiffProfile(profile);
            const activeRef = urlParams.get('r') || urlParams.get('ref_uid') || localStorage.getItem('tracking_ref_uid');
            if (activeRef && activeRef !== profile.userId) { fetch(`${WORKER_URL}/api/itineraries`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'registerUser', uid: profile.userId, name: profile.displayName, ref_uid: activeRef }) }).catch(e => console.error("Silent tracking error", e)); }
            checkMyStatus(profile.userId);
          }
        } catch (err) { console.error('LIFF 初始化失敗', err); }
      };

      const checkMyStatus = async (uid) => {
        try {
          const res = await fetch(`${WORKER_URL}/api/itineraries?action=checkUserStatus&uid=${uid}&_t=${getTimestamp()}`);
          const data = await res.json();
          if (data.success) {
             const info = data.data;
             if (info.isAdmin) setIsAdmin(true);
             if (info.role === 'distributor') { setDistributorStatus(info.status ? info.status.toString().trim().toLowerCase() : 'pending'); setMyDistributorData(info.distributorData); setIsGeneralMember(true); fetchUserOrders(uid); } 
             if (info.role === 'user') { if (info.userData && info.userData.phone) { setMyUserData(info.userData); setIsGeneralMember(true); fetchUserOrders(uid); } }
          }
        } catch (e) { console.error('Status check error', e); } finally { setIsStatusChecked(true); }
      };

      useEffect(() => {
          if (activeTab === 'crm' && isAdmin) fetchFullCrmData();
          if (activeTab === 'distributor' && distributorStatus === 'approved' && liffProfile) fetchDistributorStats(liffProfile.userId);
          if (activeTab === 'member' && isGeneralMember && liffProfile) fetchUserOrders(liffProfile.userId);
      }, [activeTab, isAdmin, distributorStatus, isGeneralMember, liffProfile]);

      const fetchUserOrders = async (uid) => {
          try {
              const res = await fetch(`${WORKER_URL}/api/itineraries?action=getUserOrders&uid=${uid}&_t=${getTimestamp()}`);
              const data = await res.json();
              if (data.success) setMyOrders(data.data);
          } catch(e) { console.error('Fetch Orders error', e); }
      };

      const fetchDistributorStats = async (uid) => {
          try {
              const res = await fetch(`${WORKER_URL}/api/itineraries?action=getDistributorPerformance&uid=${uid}&_t=${getTimestamp()}`);
              const data = await res.json();
              if (data.success) setDistributorStats({ users: data.users || [], orders: data.orders || [] });
          } catch(e) { console.error('Fetch Dist Stats error', e); }
      };

      const fetchFullCrmData = async () => {
        try {
          const [resD, resU, resO] = await Promise.all([
            fetch(`${WORKER_URL}/api/itineraries?action=getDistributors&_t=${getTimestamp()}`),
            fetch(`${WORKER_URL}/api/itineraries?action=getUsers&_t=${getTimestamp()}`),
            fetch(`${WORKER_URL}/api/itineraries?action=getAllOrders&_t=${getTimestamp()}`)
          ]);
          const [dataD, dataU, dataO] = await Promise.all([resD.json(), resU.json(), resO.json()]);
          setCrmDistributors(Array.isArray(dataD) ? dataD : []);
          setCrmUsers(Array.isArray(dataU) ? dataU : []);
          if (dataO && dataO.success) setCrmOrders(Array.isArray(dataO.data) ? dataO.data : []);
        } catch (e) { console.error('CRM Fetch error', e); }
      };

      const fetchItineraries = async () => {
        setIsLoading(true);
        try {
          const res = await fetch(`${WORKER_URL}/api/itineraries?_t=${getTimestamp()}`);
          const data = await res.json();
          if (data && Array.isArray(data)) { setItineraries(data); setFilteredResults(data); }
          else if (data && data.data && Array.isArray(data.data)) { setItineraries(data.data); setFilteredResults(data.data); }
        } catch (error) { console.error('Fetch error', error); } finally { setIsLoading(false); }
      };

      const handleUpdateOrder = async (orderId, field, value) => {
          setCrmOrders(prev => prev.map(o => String(o.orderId) === String(orderId) ? { ...o, [field]: value } : o));
          try {
              const res = await fetch(`${WORKER_URL}/api/itineraries`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'updateOrder', orderId, [field]: value }) });
              const result = await res.json();
              if (result.success) showToast('✅ 訂單狀態已更新');
              else throw new Error();
          } catch(e) { showToast('❌ 更新失敗，請重試', 'error'); fetchFullCrmData(); }
      };

      const changeTab = (newTab) => { setActiveTab(newTab); setSelectedTourId(null); setTourDetailTab('itinerary'); window.history.replaceState({}, '', `?tab=${newTab}`); };
      const showToast = (message, type = 'success') => { setToast({ message, type }); setTimeout(() => setToast(null), 3000); };
      const loginAsDistributor = () => { window.location.href = `${LOGIN_URL}?type=distributor&ref_uid=${refUid || ''}`; };
      const loginAsMember = () => { window.location.href = `${LOGIN_URL}?type=user&ref_uid=${refUid || ''}`; };

      const handleBookNow = (tour) => {
          if (!isGeneralMember) { window.location.href = `${LOGIN_URL}?type=user&ref_uid=${refUid || ''}&t=${tour.id}`; return; }
          // ★ 套用 formatPhone 防止空號
          setBookingModalData({ 
              tourId: tour.id, tourTitle: tour.title, price: tour.price, pax: 1, totalAmount: tour.price, 
              contactName: liffProfile?.displayName || '', 
              contactPhone: formatPhone(myUserData?.phone || myDistributorData?.phone || ''), 
              note: '' 
          });
      };

      const submitBooking = async (e) => {
          e.preventDefault(); setIsSubmitting(true);
          try {
              const res = await fetch(`${WORKER_URL}/api/itineraries`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'addOrder', uid: liffProfile.userId, ref_uid: refUid, ...bookingModalData }) });
              const result = await res.json();
              if (result.success) { 
                  showToast('🎉 報名成功！我們已收到您的訂單。'); 
                  setBookingModalData(null); 
                  if (liffProfile) { fetchUserOrders(liffProfile.userId); if (distributorStatus === 'approved') fetchDistributorStats(liffProfile.userId); }
                  if (isAdmin) fetchFullCrmData();
                  setTimeout(() => { changeTab('member'); setIsSubmitting(false); }, 500); 
              }
              else throw new Error(result.message || '報名失敗');
          } catch(err) { showToast('訂單送出失敗，請重試', 'error'); setIsSubmitting(false); }
      };

      const handleSearch = () => {
        let results = itineraries;
        if (searchRegion) results = results.filter(item => item.region.includes(searchRegion));
        if (searchKeyword) { const kw = searchKeyword.toLowerCase(); results = results.filter(item => (item.title && item.title.toLowerCase().includes(kw)) || (item.description && item.description.toLowerCase().includes(kw))); }
        if (searchStartDate) results = results.filter(item => item.startDate && item.startDate >= searchStartDate);
        if (searchEndDate) results = results.filter(item => item.endDate && item.endDate <= searchEndDate);
        setFilteredResults(results); showToast(`為您找到 ${results.length} 筆符合的行程`);
      };

      const handleImageUploadToDrive = async (e, type = 'itinerary') => {
        const file = e.target.files[0]; if (!file) return;
        if (type === 'itinerary') setIsUploadingImage(true); else showToast('Banner 上傳中，請稍候...');
        const reader = new FileReader(); reader.readAsDataURL(file);
        reader.onloadend = async () => {
          try {
            const res = await fetch(`${WORKER_URL}/api/itineraries`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'uploadImage', base64: reader.result }) });
            const result = await res.json();
            if (result.success) {
              if (type === 'itinerary') { setDraftData({ ...draftData, image: result.url }); showToast('✅ 圖片已成功上傳！'); } 
              else { setBannerImage(result.url); localStorage.setItem('travel_keeper_banner', result.url); showToast('✅ Banner 已成功更新！'); }
            } else throw new Error(result.message || result.error);
          } catch (err) { showToast('上傳失敗: ' + err.message, 'error'); } finally { if (type === 'itinerary') setIsUploadingImage(false); }
        };
      };

      const handleInsertImageToDescription = async (e) => {
        const file = e.target.files[0]; if (!file) return;
        setIsInsertingContentImage(true); showToast('內文圖片上傳中，請稍候...');
        const reader = new FileReader(); reader.readAsDataURL(file);
        reader.onloadend = async () => {
          try {
            const res = await fetch(`${WORKER_URL}/api/itineraries`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'uploadImage', base64: reader.result }) });
            const result = await res.json();
            if (result.success) { setDraftData(prev => ({ ...prev, description: (prev.description ? prev.description + '\n\n' : '') + `![](${result.url})\n\n` })); showToast('✅ 圖片已成功插入文案！'); } 
            else throw new Error(result.message || result.error);
          } catch (err) { showToast('圖片插入失敗: ' + err.message, 'error'); } finally { setIsInsertingContentImage(false); e.target.value = null; }
        };
      };

      const handleFileUpload = async (e) => {
        const file = e.target.files[0]; if (!file) return; 
        setOcrStatus('processing'); setIsUploadingImage(true);
        try {
          const reader = new FileReader(); reader.readAsDataURL(file);
          reader.onloadend = async () => {
            const base64data = reader.result;
            let uploadedUrl = '';
            try {
              const driveRes = await fetch(`${WORKER_URL}/api/itineraries`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'uploadImage', base64: base64data }) });
              const driveResult = await driveRes.json();
              if (driveResult.success) uploadedUrl = driveResult.url;
            } catch (err) { console.warn('圖片上傳失敗', err); }
            const res = await fetch(`${WORKER_URL}/api/upload-dm`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ image: base64data }) });
            const aiResult = await res.json();
            if (aiResult.success) {
              const parsedData = aiResult.data;
              const REGION_IMAGES = { '國旅': 'https://images.unsplash.com/photo-1578338944883-7eecc7a95079?auto=format&fit=crop&w=800&q=80', '亞洲': 'https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?auto=format&fit=crop&w=800&q=80', '歐洲': 'https://images.unsplash.com/photo-1499856871958-5b9627545d1a?auto=format&fit=crop&w=800&q=80', '美洲': 'https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?auto=format&fit=crop&w=800&q=80', '大洋洲': 'https://images.unsplash.com/photo-1523482580672-f109ba8cb9be?auto=format&fit=crop&w=800&q=80', '非洲': 'https://images.unsplash.com/photo-1516426122078-c23e76319801?auto=format&fit=crop&w=800&q=80', '預設': 'https://images.unsplash.com/photo-1436491865332-7a61a109cc05?auto=format&fit=crop&w=800&q=80' };
              parsedData.image = uploadedUrl || REGION_IMAGES[parsedData.region] || REGION_IMAGES['預設'];
              parsedData.id = Date.now(); setDraftData(parsedData); showToast('✅ AI 解析完成！系統正自動寫入資料庫...');
              const newItinerary = { ...parsedData, action: 'addItinerary', price: parseInt(parsedData.price, 10) || 0 };
              setItineraries(prev => [newItinerary, ...prev]);
              try {
                const dbRes = await fetch(`${WORKER_URL}/api/itineraries`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(newItinerary) });
                const dbResult = await dbRes.json();
                if (dbResult.success) { showToast('🎉 行程已成功上架！'); setDraftData({ id: null, title: '', region: '', price: '', days: '', startDate: '', endDate: '', description: '', image: '', notes: '' }); setOcrStatus('idle'); fetchItineraries(); } else throw new Error('寫入失敗');
              } catch (dbErr) { setOcrStatus('done'); showToast('寫入失敗，請手動點擊「儲存」', 'error'); }
            } else throw new Error(aiResult.error || '解析失敗');
            setIsUploadingImage(false);
          };
        } catch (error) { setOcrStatus('idle'); setIsUploadingImage(false); showToast(error.message || '解析失敗', 'error'); }
      };

      const handleUpdateContent = async () => {
        if (!draftData.title) return showToast('請先填寫內容', 'error');
        const isEditing = !!draftData.id;
        const submitData = { ...draftData, id: draftData.id || Date.now(), price: parseInt(draftData.price, 10) || 0, action: isEditing ? 'updateItinerary' : 'addItinerary' };
        try {
          const res = await fetch(`${WORKER_URL}/api/itineraries`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(submitData) });
          const result = await res.json();
          if (result.success) { showToast(isEditing ? '修改成功！' : '新增成功！'); setDraftData({ id: null, title: '', region: '', price: '', days: '', startDate: '', endDate: '', description: '', image: '', notes: '' }); setOcrStatus('idle'); setUploadMode('dm'); fetchItineraries(); } else throw new Error('操作失敗');
        } catch (error) { showToast('寫入資料庫錯誤', 'error'); }
      };

      const handleEditClick = (item) => { setUploadMode('manual'); setOcrStatus('done'); setDraftData(item); window.scrollTo({ top: 0, behavior: 'smooth' }); };
      
      const confirmDelete = async () => {
        if (!deleteModalId) return;
        try {
          const res = await fetch(`${WORKER_URL}/api/itineraries`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'deleteItinerary', id: deleteModalId }) });
          const result = await res.json();
          if (result.success) { showToast('已成功下架！'); setDeleteModalId(null); fetchItineraries(); } else throw new Error('刪除失敗');
        } catch (error) { showToast('下架發生錯誤', 'error'); }
      };

      const saveDistributorEdit = async () => {
        try {
          const res = await fetch(`${WORKER_URL}/api/itineraries`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'updateDistributorInfo', ...editFormData }) });
          const result = await res.json();
          if (result.success) { showToast('✅ 經銷商資料已更新！'); setEditingDistributor(null); fetchFullCrmData(); } else throw new Error('儲存失敗');
        } catch (e) { showToast('更新失敗', 'error'); }
      };

      const autoFetchTgChatId = async () => {
          if (!myDistributorData?.tgToken) { showToast('請先輸入 Bot Token', 'error'); return; }
          showToast('正在轉換獲取 ID...', 'success');
          try {
              const res = await fetch(`https://api.telegram.org/bot${myDistributorData.tgToken}/getUpdates`);
              const data = await res.json();
              if (data.ok && data.result.length > 0) {
                  const latestUpdate = data.result[data.result.length - 1];
                  const chatId = latestUpdate.message?.chat?.id || latestUpdate.my_chat_member?.chat?.id;
                  if (chatId) {
                      setMyDistributorData(prev => ({ ...prev, tgChatId: String(chatId) }));
                      showToast('✅ 成功轉換 Chat ID！請記得點擊儲存。');
                  } else throw new Error();
              } else {
                  alert('【轉換失敗】\n請先前往 Telegram，搜尋您的機器人並隨便發送一則訊息給它，然後再次點擊「轉換」按鈕！');
              }
          } catch (err) { showToast('轉換失敗，請確認 Token 是否正確', 'error'); }
      };

      const saveMyTgSettings = async () => {
          try {
              const res = await fetch(`${WORKER_URL}/api/itineraries`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'updateDistributorInfo', uid: liffProfile.userId, tgToken: myDistributorData.tgToken, tgChatId: myDistributorData.tgChatId }) });
              const result = await res.json();
              if (result.success) showToast('✅ Telegram 推播設定已成功儲存！'); else throw new Error('儲存失敗');
          } catch(e) { showToast('推播設定儲存失敗，請稍後再試', 'error'); }
      };

      const openFlexModal = (item) => { setCardOptions({ phone: false, line: false, lineAt: false, fb: false, web: false, map: false }); setFlexModalItem(item); };

      const fallbackCopyTextToClipboard = (text) => {
        var textArea = document.createElement("textarea");
        textArea.value = text; textArea.style.top = "0"; textArea.style.left = "0"; textArea.style.position = "fixed";
        document.body.appendChild(textArea); textArea.focus(); textArea.select();
        try { document.execCommand('copy'); showToast('✅ 網址已成功複製！'); } catch (err) { showToast('❌ 複製失敗', 'error'); }
        document.body.removeChild(textArea);
      };

      const handleCopyUrl = (type) => {
         const optsStr = [cardOptions.phone, cardOptions.line, cardOptions.lineAt, cardOptions.fb, cardOptions.web, cardOptions.map].map(b=>b?'1':'0').join('');
         let urlToCopy = '';
         if (type === 'share') urlToCopy = `https://liff.line.me/${LIFF_ID}?action=share&t=${flexModalItem.id}&r=${liffProfile.userId}&o=${optsStr}`;
         else if (type === 'send') urlToCopy = `https://liff.line.me/${LIFF_ID}?action=send&t=${flexModalItem.id}&r=${liffProfile.userId}&o=${optsStr}`;
         else if (type === 'web') urlToCopy = `${ENDPOINT_URL}?t=${flexModalItem.id}&r=${liffProfile.userId}`;
         if (!navigator.clipboard) { fallbackCopyTextToClipboard(urlToCopy); return; }
         navigator.clipboard.writeText(urlToCopy).then(() => showToast('✅ 網址已成功複製！快去貼在您的 LINE OA 吧！'), () => fallbackCopyTextToClipboard(urlToCopy));
      };

      const triggerFlexSharing = async () => {
        if (!flexModalItem || !liffProfile) return;
        const optsStr = [cardOptions.phone, cardOptions.line, cardOptions.lineAt, cardOptions.fb, cardOptions.web, cardOptions.map].map(b=>b?'1':'0').join('');
        const flexMsg = buildFlexMessage(flexModalItem, myDistributorData || {}, liffProfile.userId, cardOptions);
        try {
          await liff.shareTargetPicker([flexMsg]);
        } catch(e) {

                                <td className="p-5"><p className="font-bold text-gray-900 text-lg mb-2">{order.tourTitle}</p>{refDist ? <span className="text-xs font-bold bg-blue-100 text-blue-700 px-2 py-1 rounded flex items-center w-fit"><Briefcase className="w-3 h-3 mr-1" /> 推: {refDist.name}</span> : <span className="text-xs text-gray-500 bg-gray-100 px-2 py-1 rounded flex items-center w-fit">🌱 自來客</span>}</td>
                                <td className="p-5"><p className="font-bold text-gray-800 flex items-center"><UserIcon className="w-4 h-4 mr-1 text-gray-400"/> {order.contactName} <span className="text-sm font-normal text-red-600 ml-1 bg-red-50 px-1.5 rounded">({order.pax}人)</span></p><p className="text-sm text-gray-600 mt-1 flex items-center"><Smartphone className="w-4 h-4 mr-1 text-gray-400"/> {formatPhone(order.contactPhone)}</p>{order.note && <p className="text-xs text-gray-500 mt-2 bg-yellow-50 p-1.5 rounded truncate max-w-[200px]" title={order.note}>備註: {order.note}</p>}</td>
                                <td className="p-5 text-right bg-gray-50/50"><p className="font-black text-[#b82337] text-xl">${Number(order.totalAmount).toLocaleString()}</p>{Number(order.commissionAmount) > 0 && <p className="text-xs text-emerald-600 font-bold mt-1">分潤: ${Number(order.commissionAmount).toLocaleString()}</p>}</td>
                                <td className="p-5 text-center">
                                   <div className="flex flex-col gap-2 items-center">
                                      <select value={order.paymentStatus || '未付款'} onChange={(e) => handleUpdateOrder(order.orderId, 'paymentStatus', e.target.value)} className={`crm-select text-xs font-bold px-3 py-1.5 rounded-lg border outline-none cursor-pointer w-32 text-center transition-colors ${order.paymentStatus === '已付款' ? 'bg-green-50 text-green-700 border-green-200' : 'bg-red-50 text-red-600 border-red-200 hover:bg-red-100'}`}>
                                          <option value="未付款">❌ 未付款</option><option value="已付款">✅ 已付款</option><option value="已退款">退款完成</option>
                                      </select>
                                      <select value={order.orderStatus || '處理中'} onChange={(e) => handleUpdateOrder(order.orderId, 'orderStatus', e.target.value)} className={`crm-select text-xs font-bold px-3 py-1.5 rounded-lg border outline-none cursor-pointer w-32 text-center transition-colors ${order.orderStatus === '已確認' || order.orderStatus === '已出發' || order.orderStatus === '已完成' ? 'bg-blue-50 text-blue-700 border-blue-200' : order.orderStatus === '已取消' ? 'bg-gray-100 text-gray-600 border-gray-200' : 'bg-yellow-50 text-yellow-700 border-yellow-200'}`}>
                                          <option value="處理中">處理中</option><option value="已確認">📌 已確認保位</option><option value="已出發">✈️ 已出發</option><option value="已完成">🎉 已完成</option><option value="已取消">🚫 已取消</option>
                                      </select>
                                   </div>
                                </td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table></div>
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      };

      const renderAdminEditorTab = () => {
        if (!isAdmin) return <div className="p-20 text-center text-gray-500 font-bold text-2xl">無權限存取</div>;
        return (
          <div className="w-full max-w-[1920px] mx-auto px-4 sm:px-6 lg:px-8 xl:px-12 py-8 animate-fade-in pb-20">
            <div className="bg-white rounded-2xl shadow-md p-6 lg:p-8 border border-gray-100">
              <div className="flex justify-between items-center border-b pb-4 mb-6"><h2 className="text-2xl font-bold text-gray-800 flex items-center"><UploadCloud className="h-6 w-6 mr-2 text-blue-500" /> 行程智能上稿系統</h2><button onClick={handleUpdateContent} className="flex items-center bg-blue-600 hover:bg-blue-700 text-white px-4 py-2.5 rounded-lg font-medium shadow-sm"><RefreshCw className="w-4 h-4 mr-2" /> {draftData.id ? '儲存修改' : '手動新增上架'}</button></div>
              {!draftData.id && (<div className="flex space-x-4 mb-8 max-w-2xl"><button onClick={() => setUploadMode('dm')} className={`flex-1 py-3.5 rounded-xl border-2 font-bold flex justify-center items-center transition-colors ${uploadMode === 'dm' ? 'border-blue-500 bg-blue-50 text-blue-700' : 'border-gray-200 text-gray-500'}`}><ImageIcon className="mr-2 h-5 w-5" /> DM 智能解析</button><button onClick={() => { setUploadMode('manual'); setDraftData({ id: null, title: '', region: '', price: '', days: '', startDate: '', endDate: '', description: '', image: '', notes: '' }); }} className={`flex-1 py-3.5 rounded-xl border-2 font-bold flex justify-center items-center transition-colors ${uploadMode === 'manual' ? 'border-blue-500 bg-blue-50 text-blue-700' : 'border-gray-200 text-gray-500'}`}><FileText className="mr-2 h-5 w-5" /> 人工填寫</button></div>)}
              {uploadMode === 'dm' && !draftData.id && (<div className="mb-8 w-full max-w-4xl"><div className="mt-1 flex justify-center px-6 pt-12 pb-16 border-2 border-gray-300 border-dashed rounded-2xl bg-gray-50 hover:bg-gray-100 transition relative"><div className="space-y-2 text-center"><ImageIcon className="mx-auto h-20 w-20 text-gray-300 mb-4" /><label className="relative cursor-pointer bg-white rounded-lg font-bold text-blue-600 border shadow-sm px-4 py-2"><span>選擇 DM 圖片</span><input type="file" className="sr-only" accept="image/*" onChange={handleFileUpload} disabled={ocrStatus === 'processing'} /></label></div>{ocrStatus === 'processing' && <div className="absolute inset-0 bg-white/95 rounded-2xl flex flex-col items-center justify-center z-10 backdrop-blur-sm"><RefreshCw className="h-12 w-12 text-blue-500 animate-spin mb-4" /><p className="text-blue-700 font-bold text-2xl">ChatGPT 解析中...</p></div>}</div></div>)}
              {(uploadMode === 'manual' || ocrStatus === 'done' || draftData.title) && (
                <div className="bg-gray-50/80 p-6 lg:p-8 rounded-2xl border border-gray-200 relative">
                  {draftData.id && <button onClick={() => { setDraftData({ id: null, title: '', region: '', price: '', days: '', startDate: '', endDate: '', description: '', image: '', notes: '' }); setUploadMode('dm'); setOcrStatus('idle'); }} className="absolute top-6 right-6 text-gray-400 bg-white rounded-full p-1.5 border shadow-sm"><X className="w-6 h-6" /></button>}
                  <h3 className="text-2xl font-bold mb-8">{draftData.id ? '✏️ 修改行程' : '📝 行程內容草稿'}</h3>
                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8 mb-8">
                    <div className="lg:col-span-2"><label className="block text-sm font-bold text-gray-700 mb-2">行程標題</label><input type="text" value={draftData.title} onChange={(e) => setDraftData({...draftData, title: e.target.value})} className="w-full rounded-xl border-gray-300 border p-3.5 outline-none text-lg"/></div>
                    <div className="lg:col-span-1"><label className="block text-sm font-bold text-gray-700 mb-2">所屬地區</label><select value={draftData.region} onChange={(e) => setDraftData({...draftData, region: e.target.value})} className="w-full rounded-xl border-gray-300 border p-3.5 bg-white outline-none text-lg"><option value="">請選擇</option><option value="國旅">國旅</option><option value="亞洲">亞洲</option><option value="歐洲">歐洲</option><option value="美洲">美洲</option><option value="大洋洲">大洋洲</option><option value="非洲">非洲</option></select></div>
                    <div className="lg:col-span-1"><label className="block text-sm font-bold text-gray-700 mb-2">價格 (TWD)</label><input type="number" value={draftData.price} onChange={(e) => setDraftData({...draftData, price: e.target.value})} className="w-full rounded-xl border-gray-300 border p-3.5 outline-none text-lg"/></div>
                    <div className="lg:col-span-1"><label className="block text-sm font-bold text-gray-700 mb-2">出發日期</label><input type="date" value={draftData.startDate} onChange={(e) => setDraftData({...draftData, startDate: e.target.value})} className="w-full rounded-xl border-gray-300 border p-3.5 outline-none text-lg bg-white"/></div>
                    <div className="lg:col-span-1"><label className="block text-sm font-bold text-gray-700 mb-2">結束日期</label><input type="date" value={draftData.endDate} onChange={(e) => setDraftData({...draftData, endDate: e.target.value})} className="w-full rounded-xl border-gray-300 border p-3.5 outline-none text-lg bg-white"/></div>
                    <div className="lg:col-span-2"><label className="block text-sm font-bold text-gray-700 mb-2">總天數</label><input type="number" value={draftData.days} onChange={(e) => setDraftData({...draftData, days: e.target.value})} className="w-full rounded-xl border-gray-300 border p-3.5 outline-none text-lg" placeholder="例如：7"/></div>
                    <div className="lg:col-span-4">
                      <label className="block text-sm font-bold text-gray-700 mb-2">首圖網址 或 上傳雲端圖片</label>
                      <div className="flex gap-4 items-center">
                        <input type="text" value={draftData.image || ''} onChange={(e) => setDraftData({...draftData, image: e.target.value})} className="flex-1 rounded-xl border-gray-300 border p-3.5 outline-none font-mono text-base text-gray-600" placeholder="https://..." />
                        <label className={`cursor-pointer bg-blue-100 text-blue-700 px-4 py-3.5 rounded-xl font-bold hover:bg-blue-200 transition whitespace-nowrap ${isUploadingImage ? 'opacity-50 pointer-events-none' : ''}`}>{isUploadingImage ? '上傳中...' : '☁️ 上傳圖片'}<input type="file" className="hidden" accept="image/*" onChange={(e) => handleImageUploadToDrive(e, 'itinerary')} disabled={isUploadingImage} /></label>
                        {draftData.image && <img src={draftData.image} className="w-16 h-16 rounded-xl object-cover border flex-shrink-0" />}
                      </div>
                    </div>
                  </div>
                  <div className="mt-8">
                    <div className="flex justify-between items-end mb-3">
                      <label className="block text-sm font-bold text-gray-700">詳細行程文案</label>
                      <label className={`cursor-pointer bg-blue-100 text-blue-700 px-4 py-2 rounded-xl text-sm font-bold hover:bg-blue-200 transition whitespace-nowrap flex items-center shadow-sm ${isInsertingContentImage ? 'opacity-50 pointer-events-none' : ''}`}>{isInsertingContentImage ? <RefreshCw className="w-4 h-4 mr-2 animate-spin" /> : <ImageIcon className="w-4 h-4 mr-2" />}{isInsertingContentImage ? '上傳中...' : '插入內文圖片'}<input type="file" className="hidden" accept="image/*" onChange={handleInsertImageToDescription} disabled={isInsertingContentImage} /></label>
                    </div>
                    <textarea rows={15} value={draftData.description} onChange={(e) => setDraftData({...draftData, description: e.target.value})} className="w-full rounded-xl border-gray-300 border p-5 outline-none text-lg leading-relaxed" placeholder="輸入詳細內容..."/>
                  </div>
                  <div className="mt-8">
                    <label className="block text-sm font-bold text-gray-700 mb-2">注意事項 / 報名須知</label>
                    <textarea rows={8} value={draftData.notes || ''} onChange={(e) => setDraftData({...draftData, notes: e.target.value})} className="w-full rounded-xl border-gray-300 border p-5 outline-none text-lg leading-relaxed" placeholder="輸入退費規定、航班行李限制、簽證須知等..."/>
                  </div>
                </div>
              )}
            </div>
            <div className="bg-white rounded-2xl shadow-md p-6 lg:p-8 border border-gray-100 mt-6">
              <div className="flex justify-between items-center mb-6 border-b pb-4"><h3 className="text-2xl font-bold flex items-center"><FileText className="w-6 h-6 mr-2" /> 現有行程管理</h3></div>
              <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4 gap-6 max-h-[800px] overflow-y-auto pr-2 pb-2">
                {itineraries.map(item => (
                  <div key={item.id} className="flex flex-col p-5 bg-white rounded-2xl border border-gray-200 shadow-sm h-full">
                    <div className="flex gap-5 mb-5"><img src={item.image || 'https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?auto=format&fit=crop&w=800&q=80'} className="w-28 h-28 rounded-xl object-cover border" /><div className="flex-1"><span className="bg-gray-200 px-2 py-0.5 rounded text-xs font-bold">{item.region}</span><h4 className="font-bold text-lg line-clamp-2 mt-1">{item.title}</h4><div className="mt-3"><span className="font-extrabold text-[#b82337] text-xl">${Number(item.price).toLocaleString()}</span><span className="text-sm ml-1">• {item.days}天</span></div></div></div>
                    <div className="flex space-x-3 justify-end mt-auto border-t border-gray-100 pt-4"><button onClick={() => handleEditClick(item)} className="flex-1 py-2 bg-white border rounded-xl text-sm font-bold shadow-sm">編輯</button><button onClick={() => setDeleteModalId(item.id)} className="flex-1 py-2 bg-white border border-red-200 text-red-600 rounded-xl text-sm font-bold shadow-sm">下架</button></div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        );
      };

      return (
        <div className="min-h-screen flex flex-col bg-gray-50">
          {renderNavBar()}
          <div className="flex-grow w-full">
            {activeTab === 'home' && renderHomeTab()}
            {activeTab === 'member' && renderMemberTab()}
            {activeTab === 'distributor' && renderDistributorTab()}
            {activeTab === 'crm' && renderCrmTab()}
            {activeTab === 'admin' && renderAdminEditorTab()}
          </div>
          {/* Modal / Toasts Layer */}
          {renderModals()}
          {toast && (<div className="fixed bottom-6 right-6 z-[90] animate-fade-in-up"><div className={`flex items-center p-5 rounded-2xl shadow-2xl ${toast.type === 'error' ? 'bg-red-50 text-red-800' : 'bg-gray-900 text-white'}`}><span className="font-bold text-lg tracking-wide">{toast.message}</span></div></div>)}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
