<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅遊管家 - 平台級智能業務系統 (v4.0)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
    body { font-family: 'Noto Sans TC', sans-serif; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in-up { animation: fadeInUp 0.3s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    .custom-scrollbar::-webkit-scrollbar { width: 5px; height: 5px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 99px; }
    .tour-card { position: relative; background: #fff; border: 2px solid #e2e8f0; border-radius: 12px; overflow: hidden; cursor: pointer; transition: all .2s; user-select: none; }
    .tour-card:hover { border-color: #94a3b8; transform: translateY(-2px); }
    .tour-card.selected { border-color: #10b981; box-shadow: 0 0 0 3px rgba(16,185,129,.2); }
    .preview-chat-bg { background-color: #749cbd; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 pb-20">
  <div id="root"></div>

  <script type="text/babel" data-presets="react,env">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    const IconWrapper = ({ children, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={`w-6 h-6 ${className}`}>
        {children}
      </svg>
    );
    
    const Navigation = ({ className }) => <IconWrapper className={className}><polygon points="3 11 22 2 13 21 11 13 3 11"/></IconWrapper>;
    const Search = ({ className }) => <IconWrapper className={className}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></IconWrapper>;
    const Share2 = ({ className }) => <IconWrapper className={className}><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></IconWrapper>;
    const XIcon = ({ className }) => <IconWrapper className={className}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></IconWrapper>;
    const ToolIcon = ({ className }) => <IconWrapper className={className}><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></IconWrapper>;

    const WORKER_URL = 'https://travelkeeper.fangwl591021.workers.dev';
    const LIFF_ID = '2009367829-BDZCGti8';
    const ENDPOINT_URL = 'https://fangwl591021.github.io/travelkeeper/';

    function App() {
      const urlParams = new URLSearchParams(window.location.search);
      const [activeTab, setActiveTab] = useState(urlParams.get('tab') || 'home');
      const [itineraries, setItineraries] = useState([]);
      const [liffProfile, setLiffProfile] = useState(null);
      const [distData, setDistData] = useState(null);
      const [isLoading, setIsLoading] = useState(true);
      const [selectedTourId, setSelectedTourId] = useState(urlParams.get('t'));
      
      // 推廣工具專用狀態
      const [mode, setMode] = useState('single'); // 'single', 'carousel', 'multi'
      const [selectedIds, setSelectedIds] = useState(new Set());
      const [searchKeyword, setSearchKeyword] = useState('');
      const [promoModalOpen, setPromoModalOpen] = useState(false);
      const [socOpts, setSocOpts] = useState({ phone: true, line: true, lineAt: false, fb: false, map: false });

      useEffect(() => {
        initLiff();
        fetchItineraries();
      }, []);

      const initLiff = async () => {
        try {
          await liff.init({ liffId: LIFF_ID });
          if (!liff.isLoggedIn()) {
            liff.login({ redirectUri: window.location.href });
          } else {
            const profile = await liff.getProfile();
            setLiffProfile(profile);
            fetchDistData(profile.userId);
          }
        } catch (err) { console.error(err); }
      };

      const fetchDistData = async (uid) => {
        try {
          const res = await fetch(`${WORKER_URL}/api/itineraries?action=checkUserStatus&uid=${uid}`);
          const data = await res.json();
          if (data.success && data.data.role === 'distributor') setDistData(data.data.distributorData);
        } catch (e) { console.error(e); }
        finally { setIsLoading(false); }
      };

      const fetchItineraries = async () => {
        try {
          const res = await fetch(`${WORKER_URL}/api/itineraries`);
          const data = await res.json();
          setItineraries(Array.isArray(data) ? data : (data.data || []));
        } catch (e) { console.error(e); }
      };

      const changeTab = (tab) => {
        setActiveTab(tab);
        const url = new URL(window.location.href);
        url.searchParams.set('tab', tab);
        window.history.pushState({}, '', url);
      };

      const filteredItineraries = useMemo(() => {
        return itineraries.filter(i => i.title.toLowerCase().includes(searchKeyword.toLowerCase()));
      }, [itineraries, searchKeyword]);

      const handleCardClick = (id) => {
        const sid = String(id);
        if (mode === 'single') {
          setSelectedIds(new Set([sid]));
          setPromoModalOpen(true);
        } else {
          setSelectedIds(prev => {
            const next = new Set(prev);
            if (next.has(sid)) next.delete(sid);
            else if (next.size < 8) next.add(sid);
            return next;
          });
        }
      };

      // Flex JSON 生成邏輯
      const buildFinalFlex = () => {
        const items = Array.from(selectedIds).map(id => itineraries.find(i => String(i.id) === id)).filter(Boolean);
        if (items.length === 0) return null;
        const uid = liffProfile?.userId || '';

        if (mode === 'carousel' || mode === 'single') {
          const bubbles = items.map(tour => ({
            type: 'bubble', size: 'mega',
            hero: { type: 'image', url: tour.image, size: 'full', aspectRatio: '20:13', aspectMode: 'cover' },
            body: { type: 'box', layout: 'vertical', contents: [
              { type: 'text', text: tour.title, weight: 'bold', size: 'xl', wrap: true },
              { type: 'text', text: `TWD ${Number(tour.price).toLocaleString()}`, color: '#b82337', weight: 'bold', size: 'md', margin: 'md' }
            ]},
            footer: { type: 'box', layout: 'vertical', spacing: 'sm', contents: [
              { type: 'button', style: 'primary', color: '#00B900', action: { type: 'uri', label: '查看行程', uri: `${ENDPOINT_URL}?t=${tour.id}&r=${uid}` } }
            ]}
          }));
          return { type: 'flex', altText: `推薦行程：${items[0].title}`, contents: (mode === 'carousel') ? { type: 'carousel', contents: bubbles } : bubbles[0] };
        } else {
          // Multi 列表模式
          const rows = items.map((tour, idx) => ([
            { type: "box", layout: "horizontal", paddingAll: "10px", contents: [
              { type: "image", url: tour.image, size: "sm", aspectMode: "cover", aspectRatio: "1:1", flex: 1 },
              { type: "box", layout: "vertical", flex: 4, margin: "md", contents: [
                { type: "text", text: tour.title, size: "xs", weight: "bold", wrap: true },
                { type: "text", text: `NT$ ${Number(tour.price).toLocaleString()}`, color: "#ff0000", size: "xs", weight: "bold", margin: "xs" }
              ]},
              { type: "box", layout: "vertical", width: "40px", height: "40px", backgroundColor: "#00B900", cornerRadius: "20px", justifyContent: "center", alignItems: "center", contents: [
                { type: "text", text: "報名", color: "#ffffff", size: "xxs", weight: "bold" }
              ], action: { type: "uri", uri: `${ENDPOINT_URL}?t=${tour.id}&r=${uid}` }}
            ]},
            idx < items.length - 1 ? { type: "separator" } : null
          ])).flat().filter(Boolean);
          return { type: "flex", altText: `精選 ${items.length} 個推薦行程`, contents: { type: "bubble", body: { type: "box", layout: "vertical", paddingAll: "0px", contents: rows }} };
        }
      };

      const sendTargetPicker = async () => {
        const flexMsg = buildFinalFlex();
        try {
          const res = await liff.shareTargetPicker([flexMsg]);
          if (res) { setPromoModalOpen(false); setSelectedIds(new Set()); }
        } catch (e) { console.error(e); }
      };

      // --- 渲染導航列 ---
      const renderNavBar = () => (
        <nav className="sticky top-0 z-40 bg-white/90 backdrop-blur border-b border-slate-200 shadow-sm h-16 flex items-center px-4 justify-between">
          <div className="flex items-center gap-2 cursor-pointer" onClick={() => changeTab('home')}>
            <Navigation className="text-blue-600" />
            <span className="font-bold text-xl tracking-wider text-blue-900">旅遊管家</span>
          </div>
          <div className="flex bg-slate-100 rounded-lg p-1 text-xs font-bold">
            <button onClick={() => changeTab('home')} className={`px-4 py-1.5 rounded-md transition-all ${activeTab === 'home' ? 'bg-white shadow-sm' : 'text-slate-500'}`}>找行程</button>
            <button onClick={() => changeTab('distributor')} className={`px-4 py-1.5 rounded-md transition-all ${activeTab === 'distributor' ? 'bg-white shadow-sm' : 'text-slate-500'}`}>經銷專區</button>
          </div>
        </nav>
      );

      // --- 渲染推廣工具箱 (主要請求) ---
      const renderPromotionTool = () => (
        <div className="animate-fade-in">
          {/* 工具箱導航 */}
          <div className="max-w-6xl mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div className="flex items-center gap-2">
              <ToolIcon className="text-emerald-600" />
              <span className="font-black text-xl text-slate-800">推廣工具箱</span>
            </div>
            <div className="flex bg-slate-100 rounded-lg p-1 text-xs font-bold">
              <button onClick={() => { setMode('single'); setSelectedIds(new Set()); }} className={`px-4 py-1.5 rounded-md transition-all ${mode === 'single' ? 'bg-white shadow-sm' : 'text-slate-500'}`}>單張名片</button>
              <button onClick={() => { setMode('carousel'); setSelectedIds(new Set()); }} className={`px-4 py-1.5 rounded-md transition-all ${mode === 'carousel' ? 'bg-white shadow-sm' : 'text-slate-500'}`}>橫向輪播</button>
              <button onClick={() => { setMode('multi'); setSelectedIds(new Set()); }} className={`px-4 py-1.5 rounded-md transition-all ${mode === 'multi' ? 'bg-white shadow-sm' : 'text-slate-500'}`}>列表多頁</button>
            </div>
          </div>

          {/* 搜尋列 */}
          <div className="max-w-6xl mx-auto px-4 py-2">
            <div className="relative flex items-center">
              <Search className="absolute left-4 text-slate-400 w-5 h-5" />
              <input 
                type="text" 
                placeholder="搜尋行程標題..." 
                value={searchKeyword}
                onChange={(e) => setSearchKeyword(e.target.value)}
                className="w-full bg-white border border-slate-200 rounded-xl pl-12 pr-4 py-3 text-sm outline-none focus:border-emerald-500 transition shadow-sm" 
              />
            </div>
          </div>

          {/* 行程列表 */}
          <main className="max-w-6xl mx-auto px-4 py-6 grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
            {filteredItineraries.map(item => {
              const isSel = selectedIds.has(String(item.id));
              return (
                <div key={item.id} className={`tour-card ${isSel ? 'selected' : ''}`} onClick={() => handleCardClick(item.id)}>
                  {mode !== 'single' && (
                    <div className={`absolute top-2 left-2 z-10 w-6 h-6 rounded-md border-2 flex items-center justify-center transition-all ${isSel ? 'bg-emerald-500 border-emerald-500' : 'bg-black/30 border-white/80'}`}>
                      {isSel && <svg className="w-4 h-4 text-white" fill="none" stroke="currentColor" strokeWidth="3" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>}
                    </div>
                  )}
                  <div className="h-32 bg-slate-100 overflow-hidden">
                    <img src={item.image} className="w-full h-full object-cover" alt={item.title} />
                  </div>
                  <div className="p-3">
                    <p className="text-xs font-bold text-gray-800 line-clamp-2 h-8 mb-2">{item.title}</p>
                    <div className="flex justify-between items-center mt-2">
                      <span className="text-[10px] text-gray-400">{item.days}天</span>
                      <span className="text-xs font-black text-red-600">${Number(item.price).toLocaleString()}</span>
                    </div>
                  </div>
                </div>
              );
            })}
          </main>

          {/* 底部浮動列 */}
          {mode !== 'single' && selectedIds.size > 0 && (
            <div className="fixed bottom-0 left-0 right-0 bg-slate-900 text-white p-4 z-50 shadow-[0_-4px_20px_rgba(0,0,0,0.2)] animate-fade-in-up">
              <div className="max-w-6xl mx-auto flex justify-between items-center">
                <span className="font-bold text-emerald-400">已選 {selectedIds.size} 個行程</span>
                <div className="flex gap-2">
                  <button onClick={() => setSelectedIds(new Set())} className="bg-slate-700 px-4 py-2 rounded-lg font-bold text-sm">清除</button>
                  <button onClick={() => setPromoModalOpen(true)} className="bg-emerald-500 px-6 py-2 rounded-lg font-bold text-sm shadow-lg">準備發送名片 🚀</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );

      // --- 發送名片彈窗 ---
      const renderPromoModal = () => {
        if (!promoModalOpen) return null;
        const items = Array.from(selectedIds).map(id => itineraries.find(i => String(i.id) === id)).filter(Boolean);
        
        return (
          <div className="fixed inset-0 z-[100] bg-black/65 backdrop-blur-md flex items-center justify-center p-4">
            <div className="bg-white rounded-[20px] w-full max-w-4xl max-h-[92vh] overflow-hidden flex flex-col md:flex-row shadow-2xl animate-fade-in-up">
              <div className="flex-1 p-6 overflow-y-auto">
                <div className="flex justify-between items-center mb-6">
                  <h3 className="font-black text-xl">發送推廣名片</h3>
                  <button onClick={() => setPromoModalOpen(false)} className="bg-slate-100 p-2 rounded-full hover:bg-slate-200"><XIcon className="w-5 h-5 text-slate-500"/></button>
                </div>
                
                <div className="space-y-6">
                  <div>
                    <p className="text-xs font-black text-slate-400 uppercase tracking-widest mb-3">設定聯絡按鈕</p>
                    <div className="grid grid-cols-2 gap-2">
                      {['phone', 'line', 'lineAt', 'fb', 'map'].map(key => (
                        <label key={key} className={`flex items-center p-3 border rounded-xl gap-2 text-xs font-bold cursor-pointer transition ${!distData?.[key === 'lineAt' ? 'lineAtLink' : key === 'line' ? 'lineLink' : key === 'map' ? 'mapLink' : key] ? 'opacity-30' : 'hover:bg-slate-50'}`}>
                          <input type="checkbox" checked={socOpts[key]} disabled={!distData?.[key === 'lineAt' ? 'lineAtLink' : key === 'line' ? 'lineLink' : key === 'map' ? 'mapLink' : key]} onChange={() => setSocOpts({...socOpts, [key]: !socOpts[key]})} className="w-4 h-4 accent-emerald-500" />
                          {key === 'phone' ? '📞 電話' : key === 'line' ? '💬 LINE' : key === 'lineAt' ? '🟢 LINE@' : key === 'fb' ? '👍 FB' : '📍 導航'}
                        </label>
                      ))}
                    </div>
                  </div>

                  <div className="pt-4 border-t space-y-3">
                    <button onClick={() => { navigator.clipboard.writeText(JSON.stringify(buildFinalFlex(), null, 2)); alert("已複製 Flex JSON"); }} className="w-full bg-slate-100 py-3 rounded-xl font-bold text-sm text-slate-600">📋 複製 Flex JSON (貼到 LINE OA)</button>
                    <button onClick={sendTargetPicker} className="w-full bg-emerald-500 text-white py-4 rounded-xl font-black text-lg shadow-lg hover:bg-emerald-600 transition">🚀 立即分享給 LINE 好友</button>
                  </div>
                </div>
              </div>

              {/* 預覽畫面 */}
              <div className="w-full md:w-[360px] preview-chat-bg p-6 flex flex-col items-center border-l border-slate-100">
                <p className="text-white/70 text-[10px] font-bold mb-4 uppercase tracking-widest bg-black/20 px-3 py-1 rounded-full">LINE 聊天室預覽</p>
                <div className="w-full flex gap-3 overflow-x-auto pb-4 custom-scrollbar" style={{scrollSnapType: 'x mandatory'}}>
                  {items.map((tour, idx) => (
                    <div key={idx} style={{flex: '0 0 100%', scrollSnapAlign: 'start'}} className="bg-white rounded-xl overflow-hidden border-2 border-slate-800 shadow-xl">
                      <img src={tour.image} className="aspect-[16/9] w-full object-cover" />
                      <div className="p-3">
                        <p className="text-[11px] font-black text-slate-900 line-clamp-1">{tour.title}</p>
                        <p className="text-[11px] font-black text-red-600 mt-1">${Number(tour.price).toLocaleString()}</p>
                        <div className="bg-emerald-500 text-white text-center py-2 rounded-lg text-[10px] font-black mt-3">查看行程 / 立即報名</div>
                      </div>
                    </div>
                  ))}
                </div>
                {mode === 'carousel' && <div className="mt-4 flex gap-1"><div className="w-1.5 h-1.5 bg-white rounded-full"></div><div className="w-1.5 h-1.5 bg-white/30 rounded-full"></div><div className="w-1.5 h-1.5 bg-white/30 rounded-full"></div></div>}
              </div>
            </div>
          </div>
        );
      };

      return (
        <div className="min-h-screen flex flex-col">
          {renderNavBar()}
          <div className="flex-grow">
            {activeTab === 'home' ? (
              <div className="max-w-7xl mx-auto px-4 py-8 animate-fade-in">
                <h2 className="text-3xl font-black mb-8 text-slate-800 border-l-8 border-blue-600 pl-4">為您推薦的精選行程</h2>
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                  {itineraries.map(tour => (
                    <div key={tour.id} onClick={() => { setSelectedTourId(tour.id); window.history.pushState({}, '', `?t=${tour.id}`); }} className="tour-card bg-white rounded-[2rem] overflow-hidden border border-slate-100 shadow-sm hover:shadow-xl cursor-pointer flex flex-col">
                      <div className="h-56 overflow-hidden"><img src={tour.image} className="w-full h-full object-cover" /></div>
                      <div className="p-6 flex-1">
                        <h4 className="text-lg font-bold text-slate-900 leading-tight mb-4 h-14 line-clamp-2">{tour.title}</h4>
                        <div className="flex justify-between items-center pt-4 border-t">
                          <span className="text-sm font-bold text-slate-400">{tour.days} 天行程</span>
                          <span className="text-2xl font-black text-[#b82337]">${Number(tour.price).toLocaleString()}</span>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            ) : renderPromotionTool()}
          </div>
          {renderPromoModal()}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
