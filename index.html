<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅遊管家 - 智能管理與推廣系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Noto Sans TC', sans-serif; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in-up { animation: fadeInUp 0.3s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    .line-chat-bg { background-color: #749cbd; }
    .tour-card { transition: all .2s; cursor: pointer; border: 2px solid transparent; }
    .tour-card.selected { border-color: #10b981; background-color: #f0fdf4; }
  </style>
</head>
<body class="bg-gray-50 text-slate-800">
  <div id="root"></div>

  <script type="text/babel" data-presets="react,env">
    const { useState, useEffect, useMemo } = React;

    // --- 圖示組件 ---
    const IconWrapper = ({ children, className = "w-6 h-6" }) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>);
    const Navigation = ({ className }) => <IconWrapper className={className}><polygon points="3 11 22 2 13 21 11 13 3 11"/></IconWrapper>;
    const SearchIcon = ({ className }) => <IconWrapper className={className}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></IconWrapper>;
    const MapPin = ({ className }) => <IconWrapper className={className}><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></IconWrapper>;
    const Calendar = ({ className }) => <IconWrapper className={className}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></IconWrapper>;
    const Type = ({ className }) => <IconWrapper className={className}><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></IconWrapper>;
    const RefreshCw = ({ className }) => <IconWrapper className={className}><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></IconWrapper>;
    const Share2 = ({ className }) => <IconWrapper className={className}><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></IconWrapper>;
    const Briefcase = ({ className }) => <IconWrapper className={className}><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></IconWrapper>;
    const Users = ({ className }) => <IconWrapper className={className}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></IconWrapper>;
    const XIcon = ({ className }) => <IconWrapper className={className}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></IconWrapper>;
    const UploadCloud = ({ className }) => <IconWrapper className={className}><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></IconWrapper>;
    const ImageIcon = ({ className }) => <IconWrapper className={className}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></IconWrapper>;
    const FileText = ({ className }) => <IconWrapper className={className}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></IconWrapper>;
    const Camera = ({ className }) => <IconWrapper className={className}><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></IconWrapper>;
    const Edit2 = ({ className }) => <IconWrapper className={className}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></IconWrapper>;
    const Trash2 = ({ className }) => <IconWrapper className={className}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></IconWrapper>;
    const AlertCircle = ({ className }) => <IconWrapper className={className}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></IconWrapper>;

    const AdminDeniedScreen = () => (
      <div className="w-full max-w-3xl mx-auto px-4 py-32 animate-fade-in text-center">
        <AlertCircle className="w-24 h-24 text-red-500 mx-auto mb-6" />
        <h2 className="text-4xl font-bold text-gray-800 mb-4">權限不足</h2>
        <p className="text-gray-500 text-xl">此區塊為授權經銷商或管理員專屬，您的帳號目前尚未開通。</p>
      </div>
    );

    // --- 配置 ---
    const WORKER_URL = 'https://travelkeeper.fangwl591021.workers.dev';
    const LIFF_ID = '2009367829-BDZCGti8'; 
    const ENDPOINT_URL = 'https://fangwl591021.github.io/travelkeeper/';
    const ADMIN_UIDS = [
      "Uf729764dbb5b652a5a90a467320bea29",
      "U58eb5c1a747450140ce1335af709ae55"
    ];

    function App() {
      const urlParams = new URLSearchParams(window.location.search);
      const [activeTab, setActiveTab] = useState(urlParams.get('tab') || 'home'); 
      const [itineraries, setItineraries] = useState([]);
      const [liffProfile, setLiffProfile] = useState(null);
      const [distributorStatus, setDistributorStatus] = useState(null); 
      const [isAdmin, setIsAdmin] = useState(false);
      const [myDistributorData, setMyDistributorData] = useState(null);
      const [isLoading, setIsLoading] = useState(true);
      const [toast, setToast] = useState(null);

      // --- 首頁進階搜尋專用狀態 ---
      const [searchRegion, setSearchRegion] = useState('');
      const [searchStartDate, setSearchStartDate] = useState('');
      const [searchEndDate, setSearchEndDate] = useState('');
      const [searchKeywordHome, setSearchKeywordHome] = useState('');
      const [filteredResults, setFilteredResults] = useState([]);

      // --- CRM 與 上稿 專用狀態 ---
      const [crmSubTab, setCrmSubTab] = useState('distributors'); 
      const [crmDistributors, setCrmDistributors] = useState([]);
      const [crmUsers, setCrmUsers] = useState([]);
      const [editingDistributor, setEditingDistributor] = useState(null);
      const [editFormData, setEditFormData] = useState({});
      
      const [bannerImage, setBannerImage] = useState(() => localStorage.getItem('travel_keeper_banner') || 'https://images.unsplash.com/photo-1436491865332-7a61a109cc05?auto=format&fit=crop&w=1920&q=80');
      const [uploadMode, setUploadMode] = useState('dm');
      const [ocrStatus, setOcrStatus] = useState('idle');
      const [draftData, setDraftData] = useState({ id: null, title: '', region: '', price: '', days: '', startDate: '', endDate: '', description: '', image: '' });
      const [isUploadingImage, setIsUploadingImage] = useState(false); 
      const [deleteModalId, setDeleteModalId] = useState(null);

      // --- 推廣工具專用狀態 ---
      const [promoMode, setPromoMode] = useState('single'); // single, carousel, multi
      const [selectedIds, setSelectedIds] = useState(new Set());
      const [searchKeyword, setSearchKeyword] = useState('');
      const [isPromoModalOpen, setIsPromoModalOpen] = useState(false);
      const [cardOptions, setCardOptions] = useState({ phone: true, line: true, lineAt: false, fb: false, web: false, map: false });

      useEffect(() => {
        initLiff();
        fetchItineraries();
      }, []);

      useEffect(() => {
        if (isAdmin && (activeTab === 'crm' || activeTab === 'distributor')) {
          fetchFullCrmData();
        }
      }, [activeTab, isAdmin]);

      const showToast = (message, type = 'success') => { setToast({ message, type }); setTimeout(() => setToast(null), 3000); };

      const initLiff = async () => {
        try {
          await liff.init({ liffId: LIFF_ID });
          if (!liff.isLoggedIn()) {
            liff.login({ redirectUri: window.location.href });
          } else {
            const profile = await liff.getProfile();
            setLiffProfile(profile);
            
            // 嚴謹的權限判定（去空白）
            const cleanUid = String(profile.userId).trim();
            const isUserAdmin = ADMIN_UIDS.some(id => id.trim() === cleanUid);
            setIsAdmin(isUserAdmin);
            checkMyStatus(cleanUid, isUserAdmin);
          }
        } catch (err) { console.error('LIFF 初始化失敗', err); }
      };

      const checkMyStatus = async (uid, isUserAdmin) => {
        try {
          const res = await fetch(`${WORKER_URL}/api/itineraries`, { 
            method: 'POST', 
            headers: { 'Content-Type': 'application/json' }, 
            body: JSON.stringify({ action: 'checkUserStatus', uid: uid }) 
          });
          const result = await res.json();
          if (result.success) {
            const info = result.data;
            const adminVerified = isUserAdmin || info.isAdmin;
            
            if (adminVerified) {
               // 確保管理員絕對擁有最高權限
               setIsAdmin(true);
               setDistributorStatus('approved'); 
               
               // 如果管理員尚未在表格中建立經銷商資料，給予預設資料以供測試 Flex Message
               if (!info.distributorData) {
                  setMyDistributorData({
                     phone: '0900000000 (測試)',
                     lineLink: 'https://line.me/ti/p/~admin',
                     lineAtLink: 'https://lin.ee/admin',
                     fbLink: 'https://facebook.com/admin',
                     webLink: 'https://google.com',
                     mapLink: 'https://maps.google.com'
                  });
               } else {
                  setMyDistributorData(info.distributorData);
               }
            } else if (info.role === 'distributor') {
               setDistributorStatus(info.status ? String(info.status).trim().toLowerCase() : 'pending');
               setMyDistributorData(info.distributorData);
            }
          }
        } catch (e) { console.error('API 連線失敗', e); }
        finally { setIsLoading(false); }
      };

      const fetchItineraries = async () => {
        try {
          const res = await fetch(`${WORKER_URL}/api/itineraries`);
          const data = await res.json();
          if (Array.isArray(data)) {
             setItineraries(data);
             setFilteredResults(data);
          }
        } catch (e) { console.error('獲取行程失敗', e); }
      };

      const fetchFullCrmData = async () => {
        try {
          const currentTimestamp = new Date().getTime();
          const resD = await fetch(`${WORKER_URL}/api/itineraries`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'getDistributors', timestamp: currentTimestamp }) });
          const dataD = await resD.json();
          setCrmDistributors(Array.isArray(dataD) ? dataD : []);
          
          const resU = await fetch(`${WORKER_URL}/api/itineraries`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'getUsers', timestamp: currentTimestamp }) });
          const dataU = await resU.json();
          setCrmUsers(Array.isArray(dataU) ? dataU : []);
        } catch (e) { console.error('CRM Fetch error', e); }
      };

      const changeTab = (tab) => {
        setActiveTab(tab);
        window.history.replaceState({}, '', `?tab=${tab}`);
      };

      // --- 首頁搜尋邏輯 ---
      const handleSearchHome = () => {
        let results = itineraries;
        if (searchRegion) results = results.filter(item => item.region.includes(searchRegion));
        if (searchKeywordHome) {
          const kw = searchKeywordHome.toLowerCase();
          results = results.filter(item => (item.title && item.title.toLowerCase().includes(kw)) || (item.description && item.description.toLowerCase().includes(kw)));
        }
        if (searchStartDate) results = results.filter(item => item.startDate && item.startDate >= searchStartDate);
        if (searchEndDate) results = results.filter(item => item.endDate && item.endDate <= searchEndDate);
        setFilteredResults(results);
        showToast(`為您找到 ${results.length} 筆符合的行程`);
      };

      // --- 經銷推廣選卡邏輯 ---
      const handleCardClick = (id) => {
        const sid = String(id);
        if (promoMode === 'single') {
          setSelectedIds(new Set([sid]));
          setIsPromoModalOpen(true);
        } else {
          const newSet = new Set(selectedIds);
          if (newSet.has(sid)) newSet.delete(sid);
          else if (newSet.size < 8) newSet.add(sid);
          else showToast('上限為 8 個行程');
          setSelectedIds(newSet);
        }
      };

      const filteredPromoItineraries = useMemo(() => {
        return itineraries.filter(i => i.title.toLowerCase().includes(searchKeyword.toLowerCase()));
      }, [itineraries, searchKeyword]);

      // --- CRM 功能 ---
      const saveDistributorEdit = async () => {
        try {
          const payload = { action: 'updateDistributorInfo', ...editFormData };
          const res = await fetch(`${WORKER_URL}/api/itineraries`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
          const result = await res.json();
          if (result.success) { showToast('✅ 經銷商資料與狀態已更新！'); setEditingDistributor(null); fetchFullCrmData(); } else throw new Error('儲存失敗');
        } catch (e) { showToast('更新失敗，請檢查資料', 'error'); }
      };

      // --- 上稿功能 ---
      const handleImageUploadToDrive = async (e, type = 'itinerary') => {
        const file = e.target.files[0];
        if (!file) return;
        if (type === 'itinerary') setIsUploadingImage(true); else showToast('Banner 上傳中...');

        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onloadend = async () => {
          try {
            const res = await fetch(`${WORKER_URL}/api/itineraries`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'uploadImage', base64: reader.result }) });
            const result = await res.json();
            if (result.success) {
              if (type === 'itinerary') { setDraftData({ ...draftData, image: result.url }); showToast('✅ 圖片上傳成功！'); } 
              else { setBannerImage(result.url); localStorage.setItem('travel_keeper_banner', result.url); showToast('✅ Banner 更新成功！'); }
            } else throw new Error(result.error);
          } catch (err) { showToast('上傳失敗: ' + err.message, 'error'); } finally { if (type === 'itinerary') setIsUploadingImage(false); }
        };
      };

      const handleFileUpload = async (e) => {
        const file = e.target.files[0]; if (!file) return; 
        setOcrStatus('processing');
        setIsUploadingImage(true);

        try {
          const reader = new FileReader(); reader.readAsDataURL(file);
          reader.onloadend = async () => {
            const base64data = reader.result;
            let uploadedUrl = '';
            try {
              const driveRes = await fetch(`${WORKER_URL}/api/itineraries`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'uploadImage', base64: base64data }) });
              const driveResult = await driveRes.json();
              if (driveResult.success) uploadedUrl = driveResult.url;
            } catch (err) { console.warn('圖片上傳備用', err); }

            const res = await fetch(`${WORKER_URL}/api/upload-dm`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ image: base64data }) });
            const aiResult = await res.json();

            if (aiResult.success) {
              const parsedData = aiResult.data;
              parsedData.image = uploadedUrl || 'https://images.unsplash.com/photo-1436491865332-7a61a109cc05?auto=format&fit=crop&w=800&q=80';
              parsedData.id = Date.now(); 
              setDraftData(parsedData); 
              showToast('✅ 圖片已上傳且 AI 解析完成！系統正自動寫入資料庫...');
              
              const newItinerary = { ...parsedData, action: 'addItinerary', price: parseInt(parsedData.price, 10) || 0 };
              setItineraries(prev => [newItinerary, ...prev]);
              setFilteredResults(prev => [newItinerary, ...prev]);
              try {
                const dbRes = await fetch(`${WORKER_URL}/api/itineraries`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(newItinerary) });
                const dbResult = await dbRes.json();
                if (dbResult.success) { showToast('🎉 行程已成功上架！'); setDraftData({ id: null, title: '', region: '', price: '', days: '', startDate: '', endDate: '', description: '', image: '' }); setOcrStatus('idle'); fetchItineraries(); } else throw new Error('寫入失敗');
              } catch (dbErr) { setOcrStatus('done'); showToast('寫入失敗，請手動點擊「儲存」', 'error'); }
            } else throw new Error(aiResult.error || '解析失敗');
            setIsUploadingImage(false);
          };
        } catch (error) { setOcrStatus('idle'); setIsUploadingImage(false); showToast(error.message || '解析失敗', 'error'); }
      };

      const handleUpdateContent = async () => {
        if (!draftData.title) return showToast('請先填寫內容', 'error');
        const isEditing = !!draftData.id;
        const submitData = { ...draftData, id: draftData.id || Date.now(), price: parseInt(draftData.price, 10) || 0, action: isEditing ? 'updateItinerary' : 'addItinerary' };
        try {
          const res = await fetch(`${WORKER_URL}/api/itineraries`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(submitData) });
          const result = await res.json();
          if (result.success) { showToast(isEditing ? '修改成功！' : '新增成功！'); setDraftData({ id: null, title: '', region: '', price: '', days: '', startDate: '', endDate: '', description: '', image: '' }); setOcrStatus('idle'); setUploadMode('dm'); fetchItineraries(); } else throw new Error('操作失敗');
        } catch (error) { showToast('寫入資料庫錯誤', 'error'); }
      };

      const handleEditClick = (item) => { setUploadMode('manual'); setOcrStatus('done'); setDraftData(item); window.scrollTo({ top: 0, behavior: 'smooth' }); };

      const confirmDelete = async () => {
        if (!deleteModalId) return;
        try {
          const res = await fetch(`${WORKER_URL}/api/itineraries`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'deleteItinerary', id: deleteModalId }) });
          const result = await res.json();
          if (result.success) { showToast('已成功下架！'); setDeleteModalId(null); fetchItineraries(); } else throw new Error('刪除失敗');
        } catch (error) { showToast('下架發生錯誤', 'error'); }
      };

      // --- Flex Message 邏輯 ---
      const buildFinalFlex = () => {
        const items = Array.from(selectedIds).map(id => itineraries.find(i => String(i.id) === id)).filter(Boolean);
        if (items.length === 0) return null;

        const uid = liffProfile?.userId || 'GUEST';
        const dData = myDistributorData || {};
        
        const createButtons = (tourId) => {
          const trackingUrl = `${ENDPOINT_URL}index.html?t=${tourId}&r=${uid}`;
          const shareLiffUrl = `https://liff.line.me/${LIFF_ID}?action=share&t=${tourId}&r=${uid}`;
          let btns = [
            { "type": "button", "style": "primary", "color": "#00B900", "height": "sm", "action": { "type": "uri", "label": "查看行程 / 立即報名", "uri": trackingUrl } },
            { "type": "button", "style": "primary", "color": "#FF334B", "height": "sm", "margin": "sm", "action": { "type": "uri", "label": "分享行程給好友", "uri": shareLiffUrl } }
          ];
          if (cardOptions.phone && dData.phone) btns.push({ "type": "button", "style": "secondary", "height": "sm", "margin": "sm", "action": { "type": "uri", "label": "📞 聯絡電話", "uri": `tel:${dData.phone}` }});
          if (cardOptions.line && dData.lineLink) btns.push({ "type": "button", "style": "secondary", "height": "sm", "margin": "sm", "action": { "type": "uri", "label": "💬 私訊 LINE", "uri": dData.lineLink }});
          if (cardOptions.lineAt && dData.lineAtLink) btns.push({ "type": "button", "style": "secondary", "height": "sm", "margin": "sm", "action": { "type": "uri", "label": "🟢 官方 LINE@", "uri": dData.lineAtLink }});
          if (cardOptions.fb && dData.fbLink) btns.push({ "type": "button", "style": "secondary", "height": "sm", "margin": "sm", "action": { "type": "uri", "label": "👍 FB 粉絲專頁", "uri": dData.fbLink }});
          if (cardOptions.web && dData.webLink) btns.push({ "type": "button", "style": "secondary", "height": "sm", "margin": "sm", "action": { "type": "uri", "label": "🌐 官方網站", "uri": dData.webLink }});
          if (cardOptions.map && dData.mapLink) btns.push({ "type": "button", "style": "secondary", "height": "sm", "margin": "sm", "action": { "type": "uri", "label": "📍 門市導航", "uri": dData.mapLink }});
          return btns;
        };

        if (promoMode === 'single' || promoMode === 'carousel') {
          const bubbles = items.map(tour => ({
            type: 'bubble', size: 'mega',
            hero: { type: 'image', url: tour.image, size: 'full', aspectRatio: '20:13', aspectMode: 'cover' },
            body: { type: 'box', layout: 'vertical', contents: [
              { type: 'text', text: tour.title, weight: 'bold', size: 'xl', wrap: true },
              { type: 'box', layout: 'vertical', margin: 'lg', spacing: 'sm', contents: [

                      </div>
                      <div className="overflow-x-auto p-4">
                        {crmSubTab === 'distributors' ? (
                          <table className="w-full text-left border-collapse min-w-[1000px]">
                            <thead><tr className="bg-slate-100 border-b border-slate-200"><th className="p-4 font-bold text-slate-600 text-sm">申請日期</th><th className="p-4 font-bold text-slate-600 text-sm">經銷商資訊</th><th className="p-4 font-bold text-slate-600 text-sm">審核資料 (公司/統編)</th><th className="p-4 font-bold text-slate-600 text-sm">資格狀態</th><th className="p-4 font-bold text-slate-600 text-sm text-right">累積業績</th><th className="p-4 font-bold text-slate-600 text-sm text-center">操作</th></tr></thead>
                            <tbody className="divide-y divide-slate-100">
                              {crmDistributors.length === 0 ? <tr><td colSpan="6" className="p-8 text-center text-slate-400">尚無資料</td></tr> : 
                               crmDistributors.map(user => (
                                <tr key={user.uid} className="hover:bg-purple-50/30 transition-colors">
                                  <td className="p-4 text-sm text-slate-500">{user.joinDate ? String(user.joinDate).substring(0, 10) : ''}</td>
                                  <td className="p-4"><p className="font-bold text-slate-800 text-lg mb-1">{user.name}</p><p className="text-sm text-slate-600">{user.phone}</p></td>
                                  <td className="p-4"><p className="font-bold text-purple-700">{user.companyName || '未填寫'}</p><p className="text-sm text-slate-500 font-mono mt-1">統編: {user.taxId || '未填寫'}</p></td>
                                  <td className="p-4">
                                    {String(user.status || '').trim().toLowerCase() === 'approved' ? (
                                      <div><span className="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-bold">已核准</span><span className="text-xs text-slate-500 font-bold ml-2">分潤 {user.commission || 10}%</span></div>
                                    ) : <span className="bg-yellow-100 text-yellow-700 px-3 py-1 rounded-full text-xs font-bold">待審核</span>}
                                  </td>
                                  <td className="p-4 text-right"><p className="font-bold text-slate-800 text-lg">{Number(user.sales) ? user.sales : '0'} 筆</p><p className="text-xs text-slate-500 font-medium">${Number(user.revenue) ? Number(user.revenue).toLocaleString() : '0'}</p></td>
                                  <td className="p-4 text-center"><button onClick={() => { setEditingDistributor(user); setEditFormData(user); }} className="bg-purple-600 hover:bg-purple-700 text-white text-sm font-bold px-4 py-2 rounded-lg shadow-sm transition">編輯 / 審核</button></td>
                                </tr>
                              ))}
                            </tbody>
                          </table>
                        ) : (
                          <table className="w-full text-left border-collapse">
                            <thead><tr className="bg-slate-100 border-b border-slate-200"><th className="p-4 font-bold text-slate-600 text-sm">註冊日期</th><th className="p-4 font-bold text-slate-600 text-sm">會員暱稱</th><th className="p-4 font-bold text-slate-600 text-sm">聯絡電話</th><th className="p-4 font-bold text-slate-600 text-sm">推薦來源</th></tr></thead>
                            <tbody className="divide-y divide-slate-100">
                              {crmUsers.length === 0 ? <tr><td colSpan="4" className="p-8 text-center text-slate-400">尚無資料</td></tr> : 
                               crmUsers.map(user => {
                                const refDist = crmDistributors.find(d => d.uid === user.referredBy);
                                return (
                                <tr key={user.uid} className="hover:bg-purple-50/30 transition-colors">
                                  <td className="p-4 text-sm text-slate-500">{user.joinDate ? String(user.joinDate).substring(0, 10) : ''}</td>
                                  <td className="p-4 font-bold text-slate-800 text-lg">{user.name}</td>
                                  <td className="p-4"><p className="text-sm text-slate-800">{user.phone}</p></td>
                                  <td className="p-4">{refDist ? <span className="text-xs font-bold bg-blue-100 text-blue-700 px-2 py-1 rounded">推薦人: {refDist.name}</span> : <span className="text-xs text-slate-400">自然流量</span>}</td>
                                </tr>
                              )})}
                            </tbody>
                          </table>
                        )}
                      </div>
                    </div>
                  )}
                </div>
              ) : <AdminDeniedScreen />
            )}

            {/* ====== Tab: Admin (上稿系統) ====== */}
            {activeTab === 'admin' && (
              isAdmin ? (
                <div className="w-full animate-fade-in">
                  <div className="bg-white rounded-2xl shadow-md p-6 lg:p-8 border border-slate-100">
                    <div className="flex justify-between items-center border-b pb-4 mb-6"><h2 className="text-2xl font-bold text-slate-800 flex items-center"><UploadCloud className="h-6 w-6 mr-2 text-blue-500" /> 行程智能上稿系統</h2><button onClick={handleUpdateContent} className="flex items-center bg-blue-600 hover:bg-blue-700 text-white px-4 py-2.5 rounded-lg font-medium shadow-sm"><RefreshCw className="w-4 h-4 mr-2" /> {draftData.id ? '儲存修改' : '手動新增上架'}</button></div>
                    {!draftData.id && (
                      <div className="flex space-x-4 mb-8 max-w-2xl">
                        <button onClick={() => setUploadMode('dm')} className={`flex-1 py-3.5 rounded-xl border-2 font-bold flex justify-center items-center transition-colors ${uploadMode === 'dm' ? 'border-blue-500 bg-blue-50 text-blue-700' : 'border-slate-200 text-slate-500'}`}><ImageIcon className="mr-2 h-5 w-5" /> DM 智能解析</button>
                        <button onClick={() => { setUploadMode('manual'); setDraftData({ id: null, title: '', region: '', price: '', days: '', startDate: '', endDate: '', description: '', image: '' }); }} className={`flex-1 py-3.5 rounded-xl border-2 font-bold flex justify-center items-center transition-colors ${uploadMode === 'manual' ? 'border-blue-500 bg-blue-50 text-blue-700' : 'border-slate-200 text-slate-500'}`}><FileText className="mr-2 h-5 w-5" /> 人工填寫</button>
                      </div>
                    )}
                    {uploadMode === 'dm' && !draftData.id && (
                      <div className="mb-8 w-full max-w-4xl">
                        <div className="mt-1 flex justify-center px-6 pt-12 pb-16 border-2 border-slate-300 border-dashed rounded-2xl bg-slate-50 hover:bg-slate-100 transition relative">
                          <div className="space-y-2 text-center"><ImageIcon className="mx-auto h-20 w-20 text-slate-300 mb-4" /><label className="relative cursor-pointer bg-white rounded-lg font-bold text-blue-600 border shadow-sm px-4 py-2"><span>選擇 DM 圖片</span><input type="file" className="sr-only" accept="image/*" onChange={handleFileUpload} disabled={ocrStatus === 'processing'} /></label></div>
                          {ocrStatus === 'processing' && <div className="absolute inset-0 bg-white/95 rounded-2xl flex flex-col items-center justify-center z-10 backdrop-blur-sm"><RefreshCw className="h-12 w-12 text-blue-500 animate-spin mb-4" /><p className="text-blue-700 font-bold text-2xl">ChatGPT 解析中...</p></div>}
                        </div>
                      </div>
                    )}
                    {(uploadMode === 'manual' || ocrStatus === 'done' || draftData.title) && (
                      <div className="bg-slate-50/80 p-6 lg:p-8 rounded-2xl border border-slate-200 relative">
                        {draftData.id && <button onClick={() => { setDraftData({ id: null, title: '', region: '', price: '', days: '', startDate: '', endDate: '', description: '', image: '' }); setUploadMode('dm'); setOcrStatus('idle'); }} className="absolute top-6 right-6 text-slate-400 bg-white rounded-full p-1.5 border shadow-sm"><XIcon className="w-6 h-6" /></button>}
                        <div className="flex items-center mb-8"><h3 className="text-2xl font-bold">{draftData.id ? '✏️ 修改行程' : '📝 行程內容草稿'}</h3></div>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8 mb-8">
                          <div className="lg:col-span-2"><label className="block text-sm font-bold text-slate-700 mb-2">行程標題</label><input type="text" value={draftData.title} onChange={(e) => setDraftData({...draftData, title: e.target.value})} className="w-full rounded-xl border-slate-300 border p-3.5 focus:ring-blue-500 outline-none text-lg"/></div>
                          <div className="lg:col-span-1"><label className="block text-sm font-bold text-slate-700 mb-2">所屬地區</label><select value={draftData.region} onChange={(e) => setDraftData({...draftData, region: e.target.value})} className="w-full rounded-xl border-slate-300 border p-3.5 focus:ring-blue-500 bg-white outline-none text-lg"><option value="">請選擇</option><option value="國旅">國旅</option><option value="亞洲">亞洲</option><option value="歐洲">歐洲</option><option value="美洲">美洲</option><option value="大洋洲">大洋洲</option><option value="非洲">非洲</option></select></div>
                          <div className="lg:col-span-1"><label className="block text-sm font-bold text-slate-700 mb-2">價格 (TWD)</label><input type="number" value={draftData.price} onChange={(e) => setDraftData({...draftData, price: e.target.value})} className="w-full rounded-xl border-slate-300 border p-3.5 focus:ring-blue-500 outline-none text-lg"/></div>
                          
                          <div className="lg:col-span-1"><label className="block text-sm font-bold text-slate-700 mb-2">出發日期</label><input type="date" value={draftData.startDate} onChange={(e) => setDraftData({...draftData, startDate: e.target.value})} className="w-full rounded-xl border-slate-300 border p-3.5 focus:ring-blue-500 outline-none text-lg bg-white"/></div>
                          <div className="lg:col-span-1"><label className="block text-sm font-bold text-slate-700 mb-2">結束日期</label><input type="date" value={draftData.endDate} onChange={(e) => setDraftData({...draftData, endDate: e.target.value})} className="w-full rounded-xl border-slate-300 border p-3.5 focus:ring-blue-500 outline-none text-lg bg-white"/></div>
                          <div className="lg:col-span-2"><label className="block text-sm font-bold text-slate-700 mb-2">總天數</label><input type="number" value={draftData.days} onChange={(e) => setDraftData({...draftData, days: e.target.value})} className="w-full rounded-xl border-slate-300 border p-3.5 focus:ring-blue-500 outline-none text-lg" placeholder="例如：7"/></div>
                          
                          <div className="lg:col-span-4">
                            <label className="block text-sm font-bold text-slate-700 mb-2">圖片網址 或 上傳雲端圖片</label>
                            <div className="flex gap-4 items-center">
                              <input type="text" value={draftData.image || ''} onChange={(e) => setDraftData({...draftData, image: e.target.value})} className="flex-1 rounded-xl border-slate-300 border p-3.5 focus:ring-blue-500 outline-none font-mono text-base text-slate-600" placeholder="https://..." />
                              <label className={`cursor-pointer bg-blue-100 text-blue-700 px-4 py-3.5 rounded-xl font-bold hover:bg-blue-200 transition whitespace-nowrap ${isUploadingImage ? 'opacity-50 pointer-events-none' : ''}`}>
                                {isUploadingImage ? '上傳中...' : '☁️ 上傳圖片'}
                                <input type="file" className="hidden" accept="image/*" onChange={(e) => handleImageUploadToDrive(e, 'itinerary')} disabled={isUploadingImage} />
                              </label>
                              {draftData.image && <img src={draftData.image} className="w-16 h-16 rounded-xl object-cover border flex-shrink-0" />}
                            </div>
                          </div>
                        </div>
                        <div><label className="block text-sm font-bold text-slate-700 mb-2">詳細行程文案</label><textarea rows={6} value={draftData.description} onChange={(e) => setDraftData({...draftData, description: e.target.value})} className="w-full rounded-xl border-slate-300 border p-5 focus:ring-blue-500 outline-none text-lg leading-relaxed"/></div>
                      </div>
                    )}
                  </div>

                  <div className="bg-white rounded-2xl shadow-md p-6 lg:p-8 border border-slate-100 mt-6">
                    <div className="flex justify-between items-center mb-6 border-b pb-4"><h3 className="text-2xl font-bold flex items-center"><FileText className="w-6 h-6 mr-2" /> 現有行程管理</h3></div>
                    <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4 gap-6 max-h-[800px] overflow-y-auto pr-2 pb-2">
                      {itineraries.map(item => (
                        <div key={item.id} className="flex flex-col p-5 bg-white rounded-2xl border border-slate-200 shadow-sm h-full">
                          <div className="flex gap-5 mb-5"><img src={item.image || 'https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?auto=format&fit=crop&w=800&q=80'} className="w-28 h-28 rounded-xl object-cover border" /><div className="flex-1"><span className="bg-slate-200 px-2 py-0.5 rounded text-xs font-bold">{item.region}</span><h4 className="font-bold text-lg line-clamp-2 mt-1">{item.title}</h4><div className="mt-3"><span className="font-extrabold text-red-500 text-xl">${Number(item.price).toLocaleString()}</span><span className="text-sm ml-1">• {item.days}天</span></div></div></div>
                          <div className="flex space-x-3 justify-end mt-auto border-t border-slate-100 pt-4">
                            <button onClick={() => handleEditClick(item)} className="flex-1 py-2 bg-white border rounded-xl text-sm font-bold shadow-sm">編輯</button>
                            <button onClick={() => setDeleteModalId(item.id)} className="flex-1 py-2 bg-white border border-red-200 text-red-600 rounded-xl text-sm font-bold shadow-sm">下架</button>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              ) : <AdminDeniedScreen />
            )}
          </main>

          {/* 發送推廣 Modal */}
          {isPromoModalOpen && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 animate-fade-in">
              <div className="bg-white rounded-[2rem] overflow-hidden max-w-5xl w-full flex flex-col md:flex-row shadow-2xl relative animate-fade-in-up h-[90vh]">
                <button onClick={() => setIsPromoModalOpen(false)} className="absolute top-4 right-4 z-10 bg-slate-100 hover:bg-slate-200 text-slate-500 rounded-full p-2 transition"><XIcon className="w-6 h-6"/></button>
                
                {/* 左側設定區 */}
                <div className="w-full md:w-1/2 p-8 flex flex-col justify-between h-full overflow-y-auto">
                  <div>
                    <h3 className="text-2xl font-black text-slate-800 mb-2">準備發送名片</h3>
                    <p className="text-slate-500 mb-8">勾選想包含在訊息中的聯絡按鈕。</p>
                    <div className="space-y-4">
                      {/* 按鈕選項動態渲染 */}
                      {[
                        { key: 'phone', label: '📞 聯絡電話', condition: myDistributorData?.phone || isAdmin },
                        { key: 'line', label: '💬 私訊 LINE', condition: myDistributorData?.lineLink || isAdmin },
                        { key: 'lineAt', label: '🟢 官方 LINE@', condition: myDistributorData?.lineAtLink || isAdmin },
                        { key: 'fb', label: '👍 FB 粉絲專頁', condition: myDistributorData?.fbLink || isAdmin },
                        { key: 'web', label: '🌐 官方網站', condition: myDistributorData?.webLink || isAdmin },
                        { key: 'map', label: '📍 門市導航', condition: myDistributorData?.mapLink || isAdmin }
                      ].map(opt => (
                        <label key={opt.key} className={`flex items-center p-4 border-2 rounded-2xl cursor-pointer transition ${!opt.condition ? 'opacity-40 bg-slate-50 cursor-not-allowed' : 'hover:bg-slate-50 border-slate-100'}`}>
                          <input type="checkbox" className="mr-4 w-5 h-5 accent-emerald-500" disabled={!opt.condition} checked={cardOptions[opt.key]} onChange={e => setCardOptions({...cardOptions, [opt.key]: e.target.checked})} />
                          <span className="font-bold text-slate-700">{opt.label}</span>
                          {!opt.condition && <span className="ml-auto text-[10px] text-red-400 font-bold">請先補全資料</span>}
                        </label>
                      ))}
                    </div>
                  </div>
                  <div className="mt-8 space-y-3">
                    <button onClick={shareFlex} className="w-full bg-[#00B900] text-white py-4 rounded-2xl font-black text-lg shadow-lg transition active:scale-95">🚀 立即分享給 LINE 好友</button>
                    <p className="text-center text-[10px] text-slate-400">訊息將包含您的專屬追蹤連結，業績將歸屬至您的帳號。</p>
                  </div>
                </div>

                {/* 右側預覽區 */}
                <div className="w-full md:w-1/2 line-chat-bg p-8 flex flex-col items-center justify-center border-l border-slate-200">
                  <p className="text-white/70 text-xs font-black mb-6 tracking-widest uppercase bg-black/20 px-4 py-1 rounded-full">LINE 預覽效果</p>
                  
                  <div className="w-full flex gap-3 overflow-x-auto pb-4 custom-scrollbar snap-x">
                    {promoMode === 'multi' ? (
                       <div className="min-w-[280px] w-full bg-white rounded-2xl overflow-hidden shadow-xl snap-center border border-slate-200 p-4">
                         <h4 className="font-bold text-lg mb-4">📋 精選行程推薦</h4>
                         <div className="space-y-4">
                           {Array.from(selectedIds).map(id => {
                             const tour = itineraries.find(i => String(i.id) === id);
                             if (!tour) return null;
                             return (
                               <div key={id} className="flex gap-3 items-center">
                                 <img src={tour.image} className="w-16 h-16 rounded-lg object-cover" />
                                 <div className="flex-1">
                                    <p className="font-bold text-xs line-clamp-2">{tour.title}</p>
                                    <p className="text-red-600 font-black text-xs mt-1">${Number(tour.price).toLocaleString()}</p>
                                 </div>
                               </div>
                             );
                           })}
                         </div>
                       </div>
                    ) : (
                      Array.from(selectedIds).map(id => {
                        const tour = itineraries.find(i => String(i.id) === id);
                        if (!tour) return null;
                        return (
                          <div key={id} className="min-w-[260px] bg-white rounded-2xl overflow-hidden shadow-xl snap-center border border-slate-200">
                            <img src={tour.image} className="aspect-[20/13] w-full object-cover" />
                            <div className="p-4">
                              <h4 className="font-bold text-sm text-slate-800 line-clamp-2 h-10">{tour.title}</h4>
                              <p className="text-red-600 font-black text-lg mt-2">${Number(tour.price).toLocaleString()}</p>
                              <div className="bg-emerald-500 text-white text-center py-2.5 rounded-xl font-bold text-xs mt-4">查看行程 / 立即報名</div>
                              <div className="bg-rose-500 text-white text-center py-2.5 rounded-xl font-bold text-xs mt-2">分享行程給好友</div>
                              {cardOptions.phone && <div className="bg-slate-100 text-slate-700 text-center py-2 rounded-xl font-bold text-xs mt-2">📞 聯絡電話</div>}
                              {cardOptions.line && <div className="bg-slate-100 text-slate-700 text-center py-2 rounded-xl font-bold text-xs mt-2">💬 私訊 LINE</div>}
                            </div>
                          </div>
                        );
                      })
                    )}
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* 刪除確認 Modal */}
          {deleteModalId && (
            <div className="fixed inset-0 z-[120] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4">
              <div className="bg-white rounded-2xl p-8 max-w-md w-full shadow-2xl animate-fade-in-up">
                <div className="flex items-center text-red-600 mb-5"><AlertCircle className="w-8 h-8 mr-3" /><h3 className="text-2xl font-bold">確認下架此行程？</h3></div>
                <p className="text-slate-600 mb-8 text-lg leading-relaxed">下架後該行程將從前台及資料庫移除，確定要繼續嗎？</p>
                <div className="flex justify-end space-x-4">
                  <button onClick={() => setDeleteModalId(null)} className="px-6 py-2.5 rounded-xl font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 text-lg">取消</button>
                  <button onClick={confirmDelete} className="px-6 py-2.5 rounded-xl font-bold text-white bg-red-600 hover:bg-red-700 text-lg">確定下架</button>
                </div>
              </div>
            </div>
          )}

          {/* Toast */}
          {toast && (
            <div className="fixed bottom-24 left-1/2 -translate-x-1/2 z-[200] bg-slate-900/90 backdrop-blur text-white px-8 py-4 rounded-2xl font-black shadow-2xl animate-fade-in-up">
              {toast.message}
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
