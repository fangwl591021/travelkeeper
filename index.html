<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅遊管家 - 智慧旅遊平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
    body { font-family: 'Noto Sans TC', sans-serif; background: #f8fafc; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    .blog-content h3 { font-size: 1.5rem; font-weight: 900; margin-top: 2.5rem; border-left: 5px solid #2563eb; padding-left: 12px; }
    .blog-content img { width: 100%; border-radius: 20px; margin: 1.5rem 0; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
    .blog-content p { font-size: 1.05rem; line-height: 1.85; color: #4b5563; margin-bottom: 1.5rem; white-space: pre-wrap; }
    .tour-card-selectable { border: 2.5px solid #f1f5f9; transition: all 0.2s; position: relative; cursor: pointer; }
    .tour-card-selectable.selected { border-color: #10b981; background: #f0fdf4; }
  </style>
</head>
<body class="text-gray-800">
  <div id="root"></div>

  <script type="text/babel" data-presets="react,env">
    const { useState, useEffect } = React;

    const Icon = ({ name, className = "w-6 h-6" }) => {
      const icons = {
        home: <><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></>,
        user: <><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></>,
        briefcase: <><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></>,
        arrowLeft: <><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></>,
        share: <><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></>,
        check: <><polyline points="20 6 9 17 4 12"/></>
      };
      return <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>{icons[name]}</svg>;
    };

    const WORKER_URL = 'https://travelkeeper.fangwl591021.workers.dev';

    function App() {
      const urlParams = new URLSearchParams(window.location.search);
      const agencySlug = urlParams.get('a') || 'demo';
      const refUid = urlParams.get('r') || ''; // 獲取推薦人 UID (分銷用)
      
      const [tenant, setTenant] = useState(null);
      const [itineraries, setItineraries] = useState([]);
      const [activeTab, setActiveTab] = useState('home');
      const [selectedTour, setSelectedTour] = useState(null);
      const [isLoading, setIsLoading] = useState(true);
      const [liffProfile, setLiffProfile] = useState(null);
      const [myStatus, setMyStatus] = useState({ role: 'guest' });
      const [selectedIds, setSelectedIds] = useState([]);

      // 註冊表單狀態
      const [regForm, setRegForm] = useState({ name: '', phone: '', company_name: '', tax_id: '' });
      const [regLoading, setRegLoading] = useState(false);

      useEffect(() => {
        const init = async () => {
          try {
            const configRes = await fetch(`${WORKER_URL}/api/config?a=${agencySlug}`);
            const configData = await configRes.json();
            if (configData.success) {
              setTenant(configData.data);
              await liff.init({ liffId: configData.data.liff_id });
              if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                setLiffProfile(profile);
                setRegForm(p => ({ ...p, name: profile.displayName }));
                const statusRes = await fetch(`${WORKER_URL}/api/itineraries?action=checkUserStatus&uid=${profile.userId}&a=${agencySlug}`);
                const statusData = await statusRes.json();
                if (statusData.success) setMyStatus(statusData.data);
              } else { liff.login(); }
              fetchTours();
            }
          } catch (e) { console.error(e); } finally { setIsLoading(false); }
        };
        init();
      }, [agencySlug]);

      const fetchTours = async () => {
        const res = await fetch(`${WORKER_URL}/api/itineraries?a=${agencySlug}`);
        const data = await res.json();
        setItineraries(Array.isArray(data) ? data : []);
      };

      const handleRegisterPartner = async (e) => {
        e.preventDefault();
        setRegLoading(true);
        try {
          const res = await fetch(`${WORKER_URL}/api/partner/register?a=${agencySlug}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ...regForm, uid: liffProfile.userId, ref_uid: refUid })
          });
          const result = await res.json();
          if (result.success) { alert('申請已送出，請等待管理員審核。'); window.location.reload(); }
          else { alert(result.error); }
        } catch (e) { alert('連線失敗'); }
        setRegLoading(false);
      };

      const handleShareFlex = async () => {
        const items = itineraries.filter(it => selectedIds.includes(it.id));
        const bubble = (tour) => ({
          "type": "bubble",
          "hero": { "type": "image", "url": tour.image, "size": "full", "aspectRatio": "20:13", "aspectMode": "cover" },
          "body": { "type": "box", "layout": "vertical", "contents": [
            { "type": "text", "text": tour.title, "weight": "bold", "size": "xl", "wrap": true },
            { "type": "text", "text": `NT$ ${Number(tour.price).toLocaleString()}`, "color": "#b82337", "weight": "bold", "size": "lg", "margin": "md" }
          ]},
          "footer": { "type": "box", "layout": "vertical", "contents": [
            { "type": "button", "style": "primary", "color": "#00B900", "action": { "type": "uri", "label": "查看行程", "uri": `https://fangwl591021.github.io/travelkeeper/index.html?a=${agencySlug}&t=${tour.id}&r=${liffProfile.userId}` } }
          ]}
        });
        const flexContent = items.length === 1 ? bubble(items[0]) : { "type": "carousel", "contents": items.map(bubble) };
        try { await liff.shareTargetPicker([{ "type": "flex", "altText": `精選行程推薦`, "contents": flexContent }]); setSelectedIds([]); } catch (e) {}
      };

      if (isLoading) return <div className="h-screen flex items-center justify-center">Loading...</div>;

      const renderContent = () => {
        if (selectedTour) return (
          <div className="animate-fade-in bg-white min-h-screen pb-20">
            <div className="relative h-[40vh]"><img src={selectedTour.image} className="w-full h-full object-cover" /><button onClick={()=>setSelectedTour(null)} className="absolute top-6 left-6 bg-black/40 text-white p-3 rounded-full backdrop-blur-md"><Icon name="arrowLeft"/></button></div>
            <div className="p-8 max-w-2xl mx-auto">
              <span className="bg-blue-100 text-blue-700 px-4 py-1 rounded-full text-xs font-black mb-4 inline-block">{selectedTour.region}</span>
              <h1 className="text-4xl font-black mb-8 leading-tight">{selectedTour.title}</h1>
              <div className="blog-content">
                {(selectedTour.description || '').split('\n').map((line, i) => {
                  if (line.trim().startsWith('###')) return <h3 key={i}>{line.replace('###','').trim()}</h3>;
                  if (line.includes('![Image](')) { const m = line.match(/\!\[.*?\]\((.*?)\)/); return m ? <img key={i} src={m[1]} /> : null; }
                  return line.trim() ? <p key={i}>{line}</p> : null;
                })}
              </div>
              <button className="fixed bottom-6 left-6 right-6 bg-[#b82337] text-white py-5 rounded-2xl font-black text-xl shadow-2xl z-50">立即報名參團</button>
            </div>
          </div>
        );

        switch (activeTab) {
          case 'home':
            return (
              <div className="animate-fade-in p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 max-w-6xl mx-auto">
                {itineraries.map(it => (
                  <div key={it.id} onClick={()=>setSelectedTour(it)} className="bg-white rounded-3xl overflow-hidden border hover:shadow-xl transition-all cursor-pointer">
                    <div className="h-56 overflow-hidden"><img src={it.image} className="w-full h-full object-cover" /></div>
                    <div className="p-5"><h4 className="font-black text-lg mb-4 line-clamp-2">{it.title}</h4><div className="flex justify-between items-center pt-2 border-t"><span className="text-xs text-gray-400 font-bold">{it.days} 天</span><span className="text-red-600 font-black text-2xl">${Number(it.price).toLocaleString()}</span></div></div>
                  </div>
                ))}
              </div>
            );
          case 'dist':
            // 審核狀態判斷
            if (!myStatus.distributorData || myStatus.distributorData.status === 'rejected') {
              return (
                <div className="p-8 max-w-md mx-auto animate-fade-in">
                  <div className="text-center mb-10">
                    <div className="bg-emerald-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6"><Icon name="briefcase" className="w-10 h-10 text-emerald-600" /></div>
                    <h2 className="text-3xl font-black mb-2">經銷夥伴申請</h2>
                    <p className="text-slate-400 font-medium">申請通過後即可獲得專屬推薦連結</p>
                  </div>
                  <form onSubmit={handleRegisterPartner} className="space-y-5">
                    <div><label className="text-xs font-black text-slate-400 uppercase ml-2">真實姓名</label><input required className="w-full bg-white border p-4 rounded-2xl font-bold" value={regForm.name} onChange={e=>setRegForm({...regForm, name:e.target.value})} /></div>
                    <div><label className="text-xs font-black text-slate-400 uppercase ml-2">聯絡電話</label><input required className="w-full bg-white border p-4 rounded-2xl font-bold" value={regForm.phone} onChange={e=>setRegForm({...regForm, phone:e.target.value})} /></div>
                    <div><label className="text-xs font-black text-slate-400 uppercase ml-2">公司名稱 (選填)</label><input className="w-full bg-white border p-4 rounded-2xl font-bold" value={regForm.company_name} onChange={e=>setRegForm({...regForm, company_name:e.target.value})} /></div>
                    {refUid && <div className="bg-blue-50 p-4 rounded-2xl text-blue-600 text-xs font-bold">推薦人 UID: {refUid}</div>}
                    <button disabled={regLoading} className="w-full bg-emerald-600 text-white py-5 rounded-2xl font-black text-xl shadow-lg">提交申請</button>
                  </form>
                </div>
              );
            }
            if (myStatus.distributorData.status === 'pending') {
              return (
                <div className="p-20 text-center animate-fade-in">
                  <div className="text-6xl mb-6">⏳</div>
                  <h3 className="text-2xl font-black mb-4">審核中</h3>
                  <p className="text-slate-400">管理員正在審核您的申請，請稍後再試。</p>
                </div>
              );
            }
            // 已通過：顯示推廣工具
            return (
              <div className="p-6 max-w-6xl mx-auto pb-40 animate-fade-in">
                <div className="flex justify-between items-end mb-8">
                  <div><h2 className="text-3xl font-black">夥伴工具箱</h2><p className="text-slate-400 text-sm font-bold">勾選下方行程，一次分享至 LINE 群組</p></div>
                  <div className="bg-emerald-100 text-emerald-700 px-4 py-1 rounded-full font-black text-xs">已選 {selectedIds.length}</div>
                </div>
                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                  {itineraries.map(it => (
                    <div key={it.id} onClick={() => selectedIds.includes(it.id) ? setSelectedIds(selectedIds.filter(id=>id!==it.id)) : setSelectedIds([...selectedIds, it.id])} 
                      className={`tour-card-selectable rounded-3xl overflow-hidden bg-white shadow-sm ${selectedIds.includes(it.id) ? 'selected' : ''}`}>
                      <div className="h-32 overflow-hidden"><img src={it.image} className="w-full h-full object-cover" /></div>
                      <div className="p-3"><p className="text-xs font-black line-clamp-2">{it.title}</p></div>
                      {selectedIds.includes(it.id) && <div className="absolute top-2 right-2 bg-emerald-500 text-white p-1 rounded-full"><Icon name="check" className="w-4 h-4" /></div>}
                    </div>
                  ))}
                </div>
                <button onClick={handleShareFlex} disabled={selectedIds.length===0} className={`fixed bottom-24 right-6 left-6 py-5 rounded-2xl shadow-2xl flex items-center justify-center gap-3 transition-all ${selectedIds.length > 0 ? 'bg-[#00B900] text-white' : 'bg-slate-200 text-slate-400'}`}>
                  <Icon name="share" /><span className="font-black text-lg">產生推廣卡片並分享</span>
                </button>
              </div>
            );
          case 'member':
            return (
              <div className="p-10 text-center animate-fade-in">
                <img src={liffProfile?.pictureUrl} className="w-24 h-24 rounded-full mx-auto mb-6 border-4 border-white shadow-lg" />
                <h3 className="text-2xl font-black mb-2">{liffProfile?.displayName}</h3>
                <p className="text-indigo-600 font-black text-xs uppercase tracking-widest">{myStatus.role === 'distributor' ? (myStatus.distributorData.status === 'active' ? '專業經銷商' : '申請待審核') : '一般會員'}</p>
                {myStatus.distributorData?.referred_by && <p className="mt-4 text-[10px] text-slate-400">所屬上級 UID: {myStatus.distributorData.referred_by}</p>}
              </div>
            );
          default: return null;
        }
      };

      return (
        <div className="min-h-screen flex flex-col">
          <nav className="bg-white/80 backdrop-blur-md sticky top-0 z-50 px-6 py-4 flex justify-between items-center border-b">
            <div className="flex items-center gap-2 cursor-pointer" onClick={()=>{setActiveTab('home');setSelectedTour(null);}}>
              <div className="bg-blue-600 p-1.5 rounded-lg text-white font-black text-xs shadow-lg">TK</div>
              <span className="font-black text-xl tracking-tighter text-blue-900">{tenant?.name}</span>
            </div>
          </nav>
          <main className="flex-grow">{renderContent()}</main>
          <footer className="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-lg border-t px-6 py-3 flex justify-around items-center md:hidden shadow-lg z-50">
            <button onClick={()=>{setActiveTab('home');setSelectedTour(null);}} className={`flex flex-col items-center gap-1 ${activeTab==='home'&&!selectedTour?'text-blue-600':'text-slate-400'}`}><Icon name="home" /><span className="text-[10px] font-black uppercase">Home</span></button>
            <button onClick={()=>{setActiveTab('dist');setSelectedTour(null);}} className={`flex flex-col items-center gap-1 ${activeTab==='dist'&&!selectedTour?'text-emerald-600':'text-slate-400'}`}><Icon name="briefcase" /><span className="text-[10px] font-black uppercase">Partner</span></button>
            <button onClick={()=>{setActiveTab('member');setSelectedTour(null);}} className={`flex flex-col items-center gap-1 ${activeTab==='member'&&!selectedTour?'text-blue-600':'text-slate-400'}`}><Icon name="user" /><span className="text-[10px] font-black uppercase">Me</span></button>
          </footer>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
