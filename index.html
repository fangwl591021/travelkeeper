<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅遊管家 - 智能管理與推廣系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Noto Sans TC', sans-serif; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in-up { animation: fadeInUp 0.3s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .line-chat-bg { background-color: #749cbd; }
    .tour-card { transition: all .2s; cursor: pointer; border: 2px solid transparent; }
    .tour-card.selected { border-color: #10b981; background-color: #f0fdf4; }
  </style>
</head>
<body class="bg-gray-50 text-slate-800">
  <div id="root"></div>

  <script type="text/babel" data-presets="react,env">
    const { useState, useEffect, useMemo } = React;

    // --- 圖示組件 ---
    const IconWrapper = ({ children, className = "w-6 h-6" }) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>);
    const Navigation = ({ className }) => <IconWrapper className={className}><polygon points="3 11 22 2 13 21 11 13 3 11"/></IconWrapper>;
    const SearchIcon = ({ className }) => <IconWrapper className={className}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></IconWrapper>;
    const MapPin = ({ className }) => <IconWrapper className={className}><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></IconWrapper>;
    const Calendar = ({ className }) => <IconWrapper className={className}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></IconWrapper>;
    const RefreshCw = ({ className }) => <IconWrapper className={className}><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></IconWrapper>;
    const Share2 = ({ className }) => <IconWrapper className={className}><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></IconWrapper>;
    const Briefcase = ({ className }) => <IconWrapper className={className}><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></IconWrapper>;
    const Users = ({ className }) => <IconWrapper className={className}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></IconWrapper>;
    const XIcon = ({ className }) => <IconWrapper className={className}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></IconWrapper>;

    // --- 配置 ---
    const WORKER_URL = 'https://travelkeeper.fangwl591021.workers.dev';
    const LIFF_ID = '2009367829-BDZCGti8'; 
    const ENDPOINT_URL = 'https://fangwl591021.github.io/travelkeeper/';
    const ADMIN_UIDS = [
      "Uf729764dbb5b652a5a90a467320bea29",
      "U58eb5c1a747450140ce1335af709ae55"
    ];

    function App() {
      const urlParams = new URLSearchParams(window.location.search);
      const [activeTab, setActiveTab] = useState(urlParams.get('tab') || 'home'); 
      const [itineraries, setItineraries] = useState([]);
      const [liffProfile, setLiffProfile] = useState(null);
      const [distributorStatus, setDistributorStatus] = useState(null); 
      const [isAdmin, setIsAdmin] = useState(false);
      const [myDistributorData, setMyDistributorData] = useState(null);
      const [isLoading, setIsLoading] = useState(true);
      const [toast, setToast] = useState(null);

      // 推廣工具專用狀態
      const [promoMode, setPromoMode] = useState('single'); // single, carousel, multi
      const [selectedIds, setSelectedIds] = useState(new Set());
      const [searchKeyword, setSearchKeyword] = useState('');
      const [isPromoModalOpen, setIsPromoModalOpen] = useState(false);
      const [cardOptions, setCardOptions] = useState({ phone: true, line: true });

      useEffect(() => {
        initLiff();
        fetchItineraries();
      }, []);

      const showToast = (message, type = 'success') => { setToast({ message, type }); setTimeout(() => setToast(null), 3000); };

      const initLiff = async () => {
        try {
          await liff.init({ liffId: LIFF_ID });
          if (!liff.isLoggedIn()) {
            liff.login({ redirectUri: window.location.href });
          } else {
            const profile = await liff.getProfile();
            setLiffProfile(profile);
            const isUserAdmin = ADMIN_UIDS.includes(profile.userId);
            setIsAdmin(isUserAdmin);
            checkMyStatus(profile.userId, isUserAdmin);
          }
        } catch (err) { console.error('LIFF 初始化失敗', err); }
      };

      const checkMyStatus = async (uid, isUserAdmin) => {
        try {
          const res = await fetch(`${WORKER_URL}/api/itineraries`, { 
            method: 'POST', 
            headers: { 'Content-Type': 'application/json' }, 
            body: JSON.stringify({ action: 'checkUserStatus', uid: uid }) 
          });
          const result = await res.json();
          if (result.success) {
            const info = result.data;
            if (isUserAdmin || info.isAdmin) setIsAdmin(true);
            if (info.role === 'distributor') {
              setDistributorStatus(info.status ? String(info.status).trim().toLowerCase() : 'pending');
              setMyDistributorData(info.distributorData);
            }
          }
        } catch (e) { console.error('API 連線失敗', e); }
        finally { setIsLoading(false); }
      };

      const fetchItineraries = async () => {
        try {
          const res = await fetch(`${WORKER_URL}/api/itineraries`);
          const data = await res.json();
          if (Array.isArray(data)) setItineraries(data);
        } catch (e) { console.error('獲取行程失敗', e); }
      };

      const changeTab = (tab) => {
        setActiveTab(tab);
        window.history.replaceState({}, '', `?tab=${tab}`);
      };

      const handleCardClick = (id) => {
        const sid = String(id);
        if (promoMode === 'single') {
          setSelectedIds(new Set([sid]));
          setIsPromoModalOpen(true);
        } else {
          const newSet = new Set(selectedIds);
          if (newSet.has(sid)) newSet.delete(sid);
          else if (newSet.size < 8) newSet.add(sid);
          else showToast('上限為 8 個行程');
          setSelectedIds(newSet);
        }
      };

      const filteredItineraries = useMemo(() => {
        return itineraries.filter(i => i.title.toLowerCase().includes(searchKeyword.toLowerCase()));
      }, [itineraries, searchKeyword]);

      // --- Flex Message 邏輯 ---
      const buildFinalFlex = () => {
        const items = Array.from(selectedIds).map(id => itineraries.find(i => String(i.id) === id)).filter(Boolean);
        if (items.length === 0) return null;

        const uid = liffProfile?.userId || 'GUEST';

        if (promoMode === 'single' || promoMode === 'carousel') {
          const bubbles = items.map(tour => ({
            type: 'bubble', size: 'mega',
            hero: { type: 'image', url: tour.image, size: 'full', aspectRatio: '20:13', aspectMode: 'cover' },
            body: { type: 'box', layout: 'vertical', contents: [
              { type: 'text', text: tour.title, weight: 'bold', size: 'xl', wrap: true },
              { type: 'text', text: `TWD ${Number(tour.price).toLocaleString()}`, color: '#b82337', weight: 'bold', size: 'lg', margin: 'md' }
            ]},
            footer: { type: 'box', layout: 'vertical', spacing: 'sm', contents: [
              { type: 'button', style: 'primary', color: '#00B900', action: { type: 'uri', label: '查看行程 / 立即報名', uri: `${ENDPOINT_URL}index.html?t=${tour.id}&r=${uid}` } }
            ]}
          }));
          return { type: 'flex', altText: `推薦行程：${items[0].title}`, contents: (items.length > 1) ? { type: 'carousel', contents: bubbles } : bubbles[0] };
        }
        
        // 列表模式 (Multi-page list)
        return {
          type: 'flex', altText: `精選行程列表`,
          contents: {
            type: 'bubble',
            body: { type: 'box', layout: 'vertical', contents: [
              { type: 'text', text: '📋 精選行程推薦', weight: 'bold', size: 'xl', margin: 'md' },
              { type: 'separator', margin: 'lg' },
              ...items.map(tour => ({
                type: 'box', layout: 'horizontal', margin: 'lg', spacing: 'md',
                contents: [
                  { type: 'image', url: tour.image, size: 'sm', flex: 1, aspectMode: 'cover', cornerRadius: 'md' },
                  { type: 'box', layout: 'vertical', flex: 3, contents: [
                    { type: 'text', text: tour.title, size: 'sm', weight: 'bold', wrap: true },
                    { type: 'text', text: `$${Number(tour.price).toLocaleString()}`, size: 'xs', color: '#b82337', weight: 'bold' }
                  ], action: { type: 'uri', uri: `${ENDPOINT_URL}index.html?t=${tour.id}&r=${uid}` } }
                ]
              }))
            ]}
          }
        };
      };

      const shareFlex = async () => {
        const flex = buildFinalFlex();
        if (!flex) return;
        try {
          const res = await liff.shareTargetPicker([flex]);
          if (res) {
            showToast('✅ 發送成功！');
            setIsPromoModalOpen(false);
            setSelectedIds(new Set());
          }
        } catch(e) { showToast('發送取消或失敗', 'error'); }
      };

      return (
        <div className="min-h-screen flex flex-col pb-20">
          {/* 導航列 */}
          <nav className="bg-white shadow-sm h-16 sticky top-0 z-50 flex items-center px-4 justify-between border-b">
            <div className="flex items-center cursor-pointer" onClick={() => changeTab('home')}>
              <Navigation className="w-7 h-7 text-blue-600 mr-2" />
              <span className="font-black text-xl text-slate-800">旅遊管家</span>
            </div>
            <div className="flex items-center space-x-2">
              <button onClick={() => changeTab('home')} className={`px-3 py-1.5 rounded-lg text-sm font-bold transition ${activeTab === 'home' ? 'bg-blue-50 text-blue-700' : 'text-slate-500'}`}>找行程</button>
              <button onClick={() => changeTab('distributor')} className={`px-3 py-1.5 rounded-lg text-sm font-bold transition ${activeTab === 'distributor' ? 'bg-emerald-50 text-emerald-700' : 'text-slate-500'}`}>經銷工具</button>
              {isAdmin && (
                <>
                  <button onClick={() => changeTab('crm')} className={`px-3 py-1.5 rounded-lg text-sm font-bold transition ${activeTab === 'crm' ? 'bg-purple-50 text-purple-700' : 'text-slate-500'}`}>CRM</button>
                  <button onClick={() => changeTab('admin')} className={`px-3 py-1.5 rounded-lg text-sm font-bold transition ${activeTab === 'admin' ? 'bg-amber-50 text-amber-700' : 'text-slate-500'}`}>上稿</button>
                </>
              )}
              {liffProfile && <img src={liffProfile.pictureUrl} className="w-8 h-8 rounded-full border ml-2" />}
            </div>
          </nav>

          <main className="flex-grow max-w-7xl mx-auto w-full p-4">
            {/* ====== Tab: Home (找行程) ====== */}
            {activeTab === 'home' && (
              <div className="animate-fade-in">
                <div className="mb-6 h-48 rounded-2xl overflow-hidden relative shadow-md">
                  <img src="https://images.unsplash.com/photo-1436491865332-7a61a109cc05?auto=format&fit=crop&w=1200" className="w-full h-full object-cover" />
                  <div className="absolute inset-0 bg-black/40 flex flex-col items-center justify-center text-white">
                    <h2 className="text-3xl font-black">探索您的夢想旅程</h2>
                  </div>
                </div>
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                  {itineraries.map(item => (
                    <div key={item.id} className="bg-white rounded-xl shadow-sm border overflow-hidden">
                      <img src={item.image} className="w-full h-44 object-cover" />
                      <div className="p-4">
                        <span className="text-[10px] font-bold bg-blue-100 text-blue-700 px-2 py-0.5 rounded uppercase">{item.region}</span>
                        <h3 className="font-bold text-slate-800 mt-2 line-clamp-2 h-12">{item.title}</h3>
                        <div className="mt-4 flex justify-between items-baseline">
                          <span className="text-slate-400 text-xs">{item.days} 天</span>
                          <span className="text-xl font-black text-red-500">${Number(item.price).toLocaleString()}</span>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* ====== Tab: Distributor (經銷工具箱) ====== */}
            {activeTab === 'distributor' && (
              <div className="animate-fade-in">
                {(distributorStatus === 'approved' || isAdmin) ? (
                  <div>
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                      <div>
                        <h2 className="text-2xl font-black text-slate-800">推廣工具箱</h2>
                        <p className="text-slate-500 text-sm">選擇行程並產生專屬名片。</p>
                      </div>
                      <div className="flex bg-slate-200 p-1 rounded-xl text-xs font-bold w-full md:w-auto">
                        <button onClick={() => {setPromoMode('single'); setSelectedIds(new Set());}} className={`flex-1 px-4 py-2 rounded-lg transition ${promoMode === 'single' ? 'bg-white shadow text-slate-800' : 'text-slate-500'}`}>單張名片</button>
                        <button onClick={() => {setPromoMode('carousel'); setSelectedIds(new Set());}} className={`flex-1 px-4 py-2 rounded-lg transition ${promoMode === 'carousel' ? 'bg-white shadow text-slate-800' : 'text-slate-500'}`}>橫向輪播</button>
                        <button onClick={() => {setPromoMode('multi'); setSelectedIds(new Set());}} className={`flex-1 px-4 py-2 rounded-lg transition ${promoMode === 'multi' ? 'bg-white shadow text-slate-800' : 'text-slate-500'}`}>列表多頁</button>
                      </div>
                    </div>

                    <div className="relative mb-6">
                      <SearchIcon className="absolute left-3 top-3 w-5 h-5 text-slate-400" />
                      <input type="text" placeholder="搜尋行程標題..." value={searchKeyword} onChange={e => setSearchKeyword(e.target.value)} className="w-full pl-10 pr-4 py-2.5 rounded-xl border border-slate-200 outline-none focus:border-emerald-500 transition shadow-sm" />
                    </div>

                    <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
                      {filteredItineraries.map(item => {
                        const isSel = selectedIds.has(String(item.id));
                        return (
                          <div key={item.id} className={`tour-card bg-white rounded-xl shadow-sm border-2 overflow-hidden ${isSel ? 'border-emerald-500 bg-emerald-50' : 'border-slate-100'}`} onClick={() => handleCardClick(item.id)}>
                            <div className="h-32 relative">
                              {promoMode !== 'single' && (
                                <div className={`absolute top-2 left-2 w-6 h-6 rounded-full border-2 flex items-center justify-center ${isSel ? 'bg-emerald-500 border-emerald-500' : 'bg-white/50 border-white'}`}>
                                  {isSel && <div className="w-2 h-2 bg-white rounded-full"></div>}
                                </div>
                              )}
                              <img src={item.image} className="w-full h-full object-cover" />
                            </div>
                            <div className="p-3">
                              <h4 className="font-bold text-xs text-slate-800 line-clamp-2 h-8">{item.title}</h4>
                              <p className="text-red-600 font-black text-xs mt-2 text-right">${Number(item.price).toLocaleString()}</p>
                            </div>
                          </div>
                        );
                      })}
                    </div>

                    {promoMode !== 'single' && selectedIds.size > 0 && (
                      <div className="fixed bottom-0 left-0 right-0 bg-slate-900 text-white p-4 z-[60] anim-fade-up">
                        <div className="max-w-7xl mx-auto flex justify-between items-center px-4">
                          <span className="font-bold text-emerald-400">已選 {selectedIds.size} 個行程 (上限 8)</span>
                          <div className="flex gap-2">
                            <button onClick={() => setSelectedIds(new Set())} className="px-4 py-2 text-sm font-bold text-slate-400">清除</button>
                            <button onClick={() => setIsPromoModalOpen(true)} className="bg-emerald-500 px-6 py-2 rounded-xl font-bold text-sm shadow-lg">準備發送 🚀</button>
                          </div>
                        </div>
                      </div>
                    )}
                  </div>
                ) : <AdminDeniedScreen />}
              </div>
            )}

            {/* ====== Tab: CRM (經銷管理) ====== */}
            {activeTab === 'crm' && (
              isAdmin ? <div className="text-center py-20 bg-white rounded-2xl border border-dashed border-slate-300">
                <Users className="w-16 h-16 text-slate-300 mx-auto mb-4" />
                <h3 className="text-xl font-bold text-slate-700">CRM 管理模組正在連接...</h3>
                <p className="text-slate-500 mt-2">請聯繫系統維護人員開通完整權限或稍後再試。</p>
              </div> : <AdminDeniedScreen />
            )}

            {/* ====== Tab: Admin (上稿系統) ====== */}
            {activeTab === 'admin' && (
              isAdmin ? <div className="text-center py-20 bg-white rounded-2xl border border-dashed border-slate-300">
                <RefreshCw className="w-16 h-16 text-slate-300 mx-auto mb-4" />
                <h3 className="text-xl font-bold text-slate-700">上稿系統模組正在連接...</h3>
                <p className="text-slate-500 mt-2">行程新增與 AI DM 解析模組準備中。</p>
              </div> : <AdminDeniedScreen />
            )}
          </main>

          {/* 發送推廣 Modal */}
          {isPromoModalOpen && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 animate-fade-in">
              <div className="bg-white rounded-[2rem] overflow-hidden max-w-5xl w-full flex flex-col md:flex-row shadow-2xl relative animate-fade-in-up h-[90vh]">
                <button onClick={() => setIsPromoModalOpen(false)} className="absolute top-4 right-4 z-10 bg-slate-100 hover:bg-slate-200 text-slate-500 rounded-full p-2 transition"><XIcon className="w-6 h-6"/></button>
                
                {/* 左側設定區 */}
                <div className="w-full md:w-1/2 p-8 flex flex-col justify-between h-full overflow-y-auto">
                  <div>
                    <h3 className="text-2xl font-black text-slate-800 mb-2">準備發送名片</h3>
                    <p className="text-slate-500 mb-8">勾選想包含在訊息中的聯絡按鈕。</p>
                    <div className="space-y-4">
                      <label className="flex items-center p-4 border-2 rounded-2xl cursor-pointer hover:bg-slate-50 transition border-slate-100">
                        <input type="checkbox" className="mr-4 w-5 h-5 accent-emerald-500" checked={cardOptions.phone} onChange={e => setCardOptions({...cardOptions, phone: e.target.checked})} />
                        <span className="font-bold text-slate-700">📞 聯絡電話</span>
                      </label>
                      <label className="flex items-center p-4 border-2 rounded-2xl cursor-pointer hover:bg-slate-50 transition border-slate-100">
                        <input type="checkbox" className="mr-4 w-5 h-5 accent-emerald-500" checked={cardOptions.line} onChange={e => setCardOptions({...cardOptions, line: e.target.checked})} />
                        <span className="font-bold text-slate-700">💬 私訊 LINE</span>
                      </label>
                    </div>
                  </div>
                  <div className="mt-8 space-y-3">
                    <button onClick={shareFlex} className="w-full bg-[#00B900] text-white py-4 rounded-2xl font-black text-lg shadow-lg transition active:scale-95">🚀 立即分享給 LINE 好友</button>
                    <p className="text-center text-[10px] text-slate-400">訊息將包含您的專屬追蹤連結，業績將歸屬至您的帳號。</p>
                  </div>
                </div>

                {/* 右側預覽區 */}
                <div className="w-full md:w-1/2 line-chat-bg p-8 flex flex-col items-center justify-center border-l border-slate-200">
                  <p className="text-white/70 text-xs font-black mb-6 tracking-widest uppercase bg-black/20 px-4 py-1 rounded-full">LINE 預覽效果</p>
                  
                  <div className="w-full flex gap-3 overflow-x-auto pb-4 custom-scrollbar snap-x">
                    {Array.from(selectedIds).map(id => {
                      const tour = itineraries.find(i => String(i.id) === id);
                      if (!tour) return null;
                      return (
                        <div key={id} className="min-w-[260px] bg-white rounded-2xl overflow-hidden shadow-xl snap-center border border-slate-200">
                          <img src={tour.image} className="aspect-[20/13] w-full object-cover" />
                          <div className="p-4">
                            <h4 className="font-bold text-sm text-slate-800 line-clamp-2 h-10">{tour.title}</h4>
                            <p className="text-red-600 font-black text-lg mt-2">${Number(tour.price).toLocaleString()}</p>
                            <div className="bg-emerald-500 text-white text-center py-2.5 rounded-xl font-bold text-xs mt-4">查看行程 / 立即報名</div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* Toast */}
          {toast && (
            <div className="fixed bottom-24 left-1/2 -translate-x-1/2 z-[200] bg-slate-900/90 backdrop-blur text-white px-8 py-4 rounded-2xl font-black shadow-2xl animate-fade-in-up">
              {toast.message}
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
