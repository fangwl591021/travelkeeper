<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅遊管家 - 智能行程管理與經銷系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in-up { animation: fadeInUp 0.3s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    .line-chat-bg { background-color: #749cbd; }
  </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800">
  <div id="root"></div>

  <script type="text/babel" data-presets="react,env">
    const { useState, useEffect } = React;

    // --- 圖示元件 ---
    const IconWrapper = ({ children, className = "w-6 h-6" }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>;
    const Navigation = ({ className }) => <IconWrapper className={className}><polygon points="3 11 22 2 13 21 11 13 3 11"/></IconWrapper>;
    const Search = ({ className }) => <IconWrapper className={className}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></IconWrapper>;
    const MapPin = ({ className }) => <IconWrapper className={className}><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></IconWrapper>;
    const Calendar = ({ className }) => <IconWrapper className={className}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></IconWrapper>;
    const Type = ({ className }) => <IconWrapper className={className}><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></IconWrapper>;
    const UploadCloud = ({ className }) => <IconWrapper className={className}><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/><polyline points="16 16 12 12 8 16"/></IconWrapper>;
    const ImageIcon = ({ className }) => <IconWrapper className={className}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></IconWrapper>;
    const FileText = ({ className }) => <IconWrapper className={className}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></IconWrapper>;
    const RefreshCw = ({ className }) => <IconWrapper className={className}><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></IconWrapper>;
    const Send = ({ className }) => <IconWrapper className={className}><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></IconWrapper>;
    const Sparkles = ({ className }) => <IconWrapper className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></IconWrapper>;
    const CheckCircle = ({ className }) => <IconWrapper className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></IconWrapper>;
    const AlertCircle = ({ className }) => <IconWrapper className={className}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></IconWrapper>;
    const X = ({ className }) => <IconWrapper className={className}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></IconWrapper>;
    const Edit2 = ({ className }) => <IconWrapper className={className}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></IconWrapper>;
    const Trash2 = ({ className }) => <IconWrapper className={className}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></IconWrapper>;
    const Camera = ({ className }) => <IconWrapper className={className}><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></IconWrapper>;
    const Users = ({ className }) => <IconWrapper className={className}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></IconWrapper>;
    const Share2 = ({ className }) => <IconWrapper className={className}><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></IconWrapper>;
    const Briefcase = ({ className }) => <IconWrapper className={className}><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></IconWrapper>;

    const WORKER_URL = 'https://travelkeeper.fangwl591021.workers.dev';
    const LIFF_ID = '2009367829-BDZCGti8'; 
    const ENDPOINT_URL = 'https://fangwl591021.github.io/travelkeeper/';
    const LOGIN_URL = 'login.html'; 
    const ADMIN_UID = 'Uf729764dbb5b652a5a90a467320bea29';
    const HOT_SPOTS = ['國旅', '亞洲', '歐洲', '美洲', '大洋洲', '非洲'];

    const buildFlexMessage = (tourItem, distributorData, refUidStr, options) => {
        const trackingUrl = `${ENDPOINT_URL}?tour_id=${tourItem.id}&ref_uid=${refUidStr || 'GUEST'}`;
        const optsStr = [options.phone, options.line, options.lineAt, options.fb, options.web, options.map].map(b=>b?'1':'0').join('');
        
        // 【核心魔法】紅標籤專屬連結！點擊後自動開啟 LIFF 進行遞迴轉傳
        const shareLiffUrl = `https://liff.line.me/${LIFF_ID}?action=share&tour_id=${tourItem.id}&ref_uid=${refUidStr || ''}&opts=${optsStr}`;

        const buttons = [{ type: "button", style: "primary", color: "#00B900", height: "sm", margin: "sm", action: { type: "uri", label: "了解更多 / 立即報名", uri: trackingUrl } }];
        
        if (options.phone && distributorData.phone) buttons.push({ type: "button", style: "secondary", height: "sm", margin: "sm", action: { type: "uri", label: "📞 聯絡電話", uri: `tel:${distributorData.phone}` }});
        if (options.line && distributorData.lineLink) buttons.push({ type: "button", style: "secondary", height: "sm", margin: "sm", action: { type: "uri", label: "💬 私訊 LINE", uri: distributorData.lineLink }});
        if (options.lineAt && distributorData.lineAtLink) buttons.push({ type: "button", style: "secondary", height: "sm", margin: "sm", action: { type: "uri", label: "🟢 官方 LINE@", uri: distributorData.lineAtLink }});
        if (options.fb && distributorData.fbLink) buttons.push({ type: "button", style: "secondary", height: "sm", margin: "sm", action: { type: "uri", label: "👍 FB 粉絲專頁", uri: distributorData.fbLink }});
        if (options.web && distributorData.webLink) buttons.push({ type: "button", style: "secondary", height: "sm", margin: "sm", action: { type: "uri", label: "🌐 官方網站", uri: distributorData.webLink }});
        if (options.map && distributorData.mapLink) buttons.push({ type: "button", style: "secondary", height: "sm", margin: "sm", action: { type: "uri", label: "📍 門市導航", uri: distributorData.mapLink }});

        return {
          type: "flex", 
          altText: `推薦行程：${tourItem.title}`,
          contents: {
            type: "bubble",
            body: {
              type: "box", layout: "vertical", paddingAll: "0px", 
              contents: [
                { type: "image", url: tourItem.image || 'https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?auto=format&fit=crop&w=800&q=80', size: "full", aspectRatio: "20:13", aspectMode: "cover", animated: true },
                { type: "box", layout: "vertical", paddingAll: "15px", contents: [
                    { type: "text", text: tourItem.title, weight: "bold", size: "xl", align: "center", wrap: true },
                    { type: "text", text: tourItem.description ? tourItem.description.substring(0, 80) + '...' : '點擊下方按鈕了解更多精彩行程！', size: "xs", margin: "sm", color: "#666666", wrap: true },
                    { type: "box", layout: "baseline", margin: "md", contents: [
                        { type: "text", text: "🔥 熱門搶購中", size: "sm", color: "#999999", flex: 1 },
                        { type: "text", text: `$${Number(tourItem.price).toLocaleString()}`, size: "xl", color: "#ff334b", weight: "bold", align: "end" }
                      ]
                    }
                  ]
                },
                { type: "box", layout: "vertical", position: "absolute", backgroundColor: "#FF0000", cornerRadius: "xl", paddingTop: "7px", paddingBottom: "7px", paddingStart: "20px", paddingEnd: "20px", offsetTop: "10px", offsetEnd: "10px",
                  action: { type: "uri", label: "badge", uri: shareLiffUrl }, // 觸發 LIFF 遞迴轉傳
                  contents: [{ type: "text", text: "分享好友", color: "#ffffff", size: "12px", weight: "bold" }]
                }
              ]
            },
            footer: { type: "box", layout: "vertical", spacing: "sm", paddingAll: "15px", backgroundColor: "#FFFFFF", contents: buttons }
          }
        };
    };

    function App() {
      const urlParams = new URLSearchParams(window.location.search);
      const [activeTab, setActiveTab] = useState(urlParams.get('tab') || 'home'); 
      const [isAutoSharing, setIsAutoSharing] = useState(urlParams.get('action') === 'share');
      const [shareError, setShareError] = useState(null);

      const [refUid, setRefUid] = useState(() => {
        const urlRef = urlParams.get('ref_uid');
        if (urlRef) localStorage.setItem('tracking_ref_uid', urlRef);
        return urlRef || localStorage.getItem('tracking_ref_uid') || '';
      });

      const [crmSubTab, setCrmSubTab] = useState('distributors'); 
      const [itineraries, setItineraries] = useState([]);
      const [toast, setToast] = useState(null);
      const [isLoading, setIsLoading] = useState(false);
      const [isUploadingImage, setIsUploadingImage] = useState(false); 
      
      const [liffProfile, setLiffProfile] = useState(null);
      const [isLiffReady, setIsLiffReady] = useState(false);
      const [distributorStatus, setDistributorStatus] = useState(null); 
      const [isGeneralMember, setIsGeneralMember] = useState(false);
      const [isAdmin, setIsAdmin] = useState(false);

      const [myDistributorData, setMyDistributorData] = useState(null);
      const [isStatusChecked, setIsStatusChecked] = useState(false);

      const [crmDistributors, setCrmDistributors] = useState([]);
      const [crmUsers, setCrmUsers] = useState([]);

      const [searchRegion, setSearchRegion] = useState('');
      const [searchStartDate, setSearchStartDate] = useState('');
      const [searchEndDate, setSearchEndDate] = useState('');
      const [searchKeyword, setSearchKeyword] = useState('');
      const [filteredResults, setFilteredResults] = useState([]);
      
      const [bannerImage, setBannerImage] = useState(() => localStorage.getItem('travel_keeper_banner') || 'https://images.unsplash.com/photo-1436491865332-7a61a109cc05?auto=format&fit=crop&w=1920&q=80');

      const [uploadMode, setUploadMode] = useState('dm');
      const [ocrStatus, setOcrStatus] = useState('idle');
      const [draftData, setDraftData] = useState({ 
        id: null, title: '', region: '', price: '', days: '', startDate: '', endDate: '', description: '', image: '' 
      });
      
      const [deleteModalId, setDeleteModalId] = useState(null);
      const [flexModalItem, setFlexModalItem] = useState(null);

      const [editingDistributor, setEditingDistributor] = useState(null);
      const [editFormData, setEditFormData] = useState({});
      const [approveModalUser, setApproveModalUser] = useState(null);
      const [approveData, setApproveData] = useState({ commission: 10, note: '' });

      const [cardOptions, setCardOptions] = useState({ phone: false, line: false, lineAt: false, fb: false, web: false, map: false });

      useEffect(() => {
        initLiff();
        fetchItineraries();
      }, []);

      // ====== 遞迴轉傳核心機制：自動組裝名片並彈出通訊錄 ======
      useEffect(() => {
        const processAutoShare = async () => {
           if (isAutoSharing && isLiffReady && itineraries.length > 0 && liffProfile && isStatusChecked) {
              const tourId = urlParams.get('tour_id');
              const rUid = urlParams.get('ref_uid');
              const optsParam = urlParams.get('opts') || '000000';
              
              const tour = itineraries.find(i => String(i.id) === String(tourId));
              
              let targetDistData = {};
              if (rUid === liffProfile.userId) {
                targetDistData = myDistributorData || {};
              } else {
                targetDistData = crmDistributors.find(d => d.uid === rUid) || {};
              }
              
              if (!tour) { setShareError('找不到該行程資訊'); return; }

              const cOptions = {
                 phone: optsParam[0] === '1', line: optsParam[1] === '1', lineAt: optsParam[2] === '1',
                 fb: optsParam[3] === '1', web: optsParam[4] === '1', map: optsParam[5] === '1',
              };

              try {
                // 將過長的 JSON 在內部記憶體組合，完美避開 URL 400 Bad Request 錯誤！
                const flexMsg = buildFlexMessage(tour, targetDistData, rUid, cOptions);

                if (liff.isApiAvailable('shareTargetPicker')) {
                    await liff.shareTargetPicker([flexMsg]);
                    showToast('✅ 成功轉傳名片！即將關閉視窗...');
                    setTimeout(() => liff.closeWindow(), 1500);
                } else {
                    setShareError('⚠️ 轉傳失敗：您使用的瀏覽器環境不支援喚出通訊錄。請在 LINE 聊天室內直接點擊該連結。'); 
                }
              } catch(e) { 
                setShareError('⚠️ 轉傳取消或發生預期外的錯誤。'); 
              }
           }
        };

        if (crmDistributors.length > 0) {
            processAutoShare();
        } else if (isAutoSharing && isLiffReady && isStatusChecked) {
            fetchFullCrmData(); 
        }
      }, [isLiffReady, itineraries, isStatusChecked, crmDistributors, isAutoSharing]);

      const initLiff = async () => {
        try {
          await liff.init({ liffId: LIFF_ID });
          setIsLiffReady(true);
          
          if (!liff.isLoggedIn()) {
            liff.login({ redirectUri: window.location.href });
          } else {
            const profile = await liff.getProfile();
            setLiffProfile(profile);
            checkMyStatus(profile.userId);
          }
        } catch (err) { console.error('LIFF 初始化失敗', err); }
      };

      const checkMyStatus = async (uid) => {
        try {
          const res = await fetch(`${WORKER_URL}/api/itineraries`, { 
            method: 'POST', headers: { 'Content-Type': 'application/json' }, 
            body: JSON.stringify({ action: 'checkUserStatus', uid: uid }) 
          });
          const data = await res.json();
          if (data.success) {
             const info = data.data;
             if (info.isAdmin) setIsAdmin(true);
             if (info.role === 'distributor') {
               setDistributorStatus(info.status ? info.status.toString().trim().toLowerCase() : 'pending');
               setMyDistributorData(info.distributorData);
             } else if (info.role === 'user') {
               setIsGeneralMember(true);
             }
          }
        } catch (e) { console.error('Status check error', e); }
        finally { setIsStatusChecked(true); }
      };

      const fetchFullCrmData = async () => {
        try {
          const currentTimestamp = new Date().getTime();
          const resD = await fetch(`${WORKER_URL}/api/itineraries`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'getDistributors', timestamp: currentTimestamp }) });
          const dataD = await resD.json();
          setCrmDistributors(Array.isArray(dataD) ? dataD : []);
          
          const resU = await fetch(`${WORKER_URL}/api/itineraries`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'getUsers', timestamp: currentTimestamp }) });
          const dataU = await resU.json();
          setCrmUsers(Array.isArray(dataU) ? dataU : []);
        } catch (e) { console.error('CRM Fetch error', e); }
      };

      const fetchItineraries = async () => {
        setIsLoading(true);
        try {
          const res = await fetch(`${WORKER_URL}/api/itineraries?timestamp=${new Date().getTime()}`);
          const data = await res.json();
          if (data && Array.isArray(data)) { setItineraries(data); setFilteredResults(data); }
        } catch (error) { console.error('Fetch error', error); } finally { setIsLoading(false); }
      };

      const changeTab = (newTab) => {
        setActiveTab(newTab);
        window.history.replaceState({}, '', `?tab=${newTab}`);
        if (newTab === 'crm' || newTab === 'distributor') fetchFullCrmData();
      };

      const showToast = (message, type = 'success') => { setToast({ message, type }); setTimeout(() => setToast(null), 3000); };

      const loginAsDistributor = () => { window.location.href = `${LOGIN_URL}?type=distributor&ref_uid=${refUid}`; };
      const loginAsMember = () => { window.location.href = `${LOGIN_URL}?type=user&ref_uid=${refUid}`; };

      const handleSearch = () => {
        let results = itineraries;
        if (searchRegion) results = results.filter(item => item.region.includes(searchRegion));
        if (searchKeyword) {
          const kw = searchKeyword.toLowerCase();
          results = results.filter(item => (item.title && item.title.toLowerCase().includes(kw)) || (item.description && item.description.toLowerCase().includes(kw)));
        }
        if (searchStartDate) results = results.filter(item => item.startDate && item.startDate >= searchStartDate);
        if (searchEndDate) results = results.filter(item => item.endDate && item.endDate <= searchEndDate);
        setFilteredResults(results);
        showToast(`為您找到 ${results.length} 筆符合的行程`);
      };

      const handleImageUploadToDrive = async (e, type = 'itinerary') => {
        const file = e.target.files[0];
        if (!file) return;

        if (type === 'itinerary') setIsUploadingImage(true);
        else showToast('Banner 上傳雲端圖床中，請稍候...');

        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onloadend = async () => {
          try {
            const res = await fetch(`${WORKER_URL}/api/itineraries`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ action: 'uploadImage', base64: reader.result })
            });
            const result = await res.json();
            
            if (result.success) {
              if (type === 'itinerary') {
                setDraftData({ ...draftData, image: result.url });
                showToast('✅ 圖片已成功上傳至 Google Drive！');
              } else {
                setBannerImage(result.url);
                localStorage.setItem('travel_keeper_banner', result.url);
                showToast('✅ Banner 已成功更新！');
              }
            } else {
              throw new Error(result.message || result.error);
            }
          } catch (err) {
            showToast('雲端圖床上傳失敗: ' + err.message, 'error');
          } finally {
            if (type === 'itinerary') setIsUploadingImage(false);
          }
        };
      };

      const handleFileUpload = async (e) => {
        const file = e.target.files[0]; if (!file) return; 
        setOcrStatus('processing');
        setIsUploadingImage(true);

        try {
          const reader = new FileReader(); reader.readAsDataURL(file);
          reader.onloadend = async () => {
            const base64data = reader.result;

            let uploadedUrl = '';
            try {
              const driveRes = await fetch(`${WORKER_URL}/api/itineraries`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'uploadImage', base64: base64data })
              });
              const driveResult = await driveRes.json();
              if (driveResult.success) uploadedUrl = driveResult.url;
            } catch (err) { console.warn('圖片上傳失敗', err); }

            const res = await fetch(`${WORKER_URL}/api/upload-dm`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ image: base64data }) });
            const aiResult = await res.json();

            if (aiResult.success) {
              const parsedData = aiResult.data;
              parsedData.image = uploadedUrl; 
              parsedData.id = Date.now(); 
              setDraftData(parsedData); 
              showToast('✅ 圖片已上傳雲端且 AI 解析完成！系統正自動寫入資料庫...');
              
              const newItinerary = { ...parsedData, action: 'addItinerary', price: parseInt(parsedData.price, 10) || 0 };
              setItineraries(prev => [newItinerary, ...prev]);
              try {
                const dbRes = await fetch(`${WORKER_URL}/api/itineraries`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(newItinerary) });
                const dbResult = await dbRes.json();
                if (dbResult.success) { showToast('🎉 行程已成功上架！'); setDraftData({ id: null, title: '', region: '', price: '', days: '', startDate: '', endDate: '', description: '', image: '' }); setOcrStatus('idle'); fetchItineraries(); } else throw new Error('寫入失敗');
              } catch (dbErr) { setOcrStatus('done'); showToast('寫入失敗，請手動點擊「儲存」', 'error'); }
            } else throw new Error(aiResult.error || '解析失敗');
            setIsUploadingImage(false);
          };
        } catch (error) { setOcrStatus('idle'); setIsUploadingImage(false); showToast(error.message || '解析失敗', 'error'); }
      };

      const handleUpdateContent = async () => {

                <button onClick={() => setFlexModalItem(null)} className="absolute top-4 right-4 z-10 bg-black/20 hover:bg-black/50 text-white rounded-full p-2 transition"><X className="w-6 h-6"/></button>
                
                {/* 左側：設定面板 */}
                <div className="w-full md:w-3/5 p-8 lg:p-12 flex flex-col justify-center bg-white border-r border-gray-100 h-[80vh] md:h-auto overflow-y-auto custom-scrollbar">
                  <div className="flex items-center text-[#00B900] mb-2"><CheckCircle className="w-8 h-8 mr-3" /><h3 className="text-2xl font-extrabold">準備您的專屬名片</h3></div>
                  <p className="text-gray-500 mb-8 font-medium">勾選您想放在名片上的聯絡方式，預覽將即時更新。</p>
                  
                  <div className="space-y-6">
                    <div className="bg-gray-50 p-5 rounded-2xl border border-gray-200">
                      <p className="font-bold text-gray-800 mb-4 border-b pb-2">自訂名片按鈕 (建議勾選1~3項)</p>
                      
                      <div className="grid grid-cols-2 gap-3">
                         <label className={`flex items-center p-3 border rounded-xl cursor-pointer transition ${!myDistributorData?.phone ? 'opacity-50 bg-gray-100 cursor-not-allowed' : cardOptions.phone ? 'bg-emerald-50 border-emerald-500' : 'hover:bg-gray-50'}`}>
                           <input type="checkbox" className="mr-3 w-4 h-4 accent-emerald-500" disabled={!myDistributorData?.phone} checked={cardOptions.phone} onChange={(e) => setCardOptions({...cardOptions, phone: e.target.checked})} /> 📞 聯絡電話
                         </label>
                         <label className={`flex items-center p-3 border rounded-xl cursor-pointer transition ${!myDistributorData?.lineLink ? 'opacity-50 bg-gray-100 cursor-not-allowed' : cardOptions.line ? 'bg-emerald-50 border-emerald-500' : 'hover:bg-gray-50'}`}>
                           <input type="checkbox" className="mr-3 w-4 h-4 accent-emerald-500" disabled={!myDistributorData?.lineLink} checked={cardOptions.line} onChange={(e) => setCardOptions({...cardOptions, line: e.target.checked})} /> 💬 個人 LINE
                         </label>
                         <label className={`flex items-center p-3 border rounded-xl cursor-pointer transition ${!myDistributorData?.lineAtLink ? 'opacity-50 bg-gray-100 cursor-not-allowed' : cardOptions.lineAt ? 'bg-emerald-50 border-emerald-500' : 'hover:bg-gray-50'}`}>
                           <input type="checkbox" className="mr-3 w-4 h-4 accent-emerald-500" disabled={!myDistributorData?.lineAtLink} checked={cardOptions.lineAt} onChange={(e) => setCardOptions({...cardOptions, lineAt: e.target.checked})} /> 🟢 官方 LINE@
                         </label>
                         <label className={`flex items-center p-3 border rounded-xl cursor-pointer transition ${!myDistributorData?.fbLink ? 'opacity-50 bg-gray-100 cursor-not-allowed' : cardOptions.fb ? 'bg-emerald-50 border-emerald-500' : 'hover:bg-gray-50'}`}>
                           <input type="checkbox" className="mr-3 w-4 h-4 accent-emerald-500" disabled={!myDistributorData?.fbLink} checked={cardOptions.fb} onChange={(e) => setCardOptions({...cardOptions, fb: e.target.checked})} /> 👍 FB 粉專
                         </label>
                         <label className={`flex items-center p-3 border rounded-xl cursor-pointer transition ${!myDistributorData?.webLink ? 'opacity-50 bg-gray-100 cursor-not-allowed' : cardOptions.web ? 'bg-emerald-50 border-emerald-500' : 'hover:bg-gray-50'}`}>
                           <input type="checkbox" className="mr-3 w-4 h-4 accent-emerald-500" disabled={!myDistributorData?.webLink} checked={cardOptions.web} onChange={(e) => setCardOptions({...cardOptions, web: e.target.checked})} /> 🌐 官方網站
                         </label>
                         <label className={`flex items-center p-3 border rounded-xl cursor-pointer transition ${!myDistributorData?.mapLink ? 'opacity-50 bg-gray-100 cursor-not-allowed' : cardOptions.map ? 'bg-emerald-50 border-emerald-500' : 'hover:bg-gray-50'}`}>
                           <input type="checkbox" className="mr-3 w-4 h-4 accent-emerald-500" disabled={!myDistributorData?.mapLink} checked={cardOptions.map} onChange={(e) => setCardOptions({...cardOptions, map: e.target.checked})} /> 📍 實體店導航
                         </label>
                      </div>
                      <p className="text-xs text-red-500 mt-3 font-bold">* 若按鈕反灰，請先至個人資料設定補全該網址</p>
                    </div>
                    
                    <div className="pt-4">
                      {/* 【修正】文字改回「一鍵發送名片給 LINE 好友 (喚出通訊錄)」 */}
                      <button onClick={triggerFlexSharing} className="w-full bg-[#00B900] hover:bg-[#009900] text-white font-bold py-4 rounded-2xl shadow-lg transition-all flex justify-center items-center text-lg">
                        <Share2 className="w-5 h-5 mr-2" /> 一鍵發送名片給 LINE 好友 (喚出通訊錄)
                      </button>
                    </div>
                  </div>
                </div>

                <div className="w-full md:w-2/5 line-chat-bg p-6 flex flex-col items-center justify-center border-l border-gray-200 shadow-inner">
                   <p className="text-white/80 font-bold mb-4 tracking-widest text-sm uppercase bg-black/20 px-4 py-1 rounded-full">預覽畫面</p>
                   
                   <div className="w-full max-w-[300px] bg-white rounded-[20px] overflow-hidden shadow-2xl transform scale-95 origin-top relative flex flex-col">
                     <div className="relative">
                        <div className="relative h-40">
                          <img src={flexModalItem.image || 'https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?auto=format&fit=crop&w=800&q=80'} className="w-full h-full object-cover" />
                        </div>
                        <div className="absolute top-2.5 right-2.5 bg-[#FF0000] text-white px-4 py-1.5 rounded-full text-xs font-bold shadow-md cursor-pointer hover:bg-red-700 transition">
                          分享好友
                        </div>
                        <div className="p-4 flex flex-col items-center text-center">
                          <h4 className="font-bold text-xl text-gray-900 leading-snug mb-2 line-clamp-2 w-full">{flexModalItem.title}</h4>
                          <p className="text-xs text-gray-500 line-clamp-3 mb-3 text-left w-full">
                            {flexModalItem.description ? flexModalItem.description.substring(0, 80) + '...' : '點擊下方按鈕了解更多精彩行程！'}
                          </p>
                          <div className="flex justify-between items-baseline w-full mb-2">
                             <span className="text-gray-400 text-xs">🔥 熱門搶購中</span>
                             <span className="font-extrabold text-[#ff334b] text-xl">${Number(flexModalItem.price).toLocaleString()}</span>
                          </div>
                        </div>
                     </div>
                     <div className="px-4 pb-4 space-y-2 bg-white mt-auto">
                        <div className="w-full bg-[#00B900] text-white text-center py-2.5 rounded-xl font-bold text-sm shadow-sm cursor-pointer hover:opacity-90">了解更多 / 立即報名</div>
                        {cardOptions.phone && <div className="w-full bg-gray-100 text-gray-700 text-center py-2 rounded-xl font-bold text-sm">📞 聯絡電話</div>}
                        {cardOptions.line && <div className="w-full bg-gray-100 text-gray-700 text-center py-2 rounded-xl font-bold text-sm">💬 私訊 LINE</div>}
                        {cardOptions.lineAt && <div className="w-full bg-gray-100 text-gray-700 text-center py-2 rounded-xl font-bold text-sm">🟢 官方 LINE@</div>}
                        {cardOptions.fb && <div className="w-full bg-gray-100 text-gray-700 text-center py-2 rounded-xl font-bold text-sm">👍 FB 粉絲專頁</div>}
                        {cardOptions.web && <div className="w-full bg-gray-100 text-gray-700 text-center py-2 rounded-xl font-bold text-sm">🌐 官方網站</div>}
                        {cardOptions.map && <div className="w-full bg-gray-100 text-gray-700 text-center py-2 rounded-xl font-bold text-sm">📍 門市導航</div>}
                     </div>
                   </div>
                </div>
              </div>
            </div>
          )}

          {/* 刪除確認 Modal */}
          {deleteModalId && (
            <div className="fixed inset-0 z-[60] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4">
              <div className="bg-white rounded-2xl p-8 max-w-md w-full shadow-2xl animate-fade-in-up">
                <div className="flex items-center text-red-600 mb-5"><AlertCircle className="w-8 h-8 mr-3" /><h3 className="text-2xl font-bold">確認下架此行程？</h3></div>
                <p className="text-gray-600 mb-8 text-lg leading-relaxed">下架後該行程將從前台及資料庫移除，確定要繼續嗎？</p>
                <div className="flex justify-end space-x-4">
                  <button onClick={() => setDeleteModalId(null)} className="px-6 py-2.5 rounded-xl font-bold text-gray-600 bg-gray-100 hover:bg-gray-200 text-lg">取消</button>
                  <button onClick={confirmDelete} className="px-6 py-2.5 rounded-xl font-bold text-white bg-red-600 hover:bg-red-700 text-lg">確定下架</button>
                </div>
              </div>
            </div>
          )}

          {/* Toast Notification */}
          {toast && (
            <div className="fixed bottom-6 right-6 z-[90] animate-fade-in-up">
              <div className={`flex items-center p-5 rounded-2xl shadow-2xl ${toast.type === 'error' ? 'bg-red-50 text-red-800' : 'bg-gray-900 text-white'}`}><span className="font-bold text-lg tracking-wide">{toast.message}</span></div>
            </div>
          )}
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
