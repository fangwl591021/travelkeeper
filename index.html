<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅遊管家 - 智慧旅遊平台 (SaaS 版)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
    body { font-family: 'Noto Sans TC', sans-serif; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    .blog-content h3 { font-size: 1.5rem; font-weight: 900; margin-top: 2rem; margin-bottom: 0.75rem; color: #111; border-left: 5px solid #2563eb; padding-left: 14px; }
    .blog-content img { width: 100%; border-radius: 20px; margin: 1.5rem 0; object-fit: cover; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
    .blog-content p { font-size: 1.05rem; line-height: 1.85; color: #4b5563; margin-bottom: 1.5rem; white-space: pre-wrap; }
    
    /* 經銷商選取器樣式 */
    .tour-card-selectable { border: 2.5px solid #f1f5f9; transition: all 0.2s; position: relative; }
    .tour-card-selectable.selected { border-color: #10b981; background: #f0fdf4; }
    .card-check { position: absolute; top: 10px; right: 10px; width: 24px; height: 24px; background: #10b981; border-radius: 50%; color: white; display: none; align-items: center; justify-content: center; z-index: 10; }
    .tour-card-selectable.selected .card-check { display: flex; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800">
  <div id="root"></div>

  <script type="text/babel" data-presets="react,env">
    const { useState, useEffect, useRef } = React;

    const Icon = ({ name, className = "w-6 h-6" }) => {
      const icons = {
        home: (<React.Fragment><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></React.Fragment>),
        user: (<React.Fragment><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></React.Fragment>),
        briefcase: (<React.Fragment><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></React.Fragment>),
        arrowLeft: (<React.Fragment><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></React.Fragment>),
        share: (<React.Fragment><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></React.Fragment>),
        check: (<React.Fragment><polyline points="20 6 9 17 4 12"/></React.Fragment>)
      };
      return <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>{icons[name]}</svg>;
    };

    const WORKER_URL = 'https://travelkeeper.fangwl591021.workers.dev';

    function App() {
      const urlParams = new URLSearchParams(window.location.search);
      const agencySlug = urlParams.get('a') || 'demo';
      
      const [tenant, setTenant] = useState(null);
      const [itineraries, setItineraries] = useState([]);
      const [activeTab, setActiveTab] = useState(urlParams.get('tab') || 'home');
      const [selectedTour, setSelectedTour] = useState(null);
      const [isLoading, setIsLoading] = useState(true);
      const [liffProfile, setLiffProfile] = useState(null);
      const [myStatus, setMyStatus] = useState({ role: 'guest', isAdmin: false });
      
      // 經銷商專屬狀態
      const [selectedIds, setSelectedIds] = useState([]);

      useEffect(() => {
        const init = async () => {
          try {
            const configRes = await fetch(`${WORKER_URL}/api/config?a=${agencySlug}`);
            const configData = await configRes.json();
            if (configData.success) {
              setTenant(configData.data);
              await liff.init({ liffId: configData.data.liff_id });
              if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                setLiffProfile(profile);
                checkStatus(profile.userId);
              }
              fetchTours();
            }
          } catch (e) { console.error(e); } finally { setIsLoading(false); }
        };
        init();
      }, [agencySlug]);

      const fetchTours = async () => {
        const res = await fetch(`${WORKER_URL}/api/itineraries?a=${agencySlug}`);
        const data = await res.json();
        setItineraries(Array.isArray(data) ? data : []);
      };

      const checkStatus = async (uid) => {
        const res = await fetch(`${WORKER_URL}/api/itineraries?action=checkUserStatus&uid=${uid}&a=${agencySlug}`);
        const result = await res.json();
        if (result.success) setMyStatus(result.data);
      };

      const handleShareFlex = async () => {
        if (selectedIds.length === 0) return;
        const items = itineraries.filter(it => selectedIds.includes(it.id));
        
        // 產生 Flex Message
        const bubble = (tour) => ({
          "type": "bubble",
          "hero": { "type": "image", "url": tour.image, "size": "full", "aspectRatio": "20:13", "aspectMode": "cover" },
          "body": {
            "type": "box", "layout": "vertical", "contents": [
              { "type": "text", "text": tour.title, "weight": "bold", "size": "xl", "wrap": true },
              { "type": "box", "layout": "vertical", "margin": "lg", "contents": [
                { "type": "text", "text": `售價 TWD ${Number(tour.price).toLocaleString()}`, "color": "#b82337", "weight": "bold", "size": "lg" },
                { "type": "text", "text": `${tour.days} 天之旅 · ${tour.region}`, "size": "sm", "color": "#999999", "margin": "xs" }
              ]}
            ]
          },
          "footer": {
            "type": "box", "layout": "vertical", "contents": [
              { "type": "button", "style": "primary", "color": "#00B900", "action": { "type": "uri", "label": "查看行程 / 報名", "uri": `https://fangwl591021.github.io/travelkeeper/index.html?a=${agencySlug}&t=${tour.id}&r=${liffProfile.userId}` } }
            ]
          }
        });

        const flexContent = items.length === 1 ? bubble(items[0]) : { "type": "carousel", "contents": items.map(bubble) };

        try {
          await liff.shareTargetPicker([{ "type": "flex", "altText": `推薦行程：${items[0].title}`, "contents": flexContent }]);
          alert('推廣訊息已成功發送！');
          setSelectedIds([]);
        } catch (e) { alert('發送失敗'); }
      };

      if (isLoading) return <div className="h-screen flex items-center justify-center"><div className="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div></div>;

      // ── [分頁內容渲染] ──
      const renderContent = () => {
        if (selectedTour) return (
          <div className="animate-fade-in bg-white min-h-screen">
            <div className="relative h-[40vh]"><img src={selectedTour.image} className="w-full h-full object-cover" /><button onClick={()=>setSelectedTour(null)} className="absolute top-6 left-6 bg-black/40 text-white p-3 rounded-full backdrop-blur-md"><Icon name="arrowLeft"/></button></div>
            <div className="p-8 max-w-2xl mx-auto">
              <span className="bg-blue-100 text-blue-700 px-4 py-1 rounded-full text-xs font-black mb-4 inline-block">{selectedTour.region}</span>
              <h1 className="text-4xl font-black mb-6 leading-tight">{selectedTour.title}</h1>
              <div className="flex gap-10 py-6 border-y border-gray-100 mb-8">
                <div><p className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-1">售價</p><p className="text-3xl font-black text-red-600">NT$ {Number(selectedTour.price).toLocaleString()}</p></div>
                <div><p className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-1">天數</p><p className="text-2xl font-black text-gray-800">{selectedTour.days} 天</p></div>
              </div>
              <div className="blog-content">
                {(selectedTour.description || '').split('\n').map((line, i) => {
                  if (line.trim().startsWith('###')) return <h3 key={i}>{line.replace('###','').trim()}</h3>;
                  if (line.includes('![Image](')) {
                    const m = line.match(/\!\[.*?\]\((.*?)\)/);
                    return m ? <img key={i} src={m[1]} /> : null;
                  }
                  return line.trim() ? <p key={i}>{line}</p> : null;
                })}
              </div>
              <button className="w-full bg-[#b82337] text-white py-5 rounded-2xl font-black text-xl mt-12 shadow-2xl shadow-red-100 active:scale-95 transition">立即報名參團</button>
            </div>
          </div>
        );

        switch (activeTab) {
          case 'home':
            return (
              <div className="animate-fade-in">
                <header className="h-72 bg-slate-900 relative flex items-center justify-center overflow-hidden"><img src={tenant.banner_url} className="absolute inset-0 w-full h-full object-cover opacity-50" /><h2 className="relative text-white text-4xl font-black italic tracking-tighter">EXPLORE THE WORLD</h2></header>
                <div className="p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 max-w-6xl mx-auto mt-4">
                  {itineraries.map(it => (
                    <div key={it.id} onClick={()=>setSelectedTour(it)} className="bg-white rounded-3xl overflow-hidden border border-gray-100 hover:shadow-xl transition-all group cursor-pointer">
                      <div className="h-56 overflow-hidden"><img src={it.image} className="w-full h-full object-cover group-hover:scale-105 transition duration-500" /></div>
                      <div className="p-5"><h4 className="font-black text-lg mb-4 line-clamp-2">{it.title}</h4><div className="flex justify-between items-center"><span className="text-xs text-gray-400 font-bold">{it.days} 天之旅</span><span className="text-red-600 font-black text-2xl">${Number(it.price).toLocaleString()}</span></div></div>
                    </div>
                  ))}
                </div>
              </div>
            );
          
          case 'dist':
            if (myStatus.role !== 'distributor') return (
              <div className="flex flex-col items-center justify-center p-20 text-center animate-fade-in">
                <div className="bg-emerald-50 p-8 rounded-[3rem] mb-6"><Icon name="briefcase" className="w-16 h-16 text-emerald-600" /></div>
                <h3 className="text-2xl font-black mb-4">加入經銷夥伴</h3>
                <p className="text-gray-500 mb-8 max-w-xs">申請成為經銷商，即可獲取專屬推薦連結與推廣工具，賺取豐富獎金。</p>
                <button onClick={()=>window.location.href=`login.html?a=${agencySlug}&type=distributor`} className="bg-emerald-600 text-white px-10 py-4 rounded-2xl font-black shadow-lg shadow-emerald-100">立即申請開通</button>
              </div>
            );
            return (
              <div className="animate-fade-in p-6 max-w-6xl mx-auto pb-40">
                <div className="flex justify-between items-center mb-8">
                  <div><h2 className="text-3xl font-black">經銷推廣工具</h2><p className="text-gray-400 text-sm font-bold">選取行程後點擊右下角發送 Flex 名片</p></div>
                  <div className="bg-emerald-100 text-emerald-700 px-4 py-2 rounded-xl font-black text-xs">已選 {selectedIds.length} 個</div>
                </div>
                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                  {itineraries.map(it => (
                    <div key={it.id} onClick={() => {
                      if (selectedIds.includes(it.id)) setSelectedIds(selectedIds.filter(id => id !== it.id));
                      else if (selectedIds.length < 10) setSelectedIds([...selectedIds, it.id]);
                    }} className={`tour-card-selectable rounded-[2rem] overflow-hidden bg-white shadow-sm ${selectedIds.includes(it.id) ? 'selected' : ''}`}>
                      <div className="card-check"><Icon name="check" className="w-4 h-4" /></div>
                      <div className="h-32 bg-gray-100"><img src={it.image} className="w-full h-full object-cover" /></div>
                      <div className="p-3"><p className="text-sm font-bold line-clamp-2 leading-tight">{it.title}</p></div>
                    </div>
                  ))}
                </div>
                <button onClick={handleShareFlex} disabled={selectedIds.length === 0} className={`fixed bottom-24 right-6 p-6 rounded-full shadow-2xl transition-all z-50 flex items-center gap-3 ${selectedIds.length > 0 ? 'bg-[#00B900] text-white scale-110' : 'bg-gray-200 text-gray-400 opacity-50'}`}>
                  <Icon name="share" /><span className="font-black">傳送推廣名片</span>
                </button>
              </div>
            );

          case 'member':
            return (
              <div className="p-10 text-center animate-fade-in">
                <img src={liffProfile?.pictureUrl} className="w-24 h-24 rounded-full mx-auto mb-6 border-4 border-white shadow-lg" />
                <h3 className="text-2xl font-black mb-2">{liffProfile?.displayName}</h3>
                <p className="text-gray-400 font-bold mb-8">您的身分：{myStatus.role === 'distributor' ? '專業經銷商' : '一般會員'}</p>
                <div className="grid grid-cols-2 gap-4 max-w-md mx-auto">
                    <div className="bg-white p-6 rounded-3xl border border-gray-100 shadow-sm"><p className="text-[10px] font-black text-gray-400 mb-1">我的訂單</p><p className="text-2xl font-black">0</p></div>
                    <div className="bg-white p-6 rounded-3xl border border-gray-100 shadow-sm"><p className="text-[10px] font-black text-gray-400 mb-1">累積紅利</p><p className="text-2xl font-black text-blue-600">0</p></div>
                </div>
              </div>
            );

          default: return null;
        }
      };

      return (
        <div className="min-h-screen flex flex-col pb-24">
          <nav className="bg-white/80 backdrop-blur-md sticky top-0 z-50 px-6 py-4 flex justify-between items-center border-b border-gray-50">
            <div className="flex items-center gap-2 cursor-pointer" onClick={()=>{setActiveTab('home');setSelectedTour(null);}}>
              <div className="bg-blue-600 p-1.5 rounded-lg text-white font-black text-xs">TK</div>
              <span className="font-black text-xl tracking-tighter text-blue-900">{tenant.name}</span>
            </div>
          </nav>

          <main className="flex-grow">{renderContent()}</main>

          <footer className="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-lg border-t border-gray-100 px-6 py-3 flex justify-around items-center md:hidden shadow-[0_-10px_30px_rgba(0,0,0,0.05)] z-50">
            <button onClick={()=>{setActiveTab('home');setSelectedTour(null);}} className={`flex flex-col items-center gap-1 transition ${activeTab==='home'&&!selectedTour?'text-blue-600':'text-gray-400'}`}><Icon name="home" /><span className="text-[10px] font-black uppercase tracking-widest">Explore</span></button>
            <button onClick={()=>{setActiveTab('dist');setSelectedTour(null);}} className={`flex flex-col items-center gap-1 transition ${activeTab==='dist'&&!selectedTour?'text-emerald-600':'text-gray-400'}`}><Icon name="briefcase" /><span className="text-[10px] font-black uppercase tracking-widest">Partner</span></button>
            <button onClick={()=>{setActiveTab('member');setSelectedTour(null);}} className={`flex flex-col items-center gap-1 transition ${activeTab==='member'&&!selectedTour?'text-blue-600':'text-gray-400'}`}><Icon name="user" /><span className="text-[10px] font-black uppercase tracking-widest">Me</span></button>
          </footer>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
