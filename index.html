<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅遊管家 - 平台級智能業務系統 (v4.0)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
    body { font-family: 'Noto Sans TC', sans-serif; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in-up { animation: fadeInUp 0.3s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    @keyframes run { 0% { transform: translateY(0) rotate(0deg); } 25% { transform: translateY(-8px) rotate(5deg); } 50% { transform: translateY(0) rotate(0deg); } 75% { transform: translateY(-8px) rotate(-5deg); } 100% { transform: translateY(0) rotate(0deg); } }
    .animate-run { animation: run 0.5s infinite ease-in-out; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    .line-chat-bg { background-color: #749cbd; }
    .tour-card { transition: all 0.2s; }
    .tour-card:hover { transform: translateY(-4px); }
  </style>
</head>
<body class="bg-gray-50 text-gray-800">
  <div id="root"></div>

  <script type="text/babel" data-presets="react,env">
    const { useState, useEffect, useRef, useCallback } = React;

    // --- 修正後的圖示組件：確保寬高不被覆蓋 ---
    const IconWrapper = ({ children, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={`w-6 h-6 ${className}`}>
        {children}
      </svg>
    );
    
    const Navigation = ({ className }) => <IconWrapper className={className}><polygon points="3 11 22 2 13 21 11 13 3 11"/></IconWrapper>;
    const Search = ({ className }) => <IconWrapper className={className}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></IconWrapper>;
    const MapPin = ({ className }) => <IconWrapper className={className}><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></IconWrapper>;
    const Calendar = ({ className }) => <IconWrapper className={className}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></IconWrapper>;
    const Briefcase = ({ className }) => <IconWrapper className={className}><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></IconWrapper>;
    const Users = ({ className }) => <IconWrapper className={className}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></IconWrapper>;
    const UserIcon = ({ className }) => <IconWrapper className={className}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></IconWrapper>;
    const Share2 = ({ className }) => <IconWrapper className={className}><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></IconWrapper>;
    const ArrowLeft = ({ className }) => <IconWrapper className={className}><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></IconWrapper>;
    const ArrowUp = ({ className }) => <IconWrapper className={className}><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></IconWrapper>;
    const Settings = ({ className }) => <IconWrapper className={className}><><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></></IconWrapper>;
    const RefreshCw = ({ className }) => <IconWrapper className={className}><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></IconWrapper>;
    const CheckCircle = ({ className }) => <IconWrapper className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></IconWrapper>;
    const FileCheck = ({ className }) => <IconWrapper className={className}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="m9 15 2 2 4-4"/></IconWrapper>;
    const XIcon = ({ className }) => <IconWrapper className={className}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></IconWrapper>;

    const WORKER_URL = 'https://travelkeeper.fangwl591021.workers.dev';
    const LIFF_ID = '2009367829-BDZCGti8';
    const ENDPOINT_URL = 'https://fangwl591021.github.io/travelkeeper/';

    function App() {
      const urlParams = new URLSearchParams(window.location.search);
      const [activeTab, setActiveTab] = useState(urlParams.get('tab') || 'home');
      const [itineraries, setItineraries] = useState([]);
      const [liffProfile, setLiffProfile] = useState(null);
      const [isAdmin, setIsAdmin] = useState(false);
      const [distributorStatus, setDistributorStatus] = useState(null);
      const [myDistributorData, setMyDistributorData] = useState(null);
      const [selectedTourId, setSelectedTourId] = useState(urlParams.get('t'));
      const [isLoading, setIsLoading] = useState(true);
      const [toast, setToast] = useState(null);

      // --- 推廣工具完整狀態 (不精簡) ---
      const [distPanel, setDistPanel] = useState('tours');
      const [distCardMode, setDistCardMode] = useState('single'); // 'single' | 'carousel' | 'multi'
      const [distSelectedIds, setDistSelectedIds] = useState(new Set());
      const [promoModalOpen, setPromoModalOpen] = useState(false);
      const [socOpts, setSocOpts] = useState({ phone: true, line: true, lineAt: false, fb: false, map: false });

      useEffect(() => {
        initLiff();
        fetchItineraries();
      }, []);

      const initLiff = async () => {
        try {
          await liff.init({ liffId: LIFF_ID });
          if (!liff.isLoggedIn()) {
            liff.login({ redirectUri: window.location.href });
          } else {
            const profile = await liff.getProfile();
            setLiffProfile(profile);
            checkUserStatus(profile.userId);
          }
        } catch (err) { console.error('LIFF Init Error', err); }
      };

      const checkUserStatus = async (uid) => {
        try {
          const res = await fetch(`${WORKER_URL}/api/itineraries?action=checkUserStatus&uid=${uid}`);
          const data = await res.json();
          if (data.success) {
            const info = data.data;
            if (info.isAdmin) setIsAdmin(true);
            if (info.role === 'distributor') {
              setDistributorStatus(info.status ? info.status.toLowerCase() : 'pending');
              setMyDistributorData(info.distributorData);
            }
          }
        } catch (e) { console.error('Status Check Error', e); }
        finally { setIsLoading(false); }
      };

      const fetchItineraries = async () => {
        try {
          const res = await fetch(`${WORKER_URL}/api/itineraries`);
          const data = await res.json();
          const list = Array.isArray(data) ? data : (data.data || []);
          setItineraries(list);
        } catch (e) { console.error('Fetch Tours Error', e); }
      };

      const showToastMsg = (message) => { setToast(message); setTimeout(() => setToast(null), 3000); };

      const changeTab = (newTab) => {
        setActiveTab(newTab);
        setSelectedTourId(null);
        const url = new URL(window.location.href);
        url.searchParams.set('tab', newTab);
        url.searchParams.delete('t');
        window.history.pushState({}, '', url);
      };

      // --- Flex Message 生成邏輯 (完全保留) ---
      const buildFinalFlex = () => {
        const items = Array.from(distSelectedIds).map(id => itineraries.find(i => String(i.id) === String(id))).filter(Boolean);
        if (items.length === 0) return null;
        const uid = liffProfile?.userId || '';

        if (distCardMode === 'single' || distCardMode === 'carousel') {
          const bubbles = items.map(tour => {
            const trackUrl = `${ENDPOINT_URL}?t=${tour.id}&r=${uid}`;
            const btns = [{ type: "button", style: "primary", color: "#00B900", action: { type: "uri", label: "查看行程 / 立即報名", uri: trackUrl } }];
            if (socOpts.phone && myDistributorData?.phone) btns.push({ type: "button", style: "secondary", margin: "sm", action: { type: "uri", label: "📞 撥打電話", uri: `tel:${myDistributorData.phone}` }});
            
            return {
              type: "bubble", size: "mega",
              hero: { type: "image", url: tour.image, size: "full", aspectRatio: "20:13", aspectMode: "cover" },
              body: { type: "box", layout: "vertical", contents: [
                { type: "text", text: tour.title, weight: "bold", size: "xl", wrap: true },
                { type: "text", text: `TWD ${Number(tour.price).toLocaleString()}`, color: "#b82337", weight: "bold", size: "lg", margin: "md" }
              ]},
              footer: { type: "box", layout: "vertical", spacing: "sm", contents: btns }
            };
          });
          return { type: "flex", altText: `推薦行程：${items[0].title}`, contents: distCardMode === 'carousel' ? { type: "carousel", contents: bubbles } : bubbles[0] };
        } else {
          // Multi 模式 (V3 列表)
          const rows = items.map((tour, idx) => ([
            { type: "box", layout: "horizontal", paddingAll: "10px", contents: [
              { type: "image", url: tour.image, size: "sm", aspectMode: "cover", aspectRatio: "1:1", flex: 1 },
              { type: "box", layout: "vertical", flex: 4, margin: "md", contents: [
                { type: "text", text: tour.title, size: "xs", weight: "bold", wrap: true },
                { type: "text", text: `NT$ ${Number(tour.price).toLocaleString()}`, color: "#ff0000", size: "xs", weight: "bold", margin: "xs" }
              ]},
              { type: "box", layout: "vertical", width: "40px", height: "40px", backgroundColor: "#00B900", cornerRadius: "20px", justifyContent: "center", alignItems: "center", contents: [
                { type: "text", text: "報名", color: "#ffffff", size: "xxs", weight: "bold" }
              ], action: { type: "uri", uri: `${ENDPOINT_URL}?t=${tour.id}&r=${uid}` }}
            ]},
            idx < items.length - 1 ? { type: "separator" } : null
          ])).flat().filter(Boolean);

          return {
            type: "flex", altText: `精選 ${items.length} 個推薦行程`,
            contents: { type: "bubble", body: { type: "box", layout: "vertical", paddingAll: "0px", contents: rows }}
          };
        }
      };

      const handleShare = async () => {
        const flex = buildFinalFlex();
        if (!flex) return;
        try {
          const res = await liff.shareTargetPicker([flex]);
          if (res) { showToastMsg("✅ 已成功發送！"); setPromoModalOpen(false); setDistSelectedIds(new Set()); }
        } catch (e) { showToastMsg("❌ 發送失敗或取消"); }
      };

      // --- Render Helpers ---
      const renderNavBar = () => (
        <nav className="bg-white shadow-sm sticky top-0 z-50 h-16 flex items-center px-6 justify-between">
          <div className="flex items-center cursor-pointer" onClick={() => changeTab('home')}>
            <Navigation className="text-blue-600 mr-2" />
            <span className="font-bold text-xl tracking-wider text-blue-900">旅遊管家</span>
          </div>
          <div className="hidden md:flex items-center space-x-1">
            <button onClick={() => changeTab('home')} className={`px-4 py-2 rounded-lg text-sm font-bold ${activeTab === 'home' ? 'bg-blue-50 text-blue-700' : 'text-gray-600 hover:bg-gray-100'}`}>找行程</button>
            <button onClick={() => changeTab('member')} className={`px-4 py-2 rounded-lg text-sm font-bold ${activeTab === 'member' ? 'bg-orange-50 text-orange-700' : 'text-gray-600 hover:bg-gray-100'}`}>會員中心</button>
            <button onClick={() => changeTab('distributor')} className={`px-4 py-2 rounded-lg text-sm font-bold ${activeTab === 'distributor' ? 'bg-emerald-50 text-emerald-700' : 'text-gray-600 hover:bg-gray-100'}`}>經銷專區</button>
            {isAdmin && <button onClick={() => changeTab('crm')} className={`px-4 py-2 rounded-lg text-sm font-bold ${activeTab === 'crm' ? 'bg-purple-50 text-purple-700' : 'text-gray-600 hover:bg-gray-100'}`}>CRM</button>}
          </div>
          <div className="flex items-center gap-3">
            <div className="text-right hidden sm:block">
              <p className="text-sm font-bold leading-none mb-1">{liffProfile?.displayName || '未登入'}</p>
              <span className="text-[10px] bg-gray-100 px-2 py-0.5 rounded text-gray-500 border border-gray-200">
                {isAdmin ? '系統管理員' : (distributorStatus === 'approved' ? '經銷商' : '一般訪客')}
              </span>
            </div>
            <img src={liffProfile?.pictureUrl || 'https://via.placeholder.com/150'} className="w-10 h-10 rounded-full border-2 border-white shadow-sm object-cover" />
          </div>
        </nav>
      );

      // --- 經銷商專區 (完整推廣工具箱) ---
      const renderDistributorPanel = () => {
        if (isLoading) return <div className="p-20 text-center"><RefreshCw className="animate-spin mx-auto w-10 h-10 text-emerald-500" /></div>;
        if (!distributorStatus) return (
          <div className="max-w-2xl mx-auto mt-20 p-10 bg-white rounded-3xl border text-center shadow-sm">
            <Briefcase className="w-20 h-20 text-emerald-500 mx-auto mb-6" />
            <h2 className="text-3xl font-bold mb-4">申請成為經銷商</h2>
            <p className="text-gray-500 mb-8">立即獲得專屬推廣連結與分潤獎金。</p>
            <button className="bg-emerald-500 text-white font-bold py-4 px-10 rounded-2xl w-full shadow-lg">前往登入 / 註冊</button>
          </div>
        );

        return (
          <div className="flex flex-col md:flex-row min-h-screen bg-gray-50">
            {/* 側邊導航 */}
            <div className="w-full md:w-64 bg-white border-r p-4 sticky top-16 h-fit md:h-[calc(100vh-64px)]">
              <div className="space-y-1">
                {[{id:'tours',label:'可推廣行程',icon:'✈️'},{id:'orders',label:'業績訂單',icon:'📋'},{id:'stats',label:'業績總覽',icon:'📊'},{id:'settings',label:'推廣設定',icon:'⚙️'}].map(item=>(
                  <button key={item.id} onClick={()=>setDistPanel(item.id)} className={`w-full text-left px-4 py-3 rounded-xl font-bold transition flex items-center gap-3 ${distPanel===item.id?'bg-emerald-500 text-white':'text-gray-600 hover:bg-gray-100'}`}>
                    <span>{item.icon}</span>{item.label}
                  </button>
                ))}
              </div>
            </div>

            {/* 內容區：推廣工具箱精華 */}
            <div className="flex-1 p-6 md:p-10">
              {distPanel === 'tours' && (
                <div className="animate-fade-in">
                  <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
                    <h2 className="text-2xl font-black flex items-center gap-2">推廣工具箱 <span className="text-sm font-normal text-gray-400">({itineraries.length} 個項目)</span></h2>
                    <div className="flex bg-gray-100 rounded-xl p-1 text-xs font-bold">
                      <button onClick={()=>{setDistCardMode('single'); setDistSelectedIds(new Set());}} className={`px-4 py-2 rounded-lg transition ${distCardMode==='single'?'bg-white shadow-sm':'text-gray-400'}`}>單張名片</button>
                      <button onClick={()=>setDistCardMode('carousel')} className={`px-4 py-2 rounded-lg transition ${distCardMode==='carousel'?'bg-white shadow-sm':'text-gray-400'}`}>橫向輪播</button>
                      <button onClick={()=>setDistCardMode('multi')} className={`px-4 py-2 rounded-lg transition ${distCardMode==='multi'?'bg-white shadow-sm':'text-gray-400'}`}>列表多頁</button>
                    </div>
                  </div>

                  <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
                    {itineraries.map(tour => {
                      const isSel = distSelectedIds.has(tour.id);
                      return (
                        <div key={tour.id} onClick={() => {
                          const next = new Set(distSelectedIds);
                          if (distCardMode === 'single') { next.clear(); next.add(tour.id); setDistSelectedIds(next); setPromoModalOpen(true); }
                          else { if (next.has(tour.id)) next.delete(tour.id); else if(next.size < 8) next.add(tour.id); setDistSelectedIds(next); }
                        }} className={`bg-white rounded-2xl overflow-hidden border-2 transition cursor-pointer relative group ${isSel?'border-emerald-500 shadow-lg ring-4 ring-emerald-100':'border-gray-100 shadow-sm'}`}>
                          <div className="h-32 bg-gray-200 overflow-hidden"><img src={tour.image} className="w-full h-full object-cover group-hover:scale-110 transition duration-500" /></div>
                          <div className="p-3">
                            <h4 className="text-xs font-bold text-gray-800 line-clamp-2 h-8">{tour.title}</h4>
                            <p className="text-xs font-black text-red-600 mt-2">${Number(tour.price).toLocaleString()}</p>
                          </div>
                          {isSel && <div className="absolute top-2 left-2 bg-emerald-500 text-white rounded-full p-1 shadow-md"><CheckCircle className="w-4 h-4" /></div>}
                        </div>
                      );
                    })}
                  </div>

                  {/* 底部浮動操作列 (多選模式) */}
                  {distCardMode !== 'single' && distSelectedIds.size > 0 && (
                    <div className="fixed bottom-8 left-1/2 -translate-x-1/2 w-[calc(100%-2rem)] max-w-2xl bg-slate-900 text-white rounded-3xl p-4 flex items-center justify-between shadow-2xl animate-fade-in-up z-50">
                      <div className="px-4"><p className="text-xs text-slate-400 font-bold uppercase">已選項目</p><p className="text-lg font-black text-emerald-400">{distSelectedIds.size} / 8</p></div>
                      <div className="flex gap-2">
                        <button onClick={()=>setDistSelectedIds(new Set())} className="px-4 py-3 text-sm font-bold text-slate-400">清空</button>
                        <button onClick={()=>setPromoModalOpen(true)} className="bg-emerald-500 text-white px-8 py-3 rounded-2xl font-black shadow-lg">準備發送 🚀</button>
                      </div>
                    </div>
                  )}
                </div>
              )}
              {distPanel !== 'tours' && <div className="p-20 text-center text-gray-400 font-bold">功能開發中，敬請期待...</div>}
            </div>
          </div>
        );
      };

      // --- 發送名片彈窗 (不精簡，含預覽畫面) ---
      const renderPromoModal = () => {
        if (!promoModalOpen) return null;
        const items = Array.from(distSelectedIds).map(id => itineraries.find(i => String(i.id) === String(id))).filter(Boolean);
        
        return (
          <div className="fixed inset-0 z-[100] bg-black/70 backdrop-blur-sm flex items-center justify-center p-4">
            <div className="bg-white rounded-[2rem] w-full max-w-5xl max-h-[90vh] overflow-hidden flex flex-col md:flex-row shadow-2xl animate-fade-in-up">
              {/* 設定區 */}
              <div className="flex-1 p-8 overflow-y-auto">
                <div className="flex justify-between items-center mb-8">
                  <h3 className="text-2xl font-black">發送推廣名片</h3>
                  <button onClick={()=>setPromoModalOpen(false)} className="p-2 bg-gray-100 rounded-full"><XIcon className="w-5 h-5"/></button>
                </div>
                
                <div className="space-y-6">
                  <div>
                    <p className="text-xs font-black text-gray-400 uppercase tracking-widest mb-3">設定聯絡按鈕</p>
                    <div className="grid grid-cols-2 gap-3">
                      {['phone', 'line', 'lineAt', 'fb', 'map'].map(key => (
                        <label key={key} className="flex items-center p-4 border rounded-2xl gap-3 cursor-pointer hover:bg-gray-50 transition">
                          <input type="checkbox" checked={socOpts[key]} onChange={()=>setSocOpts({...socOpts,[key]:!socOpts[key]})} className="w-5 h-5 accent-emerald-500" />
                          <span className="font-bold text-sm">{key === 'phone' ? '📞 電話' : key === 'line' ? '💬 LINE' : key === 'lineAt' ? '🟢 LINE@' : key === 'fb' ? '👍 FB' : '📍 門市'}</span>
                        </label>
                      ))}
                    </div>
                  </div>

                  <div className="pt-8 border-t space-y-3">
                    <button onClick={() => { navigator.clipboard.writeText(JSON.stringify(buildFinalFlex(), null, 2)); showToastMsg("✅ Flex JSON 已複製"); }} className="w-full py-4 bg-gray-100 rounded-2xl font-bold text-sm text-gray-600">📋 複製 Flex JSON (貼到 LINE OA)</button>
                    <button onClick={handleShare} className="w-full py-5 bg-emerald-500 text-white rounded-2xl font-black text-xl shadow-xl hover:bg-emerald-600 transition">🚀 立即分享給 LINE 好友</button>
                  </div>
                </div>
              </div>

              {/* 預覽區 (仿 LINE 聊天室) */}
              <div className="w-full md:w-[400px] line-chat-bg p-8 flex flex-col items-center">
                <p className="text-white/60 text-[10px] font-bold mb-6 uppercase tracking-widest bg-black/20 px-3 py-1 rounded-full">LINE 預覽效果</p>
                <div className="w-full overflow-hidden">
                  <div className="bg-white rounded-2xl shadow-xl overflow-hidden">
                    <img src={items[0]?.image} className="w-full aspect-[20/13] object-cover" />
                    <div className="p-4">
                      <p className="font-bold text-sm line-clamp-1">{items[0]?.title}</p>
                      <p className="text-red-600 font-black text-xs mt-1">${Number(items[0]?.price).toLocaleString()}</p>
                      <div className="mt-4 py-2 bg-emerald-500 text-white text-center rounded-lg text-[10px] font-black">查看行程 / 立即報名</div>
                      {socOpts.phone && <div className="mt-2 py-2 bg-gray-100 text-gray-800 text-center rounded-lg text-[10px] font-bold">📞 聯絡專屬顧問</div>}
                    </div>
                  </div>
                </div>
                {distCardMode === 'carousel' && <div className="mt-4 flex gap-1"><div className="w-1.5 h-1.5 bg-white rounded-full"></div><div className="w-1.5 h-1.5 bg-white/30 rounded-full"></div><div className="w-1.5 h-1.5 bg-white/30 rounded-full"></div></div>}
              </div>
            </div>
          </div>
        );
      };

      // --- 渲染首頁列表 (修正 Search Bar 圖示大小) ---
      const renderHomeTab = () => {
        if (selectedTourId) {
          const tour = itineraries.find(i => String(i.id) === String(selectedTourId));
          if (!tour) return <div className="p-20 text-center">找不到行程</div>;
          return (
            <div className="bg-white animate-fade-in pb-20 min-h-screen">
              <div className="relative h-[50vh]"><img src={tour.image} className="w-full h-full object-cover" /><div className="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent" /><div className="absolute bottom-10 left-10 text-white"><h1 className="text-4xl font-black">{tour.title}</h1></div></div>
              <div className="max-w-7xl mx-auto px-6 py-10">
                {renderAgencyBlogDescription(tour.description)}
                <button onClick={()=>setSelectedTourId(null)} className="mt-10 flex items-center gap-2 text-blue-600 font-bold"><ArrowLeft className="w-5 h-5"/> 返回列表</button>
              </div>
            </div>
          );
        }

        return (
          <div className="pb-20">
            <div className="h-80 md:h-[450px] relative bg-slate-900 overflow-hidden flex items-center justify-center">
              <img src="https://images.unsplash.com/photo-1436491865332-7a61a109cc05?w=1920" className="w-full h-full object-cover opacity-60 absolute inset-0" />
              <div className="relative z-10 text-center px-6 w-full max-w-4xl">
                <h1 className="text-4xl md:text-6xl font-black text-white mb-8 tracking-widest">探索世界的美好</h1>
                <div className="bg-white/95 backdrop-blur-md rounded-2xl p-4 shadow-2xl flex flex-col md:flex-row gap-4 items-center">
                  <div className="flex-1 flex items-center bg-gray-100 rounded-xl px-4 py-3 gap-3 w-full">
                    {/* 這裡修正了：傳入 w-6 h-6 以防壞掉 */}
                    <Search className="w-6 h-6 text-gray-400 shrink-0" />
                    <input type="text" placeholder="搜尋目的地或行程關鍵字..." className="bg-transparent outline-none w-full text-gray-800 font-bold" />
                  </div>
                  <button className="bg-blue-600 text-white font-bold py-3.5 px-10 rounded-xl w-full md:w-auto">搜尋行程</button>
                </div>
              </div>
            </div>
            
            <div className="max-w-7xl mx-auto px-4 mt-12">
              <h2 className="text-3xl font-black mb-10 text-gray-800 border-l-8 border-blue-600 pl-4">為您推薦的精選行程</h2>
              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                {itineraries.map(tour => (
                  <div key={tour.id} onClick={() => { setSelectedTourId(tour.id); window.history.pushState({}, '', `?t=${tour.id}`); }} className="tour-card bg-white rounded-[2rem] overflow-hidden border border-gray-100 shadow-sm hover:shadow-xl cursor-pointer flex flex-col">
                    <div className="h-56 overflow-hidden"><img src={tour.image} className="w-full h-full object-cover" /></div>
                    <div className="p-6 flex-1">
                      <h4 className="text-lg font-bold text-gray-900 leading-tight mb-4 h-14 line-clamp-2">{tour.title}</h4>
                      <div className="flex justify-between items-center pt-4 border-t">
                        <span className="text-sm font-bold text-gray-400">{tour.days} 天行程</span>
                        <span className="text-2xl font-black text-[#b82337]">${Number(tour.price).toLocaleString()}</span>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        );
      };

      return (
        <div className="min-h-screen bg-gray-50">
          {renderNavBar()}
          <main>
            {activeTab === 'home' && renderHomeTab()}
            {activeTab === 'distributor' && renderDistributorPanel()}
            {activeTab === 'member' && <div className="p-20 text-center text-gray-500">會員功能加載中...</div>}
            {activeTab === 'crm' && <div className="p-20 text-center text-gray-500">CRM 管理台加載中...</div>}
          </main>
          {renderPromoModal()}
          {toast && (
            <div className="fixed bottom-10 left-1/2 -translate-x-1/2 z-[200] animate-fade-in-up">
              <div className="bg-slate-900 text-white px-8 py-4 rounded-2xl shadow-2xl font-bold">{toast}</div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
