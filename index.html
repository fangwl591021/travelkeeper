<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅遊管家 - 智能業務系統 (旗艦穩定版)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in-up { animation: fadeInUp 0.3s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    @keyframes run { 0% { transform: translateY(0) rotate(0deg); } 25% { transform: translateY(-8px) rotate(5deg); } 50% { transform: translateY(0) rotate(0deg); } 75% { transform: translateY(-8px) rotate(-5deg); } 100% { transform: translateY(0) rotate(0deg); } }
    .animate-run { animation: run 0.5s infinite ease-in-out; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    .line-chat-bg { background-color: #749cbd; }
  </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800">
  <div id="root"></div>

  <script type="text/babel" data-presets="react,env">
    const { useState, useEffect, useRef } = React;

    // --- 圖示組件 ---
    const IconWrapper = ({ children, className = "w-6 h-6" }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>;
    const Navigation = ({ className }) => <IconWrapper className={className}><polygon points="3 11 22 2 13 21 11 13 3 11"/></IconWrapper>;
    const Search = ({ className }) => <IconWrapper className={className}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></IconWrapper>;
    const MapPin = ({ className }) => <IconWrapper className={className}><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></IconWrapper>;
    const Calendar = ({ className }) => <IconWrapper className={className}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></IconWrapper>;
    const UploadCloud = ({ className }) => <IconWrapper className={className}><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></IconWrapper>;
    const RefreshCw = ({ className }) => <IconWrapper className={className}><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></IconWrapper>;
    const ArrowLeft = ({ className }) => <IconWrapper className={className}><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></IconWrapper>;
    const Users = ({ className }) => <IconWrapper className={className}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></IconWrapper>;

    const WORKER_URL = 'https://travelkeeper.fangwl591021.workers.dev';
    const LIFF_ID = '2009367829-BDZCGti8'; 
    const ENDPOINT_URL = 'https://fangwl591021.github.io/travelkeeper/';

    function App() {
      const [activeTab, setActiveTab] = useState('home');
      const [itineraries, setItineraries] = useState([]);
      const [filteredResults, setFilteredResults] = useState([]);
      const [isLoading, setIsLoading] = useState(true);
      const [selectedTourId, setSelectedTourId] = useState(null);
      const [liffProfile, setLiffProfile] = useState(null);
      const [isAdmin, setIsAdmin] = useState(false);
      const [isDistributor, setIsDistributor] = useState(false);
      const [toast, setToast] = useState(null);

      // --- 初始化 ---
      useEffect(() => {
        const init = async () => {
          try {
            await liff.init({ liffId: LIFF_ID, withLoginOnExternalBrowser: true });
            if (liff.isLoggedIn()) {
              const profile = await liff.getProfile();
              setLiffProfile(profile);
              checkRole(profile.userId);
            }
          } catch (e) { console.error('LIFF Init Error', e); }
          fetchData();
        };
        init();
      }, []);

      const checkRole = async (uid) => {
        const adminUIDs = ["Uf729764dbb5b652a5a90a467320bea29"];
        if (adminUIDs.includes(uid)) setIsAdmin(true);
        // 經銷商檢查邏輯...
      };

      const fetchData = async () => {
        setIsLoading(true);
        try {
          const res = await fetch(`${WORKER_URL}/api/itineraries?_t=${Date.now()}`);
          const data = await res.json();
          setItineraries(data || []);
          setFilteredResults(data || []);
        } catch (e) { console.error('Fetch Error', e); }
        setIsLoading(false);
      };

      const showToast = (message) => {
        setToast(message);
        setTimeout(() => setToast(null), 3000);
      };

      // --- 介面渲染 ---
      const renderNavBar = () => (
        <nav className="bg-white shadow-md sticky top-0 z-50">
          <div className="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div className="flex items-center cursor-pointer" onClick={() => setActiveTab('home')}>
              <Navigation className="h-7 w-7 text-blue-600 mr-2" />
              <span className="font-bold text-xl tracking-tight text-blue-900">旅遊管家</span>
            </div>
            <div className="flex items-center space-x-4">
              <button onClick={() => setActiveTab('home')} className={`px-3 py-2 rounded-lg text-sm font-bold ${activeTab === 'home' ? 'text-blue-700 bg-blue-50' : 'text-gray-600'}`}>首頁行程</button>
              {isAdmin && <button onClick={() => setActiveTab('admin')} className={`px-3 py-2 rounded-lg text-sm font-bold ${activeTab === 'admin' ? 'text-red-700 bg-red-50' : 'text-gray-600'}`}>後台上稿</button>}
              <div className="flex items-center ml-4">
                <img src={liffProfile?.pictureUrl || 'https://via.placeholder.com/150'} className="w-9 h-9 rounded-full border shadow-sm" />
              </div>
            </div>
          </div>
        </nav>
      );

      return (
        <div className="min-h-screen bg-gray-50 flex flex-col">
          {renderNavBar()}
          <main className="flex-grow max-w-7xl mx-auto w-full p-4">
            {isLoading ? (
              <div className="flex flex-col items-center justify-center py-40">
                <RefreshCw className="w-10 h-10 text-blue-500 animate-spin mb-4" />
                <p className="text-gray-500 font-bold">載入系統中...</p>
              </div>
            ) : activeTab === 'home' ? (
              <div className="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6 animate-fade-in">
                {filteredResults.map(item => (
                  <div key={item.id} className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-lg transition cursor-pointer">
                    <div className="h-48 overflow-hidden"><img src={item.image} className="w-full h-full object-cover" /></div>
                    <div className="p-4">
                      <h4 className="font-bold text-lg mb-2 line-clamp-2">{item.title}</h4>
                      <p className="text-red-600 font-black text-xl">${Number(item.price).toLocaleString()}</p>
                    </div>
                  </div>
                ))}
              </div>
            ) : (
              <div className="p-10 bg-white rounded-3xl border border-gray-100 text-center shadow-sm">
                 <h2 className="text-2xl font-black mb-4">後台管理系統</h2>
                 <p className="text-gray-400">目前為單一企業穩定版。</p>
              </div>
            )}
          </main>
          {toast && (<div className="fixed bottom-6 right-6 z-50 bg-gray-900 text-white px-6 py-3 rounded-2xl shadow-2xl animate-fade-in-up font-bold">{toast}</div>)}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
