<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅遊管家 - 智慧旅遊平台 (SaaS 版)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in-up { animation: fadeInUp 0.3s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
  </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800">
  <div id="root"></div>

  <script type="text/babel" data-presets="react,env">
    const { useState, useEffect, useRef } = React;

    const Icon = ({ name, className = "w-6 h-6" }) => {
      const icons = {
        home: (
          <React.Fragment>
            <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </React.Fragment>
        ),
        search: (
          <React.Fragment>
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </React.Fragment>
        ),
        user: (
          <React.Fragment>
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </React.Fragment>
        ),
        briefcase: (
          <React.Fragment>
            <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
          </React.Fragment>
        ),
        calendar: (
          <React.Fragment>
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </React.Fragment>
        ),
        refresh: (
          <React.Fragment>
            <polyline points="23 4 23 10 17 10"/>
            <polyline points="1 20 1 14 7 14"/>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
          </React.Fragment>
        ),
        arrowLeft: (
          <React.Fragment>
            <line x1="19" y1="12" x2="5" y2="12"/>
            <polyline points="12 19 5 12 12 5"/>
          </React.Fragment>
        ),
        share: (
          <React.Fragment>
            <circle cx="18" cy="5" r="3"/>
            <circle cx="6" cy="12" r="3"/>
            <circle cx="18" cy="19" r="3"/>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
          </React.Fragment>
        )
      };
      return (
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
          {icons[name]}
        </svg>
      );
    };

    // ★ 設定 Worker URL 與頁面路徑
    const WORKER_URL = 'https://travelkeeper.fangwl591021.workers.dev';
    const LOGIN_PAGE = 'login.html';
    const MODEL_PAGE = 'model.html';

    function App() {
      const urlParams = new URLSearchParams(window.location.search);
      const agencySlug = urlParams.get('a') || 'demo'; 
      const refUid = urlParams.get('r') || '';       
      const initTab = urlParams.get('tab') || 'home';

      const [tenant, setTenant] = useState(null);    
      const [itineraries, setItineraries] = useState([]);
      const [activeTab, setActiveTab] = useState(initTab);
      const [selectedTour, setSelectedTour] = useState(null);
      const [isLoading, setIsLoading] = useState(true);
      const [liffProfile, setLiffProfile] = useState(null);
      const [myStatus, setMyStatus] = useState({ role: 'guest', isAdmin: false });

      useEffect(() => {
        const init = async () => {
          try {
            const configRes = await fetch(`${WORKER_URL}/api/config?a=${agencySlug}`);
            const configData = await configRes.json();
            
            if (configData.success) {
              setTenant(configData.data);
              
              await liff.init({ liffId: configData.data.liff_id });
              if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                setLiffProfile(profile);
                checkStatus(profile.userId);
              }
              fetchTours();
            } else {
              console.error("找不到該租戶的配置");
            }
          } catch (e) {
            console.error("初始化錯誤", e);
          } finally {
            setIsLoading(false);
          }
        };
        init();
      }, [agencySlug]);

      const fetchTours = async () => {
        try {
          const res = await fetch(`${WORKER_URL}/api/itineraries?a=${agencySlug}`);
          const data = await res.json();
          setItineraries(Array.isArray(data) ? data : []);
        } catch (e) {
          console.error("獲取行程錯誤", e);
        }
      };

      const checkStatus = async (uid) => {
        try {
          const res = await fetch(`${WORKER_URL}/api/itineraries?action=checkUserStatus&uid=${uid}&a=${agencySlug}`);
          const result = await res.json();
          if (result.success) setMyStatus(result.data);
        } catch (e) {
          console.error("檢查狀態錯誤", e);
        }
      };

      // 導向註冊/登入頁面邏輯
      const handleRegister = (type = 'user') => {
        window.location.href = `${LOGIN_PAGE}?a=${agencySlug}&type=${type}`;
      };

      if (isLoading) return (
        <div className="flex flex-col items-center justify-center min-h-screen bg-white">
          <div className="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
          <p className="text-gray-500 font-bold">正在進入專屬平台...</p>
        </div>
      );

      if (!tenant) return <div className="p-20 text-center text-red-500 font-bold text-2xl">系統配置錯誤，請聯絡管理員。</div>;

      // 渲染會員中心
      const renderMemberTab = () => {
        if (!liffProfile || myStatus.role === 'guest') {
          return (
            <div className="p-6 text-center animate-fade-in mt-10">
              <div className="bg-orange-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4"><Icon name="user" className="w-10 h-10 text-orange-500"/></div>
              <h2 className="text-2xl font-bold mb-2">您尚未登入或註冊</h2>
              <p className="text-gray-500 mb-8">註冊成為會員，輕鬆管理您的訂單與行程。</p>
              <button onClick={() => handleRegister('user')} className="bg-blue-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg w-full max-w-xs">立即免費註冊</button>
            </div>
          );
        }

        return (
          <div className="p-6 animate-fade-in max-w-3xl mx-auto">
            <h2 className="text-2xl font-black mb-6">會員中心</h2>
            <div className="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 flex items-center gap-4 mb-6">
              <img src={liffProfile.pictureUrl} className="w-16 h-16 rounded-full shadow-sm" />
              <div>
                <p className="text-sm text-gray-500 font-bold">{tenant.name} 會員</p>
                <p className="text-xl font-black text-gray-800">{myStatus.userData?.name || liffProfile.displayName}</p>
              </div>
            </div>

            <div className="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 mb-6 text-center py-10">
              <p className="text-gray-400 font-bold">目前尚無歷史訂單</p>
            </div>

            {myStatus.role === 'user' && (
              <div className="bg-emerald-50 rounded-2xl p-6 border border-emerald-100 flex flex-col items-center text-center">
                <div className="bg-emerald-100 p-3 rounded-full mb-3"><Icon name="briefcase" className="w-6 h-6 text-emerald-600"/></div>
                <h3 className="font-bold text-lg text-emerald-800 mb-2">想成為推廣夥伴嗎？</h3>
                <p className="text-sm text-emerald-600 mb-4">申請成為經銷商，獲取專屬推廣工具與分潤。</p>
                <button onClick={() => handleRegister('distributor')} className="bg-emerald-600 text-white font-bold py-2.5 px-6 rounded-xl shadow-md">立即申請經銷商</button>
              </div>
            )}
          </div>
        );
      };

      // 渲染經銷商專區
      const renderDistTab = () => {
        if (!liffProfile || myStatus.role !== 'distributor') {
          return (
            <div className="p-6 text-center animate-fade-in mt-10">
              <div className="bg-emerald-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4"><Icon name="briefcase" className="w-10 h-10 text-emerald-600"/></div>
              <h2 className="text-2xl font-bold mb-2">經銷商專區</h2>
              <p className="text-gray-500 mb-8">此區域僅限審核通過的推廣夥伴使用。</p>
              <button onClick={() => handleRegister('distributor')} className="bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg w-full max-w-xs">申請加入經銷商</button>
            </div>
          );
        }

        const distData = myStatus.distributorData;
        return (
          <div className="p-6 animate-fade-in max-w-3xl mx-auto">
            <h2 className="text-2xl font-black mb-6 text-emerald-800">推廣管理後台</h2>
            
            <div className="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 mb-6">
              <div className="flex justify-between items-start mb-4">
                <div className="flex items-center gap-3">
                  <img src={liffProfile.pictureUrl} className="w-12 h-12 rounded-full shadow-sm" />
                  <div>
                    <p className="font-black text-lg">{distData?.name || liffProfile.displayName}</p>
                    <p className="text-xs text-gray-500 font-bold">{distData?.company_name}</p>
                  </div>
                </div>
                <span className={`px-2 py-1 rounded text-xs font-bold ${distData?.status === 'approved' ? 'bg-green-100 text-green-700' : 'bg-orange-100 text-orange-700'}`}>
                  {distData?.status === 'approved' ? '審核通過' : '審核中'}
                </span>
              </div>
            </div>

            <div className="grid grid-cols-2 gap-4 mb-6">
              <div className="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
                <p className="text-xs text-gray-400 font-bold mb-1">本月推廣數</p>
                <p className="text-2xl font-black text-gray-800">0</p>
              </div>
              <div className="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
                <p className="text-xs text-gray-400 font-bold mb-1">預估分潤</p>
                <p className="text-2xl font-black text-emerald-600">$0</p>
              </div>
            </div>

            {distData?.status === 'approved' && (
              <button onClick={() => window.location.href = `${MODEL_PAGE}?a=${agencySlug}`} className="w-full bg-slate-800 text-white font-bold py-4 rounded-xl shadow-lg flex justify-center items-center gap-2 mb-4 hover:bg-slate-700 transition">
                <Icon name="share" /> 開啟名片推廣工具 (Web)
              </button>
            )}
            
            {distData?.status !== 'approved' && (
              <div className="bg-orange-50 text-orange-700 p-4 rounded-xl text-sm font-bold border border-orange-200">
                ⚠️ 您的帳號目前正在審核中，通過後即可使用推廣工具。
              </div>
            )}
          </div>
        );
      };

      return (
        <div className="min-h-screen flex flex-col bg-gray-50">
          {/* 導航列 */}
          <nav className="bg-white shadow-sm sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
            <div className="flex items-center gap-2 cursor-pointer" onClick={() => { setActiveTab('home'); setSelectedTour(null); }}>
              <div className="bg-blue-600 p-1.5 rounded-lg text-white font-black text-xs">TK</div>
              <span className="font-bold text-lg text-blue-900">{tenant.name}</span>
            </div>
            <div className="flex items-center gap-4">
              {liffProfile ? (
                <img src={liffProfile.pictureUrl} className="w-9 h-9 rounded-full border border-gray-200" onClick={() => setActiveTab('member')} />
              ) : (
                <button onClick={() => handleRegister('user')} className="bg-[#00B900] text-white px-4 py-1.5 rounded-full text-xs font-bold shadow-sm">登入 / 註冊</button>
              )}
            </div>
          </nav>

          {/* 內容區切換 */}
          <main className="flex-grow pb-24 md:pb-6">
            {selectedTour ? (
              // 行程詳情頁
              <div className="animate-fade-in bg-white min-h-screen">
                <div className="relative h-[40vh]">
                  <img src={selectedTour.image} className="w-full h-full object-cover" />
                  <button onClick={() => setSelectedTour(null)} className="absolute top-4 left-4 bg-black/50 text-white p-2 rounded-full backdrop-blur-md">
                    <Icon name="arrowLeft" />
                  </button>
                </div>
                <div className="p-6">
                  <span className="bg-red-100 text-red-700 px-3 py-1 rounded-full text-xs font-bold mb-3 inline-block">{selectedTour.region}</span>
                  <h1 className="text-3xl font-black mb-4">{selectedTour.title}</h1>
                  <div className="flex justify-between items-center bg-gray-50 p-4 rounded-2xl mb-6">
                    <div><p className="text-gray-400 text-xs font-bold">價格</p><p className="text-2xl font-black text-red-600">TWD {Number(selectedTour.price).toLocaleString()}</p></div>
                    <div><p className="text-gray-400 text-xs font-bold">天數</p><p className="text-xl font-bold">{selectedTour.days} 天</p></div>
                  </div>
                  <div className="prose max-w-none whitespace-pre-wrap leading-relaxed text-gray-700">
                    {selectedTour.description}
                  </div>
                  <button className="w-full bg-[#b82337] text-white py-4 rounded-2xl font-black text-lg mt-10 shadow-lg shadow-red-100">立即預約報名</button>
                </div>
              </div>
            ) : activeTab === 'member' ? (
              renderMemberTab()
            ) : activeTab === 'dist' ? (
              renderDistTab()
            ) : (
              // 首頁列表
              <div className="animate-fade-in">
                <header className="h-64 relative overflow-hidden">
                  <img src={tenant.banner_url} className="w-full h-full object-cover" />
                  <div className="absolute inset-0 bg-black/30 flex flex-col justify-center items-center text-white p-6 text-center">
                    <h2 className="text-3xl font-black mb-2 drop-shadow-md">探索世界的美好</h2>
                    <p className="text-sm opacity-90">為您精選最優質的旅遊行程</p>
                  </div>
                </header>

                <div className="max-w-6xl mx-auto px-6 py-10">
                  <div className="flex justify-between items-center mb-8 border-b pb-4">
                    <h3 className="text-xl font-bold flex items-center gap-2"><Icon name="calendar" className="w-5 h-5 text-blue-600" /> 精選行程</h3>
                    <span className="text-xs text-gray-400 font-bold">共 {itineraries.length} 筆</span>
                  </div>

                  {itineraries.length === 0 ? (
                    <div className="text-center py-20 text-gray-400 bg-white rounded-3xl border-2 border-dashed border-gray-100">目前尚無行程上架</div>
                  ) : (
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                      {itineraries.map(item => (
                        <div key={item.id} onClick={() => setSelectedTour(item)} className="bg-white rounded-2xl overflow-hidden border border-gray-200 hover:shadow-xl transition-all cursor-pointer group">
                          <div className="h-48 overflow-hidden">
                            <img src={item.image} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />
                          </div>
                          <div className="p-4">
                            <h4 className="font-bold text-lg mb-2 line-clamp-2">{item.title}</h4>
                            <div className="flex justify-between items-end pt-2 border-t border-gray-50">
                              <span className="text-sm text-gray-400 font-bold">{item.days} 天</span>
                              <span className="text-red-600 font-black text-xl">${Number(item.price).toLocaleString()}</span>
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            )}
          </main>

          {/* 底部選單 */}
          <footer className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 px-6 py-2 flex justify-around items-center md:hidden shadow-[0_-4px_10px_rgba(0,0,0,0.03)] z-50">
            <button onClick={() => {setActiveTab('home'); setSelectedTour(null);}} className={`flex flex-col items-center gap-1 ${activeTab==='home'&&!selectedTour?'text-blue-600':'text-gray-400'}`}><Icon name="home" /><span className="text-[10px] font-bold">首頁</span></button>
            <button onClick={() => {setActiveTab('member'); setSelectedTour(null);}} className={`flex flex-col items-center gap-1 ${activeTab==='member'&&!selectedTour?'text-blue-600':'text-gray-400'}`}><Icon name="user" /><span className="text-[10px] font-bold">會員</span></button>
            <button onClick={() => {setActiveTab('dist'); setSelectedTour(null);}} className={`flex flex-col items-center gap-1 ${activeTab==='dist'&&!selectedTour?'text-blue-600':'text-gray-400'}`}><Icon name="briefcase" /><span className="text-[10px] font-bold">經銷商</span></button>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
