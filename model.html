<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>旅遊管家 · 推廣工具 (三合一版本)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    .tour-card.selected { border-color: #10b981; box-shadow: 0 0 0 3px rgba(16,185,129,0.2); }
    .carousel-preview { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; gap: 12px; padding: 10px; }
    .carousel-item { flex: 0 0 80%; scroll-snap-align: start; background: white; border-radius: 16px; border: 2px solid #333; }
  </style>
</head>
<body class="bg-gray-50 pb-20">
  <nav class="bg-white border-b p-4 flex justify-between items-center sticky top-0 z-50">
    <span class="font-black text-xl">推廣工具箱</span>
    <div class="flex bg-gray-100 rounded-lg p-1 text-xs font-bold">
      <button onclick="setMode('single')" id="m-single" class="px-4 py-2 rounded-md bg-white shadow-sm">單張名片</button>
      <button onclick="setMode('carousel')" id="m-carousel" class="px-4 py-2 rounded-md">橫向輪播</button>
      <button onclick="setMode('multi')" id="m-multi" class="px-4 py-2 rounded-md">列表多頁</button>
    </div>
  </nav>

  <div id="app" class="p-4 grid grid-cols-2 md:grid-cols-4 gap-4">
    <!-- 行程卡片將由 JS 渲染 -->
  </div>

  <div id="footer" class="fixed bottom-0 left-0 right-0 bg-slate-900 text-white p-4 hidden flex justify-between items-center">
    <span id="select-hint">已選 0 個行程</span>
    <button onclick="openExportModal()" class="bg-emerald-500 px-6 py-2 rounded-xl font-bold">準備發送名片 🚀</button>
  </div>

  <script>

    let selectedIds = new Set();
    const LIFF_ID = '2009367829-BDZCGti8';

    async function init() {
      await liff.init({ liffId: LIFF_ID });
      // 載入行程資料並渲染...
    }
    
    function setMode(m) {
      mode = m;
      selectedIds.clear();
      // 更新 UI 狀態...
    }

    function onCardClick(id) {
      if (mode === 'single') {
        // 直接開啟單張設定彈窗
      } else {
        // 切換勾選狀態
      }
    }
    
    // ...其餘 Carousel 與 Multi 渲染邏輯
    init();
  </script>
</body>
</html>
