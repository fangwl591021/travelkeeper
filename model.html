<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅遊管家 · 獨立推廣工具</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Noto Sans TC', sans-serif; }
    :root {
      --red: #b82337;
      --green: #00B900;
      --emerald: #10b981;
      --slate: #1e293b;
    }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 99px; }

    @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes popIn  { 0% { transform:scale(.85); opacity:0; } 60% { transform:scale(1.04); } 100% { transform:scale(1); opacity:1; } }
    .anim-fade-up  { animation: fadeUp .35s ease both; }
    .anim-pop-in   { animation: popIn .3s cubic-bezier(.34,1.56,.64,1) both; }

    /* ── Card ── */
    .tour-card {
      position: relative; background: #fff; border: 2px solid #e2e8f0; border-radius: 12px;
      overflow: hidden; cursor: pointer; transition: all .2s; user-select: none;
    }
    .tour-card:hover { border-color: #94a3b8; transform: translateY(-2px); }
    .tour-card.selected { border-color: var(--emerald); box-shadow: 0 0 0 3px rgba(16,185,129,.2), 0 4px 15px rgba(0,0,0,.05); }

    .card-check {
      position: absolute; top: 8px; left: 8px; z-index: 5;
      width: 22px; height: 22px; border-radius: 6px; border: 2.5px solid #fff;
      background: rgba(0,0,0,.35); display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }
    .tour-card.selected .card-check { background: var(--emerald); border-color: var(--emerald); }
    .card-check svg { display:none; }
    .tour-card.selected .card-check svg { display:block; }

    /* Bottom bar */
    #bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 50; background: var(--slate);
      box-shadow: 0 -4px 24px rgba(0,0,0,.3); padding: 12px 16px;
      transform: translateY(100%); transition: transform .3s cubic-bezier(.16,1,.3,1);
    }
    #bottom-bar.visible { transform: translateY(0); }

    /* Tab */
    .tab-btn { transition: all .2s; }
    .tab-btn.active { background: var(--emerald); color: #fff; box-shadow: 0 2px 8px rgba(16,185,129,.35); }

    /* Modal */
    .modal-overlay {
      position: fixed; inset:0; z-index: 80; background: rgba(0,0,0,.65); backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center; padding: 16px;
      opacity:0; pointer-events:none; transition: opacity .25s;
    }
    .modal-overlay.open { opacity:1; pointer-events:auto; }
    .modal-sheet {
      background: #fff; border-radius: 20px; width: 100%; max-width: 960px; max-height: 92vh;
      overflow: hidden; transform: scale(.94) translateY(16px); transition: transform .3s;
      display: flex; flex-direction: column;
    }
    .modal-overlay.open .modal-sheet { transform: scale(1) translateY(0); }
    
    .modal-body-layout { display: flex; flex: 1; overflow: hidden; }
    .modal-left { flex: 1; overflow-y: auto; padding: 20px 24px; }
    .modal-right {
      width: 340px; flex-shrink: 0; background: #749cbd;
      display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; gap: 12px;
    }
    @media (max-width: 768px) { .modal-right { display: none; } }

    /* Toast */
    #toast {
      position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(16px);
      background:#1e293b; color:#fff; padding:10px 20px; border-radius:10px; font-size:13px; font-weight:700;
      opacity:0; pointer-events:none; transition: all .25s; z-index:999;
    }
    #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    /* Social Checkboxes */
    .soc-check label { display:flex; align-items:center; gap:8px; padding:8px 10px; border-radius:8px; cursor:pointer; border:1.5px solid #e2e8f0; font-size:13px; font-weight:600; transition:all .15s; }
    .soc-check input:checked + label { border-color:var(--emerald); background:#f0fdf4; color:#065f46; }
    .soc-check input { display:none; }
    
    /* Skeleton */
    .skeleton { background: linear-gradient(90deg,#f1f5f9 25%,#e2e8f0 50%,#f1f5f9 75%); background-size:200% 100%; animation: skeleton-slide 1.2s infinite; border-radius:6px; }
    @keyframes skeleton-slide { 0%{background-position:200%} 100%{background-position:-200%} }
  </style>
</head>
<body class="bg-[#F0F4F8] min-h-screen pb-28">

  <!-- ── TOP NAV ── -->
  <nav class="sticky top-0 z-40 bg-white/90 backdrop-blur border-b border-slate-200 shadow-sm">
    <div class="max-w-6xl mx-auto px-4 h-14 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <svg class="w-6 h-6 text-emerald-600" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
        <span class="font-black text-lg text-slate-800 tracking-wide">推廣工具</span>
      </div>
      <div class="flex items-center gap-3">
        <!-- 模式切換：單張、橫向輪播、垂直多頁 -->
        <div class="flex bg-slate-100 rounded-lg p-1 text-xs font-bold overflow-x-auto">
          <button id="mode-single" onclick="setMode('single')" class="tab-btn active px-4 py-1.5 rounded-md flex-shrink-0 transition-all">單張名片</button>
          <button id="mode-carousel" onclick="setMode('carousel')" class="tab-btn px-4 py-1.5 rounded-md text-slate-500 flex-shrink-0 transition-all">橫向輪播</button>
          <button id="mode-multi" onclick="setMode('multi')" class="tab-btn px-4 py-1.5 rounded-md text-slate-500 flex-shrink-0 transition-all">列表多頁</button>
        </div>
      </div>
    </div>
  </nav>

  <!-- ── SEARCH BAR ── -->
  <div class="bg-white/95 backdrop-blur border-b border-slate-100 shadow-sm mb-5">
    <div class="max-w-6xl mx-auto px-4 py-3 flex gap-2">
      <div class="relative flex-1">
        <svg class="absolute left-3 top-2.5 w-4 h-4 text-slate-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="search-input" type="text" placeholder="搜尋行程名稱…" oninput="filterCards()" class="w-full pl-9 pr-4 py-2 text-sm bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-emerald-400 transition">
      </div>
    </div>
  </div>

  <!-- ── MAIN GRID ── -->
  <main class="max-w-6xl mx-auto px-4">
    <div class="flex items-center justify-between mb-4">
      <div class="flex items-center gap-2">
        <p id="count-label" class="text-xs font-bold text-slate-500 tracking-wide"></p>
        <span id="mode-hint" class="text-[10px] bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full font-bold hidden sm:block">點擊卡片產生名片</span>
      </div>
      <button id="select-all-btn" onclick="toggleSelectAll()" class="text-xs font-bold text-emerald-600 hidden hover:text-emerald-700 underline underline-offset-2">全部選取</button>
    </div>
    
    <div id="cards-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 anim-fade-up"></div>
    
    <div id="empty-state" class="hidden py-24 text-center">
      <div class="text-5xl mb-4 opacity-50">🔍</div>
      <p class="text-slate-400 font-bold">找不到符合的行程</p>
    </div>
  </main>

  <!-- ── BOTTOM BAR (Multi & Carousel) ── -->
  <div id="bottom-bar">
    <div class="max-w-6xl mx-auto flex items-center justify-between gap-3">
      <div>
        <p class="text-white text-sm font-bold">已選 <span id="selected-count" class="text-emerald-400 text-lg font-black">0</span> 個</p>
        <p class="text-slate-400 text-[10px]">最多可選 8 個</p>
      </div>
      <div class="flex gap-2">
        <button onclick="clearSelection()" class="bg-slate-700 hover:bg-slate-600 text-white text-xs font-bold px-4 py-2.5 rounded-lg transition">清除</button>
        <button onclick="openShareModal()" id="share-btn" disabled class="bg-emerald-500 hover:bg-emerald-600 text-white text-sm font-bold px-6 py-2.5 rounded-lg opacity-50 cursor-not-allowed transition">
          發送名片 🚀
        </button>
      </div>
    </div>
  </div>

  <!-- ========================================================================= -->
  <!-- MODAL: SINGLE CARD (單張名片) -->
  <!-- ========================================================================= -->
  <div id="single-modal" class="modal-overlay" onclick="closeModal(event, 'single-modal')">
    <div class="modal-sheet anim-pop-in">
      <div class="bg-white border-b border-slate-100 px-5 py-4 flex justify-between items-center">
        <div><p class="font-black text-slate-800">單張推廣名片</p><p id="single-modal-title" class="text-xs text-slate-400 mt-1 truncate max-w-[200px]"></p></div>
        <button onclick="document.getElementById('single-modal').classList.remove('open')" class="text-slate-400 hover:text-slate-600 bg-slate-100 p-2 rounded-full font-bold leading-none">✕</button>
      </div>
      <div class="modal-body-layout">
        <div class="modal-left space-y-5">
          <div>
            <p class="text-xs font-black text-slate-500 mb-3">名片聯絡按鈕（建議 1~3 項）</p>
            <div id="single-soc-options" class="grid grid-cols-2 gap-2 soc-check" onchange="renderPreview('single')"></div>
          </div>
          <div class="pt-4 border-t border-slate-100 space-y-2.5">
            <p class="text-xs font-black text-slate-500 mb-2">發送與分享</p>
            <button onclick="executeAction('single', 'web')"    class="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-bold py-3 rounded-lg">🔗 複製純網頁連結</button>
            <button onclick="executeAction('single', 'send')"   class="w-full bg-indigo-500 hover:bg-indigo-600 text-white text-sm font-bold py-3 rounded-lg">📨 複製 LINE OA 專用轉傳連結</button>
            <button onclick="executeAction('single', 'picker')" class="w-full bg-[#00B900] hover:bg-[#009900] text-white text-sm font-bold py-3 rounded-lg flex justify-center items-center gap-2">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg> 在此裝置直接傳給好友
            </button>
          </div>
        </div>
        <div class="modal-right">
          <p class="text-white/80 text-[10px] font-bold bg-black/20 px-3 py-1 rounded-full">預覽畫面</p>
          <div id="single-preview" class="w-full max-w-[260px] bg-white rounded-[16px] overflow-hidden shadow-2xl border-4 border-slate-800"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ========================================================================= -->
  <!-- MODAL: CAROUSEL (橫向輪播) -->
  <!-- ========================================================================= -->
  <div id="carousel-modal" class="modal-overlay" onclick="closeModal(event, 'carousel-modal')">
    <div class="modal-sheet anim-pop-in" style="max-width:850px;">
      <div class="bg-white border-b border-slate-100 px-5 py-4 flex justify-between items-center">
        <div><p class="font-black text-slate-800">橫向輪播名片推廣</p><p class="text-xs text-slate-400 mt-1">已選 <span id="carousel-modal-count" class="text-emerald-600 font-bold">0</span> 個行程</p></div>
        <button onclick="document.getElementById('carousel-modal').classList.remove('open')" class="text-slate-400 hover:text-slate-600 bg-slate-100 p-2 rounded-full font-bold leading-none">✕</button>
      </div>
      <div class="modal-body-layout flex-col md:flex-row">
        <div class="modal-left space-y-5">
          <div>
            <p class="text-xs font-black text-slate-500 mb-3">套用聯絡按鈕至所有卡片</p>
            <div id="carousel-soc-options" class="grid grid-cols-2 gap-2 soc-check" onchange="renderPreview('carousel')"></div>
          </div>
          <div class="pt-4 border-t border-slate-100 space-y-2.5">
            <button onclick="executeAction('carousel', 'copy')"   class="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-bold py-3 rounded-lg">📋 複製 Flex JSON (LINE OA 用)</button>
            <button onclick="executeAction('carousel', 'picker')" class="w-full bg-[#00B900] hover:bg-[#009900] text-white text-sm font-bold py-3 rounded-lg flex justify-center items-center gap-2">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg> 立即傳給好友
            </button>
          </div>
        </div>
        <div class="modal-right" style="width: 380px;">
          <p class="text-white/80 text-[10px] font-bold bg-black/20 px-3 py-1 rounded-full mb-3">預覽畫面 (左右滑動查看)</p>
          <!-- Carousel Container -->
          <div id="carousel-preview" class="flex gap-3 overflow-x-auto w-full pb-3 custom-scrollbar px-2" style="scroll-snap-type: x mandatory;">
            <!-- Rendered by JS -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ========================================================================= -->
  <!-- MODAL: MULTI LIST (列表多頁) -->
  <!-- ========================================================================= -->
  <div id="multi-modal" class="modal-overlay" onclick="closeModal(event, 'multi-modal')">
    <div class="modal-sheet anim-pop-in">
      <div class="bg-white border-b border-slate-100 px-5 py-4 flex justify-between items-center">
        <div><p class="font-black text-slate-800">列表式名片推廣</p><p class="text-xs text-slate-400 mt-1">已選 <span id="multi-modal-count" class="text-emerald-600 font-bold">0</span> 個行程</p></div>
        <button onclick="document.getElementById('multi-modal').classList.remove('open')" class="text-slate-400 hover:text-slate-600 bg-slate-100 p-2 rounded-full font-bold leading-none">✕</button>
      </div>
      <div class="modal-body-layout">
        <div class="modal-left space-y-4">
          <div>
            <p class="text-xs font-bold text-slate-500 mb-1.5">設定主視覺圖網址 (留空則用第一張)</p>
            <input id="multi-hero-url" type="text" placeholder="https://..." oninput="renderPreview('multi')" class="w-full text-xs bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 outline-none">
          </div>
          <div>
            <p class="text-xs font-black text-slate-500 mb-2">底部社群 Icon 連結</p>
            <div id="multi-soc-options" class="grid grid-cols-3 gap-2 soc-check" onchange="renderPreview('multi')"></div>
          </div>
          <div class="pt-4 border-t border-slate-100 space-y-2.5">
            <button onclick="executeAction('multi', 'copy')"   class="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-bold py-3 rounded-lg">📋 複製 Flex JSON</button>
            <button onclick="executeAction('multi', 'picker')" class="w-full bg-[#00B900] hover:bg-[#009900] text-white text-sm font-bold py-3 rounded-lg flex justify-center items-center gap-2">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg> 立即傳給好友
            </button>
          </div>
        </div>
        <div class="modal-right">
          <p class="text-white/80 text-[10px] font-bold bg-black/20 px-3 py-1 rounded-full mb-3">預覽畫面</p>
          <div id="multi-preview" class="w-full max-w-[260px] bg-white rounded-[16px] overflow-hidden shadow-2xl border-4 border-slate-800"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast"></div>

<script>
/* =========================================================
   CONFIG & STATE
========================================================= */
const WORKER_URL   = 'https://travelkeeper.fangwl591021.workers.dev';
const LIFF_ID      = '2009367829-BDZCGti8';
const ENDPOINT_URL = 'https://fangwl591021.github.io/travelkeeper/';

const SOC_DEFS = [
  { key:'phone',  label:'📞 電話',   icon:'https://aiwe.cc/wp-content/uploads/2026/02/7254567388850a6b4d77b75208ebd4b8.png' },
  { key:'line',   label:'💬 LINE',   icon:'https://aiwe.cc/wp-content/uploads/2026/02/b75a5831fd553c7130aeafbb9783cf79.png' },
  { key:'lineAt', label:'🟢 LINE@',  icon:'https://aiwe.cc/wp-content/uploads/2026/02/b75a5831fd553c7130aeafbb9783cf79.png' },
  { key:'fb',     label:'👍 FB',     icon:'https://aiwe.cc/wp-content/uploads/2026/02/3986d1fd62384c8cdaa0e7c82f2740d1.png' },
  { key:'map',    label:'📍 導航',   icon:'https://aiwe.cc/wp-content/uploads/2026/02/5af1a3a285c2bdee4192223e31e1f833.png' },
];

let allItineraries = [];
let filtered       = [];
let selectedIds    = new Set();
let currentMode    = 'single'; // 'single' | 'carousel' | 'multi'
let liffProfile    = null;
let distData       = null;
let singleActiveId = null;

const urlParams = new URLSearchParams(window.location.search);
const REF_UID   = urlParams.get('r') || localStorage.getItem('tracking_ref_uid') || '';

/* =========================================================
   INITIALIZATION
========================================================= */
(async function init() {
  try {
    await liff.init({ liffId: LIFF_ID, withLoginOnExternalBrowser: true });
    if (!liff.isLoggedIn()) { liff.login({ redirectUri: window.location.href }); return; }
    liffProfile = await liff.getProfile();
    document.getElementById('nav-avatar').src = liffProfile.pictureUrl || '';
    document.getElementById('nav-avatar').classList.remove('hidden');
    await loadDistData();
  } catch(e) { console.error('LIFF Init Error', e); }

  await fetchItineraries();
  buildSocCheckboxes();
  setMode('single');
})();

async function loadDistData() {
  try {
    const res = await fetch(`${WORKER_URL}/api/itineraries?action=checkUserStatus&uid=${liffProfile.userId}`);
    const data = await res.json();
    if (data.success && data.data?.role === 'distributor') distData = data.data.distributorData;
  } catch(e) {}
}

async function fetchItineraries() {
  renderSkeletons();
  try {
    const res = await fetch(`${WORKER_URL}/api/itineraries`);
    const data = await res.json();
    allItineraries = Array.isArray(data) ? data : (data?.data || []);
    filtered = allItineraries;
    document.getElementById('count-label').textContent = `共 ${allItineraries.length} 筆行程`;
    renderCards();
  } catch(e) {
    document.getElementById('cards-grid').innerHTML = `<div class="col-span-full py-10 text-center text-slate-500 font-bold">載入失敗</div>`;
  }
}

/* =========================================================
   UI RENDERING
========================================================= */
function renderSkeletons() {
  const grid = document.getElementById('cards-grid');
  grid.innerHTML = Array.from({length:10}).map(() => `
    <div class="bg-white rounded-xl overflow-hidden border-2 border-slate-100">
      <div class="skeleton h-36 w-full"></div>
      <div class="p-3 space-y-2"><div class="skeleton h-3 w-3/4"></div><div class="skeleton h-3 w-1/2"></div></div>
    </div>
  `).join('');
}

function renderCards() {
  const grid = document.getElementById('cards-grid');
  const empty = document.getElementById('empty-state');
  
  if (filtered.length === 0) { grid.innerHTML = ''; empty.classList.remove('hidden'); return; }
  empty.classList.add('hidden');

  grid.innerHTML = filtered.map((item, i) => {
    const isSel = selectedIds.has(String(item.id));
    return `
    <div class="tour-card ${isSel ? 'selected' : ''} anim-fade-up" style="animation-delay:${Math.min(i*20, 200)}ms" data-id="${item.id}" onclick="onCardClick('${item.id}')">
      <div class="card-check" style="${currentMode==='single'?'display:none':''}"><svg width="12" height="12" fill="none" stroke="#fff" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
      <span style="position:absolute;top:8px;right:8px;z-index:5;background:rgba(0,0,0,.6);color:#fff;font-size:10px;font-weight:900;padding:2px 8px;border-radius:6px;">${item.region||'未分類'}</span>
      <div class="overflow-hidden bg-slate-100" style="height:130px;">
        <img src="${item.image}" class="w-full h-full object-cover transition-transform duration-500 hover:scale-105" onerror="this.src='https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?w=400&q=70'">
      </div>
      <div class="p-3">
        <p class="text-[12px] font-bold text-slate-800 line-clamp-2 leading-snug mb-2">${item.title}</p>
        <div class="flex items-center justify-between">
          <span class="text-[10px] font-bold text-slate-400 bg-slate-100 px-2 py-0.5 rounded">${item.days} 天</span>
          <span class="text-[13px] font-black text-[#b82337]">$${Number(item.price).toLocaleString()}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

/* =========================================================
   INTERACTIONS
========================================================= */
function setMode(m) {
  currentMode = m;
  ['single', 'carousel', 'multi'].forEach(id => {
    const btn = document.getElementById(`mode-${id}`);
    if(btn) btn.classList.toggle('active', m === id);
    if(btn) btn.classList.toggle('text-slate-500', m !== id);
  });
  
  const hint = document.getElementById('mode-hint');
  if (m === 'single') hint.textContent = '點擊卡片 → 預覽並傳送單張名片';
  else if (m === 'carousel') hint.textContent = '勾選行程 → 產生左右滑動橫式名片';
  else hint.textContent = '勾選行程 → 產生垂直列表清單名片';

  document.getElementById('select-all-btn').classList.toggle('hidden', m === 'single');
  clearSelection();
  renderCards();
}

function filterCards() {
  const kw = document.getElementById('search-input').value.toLowerCase();
  const region = document.getElementById('filter-region').value;
  filtered = allItineraries.filter(item => {
    const matchKw = !kw || (item.title||'').toLowerCase().includes(kw);
    const matchReg = !region || item.region === region;
    return matchKw && matchReg;
  });
  renderCards();
}

function onCardClick(id) {
  if (currentMode === 'single') {
    singleActiveId = id;
    openModal('single-modal');
    setTimeout(() => renderPreview('single'), 50);
    return;
  }
  
  // Multi / Carousel selection
  const sid = String(id);
  if (selectedIds.has(sid)) selectedIds.delete(sid);
  else {
    if (selectedIds.size >= 8) { showToast('最多只能選擇 8 個行程！'); return; }
    selectedIds.add(sid);
  }
  
  updateBottomBar();
  document.querySelectorAll('.tour-card').forEach(el => {
    if (el.dataset.id === sid) el.classList.toggle('selected', selectedIds.has(sid));
  });
}

function updateBottomBar() {
  const count = selectedIds.size;
  document.getElementById('selected-count').textContent = count;
  const bar = document.getElementById('bottom-bar');
  const btn = document.getElementById('share-btn');
  if (count > 0) {
    bar.classList.add('visible');
    btn.disabled = false; btn.classList.remove('opacity-50', 'cursor-not-allowed');
  } else {
    bar.classList.remove('visible');
    btn.disabled = true; btn.classList.add('opacity-50', 'cursor-not-allowed');
  }
}

function clearSelection() {
  selectedIds.clear();
  updateBottomBar();
  document.querySelectorAll('.tour-card.selected').forEach(el => el.classList.remove('selected'));
}

function toggleSelectAll() {
  if (selectedIds.size === Math.min(filtered.length, 8)) clearSelection();
  else {
    let count = 0;
    filtered.forEach(item => { if (count < 8) { selectedIds.add(String(item.id)); count++; } });
    updateBottomBar(); renderCards();
  }
}

/* =========================================================
   MODAL & PREVIEW LOGIC
========================================================= */
function openShareModal() {
  if (currentMode === 'carousel') {
    document.getElementById('carousel-modal-count').textContent = selectedIds.size;
    openModal('carousel-modal');
    setTimeout(() => renderPreview('carousel'), 50);
  } else {
    document.getElementById('multi-modal-count').textContent = selectedIds.size;
    const items = getSelectedItems();
    if (!document.getElementById('multi-hero-url').value && items[0]) {
      document.getElementById('multi-hero-url').value = items[0].image || '';
    }
    openModal('multi-modal');
    setTimeout(() => renderPreview('multi'), 50);
  }
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(e, id) { if (e.target.id === id) document.getElementById(id).classList.remove('open'); }
function getSelectedItems() { return [...selectedIds].map(id => allItineraries.find(t => String(t.id) === id)).filter(Boolean); }

function buildSocCheckboxes() {
  ['single', 'carousel', 'multi'].forEach(modePrefix => {
    const container = document.getElementById(`${modePrefix}-soc-options`);
    if (!container) return;
    container.innerHTML = SOC_DEFS.map(s => {
      const hasUrl = getSocUrl(s.key);
      return `<div class="soc-check">
        <input type="checkbox" id="soc-${modePrefix}-${s.key}" onchange="renderPreview('${modePrefix}')" ${!hasUrl?'disabled':''}>
        <label for="soc-${modePrefix}-${s.key}" class="${!hasUrl?'opacity-40 bg-gray-50':''}">${s.label}</label>
      </div>`;
    }).join('');
  });
}

function getSocUrl(key) {
  if (!distData) return null;
  const map = { phone: distData.phone, line: distData.lineLink, lineAt: distData.lineAtLink, fb: distData.fbLink, map: distData.mapLink };
  return map[key] || null;
}

function getCheckedSocKeys(modePrefix) {
  return SOC_DEFS.filter(s => {
    const el = document.getElementById(`soc-${modePrefix}-${s.key}`);
    return el && el.checked;
  }).map(s => s.key);
}

function renderButtonsHtml(modePrefix) {
  const keys = getCheckedSocKeys(modePrefix);
  let html = `
    <div style="background:#00B900;color:#fff;text-align:center;padding:9px;border-radius:10px;font-size:11px;font-weight:900;margin-bottom:6px;">查看行程 / 立即報名</div>
    <div style="background:#b82337;color:#fff;text-align:center;padding:9px;border-radius:10px;font-size:11px;font-weight:900;margin-bottom:6px;">📤 分享行程給好友</div>
  `;
  keys.forEach(k => {
    const label = SOC_DEFS.find(s=>s.key===k)?.label || k;
    html += `<div style="background:#f1f5f9;color:#334155;text-align:center;padding:8px;border-radius:10px;font-size:11px;font-weight:700;margin-bottom:6px;">${label}</div>`;
  });
  return html;
}

// Render Engine
function renderPreview(type) {
  if (type === 'single') {
    const tour = allItineraries.find(t => String(t.id) === String(singleActiveId));
    if(!tour) return;
    document.getElementById('single-modal-title').textContent = tour.title;
    document.getElementById('single-preview').innerHTML = `
      <div style="aspect-ratio:20/13;overflow:hidden;background:#e2e8f0;"><img src="${tour.image}" style="width:100%;height:100%;object-fit:cover;"></div>
      <div style="padding:16px;">
        <p style="font-size:14px;font-weight:900;color:#111;line-height:1.4;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${tour.title}</p>
        <div style="margin-bottom:4px;font-size:11px;color:#666;font-weight:bold;"><span style="color:#aaa;margin-right:6px;">天數</span>${tour.days} 天</div>
        <div style="margin-bottom:14px;font-size:14px;font-weight:900;color:#b82337;"><span style="color:#aaa;font-size:10px;font-weight:400;margin-right:6px;">價格</span>TWD ${Number(tour.price).toLocaleString()}</div>
        ${renderButtonsHtml('single')}
      </div>`;
  } 
  else if (type === 'carousel') {
    const items = getSelectedItems();
    const container = document.getElementById('carousel-preview');
    container.innerHTML = items.map(tour => `
      <div style="flex: 0 0 88%; scroll-snap-align: center;" class="bg-white rounded-[16px] overflow-hidden shadow-2xl border-[3px] border-slate-800 flex flex-col">
        <div style="aspect-ratio:20/13;overflow:hidden;background:#e2e8f0;flex-shrink:0;"><img src="${tour.image}" style="width:100%;height:100%;object-fit:cover;"></div>
        <div style="padding:14px;flex:1;display:flex;flex-direction:column;">
          <p style="font-size:13px;font-weight:900;color:#111;line-height:1.3;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${tour.title}</p>
          <div style="margin-bottom:4px;font-size:11px;color:#666;font-weight:bold;"><span style="color:#aaa;margin-right:6px;">天數</span>${tour.days} 天</div>
          <div style="margin-bottom:12px;font-size:13px;font-weight:900;color:#b82337;"><span style="color:#aaa;font-size:10px;font-weight:400;margin-right:6px;">價格</span>TWD ${Number(tour.price).toLocaleString()}</div>
          <div style="margin-top:auto;">${renderButtonsHtml('carousel')}</div>
        </div>
      </div>
    `).join('');
  }
  else if (type === 'multi') {
    const items = getSelectedItems();
    const heroUrl = document.getElementById('multi-hero-url')?.value || (items[0]?.image) || '';
    let html = `<div style="aspect-ratio:12/5;overflow:hidden;background:#f1f5f9;"><img src="${heroUrl}" style="width:100%;height:100%;object-fit:cover;"></div>`;
    items.forEach(item => {
      html += `<div class="preview-item">
        <img src="${item.image}" style="width:40px;height:40px;object-fit:cover;border-radius:6px;margin-right:12px;flex-shrink:0;">
        <div style="flex:1;min-width:0;"><p style="font-size:11px;font-weight:900;color:#111;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${item.title}</p><p style="font-size:11px;font-weight:900;color:#b82337;margin-top:2px;">NT$ ${Number(item.price).toLocaleString()}</p></div>
        <div style="width:28px;height:28px;border-radius:50%;background:#00B900;color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;flex-shrink:0;margin-left:8px;">報</div>
      </div>`;
    });
    const keys = getCheckedSocKeys('multi');
    if (keys.length > 0) {
      html += `<div style="padding:10px;display:flex;justify-content:center;gap:12px;border-top:1px solid #f1f5f9;">
        ${keys.map(k => `<img src="${SOC_DEFS.find(s=>s.key===k).icon}" style="width:20px;height:20px;object-fit:contain;">`).join('')}
      </div>`;
    }
    document.getElementById('multi-preview').innerHTML = html;
  }
}

/* =========================================================
   FLEX MESSAGE BUILDERS & ACTIONS
========================================================= */
function buildOptionsString(modePrefix) {
  const keys = ['phone','line','lineAt','fb','web','map'];
  return keys.map(k => {
    const el = document.getElementById(`soc-${modePrefix}-${k}`);
    return el && el.checked ? '1' : '0';
  }).join('');
}

function createSingleBubble(tour, optsStr) {
  const uid = liffProfile?.userId || '';
  const trackingUrl = `${ENDPOINT_URL}?t=${tour.id}&r=${uid}`;
  const shareLiff   = `https://liff.line.me/${LIFF_ID}?action=share&t=${tour.id}&r=${uid}&o=${optsStr}`;
  const opts = { phone:optsStr[0]==='1', line:optsStr[1]==='1', lineAt:optsStr[2]==='1', fb:optsStr[3]==='1', web:optsStr[4]==='1', map:optsStr[5]==='1' };
  
  const buttons = [
    { type:'button', style:'primary', color:'#00B900', height:'sm', action:{ type:'uri', label:'查看行程 / 立即報名', uri:trackingUrl } },
    { type:'button', style:'primary', color:'#b82337', height:'sm', margin:'sm', action:{ type:'uri', label:'分享行程給好友', uri:shareLiff } }
  ];
  const tPhone = distData?.phone ? formatPhone(distData.phone) : '';
  if (opts.phone && tPhone)             buttons.push({ type:'button', style:'secondary', height:'sm', margin:'sm', action:{ type:'uri', label:'📞 聯絡電話', uri:`tel:${tPhone}` }});
  if (opts.line  && distData?.lineLink) buttons.push({ type:'button', style:'secondary', height:'sm', margin:'sm', action:{ type:'uri', label:'💬 私訊 LINE', uri:distData.lineLink }});
  if (opts.lineAt&& distData?.lineAtLink)buttons.push({ type:'button', style:'secondary', height:'sm', margin:'sm', action:{ type:'uri', label:'🟢 官方 LINE@', uri:distData.lineAtLink }});
  if (opts.fb    && distData?.fbLink)   buttons.push({ type:'button', style:'secondary', height:'sm', margin:'sm', action:{ type:'uri', label:'👍 FB 粉絲專頁', uri:distData.fbLink }});
  if (opts.map   && distData?.mapLink)  buttons.push({ type:'button', style:'secondary', height:'sm', margin:'sm', action:{ type:'uri', label:'📍 門市導航', uri:distData.mapLink }});

  return {
    type: 'bubble', size: 'mega',
    hero: { type:'image', url:tour.image, size:'full', aspectRatio:'20:13', aspectMode:'cover', action:{ type:'uri', uri:trackingUrl } },
    body: { type:'box', layout:'vertical', contents:[
      { type:'text', text:tour.title, weight:'bold', size:'xl', wrap:true },
      { type:'box', layout:'vertical', margin:'lg', spacing:'sm', contents:[
        { type:'box', layout:'baseline', spacing:'sm', contents:[ {type:'text',text:'天數',color:'#aaa',size:'sm',flex:1}, {type:'text',text:`${tour.days} 天`,color:'#666',size:'sm',weight:'bold',flex:4} ]},
        { type:'box', layout:'baseline', spacing:'sm', contents:[ {type:'text',text:'價格',color:'#aaa',size:'sm',flex:1}, {type:'text',text:`TWD ${Number(tour.price).toLocaleString()}`,color:'#b82337',size:'md',weight:'bold',flex:4} ]}
      ]}
    ]},
    footer: { type:'box', layout:'vertical', spacing:'sm', contents:buttons }
  };
}

function buildFlex(type, items, optsStr) {
  if (type === 'single') {
    return { type: 'flex', altText: `推薦行程：${items[0].title}`, contents: createSingleBubble(items[0], optsStr) };
  } 
  else if (type === 'carousel') {
    return {
      type: 'flex', altText: `精選 ${items.length} 個行程輪播`,
      contents: { type: 'carousel', contents: items.map(t => createSingleBubble(t, optsStr)) }
    };
  }
  else if (type === 'multi') {
    const uid = liffProfile?.userId || '';
    const heroUrl = document.getElementById('multi-hero-url')?.value || items[0].image;
    const bodyContents = items.flatMap((item, i) => {
      const trackingUrl = `${ENDPOINT_URL}?t=${item.id}&r=${uid}`;
      const row = {
        type:'box', layout:'horizontal', paddingAll:'5px',
        contents:[
          { type:'image', url:item.image, size:'sm', aspectMode:'cover', aspectRatio:'1:1', flex:1 },
          { type:'box', layout:'vertical', flex:4, offsetStart:'8px', contents:[
            { type:'text', text:item.title, size:'xs', wrap:true, color:'#111111', weight:'bold' },
            { type:'text', text:`NT$ ${Number(item.price).toLocaleString()}`, weight:'bold', size:'xs', color:'#FF0000', margin:'xs' },
          ]},
          { type:'box', layout:'vertical', width:'36px', height:'36px', backgroundColor:'#00B900', cornerRadius:'100px', justifyContent:'center', alignItems:'center', flex:0,
            contents:[{ type:'text', text:'報名', color:'#ffffff', size:'xxs', weight:'bold', align:'center' }], action:{ type:'uri', uri:trackingUrl }
          }
        ]
      };
      return i < items.length-1 ? [row,{type:'separator',color:'#F0F0F0'}] : [row];
    });
    
    // Bottom icons
    const keys = getCheckedSocKeys('multi');
    const getMapUrl = k => {
      const m = { phone:distData?.phone?`tel:${formatPhone(distData.phone)}`:null, line:distData?.lineLink, lineAt:distData?.lineAtLink, fb:distData?.fbLink, map:distData?.mapLink };
      return m[k] || 'https://line.me';
    };
    const footerContents = keys.length > 0 
      ? keys.map(k => ({ type:'image', url:SOC_DEFS.find(s=>s.key===k).icon, size:'xs', aspectRatio:'1:1', animated:true, action:{ type:'uri', uri:getMapUrl(k) } }))
      : [{ type:'text', text:'立即報名精選行程', size:'xs', color:'#aaaaaa', align:'center' }];

    return {
      type: 'flex', altText: `精選 ${items.length} 個推薦行程`,
      contents: { type: 'bubble', size: 'giga',
        hero: { type:'box', layout:'vertical', paddingAll:'0px', contents:[{ type:'image', url:heroUrl, size:'full', aspectRatio:'12:5', aspectMode:'cover' }] },
        body: { type:'box', layout:'vertical', paddingAll:'0px', contents:bodyContents },
        footer: { type:'box', layout:'horizontal', paddingAll:'10px', contents:footerContents, justifyContent:'center', spacing:'lg' }
      }
    };
  }
}

async function executeAction(modePrefix, actionType) {
  let items = [];
  if (modePrefix === 'single') {
    const tour = allItineraries.find(t => String(t.id) === String(singleActiveId));
    if(!tour) return;
    items = [tour];
  } else {
    items = getSelectedItems();
    if(!items.length) return;
  }

  const optsStr = buildOptionsString(modePrefix);
  const uid = liffProfile?.userId || '';

  // 網址類分享 (只適用於 Single)
  if (actionType === 'web') {
    copyText(`${ENDPOINT_URL}?t=${items[0].id}&r=${uid}`, '✅ 純網頁連結已複製！');
  } else if (actionType === 'send') {
    copyText(`https://liff.line.me/${LIFF_ID}?action=send&t=${items[0].id}&r=${uid}&o=${optsStr}`, '✅ 原地傳送連結已複製！');
  } else if (actionType === 'share') {
    copyText(`https://liff.line.me/${LIFF_ID}?action=share&t=${items[0].id}&r=${uid}&o=${optsStr}`, '✅ 群發轉傳連結已複製！');
  } 
  
  // Flex JSON 複製 (適用於 Carousel / Multi)
  else if (actionType === 'copy') {
    const flex = buildFlex(modePrefix, items, optsStr);
    copyText(JSON.stringify(flex, null, 2), '✅ Flex JSON 已複製！貼到 LINE OA 使用');
  } 
  
  // Share Target Picker (全模式通用)
  else if (actionType === 'picker') {
    const flex = buildFlex(modePrefix, items, optsStr);
    try {
      await liff.shareTargetPicker([flex]);
      document.getElementById(`${modePrefix}-modal`).classList.remove('open');
      if(modePrefix !== 'single') clearSelection();
      showToast('✅ 推廣卡片已成功發送！');
    } catch(e) {
      if (modePrefix === 'single') {
        copyText(`https://liff.line.me/${LIFF_ID}?action=share&t=${items[0].id}&r=${uid}&o=${optsStr}`, '✅ 已複製分享連結（通訊錄喚起失敗）');
      } else {
        copyText(JSON.stringify(flex, null, 2), '✅ 已複製 Flex JSON（通訊錄喚起失敗）');
      }
    }
  }
}

/* =========================================================
   UTILS
========================================================= */
function copyText(text, msg) {
  const fallback = t => {
    const ta = document.createElement('textarea'); ta.value = t; ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); showToast(msg); } catch { showToast('❌ 複製失敗'); }
    document.body.removeChild(ta);
  };
  if (navigator.clipboard) { navigator.clipboard.writeText(text).then(() => showToast(msg)).catch(() => fallback(text)); } 
  else { fallback(text); }
}

let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast'); el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}
</script>
