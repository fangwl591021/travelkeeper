<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅遊管家 - 系統登入與驗證</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
  <div id="root" class="w-full max-w-lg"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const LIFF_ID = '2009367829-BDZCGti8';

    function LoginApp() {
      const [step, setStep] = useState('checking');
      const [profile, setProfile] = useState(null);

      useEffect(() => {
        liff.init({ liffId: LIFF_ID, withLoginOnExternalBrowser: true }).then(() => {
          if (!liff.isLoggedIn()) { liff.login(); }
          else { liff.getProfile().then(p => { setProfile(p); setStep('form'); }); }
        });
      }, []);

      return (
        <div className="bg-white p-10 rounded-3xl shadow-xl text-center">
          <h1 className="text-3xl font-black mb-6 text-blue-900">歡迎來到旅遊管家</h1>
          {step === 'checking' && <p>正在進行 LINE 授權驗證...</p>}
          {step === 'form' && profile && (
            <div className="space-y-6 text-left">
              <div className="flex items-center gap-4 bg-gray-50 p-4 rounded-2xl border">
                <img src={profile.pictureUrl} className="w-16 h-16 rounded-full" />
                <p className="font-bold text-xl">{profile.displayName}</p>
              </div>
              <p className="text-gray-500">此帳號尚未完成開通，請填寫基本聯絡手機以便存取系統。</p>
              <input className="w-full p-4 border rounded-xl" placeholder="聯絡手機 (例如 0912...)" />
              <button className="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg">確認註冊並進入系統</button>
            </div>
          )}
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<LoginApp />);
  </script>
</body>
</html>
