<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅遊管家 - 系統登入與驗證</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
  <div id="root" class="w-full max-w-md bg-white p-8 rounded-3xl shadow-xl"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;
    const LIFF_ID = '2009367829-BDZCGti8';

    function LoginApp() {
      const [type, setType] = useState(new URLSearchParams(window.location.search).get('type') || 'user');
      const [profile, setProfile] = useState(null);

      useEffect(() => {
        liff.init({ liffId: LIFF_ID, withLoginOnExternalBrowser: true }).then(() => {
          if (!liff.isLoggedIn()) { liff.login(); }
          else { liff.getProfile().then(setProfile); }
        });
      }, []);

      return (
        <div className="text-center">
          <h2 className="text-2xl font-black mb-4">
            {type === 'tenant' ? '主帳號進駐申請' : type === 'distributor' ? '分銷商申請' : '會員註冊'}
          </h2>
          <p className="text-gray-500 mb-6">您好 {profile?.displayName}，請填寫基本資料完成開通</p>
          <form className="space-y-4 text-left">
            <div><label className="block text-sm font-bold mb-1">真實姓名</label><input className="w-full border p-3 rounded-xl" required /></div>
            <div><label className="block text-sm font-bold mb-1">手機號碼</label><input className="w-full border p-3 rounded-xl" required /></div>
            {type !== 'user' && (
              <>
                <div><label className="block text-sm font-bold mb-1">公司/門市名稱</label><input className="w-full border p-3 rounded-xl" required /></div>
                <div><label className="block text-sm font-bold mb-1">統一編號</label><input className="w-full border p-3 rounded-xl" required /></div>
              </>
            )}
            <button className="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl mt-4">提交申請</button>
          </form>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<LoginApp />);
  </script>
</body>
</html>
