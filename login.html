<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅遊管家 - 智慧旅遊平台 (SaaS 版)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in-up { animation: fadeInUp 0.3s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
  </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800">
  <div id="root"></div>

  <script type="text/babel" data-presets="react,env">
    const { useState, useEffect, useRef } = React;

    // 圖示組件 - 已修正相鄰 JSX 元素錯誤
    const Icon = ({ name, className = "w-6 h-6" }) => {
      const icons = {
        home: (
          <React.Fragment>
            <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </React.Fragment>
        ),
        search: (
          <React.Fragment>
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </React.Fragment>
        ),
        user: (
          <React.Fragment>
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </React.Fragment>
        ),
        briefcase: (
          <React.Fragment>
            <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
          </React.Fragment>
        ),
        calendar: (
          <React.Fragment>
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </React.Fragment>
        ),
        refresh: (
          <React.Fragment>
            <polyline points="23 4 23 10 17 10"/>
            <polyline points="1 20 1 14 7 14"/>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
          </React.Fragment>
        ),
        arrowLeft: (
          <React.Fragment>
            <line x1="19" y1="12" x2="5" y2="12"/>
            <polyline points="12 19 5 12 12 5"/>
          </React.Fragment>
        )
      };
      return (
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
          {icons[name]}
        </svg>
      );
    };

    // ★ 設定 Worker URL
    const WORKER_URL = 'https://travelkeeper.fangwl591021.workers.dev';
    const LOGIN_PAGE = 'login.html';

    function App() {
      const urlParams = new URLSearchParams(window.location.search);
      const agencySlug = urlParams.get('a') || 'demo'; // 租戶代號
      const refUid = urlParams.get('r') || '';       // 推薦人 UID

      const [tenant, setTenant] = useState(null);    // 旅行社配置
      const [itineraries, setItineraries] = useState([]);
      const [activeTab, setActiveTab] = useState('home');
      const [selectedTour, setSelectedTour] = useState(null);
      const [isLoading, setIsLoading] = useState(true);
      const [liffProfile, setLiffProfile] = useState(null);
      const [myStatus, setMyStatus] = useState({ role: 'guest', isAdmin: false });

      // 1. 初始化平台配置
      useEffect(() => {
        const init = async () => {
          try {
            // 抓取旅行社專屬設定 (LIFF ID, Banner 等)
            const configRes = await fetch(`${WORKER_URL}/api/config?a=${agencySlug}`);
            const configData = await configRes.json();
            
            if (configData.success) {
              setTenant(configData.data);
              
              // 初始化該旅行社的 LIFF
              await liff.init({ liffId: configData.data.liff_id });
              if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                setLiffProfile(profile);
                checkStatus(profile.userId);
              }
              
              // 抓取該旅行社的行程
              fetchTours();
            } else {
              console.error("找不到該租戶的配置");
            }
          } catch (e) {
            console.error("初始化錯誤", e);
          } finally {
            setIsLoading(false);
          }
        };
        init();
      }, [agencySlug]);

      const fetchTours = async () => {
        try {
          const res = await fetch(`${WORKER_URL}/api/itineraries?a=${agencySlug}`);
          const data = await res.json();
          setItineraries(Array.isArray(data) ? data : []);
        } catch (e) {
          console.error("獲取行程錯誤", e);
        }
      };

      const checkStatus = async (uid) => {
        try {
          const res = await fetch(`${WORKER_URL}/api/itineraries?action=checkUserStatus&uid=${uid}&a=${agencySlug}`);
          const result = await res.json();
          if (result.success) setMyStatus(result.data);
        } catch (e) {
          console.error("檢查狀態錯誤", e);
        }
      };

      if (isLoading) return (
        <div className="flex flex-col items-center justify-center min-h-screen bg-white">
          <div className="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
          <p className="text-gray-500 font-bold">正在進入專屬平台...</p>
        </div>
      );

      if (!tenant) return <div className="p-20 text-center text-red-500 font-bold text-2xl">系統配置錯誤，請聯絡管理員。</div>;

      return (
        <div className="min-h-screen flex flex-col bg-gray-50">
          {/* 導航列 */}
          <nav className="bg-white shadow-sm sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
            <div className="flex items-center gap-2 cursor-pointer" onClick={() => { setActiveTab('home'); setSelectedTour(null); }}>
              <div className="bg-blue-600 p-1.5 rounded-lg text-white font-black text-xs">TK</div>
              <span className="font-bold text-lg text-blue-900">{tenant.name}</span>
            </div>
            <div className="flex items-center gap-4">
              {liffProfile ? (
                <img src={liffProfile.pictureUrl} className="w-9 h-9 rounded-full border border-gray-200" />
              ) : (
                <button onClick={() => liff.login()} className="bg-[#00B900] text-white px-4 py-1.5 rounded-full text-xs font-bold shadow-sm">登入</button>
              )}
            </div>
          </nav>

          {/* 內容區 */}
          <main className="flex-grow pb-24 md:pb-6">
            {selectedTour ? (
              // 行程詳情頁
              <div className="animate-fade-in bg-white min-h-screen">
                <div className="relative h-[40vh]">
                  <img src={selectedTour.image} className="w-full h-full object-cover" />
                  <button onClick={() => setSelectedTour(null)} className="absolute top-4 left-4 bg-black/50 text-white p-2 rounded-full backdrop-blur-md">
                    <Icon name="arrowLeft" />
                  </button>
                </div>
                <div className="p-6">
                  <span className="bg-red-100 text-red-700 px-3 py-1 rounded-full text-xs font-bold mb-3 inline-block">{selectedTour.region}</span>
                  <h1 className="text-3xl font-black mb-4">{selectedTour.title}</h1>
                  <div className="flex justify-between items-center bg-gray-50 p-4 rounded-2xl mb-6">
                    <div><p className="text-gray-400 text-xs font-bold">價格</p><p className="text-2xl font-black text-red-600">TWD {Number(selectedTour.price).toLocaleString()}</p></div>
                    <div><p className="text-gray-400 text-xs font-bold">天數</p><p className="text-xl font-bold">{selectedTour.days} 天</p></div>
                  </div>
                  <div className="prose max-w-none whitespace-pre-wrap leading-relaxed text-gray-700">
                    {selectedTour.description}
                  </div>
                  <button className="w-full bg-[#b82337] text-white py-4 rounded-2xl font-black text-lg mt-10 shadow-lg shadow-red-100">立即預約報名</button>
                </div>
              </div>
            ) : (
              // 首頁列表
              <div className="animate-fade-in">
                <header className="h-64 relative overflow-hidden">
                  <img src={tenant.banner_url} className="w-full h-full object-cover" />
                  <div className="absolute inset-0 bg-black/30 flex flex-col justify-center items-center text-white p-6 text-center">
                    <h2 className="text-3xl font-black mb-2 drop-shadow-md">探索世界的美好</h2>
                    <p className="text-sm opacity-90">為您精選最優質的旅遊行程</p>
                  </div>
                </header>

                <div className="max-w-6xl mx-auto px-6 py-10">
                  <div className="flex justify-between items-center mb-8 border-b pb-4">
                    <h3 className="text-xl font-bold flex items-center gap-2"><Icon name="calendar" className="w-5 h-5 text-blue-600" /> 精選行程</h3>
                    <span className="text-xs text-gray-400 font-bold">共 {itineraries.length} 筆</span>
                  </div>

                  {itineraries.length === 0 ? (
                    <div className="text-center py-20 text-gray-400 bg-white rounded-3xl border-2 border-dashed border-gray-100">目前尚無行程上架</div>
                  ) : (
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                      {itineraries.map(item => (
                        <div key={item.id} onClick={() => setSelectedTour(item)} className="bg-white rounded-2xl overflow-hidden border border-gray-200 hover:shadow-xl transition-all cursor-pointer group">
                          <div className="h-48 overflow-hidden">
                            <img src={item.image} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />
                          </div>
                          <div className="p-4">
                            <h4 className="font-bold text-lg mb-2 line-clamp-2">{item.title}</h4>
                            <div className="flex justify-between items-end pt-2 border-t border-gray-50">
                              <span className="text-sm text-gray-400 font-bold">{item.days} 天</span>
                              <span className="text-red-600 font-black text-xl">${Number(item.price).toLocaleString()}</span>
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            )}
          </main>

          {/* 底部選單 */}
          <footer className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 px-6 py-2 flex justify-around items-center md:hidden shadow-[0_-4px_10px_rgba(0,0,0,0.03)]">
            <button onClick={() => {setActiveTab('home'); setSelectedTour(null);}} className={`flex flex-col items-center gap-1 ${activeTab==='home'?'text-blue-600':'text-gray-400'}`}><Icon name="home" /><span className="text-[10px] font-bold">首頁</span></button>
            <button onClick={() => setActiveTab('member')} className={`flex flex-col items-center gap-1 ${activeTab==='member'?'text-blue-600':'text-gray-400'}`}><Icon name="user" /><span className="text-[10px] font-bold">會員</span></button>
            <button onClick={() => setActiveTab('dist')} className={`flex flex-col items-center gap-1 ${activeTab==='dist'?'text-blue-600':'text-gray-400'}`}><Icon name="briefcase" /><span className="text-[10px] font-bold">經銷商</span></button>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
