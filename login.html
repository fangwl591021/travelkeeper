<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅遊管家 - 系統登入與驗證</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
  
  <!-- LINE LIFF SDK -->
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    @keyframes spin-slow { 100% { transform: rotate(360deg); } }
    .animate-spin-slow { animation: spin-slow 3s linear infinite; }
  </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800 flex items-center justify-center min-h-screen">
  <div id="root"></div>

  <script type="text/babel" data-presets="react,env">
    const { useState, useEffect } = React;

    // --- 系統變數 ---
    const WORKER_URL = 'https://travelkeeper.fangwl591021.workers.dev';
    const LIFF_ID = '2009367829-BDZCGti8'; 
    const MAIN_APP_URL = 'index.html'; // 註冊完畢後導向的主程式網址

    function LoginApp() {
      const [statusMsg, setStatusMsg] = useState('正在初始化系統環境...');
      const [error, setError] = useState(null);

      useEffect(() => {
        const processLogin = async () => {
          try {
            // 1. 取得網址參數 (判斷是 user 還是 distributor)
            const urlParams = new URLSearchParams(window.location.search);
            const applyType = urlParams.get('type') || 'user';
            
            // 2. 初始化 LIFF
            setStatusMsg('正在連接 LINE 授權服務...');
            await liff.init({ liffId: LIFF_ID });

            // 3. 如果尚未登入，要求登入
            if (!liff.isLoggedIn()) {
              // 記錄當前網址以便登入後跳轉回來繼續流程
              liff.login({ redirectUri: window.location.href });
              return; // 終止後續，等待 LINE 導回
            }

            // 4. 已經登入，取得使用者資訊
            setStatusMsg('授權成功！正在為您註冊/驗證身分...');
            const profile = await liff.getProfile();

            // 5. 呼叫後端 API 寫入對應的資料庫
            const actionType = applyType === 'distributor' ? 'registerDistributor' : 'registerUser';
            const targetTab = applyType === 'distributor' ? 'distributor' : 'member';
            
            const res = await fetch(`${WORKER_URL}/api/itineraries`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ 
                action: actionType, 
                uid: profile.userId, 
                name: profile.displayName,
                pictureUrl: profile.pictureUrl
              })
            });

            const result = await res.json();

            if (result.success) {
              setStatusMsg('驗證完畢！正在前往專屬頁面...');
              // 6. 成功後，導回主程式並加上 tab 參數自動切換頁面
              setTimeout(() => {
                window.location.href = `${MAIN_APP_URL}?tab=${targetTab}`;
              }, 1000);
            } else {
              throw new Error(result.message || '資料庫寫入失敗');
            }

          } catch (err) {
            console.error(err);
            setError(err.message || '登入流程發生未知錯誤，請嘗試重新載入');
          }
        };

        processLogin();
      }, []);

      return (
        <div className="bg-white p-10 rounded-3xl shadow-2xl max-w-md w-full mx-4 text-center border border-gray-100">
          <div className="mb-8 relative">
             <div className="absolute inset-0 bg-blue-100 rounded-full animate-ping opacity-75"></div>
             <div className="relative bg-gradient-to-tr from-blue-600 to-blue-400 w-24 h-24 mx-auto rounded-full flex items-center justify-center shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-12 h-12">
                   <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                </svg>
             </div>
          </div>
          
          <h2 className="text-2xl font-bold text-gray-800 mb-4">系統安全驗證中</h2>
          
          {error ? (
            <div className="bg-red-50 text-red-600 p-4 rounded-xl text-sm font-bold border border-red-200">
              ❌ 錯誤：{error}
            </div>
          ) : (
            <div className="flex flex-col items-center">
               <svg className="animate-spin-slow w-8 h-8 text-blue-500 mb-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                 <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                 <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
               </svg>
               <p className="text-gray-500 font-medium">{statusMsg}</p>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<LoginApp />);
  </script>
</body>
</html>
