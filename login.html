<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>旅遊管家 - 登入</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body class="bg-blue-50 flex items-center justify-center min-h-screen p-4">
  <div id="root" class="w-full max-w-md"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;
    const LIFF_ID = '2009367829-BDZCGti8';

    function LoginApp() {
      const [profile, setProfile] = useState(null);

      useEffect(() => {
        liff.init({ liffId: LIFF_ID, withLoginOnExternalBrowser: true }).then(() => {
          if (!liff.isLoggedIn()) liff.login();
          else liff.getProfile().then(setProfile);
        });
      }, []);

      return (
        <div className="bg-white p-8 rounded-3xl shadow-xl text-center">
          <h2 className="text-2xl font-black mb-4">歡迎登入</h2>
          {profile && (
            <div className="space-y-4">
              <img src={profile.pictureUrl} className="w-20 h-20 rounded-full mx-auto" />
              <p className="font-bold">{profile.displayName}</p>
              <button className="w-full bg-blue-600 text-white font-bold py-3 rounded-xl">進入系統</button>
            </div>
          )}
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<LoginApp />);
  </script>
</body>
</html>
